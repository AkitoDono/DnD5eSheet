                 {alwaysTwoH ? "🤲 2H" : "✋ 1H"}
                </span>
               </div>
              )}

              {/* Skalierung */}
              {it.weapon.scale&&<div style={{display:"flex",alignItems:"center",
               background:"rgba(12,12,18,0.88)",border:"1px solid rgba(255,255,255,0.08)",
               borderRadius:8,padding:"3px 8px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:700}}>{it.weapon.scale}</span>
              </div>}

              {/* Props */}
              {wProps.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
               {wProps.map(p=><span key={p} style={{fontSize:10,color:"rgba(255,255,255,0.3)",
                background:"rgba(12,12,18,0.88)",borderRadius:6,padding:"3px 7px"}}>{p}</span>)}
              </div>}
             </div>
             );
            })()}

            {/* ── ARMOR STAT BAR ── */}
            {(it.type==="armor"||it.type==="shield")&&(()=>{
             const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
             const aWarns = it.type==="armor" ? armorWarnings(it, classNames, ch.stats?.str) : [];
             const profCat = it.armor?.profCategory;
             const catColors2 = {leicht:"#4ade80",mittel:"#60a5fa",schwer:"#f87171"};
             const catLabels2 = {keine:"Keine",leicht:"Leicht",mittel:"Mittel",schwer:"Schwer"};
             return (
             <div style={{
              display:"flex",gap:6,padding:"6px 12px 8px",flexWrap:"wrap",
              borderTop:`1px solid ${it.equipped ? col+"33" : "rgba(15,15,22,0.87)"}`,
             }}>
              {/* RK */}
              <div style={{display:"flex",alignItems:"center",gap:5,
               background:it.equipped?"rgba(96,165,250,0.12)":"rgba(15,15,22,0.87)",
               border:`1px solid ${it.equipped?"rgba(96,165,250,0.3)":"rgba(255,255,255,0.1)"}`,
               borderRadius:8,padding:"3px 9px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>{lang==="en"?"AC":"RK"}</span>
               <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#60a5fa":"rgba(255,255,255,0.5)"}}>
                {it.type==="armor"
                 ? `${it.armor?.ac||10}${it.armor?.bonus?` +${it.armor.bonus}`:""}`
                 : `+${it.shield?.acBonus||2}`}
               </span>
              </div>
              {/* Kategorie-Badge */}
              {it.type==="armor"&&profCat&&profCat!=="keine"&&(()=>{
               const prof = hasArmorProf(classNames, profCat);
               const cc = catColors2[profCat]||"rgba(255,255,255,0.3)";
               return (
                <div style={{display:"flex",alignItems:"center",gap:4,
                 background: prof?`${cc}12`:"rgba(248,113,113,0.08)",
                 border:`1px solid ${prof?cc+"30":"rgba(248,113,113,0.3)"}`,
                 borderRadius:8,padding:"3px 9px"}}>
                 <span style={{fontSize:10,fontWeight:700,color:prof?cc:"#f87171"}}>
                  {prof?"✓":"✗"} {catLabels2[profCat]}
                 </span>
                </div>
               );
              })()}
              {/* STR-Anforderung */}
              {it.type==="armor"&&(it.armor?.minStr||0)>0&&(()=>{
               const ok = (ch.stats?.str||10) >= it.armor.minStr;
               return (
                <div style={{display:"flex",alignItems:"center",gap:4,
                 background:ok?"rgba(12,12,18,0.88)":"rgba(248,113,113,0.08)",
                 border:`1px solid ${ok?"rgba(255,255,255,0.08)":"rgba(248,113,113,0.3)"}`,
                 borderRadius:8,padding:"3px 9px"}}>
                 <span style={{fontSize:10,fontWeight:700,color:ok?"rgba(255,255,255,0.35)":"#f87171"}}>
                  STR {it.armor.minStr}+{!ok&&" ⚠"}
                 </span>
                </div>
               );
              })()}
              {/* Heimlichkeit */}
              {it.type==="armor"&&it.armor?.stealthDisadv&&(
               <div style={{display:"flex",alignItems:"center",gap:4,
                background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.2)",
                borderRadius:8,padding:"3px 9px"}}>
                <span style={{fontSize:10,color:"#f87171",fontWeight:700}}>⚠ Heimlichkeit</span>
               </div>
              )}
             </div>
             );
            })()}

            {/* ── EXPANDED DETAIL ── */}
            {expandedItem===i&&<div style={{padding:"0 12px 12px",borderTop:`1px solid ${it.equipped?col+"22":"rgba(15,15,22,0.87)"}`}}><ItemDetail it={it} i={i}/></div>}
            {/* ── CONTAINER INHALT ── */}
            {isContainer && it.isOpen && (
             <div style={{padding:"0 12px 12px",borderTop:"1px solid rgba(251,191,36,0.15)"}}>
              <div style={{fontSize:10,fontWeight:800,color:"rgba(251,191,36,0.6)",letterSpacing:"0.07em",marginBottom:8,marginTop:8}}>INHALT</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
               {it.contents.map((c,ci)=>(
                <div key={ci} style={{display:"flex",alignItems:"center",gap:5,
                 background:"rgba(12,12,18,0.9)",border:"1px solid rgba(255,255,255,0.1)",
                 borderRadius:8,padding:"3px 10px",fontSize:12}}>
                 <span style={{color:"rgba(255,255,255,0.6)"}}>{c.qty>1?`${c.qty}× `:""}{c.name}</span>
                 <button onClick={()=>upCh(n=>{
                  const newContents = n.inventory[i].contents.filter((_,j)=>j!==ci);
                  if(newContents.length===0){n.inventory[i].contents=null;n.inventory[i].isOpen=false;}
                  else n.inventory[i].contents=newContents;
                  return n;
                 })} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.25)",
                  cursor:"pointer",fontSize:11,padding:"0 1px",lineHeight:1}}>✕</button>
                </div>
               ))}
              </div>
              <button onClick={()=>{

               upCh(n=>{
                const contents = n.inventory[i].contents||[];
                contents.forEach(c=>{
                 const exists = n.inventory.some((x,xi)=>xi!==i&&x.name===c.name&&x.type==="misc");
                 if(!exists) n.inventory.push({...DEFAULT_ITEM,name:c.name,type:"misc",qty:c.qty,equipped:false});
                });
                n.inventory[i].contents=null;
                n.inventory[i].isOpen=false;
                n.inventory[i].name=n.inventory[i].name.replace(/ \(.*\)/,"");
                n.inventory[i].desc="Ausgeleert";
                return n;
               });
              }} style={{marginTop:8,fontSize:11,padding:"4px 10px",borderRadius:8,cursor:"pointer",
               background:"rgba(251,191,36,0.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.3)",
               fontFamily:"inherit",fontWeight:700}}>
               📤 Alles auspacken
              </button>
             </div>
            )}
           </div>
          );
         })}
         <div style={{textAlign:"right",fontSize:11,color:"rgba(255,255,255,0.25)",paddingTop:4}}>
          {lang==="en"?"Weight:":"Gewicht:"} {ch.inventory.reduce((s,it)=>s+(it.weight*it.qty),0).toFixed(1)} / {ch.stats.str*15} lbs
         </div>
        </div>
      }
     </div>
    </>}

    {tab==="features"&&<>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={S.section}>✨ {lang==="en"?"Features & Class Traits":"Features & Klassenmerkmale"}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:-6,marginBottom:10}}>{lang==="en"?"Attribute & skill bonuses are applied everywhere.":"Attribut- & Fertigkeitsboni werden überall eingerechnet."}</div></div><button onClick={()=>upCh(n=>{n.featureList.push({...DEFAULT_FEATURE});return n;})} style={{...S.btnPrimary,fontSize:12,padding:"6px 14px"}}>+ Feature</button></div>

     {ch.featureList.some(f=>f.type==="ki_pool"&&f.active!==false)&&(()=>{
      const charLevel = ch.classes.reduce((s,c)=>s+(c.level||0),0)||1;

      const pool = Object.values(KNOWN_RESOURCE_POOLS).find(p =>
       p.type==="ki_pool" && p.abilities.length > 0 &&
       ch.featureList.some(f=>f.type==="ki_pool"&&p.keywords.some(kw=>((f.keyword||"")+(f.desc||"")).toLowerCase().includes(kw)))
      );
      const futureAbils = pool ? pool.abilities.filter(ab=>(ab.minLevel||1)>charLevel) : [];
      return (
       <div style={{...S.card,border:"2px solid rgba(56,189,248,0.35)",background:"rgba(56,189,248,0.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
         <div>
          <div style={{fontWeight:800,fontSize:14,color:"#38bdf8"}}>⚡ {lang==="en"?"Ki Abilities":"Ki-Fähigkeiten"}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>{lang==="en"?"✓ = visible in overview · Always active · auto-updated per level":"✓ = in Übersicht sichtbar · Immer aktiv · werden automatisch pro Level ergänzt"}</div>
         </div>
         <button onClick={()=>upCh(n=>{n.featureList.push({...DEFAULT_FEATURE,type:"ki_ability",kiCost:1,kiAction:"Bonus-Aktion",active:true});return n;})}
          style={{fontSize:11,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background:"rgba(56,189,248,0.15)",color:"#38bdf8",border:"1px solid rgba(56,189,248,0.35)"}}>
          + {lang==="en"?"Manual":"Manuell"}
         </button>
        </div>

        {/* Aktuelle Ki-Fähigkeiten (editierbar, immer aktiv) */}
        {ch.featureList.filter(f=>f.type==="ki_ability").length===0
         ? <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontStyle:"italic",marginBottom:futureAbils.length?10:0}}>{lang==="en"?"No Ki abilities for this level yet.":"Noch keine Ki-Fähigkeiten für dieses Level."}</div>
         : ch.featureList.map((f,i)=>{
          if(f.type!=="ki_ability") return null;
          const isActive = f.active !== false;
          return (
           <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"8px 10px",borderRadius:10,marginBottom:6,
            transition:"all 0.2s",
            background:isActive?"rgba(56,189,248,0.07)":"rgba(255,255,255,0.02)",
            border:`1px solid ${isActive?"rgba(56,189,248,0.2)":"rgba(18,18,25,0.83)"}`,
            opacity:isActive?1:0.45}}>
            <input type="checkbox" checked={isActive}
             onChange={e=>upCh(n=>{n.featureList[i].active=e.target.checked;return n;})}
             style={{accentColor:"#38bdf8",marginTop:4,flexShrink:0,width:15,height:15,cursor:"pointer"}}
             title={isActive?"In Übersicht anzeigen (abwählen zum Ausblenden)":"Ausgeblendet (anwählen zum Anzeigen)"}/>
            <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 60px 1fr",gap:8,alignItems:"start"}}>
             <div><Label>Name</Label>
              <AutoTextarea value={f.keyword||""} onChange={e=>upCh(n=>{n.featureList[i].keyword=e.target.value;return n;})} placeholder="Flurry of Blows"/>
             </div>
             <div><Label>{L.kiCost}</Label>
              <input type="number" min="0" max="10" value={f.kiCost??1}
               onChange={e=>upCh(n=>{n.featureList[i].kiCost=+e.target.value;return n;})}
               style={{...S.input,textAlign:"center",padding:"4px"}}/>
             </div>
             <div><Label>{L.action}</Label>
              <select value={f.kiAction||"Bonus-Aktion"} onChange={e=>upCh(n=>{n.featureList[i].kiAction=e.target.value;return n;})} style={S.input}>
               {["Bonus-Aktion","Aktion","Reaktion","Nach Treffer","Passiv"].map(a=><option key={a}>{a}</option>)}
              </select>
             </div>
             <div style={{gridColumn:"1/-1"}}><Label>{L.description}</Label>
              <AutoTextarea value={f.desc||""} onChange={e=>upCh(n=>{n.featureList[i].desc=e.target.value;return n;})} placeholder={lang==="en"?"What does this ability do?":"Was macht diese Fähigkeit?"} minRows={1}/>
             </div>
            </div>
           </div>
          );
         })
        }

        {/* Zukünftige Fähigkeiten – gesperrt */}
        {futureAbils.length>0&&(
         <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",letterSpacing:"0.06em",marginBottom:6}}>{L.notAvailYet}</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
           {futureAbils.map(ab=>(
            <div key={ab.name} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,
             background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",opacity:0.5}}>
             <span style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.3)",flex:1}}>{ab.name}</span>
             <span style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontWeight:600}}>{L.fromLevel} {ab.minLevel}</span>
            </div>
           ))}
          </div>
         </div>
        )}
       </div>
      );
     })()}
     {ch.featureList.filter(f=>f.type!=="ki_pool"&&f.type!=="ki_ability").length===0
      ?(<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",padding:"40px 0",fontSize:13}}>{L.noFeatures}</div>)
      :(() => {

       const TYPE_ORDER = {
        limited_use:1, extra_attack:2, sneak_attack:3, attack_bonus:4, bonus_damage:5,
        ac_bonus:6, speed_bonus:7, stat_bonus:8, skill_bonus:9,
        resistance:10, advantage:11, disadvantage:12,
        passive:13, other:14,
       };
       return [...ch.featureList]
        .map((f,i) => ({f,i}))
        .filter(({f}) => f.type!=="ki_pool" && f.type!=="ki_ability")
        .sort((a,b) => (TYPE_ORDER[a.f.type]??99) - (TYPE_ORDER[b.f.type]??99))
        .map(({f,i}) => {
       const isLU = f.type==="limited_use";
       const maxUses  = f.maxUses ?? 1;
       const usesLeft = f.usesLeft ?? maxUses;
       const resetLabel = RESET_TYPES_ACTIVE.find(r=>r.value===f.resetOn)?.label || (lang==="en"?"🌙 Long Rest":"🌙 Lange Rast");
       return (
        <div key={i} style={{...S.card,
         opacity:f.active!==false?1:0.45,
         border:`1px solid ${isLU?(usesLeft>0?`${theme.accent}55`:"rgba(248,113,113,0.3)"):theme.border}`,
         background: theme.card,
         borderLeft: isLU ? `3px solid ${usesLeft>0?theme.accent:"#f87171"}` : undefined,
        }}>
         <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <input type="checkbox" checked={f.active!==false}
           onChange={e=>upCh(n=>{n.featureList[i].active=e.target.checked;return n;})}
           style={{accentColor:theme.accent,marginTop:4}}/>
          <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
           <div><Label>{L.keyword}</Label><AutoTextarea value={f.keyword||""} onChange={e=>upCh(n=>{n.featureList[i].keyword=e.target.value;const upd=autoClassifyFeature({...n.featureList[i]});if(upd.type!==n.featureList[i].type&&(n.featureList[i].type==="passive"||n.featureList[i].type==="other"))n.featureList[i]={...upd};else n.featureList[i].keyword=e.target.value;return n;})} placeholder="e.g. Sneak Attack"/></div>
           <div><Label>{L.type}</Label><select value={f.type} onChange={e=>upCh(n=>{const newType=e.target.value;n.featureList[i].type=newType;n.featureList[i].target="";if(newType==="limited_use"){n.featureList[i].usesLeft=n.featureList[i].maxUses??1;}return n;})} style={S.input}>{FEATURE_TYPES_ACTIVE.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}</select></div>
           <div style={{gridColumn:"1/-1"}}><Label>{L.description}</Label><AutoTextarea value={f.desc||""} onChange={e=>upCh(n=>{n.featureList[i].desc=e.target.value;const upd=autoClassifyFeature({...n.featureList[i]});if(upd.type!==n.featureList[i].type&&(n.featureList[i].type==="passive"||n.featureList[i].type==="other")){n.featureList[i]={...upd};}else{n.featureList[i].desc=e.target.value;}return n;})} placeholder={lang==="en"?"How does it work?":"Wie funktioniert es?"} minRows={2}/></div>

           {isLU && <>
            <div>
             <Label>{L.maxUses}</Label>
             <input type="number" min="1" max="20" value={f.maxUses||1}
              onChange={e=>upCh(n=>{const v=Math.max(1,+e.target.value);const wasF=n.featureList[i].usesLeft==null||(n.featureList[i].usesLeft??n.featureList[i].maxUses)>=(n.featureList[i].maxUses||1);n.featureList[i].maxUses=v;n.featureList[i].usesLeft=wasF?v:Math.min(n.featureList[i].usesLeft??v,v);return n;})}
              style={S.input}/>
            </div>
            <div>
             <Label>{L.resetAt}</Label>
             <select value={f.resetOn||"long"} onChange={e=>upCh(n=>{n.featureList[i].resetOn=e.target.value;return n;})} style={S.input}>
              {RESET_TYPES_ACTIVE.map(r=><option key={r.value} value={r.value}>{r.label}</option>)}
             </select>
            </div>
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:8}}>
             <button onClick={()=>upCh(n=>{n.featureList[i].usesLeft=Math.max(0,(n.featureList[i].usesLeft??1)-1);return n;})}
              disabled={usesLeft<=0}
              style={{background:usesLeft>0?"rgba(248,113,113,0.15)":"rgba(15,15,22,0.87)",
               color:usesLeft>0?"#f87171":"rgba(255,255,255,0.2)",
               border:`1px solid ${usesLeft>0?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.08)"}`,
               borderRadius:8,padding:"5px 12px",cursor:usesLeft>0?"pointer":"not-allowed",
               fontSize:12,fontWeight:800,fontFamily:"inherit"}}>
              {L.use}
             </button>
             <button onClick={()=>upCh(n=>{n.featureList[i].usesLeft=n.featureList[i].maxUses||1;return n;})}
              style={{...S.btnGhost,fontSize:12,padding:"5px 12px"}}>{L.reset}</button>
             <div style={{display:"flex",gap:4,marginLeft:4,flexWrap:"wrap"}}>
              {Array.from({length:maxUses}).map((_,di)=>(
               <div key={di} onClick={()=>upCh(n=>{n.featureList[i].usesLeft=maxUses-di;return n;})}
                style={{width:18,height:18,borderRadius:"50%",cursor:"pointer",transition:"all 0.15s",
                 background:di<usesLeft?theme.accent:"rgba(255,255,255,0.1)",
                 border:`2px solid ${di<usesLeft?theme.accent:"rgba(255,255,255,0.15)"}`,
                 boxShadow:di<usesLeft?`0 0 6px ${theme.accent}88`:"none"}}/>
              ))}
             </div>
             <span style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginLeft:4}}>
              {usesLeft}/{maxUses} · {resetLabel}
             </span>
            </div>
           </>}

           {!isLU && <>
            {f.type!=="passive"&&f.type!=="other"&&f.type!=="resistance"&&f.type!=="advantage"&&f.type!=="disadvantage"&&(
             <div><Label>{f.type==="extra_attack"?(lang==="en"?"Count":"Anzahl"):f.type==="bonus_damage"||f.type==="sneak_attack"?(lang==="en"?"Dice":"Würfel"):L.bonus}</Label>
              <AutoTextarea value={f.value} onChange={e=>upCh(n=>{n.featureList[i].value=e.target.value;return n;})}
               placeholder={f.type==="extra_attack"?"1":f.type==="bonus_damage"||f.type==="sneak_attack"?"2d6":"2"}/></div>
            )}
            {f.type==="stat_bonus"?(<div><Label>{L.attribute}</Label><select value={f.target} onChange={e=>upCh(n=>{n.featureList[i].target=e.target.value;return n;})} style={S.input}><option value="">{lang==="en"?"— choose —":"— wählen —"}</option>{SAVES.map(s=><option key={s} value={s}>{STAT_NAMES[s]}</option>)}</select></div>)
             :f.type==="skill_bonus"?(<div><Label>{L.skill}</Label><select value={f.target} onChange={e=>upCh(n=>{n.featureList[i].target=e.target.value;return n;})} style={S.input}><option value="">{lang==="en"?"— choose —":"— wählen —"}</option>{SKILLS.map(s=><option key={s.name} value={s.name}>{lang==="en"?(SKILL_DE_TO_EN[s.name]||s.name):s.name}</option>)}</select></div>)
             :(<div><Label>{L.note}</Label><AutoTextarea value={f.note} onChange={e=>upCh(n=>{n.featureList[i].note=e.target.value;return n;})} placeholder={lang==="en"?"e.g. once per round":"z.B. einmal pro Runde"}/></div>)}
           </>}
          </div>
          <button onClick={()=>upCh(n=>{n.featureList.splice(i,1);return n;})} style={{...S.btnDanger,padding:"4px 10px",fontSize:13}}>✕</button>
         </div>
        </div>
       );
      })
     })()}
    </>}

    {tab==="notes"&&<>
     <TraitNotesTab ch={ch} upCh={upCh} up={up} theme={theme} S={S} AT={AT} lang={lang}/>
     {/* ── Sprachen ── */}
     <LanguagesCard ch={ch} upCh={upCh} theme={theme} S={S} lang={lang}/>
          <div style={S.card}><div style={S.section}>{L.notes}</div><AT path="notes" placeholder={L.notesPlaceholder} minRows={8}/></div>
    </>}
   </div>}
  </div>
 </div>);
}

class AppErrorBoundary extends React.Component {
 constructor(props) { super(props); this.state = { hasError:false, error:null }; }
 static getDerivedStateFromError(e) { return { hasError:true, error:e }; }
 componentDidCatch(err, info) { console.error("App crash:", err, info); }
 render() {
  if (this.state.hasError) return (
   <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column",
    alignItems:"center", justifyContent:"center", color:"white",
    fontFamily:"system-ui", textAlign:"center", padding:32 }}>
    <div style={{ fontSize:48, marginBottom:16 }}>⚠️</div>
    <div style={{ fontSize:22, fontWeight:800, marginBottom:8 }}>Etwas ist schiefgelaufen</div>
    <div style={{ fontSize:14, color:"#f87171", marginBottom:8,
     fontFamily:"monospace", background:"rgba(239,68,68,0.1)",
     padding:"10px 16px", borderRadius:8, maxWidth:500, wordBreak:"break-all" }}>
     {this.state.error?.message || "Unbekannter Fehler"}
    </div>
    <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:24,
     fontFamily:"monospace", maxWidth:600, textAlign:"left", wordBreak:"break-all",
     whiteSpace:"pre-wrap" }}>
     {(this.state.error?.stack||"").slice(0,800)}
    </div>
    <button onClick={()=>this.setState({hasError:false,error:null})}
     style={{ background:"#fbbf24", color:"#0f1117", border:"none", borderRadius:10,
      padding:"10px 24px", fontWeight:800, fontSize:14, cursor:"pointer" }}>
     Neu laden
    </button>
   </div>
  );
  return this.props.children;
 }
}
const _appRoot = ReactDOM.createRoot(document.getElementById("root"));
_appRoot.render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
