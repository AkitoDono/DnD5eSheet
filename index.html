function autoClassifyFeature(f) {

 const protectedTypes = ["limited_use","ki_pool","ki_ability","sneak_attack","extra_attack",
  "attack_bonus","bonus_damage","ac_bonus","speed_bonus","stat_bonus","skill_bonus","resistance","advantage","disadvantage"];
 if (protectedTypes.includes(f.type)) {

  if (f.type === "ki_pool") {
   if (!f.kiAbilities || f.kiAbilities.length === 0) {
    const text = ((f.keyword||"")+" "+(f.desc||"")).toLowerCase();
    for (const pool of Object.values(KNOWN_RESOURCE_POOLS)) {
     if (pool.type === "ki_pool" && pool.keywords.some(kw => text.includes(kw))) {
      return { ...f, kiAbilities: pool.abilities, resetOn: f.resetOn || pool.resetOn };
     }
    }
   }
  }
  return f;
 }

 const text = ((f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"")).toLowerCase();

 for (const [poolName, pool] of Object.entries(KNOWN_RESOURCE_POOLS)) {
  if (pool.keywords.some(kw => text.includes(kw))) {
   const maxUses = f.maxUses || 1;
   return {
    ...f,
    type: pool.type,
    resetOn: pool.resetOn,
    maxUses,
    usesLeft: f.usesLeft ?? maxUses,
    kiAbilities: pool.abilities.length > 0 ? pool.abilities : undefined,
   };
  }
 }

 const perRoundPatterns = [
  /pro runde/i,
  /per (turn|round)/i,
  /once per turn/i,
  /einmal pro (angriff|zug|kampfrunde)/i,
  /bonus.?aktion/i,
  /als reaktion/i,
 ];
 if (perRoundPatterns.some(p => p.test(text))) return f;

 const limitedPatterns = [
  /einmal pro (langen?|kurzen?) rast/i,
  /(\d+)×? pro (langen?|kurzen?) rast/i,
  /once per (long|short) rest/i,
  /pro tag/i, /per day/i,
  /einmal täglich/i,
  /(\d+)×? pro tag/i,
  /recharges? (on a|after) (long|short)/i,
  /lädt sich.*rast.*auf/i,
  /nach.*rast.*zurück/i,
  /kann.*einmal.*pro (langen?|kurzen?) rast/i,
 ];
 const isLimited = limitedPatterns.some(p => p.test(text));
 if (!isLimited) return f;

 let resetOn = "long";
 if (/kurzen? rast|short rest/i.test(text)) resetOn = "short";

 let maxUses = 1;
 const countMatch = text.match(/(\d+)[×x]?\s*pro/i) || text.match(/(\d+)\s*mal/i);
 if (countMatch) maxUses = Math.min(parseInt(countMatch[1]), 20);

 return { ...f, type:"limited_use", maxUses, usesLeft: maxUses, resetOn };
}

function syncKiAbilities(featureList, classes) {
 let list = [...featureList];
 const totalLevel = (classes||[]).reduce((s,c)=>s+(c.level||0),0)||1;

 for (const pool of Object.values(KNOWN_RESOURCE_POOLS)) {
  if (pool.type !== "ki_pool" || !pool.abilities.length) continue;
  const poolIdx = list.findIndex(f => f.type==="ki_pool" &&
   pool.keywords.some(kw => ((f.keyword||"")+" "+(f.desc||"")).toLowerCase().includes(kw)));
  if (poolIdx === -1) continue;

  const poolF = list[poolIdx];
  const classNames = {
   ki:         ["Mönch","Monk"],
   sorcery:    ["Zauberwirker","Sorcerer","Sorcerer (Zauberwirker)"],
   superiority:["Kämpfer","Fighter","Krieger"],
  };

  const poolKey = Object.keys(KNOWN_RESOURCE_POOLS).find(k => KNOWN_RESOURCE_POOLS[k] === pool);
  const relevantNames = classNames[poolKey] || [];

  let classLevel = totalLevel;
  if (relevantNames.length > 0) {
   const match = (classes||[]).find(c => relevantNames.some(n => (c.name||"").toLowerCase().includes(n.toLowerCase())));
   if (match) classLevel = match.level || 1;
  }

  list[poolIdx] = {
   ...poolF,
   maxUses: classLevel,
   usesLeft: Math.min(poolF.usesLeft ?? classLevel, classLevel),
   note: `${classLevel} Ki-Punkte (= Mönch-Level) · Reset nach kurzer oder langer Rast`,
  };

  const existing = new Set(list.filter(f=>f.type==="ki_ability").map(f=>(f.keyword||"").toLowerCase()));
  for (const ab of pool.abilities) {
   if (ab.minLevel && classLevel < ab.minLevel) continue;
   if (existing.has(ab.name.toLowerCase())) continue;
   list.push({
    ...DEFAULT_FEATURE,
    keyword: ab.name,
    type: "ki_ability",
    kiCost: ab.cost,
    kiAction: ab.action,
    desc: ab.desc,
    active: true,
   });
  }
 }
 return list;
}

function HpButtons({currentHP,maxHP,tempHP,onUpdate,onUpdateTemp,L}){
 if(!L) L=LANG.de;
 const [mode,setMode]=useState(null);const [input,setInput]=useState("");
 const confirm=()=>{const v=parseInt(input);if(isNaN(v)||v<=0){setMode(null);setInput("");return;}if(mode==="heal")onUpdate(Math.min(maxHP,currentHP+v));if(mode==="damage"){const t=tempHP||0;if(t>0){const absorbed=Math.min(t,v);const remaining=v-absorbed;if(onUpdateTemp)onUpdateTemp(t-absorbed);if(remaining>0)onUpdate(Math.max(0,currentHP-remaining));}else{onUpdate(Math.max(0,currentHP-v));}}setMode(null);setInput("");};

rtRest} disabled={shortRestDice===0||shortRestInput===""} style={{flex:1,background:shortRestDice>0&&shortRestInput!==""?"rgba(251,191,36,0.2)":"rgba(15,15,22,0.87)",color:shortRestDice>0&&shortRestInput!==""?"#fbbf24":"rgba(255,255,255,0.2)",border:`1px solid ${shortRestDice>0&&shortRestInput!==""?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"10px 0",fontWeight:800,cursor:shortRestDice>0&&shortRestInput!==""?"pointer":"not-allowed",fontSize:14,fontFamily:"inherit"}}>{L.confirm}</button><button onClick={closeShort} style={{...S.btnGhost,padding:"10px 16px"}}>{L.cancel}</button></div></>:<><div style={{padding:"14px",background:"rgba(251,191,36,0.07)",borderRadius:12,border:"1px solid rgba(251,191,36,0.2)",marginBottom:16}}><div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:6}}>{lang==="en"?"Your roll":"Dein Wurf"} ({shortRestResult.dice}×{dieType}):</div><div style={{fontSize:22,fontWeight:900,color:"#fbbf24",marginBottom:4}}>{shortRestResult.rolled}</div><div style={{fontSize:18,fontWeight:900,color:"#4ade80"}}>+{shortRestResult.healing} HP {lang==="en"?"healed":"geheilt"} ✓</div></div><button onClick={closeShort} style={{width:"100%",background:"rgba(34,197,94,0.15)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"10px 0",fontWeight:800,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>{L.done}</button></>}</>}

    </div>))}

 </div>);

function TraitNotesTab({ ch, upCh, up, theme, S, AT, lang }) {
 if(!lang) lang="de";
 const [openPicker, setOpenPicker] = useState(null);

 const background = ch.background || "";
 const fields = lang==="en" ? [
  { key:"personalityTraits", label:"🧠 Personality",  placeholder:"How does your character behave?" },
  { key:"ideals",            label:"💡 Ideals",        placeholder:"What does your character fight for?" },
  { key:"bonds",             label:"🔗 Bonds",         placeholder:"What keeps your character in the world?" },
  { key:"flaws",             label:"⚠️ Flaws",         placeholder:"What makes your character human?" },
 ] : [
  { key:"personalityTraits", label:"🧠 Persönlichkeit", placeholder:"Wie verhält sich dein Charakter?" },
  { key:"ideals",            label:"💡 Ideale",         placeholder:"Wofür kämpft dein Charakter?" },
  { key:"bonds",             label:"🔗 Bindungen",      placeholder:"Was hält deinen Charakter in der Welt?" },
  { key:"flaws",             label:"⚠️ Schwächen",      placeholder:"Was macht deinen Charakter menschlich?" },
 ];

 const getSuggestions = (fieldKey) => {
  const data = TRAIT_SUGGESTIONS[fieldKey];
  if (!data) return [];
  const byBg = background ? (data.byBackground?.[background] || []) : [];
  const generic = data.generic || [];

  return [...byBg, ...generic.filter(g => !byBg.includes(g))];
 };

 const appendSuggestion = (fieldKey, text) => {
  const current = ch[fieldKey] || "";
  const newVal = current.trim() ? current.trim() + "\n" + text : text;
  up(fieldKey, newVal);
 };

 return (
  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
   <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
    {fields.map(({ key, label, placeholder }) => {
     const suggestions = getSuggestions(key);
     const isOpen = openPicker === key;
     const bgSuggestions = background ? (TRAIT_SUGGESTIONS[key]?.byBackground?.[background] || []) : [];

     return (
      <div key={key} style={S.card}>
       {/* Header */}
       <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <div style={{ ...S.section, fontSize:13, margin:0 }}>{label}</div>
        <button
         onClick={() => setOpenPicker(isOpen ? null : key)}
         style={{
          background: isOpen ? `${theme.accent}22` : "rgba(15,15,22,0.85)",
          border: `1px solid ${isOpen ? theme.accent+"66" : "rgba(255,255,255,0.12)"}`,
          borderRadius: 8, padding:"3px 10px", cursor:"pointer",
          fontFamily:"inherit", fontWeight:700, fontSize:11,
          color: isOpen ? theme.accent : "rgba(255,255,255,0.45)",
          transition:"all 0.15s",
         }}
        >
         {isOpen ? (lang==="en"?"✕ Close":"✕ Schließen") : (lang==="en"?"✦ Suggestions":"✦ Vorschläge")}
        </button>
       </div>

       {/* Suggestions Panel */}
       {isOpen && (
        <div style={{
         marginBottom:10, borderRadius:10,
         border:`1px solid ${theme.accent}33`,
         background:"rgba(255,255,255,0.02)",
         overflow:"hidden",
        }}>
         {/* Background-specific header */}
         {background && bgSuggestions.length > 0 && (
          <div style={{
           padding:"6px 10px", fontSize:10, fontWeight:800,
           color:theme.accent, letterSpacing:"0.07em",
           background:`${theme.accent}0d`,
           borderBottom:`1px solid ${theme.accent}22`,
          }}>
           {lang==="en"?`✦ FITS BACKGROUND: ${background.toUpperCase()}`:`✦ PASSEND ZUM HINTERGRUND: ${background.toUpperCase()}`}
          </div>
         )}
         <div style={{ maxHeight:220, overflowY:"auto", padding:"6px 0" }}>
          {suggestions.map((s, i) => {
           const isBg = bgSuggestions.includes(s);
           const alreadyUsed = (ch[key] || "").includes(s);
           return (
            <div
             key={i}
             onClick={() => !alreadyUsed && appendSuggestion(key, s)}
             style={{
              padding:"7px 10px",
              cursor: alreadyUsed ? "default" : "pointer",
              display:"flex", alignItems:"flex-start", gap:8,
              opacity: alreadyUsed ? 0.35 : 1,
              background: alreadyUsed ? "transparent" : "transparent",
              transition:"background 0.12s",
              borderBottom: i < suggestions.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none",
             }}

            >
             <span style={{
              flexShrink:0, fontSize:12, marginTop:1,
              color: alreadyUsed ? "rgba(255,255,255,0.2)" : isBg ? theme.accent : "rgba(255,255,255,0.25)",
              fontWeight:800,
             }}>
              {alreadyUsed ? "✓" : isBg ? "★" : "·"}
             </span>
             <span style={{
              fontSize:12, color: alreadyUsed ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.7)",
              lineHeight:1.5,
             }}>
              {s}
             </span>
            </div>
           );
          })}
         </div>
         <div style={{
          padding:"6px 10px", fontSize:10,
          color:"rgba(255,255,255,0.2)",
          borderTop:"1px solid rgba(255,255,255,0.06)",
         }}>
          <span style={{ color:theme.accent }}>★</span> {lang==="en"?"Background-specific":"Hintergrund-passend"} &nbsp;·&nbsp; <span style={{ color:"rgba(255,255,255,0.4)" }}>·</span> {lang==="en"?"General":"Allgemein"} &nbsp;·&nbsp; {lang==="en"?"Click to add":"Klicken zum Hinzufügen"}
         </div>
        </div>
       )}

       {/* Text field */}
       <AT path={key} placeholder={placeholder} minRows={3}/>
      </div>
     );
    })}
   </div>
  </div>
 );
}

const HIT_DICE_SIDES = { "1d12":12,"1d10":10,"1d8":8,"1d6":6 };

function LevelUpModal({ cls, currentLevel, ch, onConfirm, onClose, theme }) {
 const lang = localStorage.getItem("dnd5e_lang") || "de";
 const newLevel = currentLevel + 1;
 const clsData  = LEVEL_UP_DATA[cls?.name] || LEVEL_UP_DATA[EN_TO_DE_CLASS[cls?.name]] || null;
 const hitDie   = clsData?.hitDie || cls?.hitDie || ch.hitDice || "1d8";
 const dieSides = HIT_DICE_SIDES[hitDie] || 8;
 const conMod   = Math.floor(((ch.stats?.con || 10) - 10) / 2);
 const newFeatures = clsData?.features?.[newLevel] || [];
 const newPB    = Math.ceil(newLevel / 4) + 1;
 const oldPB    = Math.ceil(currentLevel / 4) + 1;
 const pbChanged = newPB !== oldPB;

 const newSlots = clsData?.spellSlots?.[newLevel] || null;
 const oldSlots = clsData?.spellSlots?.[currentLevel] || null;
 const slotChanges = newSlots ? newSlots.map((v, i) => ({ grade: i+1, delta: v - (oldSlots?.[i] || 0) })).filter(({delta}) => delta > 0) : [];

 const isASI = newFeatures.some(f => f.includes("ASI") || f.includes("Attributsteigerung"));

 const [hpMode, setHpMode]       = useState("roll");
 const [rolledHP, setRolledHP]   = useState(null);
 const [manualHP, setManualHP]   = useState("");
 const [rolling, setRolling]     = useState(false);
 const [asiStats, setAsiStats]   = useState({ str:0,dex:0,con:0,int:0,wis:0,cha:0 });
 const [asiPoints, setAsiPoints] = useState(2);

 const rollHP = () => {
  setRolling(true);
  setTimeout(() => {
   setRolledHP(Math.floor(Math.random() * dieSides) + 1);
   setRolling(false);
  }, 500);
 };

 const hpGain = hpMode === "max"
  ? dieSides + conMod
  : hpMode === "roll"
  ? (rolledHP !== null ? rolledHP + conMod : null)
  : (parseInt(manualHP) ? parseInt(manualHP) + conMod : null);

 const canConfirm = hpGain !== null && hpGain !== undefined;

 const handleConfirm = () => {
  if (!canConfirm) return;
  onConfirm({
   newLevel,
   hpIncrease: Math.max(1, hpGain),
   newFeatures,
   newSlots,
   asiStats: isASI ? asiStats : null,
   pbChanged,
   newPB,
  });
 };

 const STAT_KEYS = ["str","dex","con","int","wis","cha"];
 const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
 const STAT_COLORS = { str:"#ef4444",dex:"#4ade80",con:"#f97316",int:"#818cf8",wis:"#86efac",cha:"#ec4899" };

 const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:10, padding:"7px 10px", color:"white", fontSize:14, outline:"none",
  width:"100%", fontFamily:"inherit" };

 return (
  <div style={{ position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",
   justifyContent:"center",background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",padding:16 }}
   onClick={onClose}>
   <div onClick={e=>e.stopPropagation()} style={{

    padding:"24px 20px",boxShadow:`0 0 60px ${theme.accent}22,0 24px 60px rgba(0,0,0,0.8)`,

     fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>✕</button>

    {/* Header */}
    <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:20 }}>
     <div style={{ width:52,height:52,borderRadius:14,flexShrink:0,
      background:`${theme.accent}18`,border:`2px solid ${theme.accent}55`,
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:26 }}>⬆</div>
     <div>
      <div style={{ fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.3)",
       letterSpacing:"0.08em",textTransform:"uppercase" }}>Level Up!</div>
      <div style={{ fontSize:22,fontWeight:900,color:theme.accent }}>
       {cls?.name || (lang==="en"?"Class":"Klasse")} – Level {newLevel}
      </div>
      {pbChanged && (
       <div style={{ fontSize:12,color:"#4ade80",fontWeight:700,marginTop:2 }}>
        ✦ {lang==="en"?`Proficiency Bonus increases to +${newPB}`:`Übungsbonus steigt auf +${newPB}`}
       </div>
      )}
     </div>
    </div>

    <div style={{ display:"flex",flexDirection:"column",gap:16 }}>

     {/* HP SECTION */}

      </div>

       {lang==="en"?"Hit Die:":"Trefferwürfel:"} <strong style={{color:"rgba(255,255,255,0.7)"}}>{hitDie}</strong> &nbsp;·&nbsp;
       {lang==="en"?"CON Mod:":"CON-Mod:"} <strong style={{color:conMod>=0?"#4ade80":"#f87171"}}>{conMod>=0?"+":""}{conMod}</strong>
      </div>

      <div style={{ display:"flex",gap:6,marginBottom:12 }}>
       {(lang==="en"?[["roll","🎲 Roll"],["max","⬆ Maximum"],["manual","✏ Manual"]]:[["roll","🎲 Würfeln"],["max","⬆ Maximum"],["manual","✏ Manuell"]]).map(([m,l])=>(
        <button key={m} onClick={()=>setHpMode(m)} style={{
         flex:1,padding:"7px 4px",fontSize:11,fontWeight:800,
         borderRadius:10,cursor:"pointer",fontFamily:"inherit",
         border:`2px solid ${hpMode===m?theme.accent:"rgba(255,255,255,0.1)"}`,

         color:hpMode===m?theme.accent:"rgba(255,255,255,0.4)",transition:"all 0.15s",
        }}>{l}</button>
       ))}
      </div>

      {hpMode==="roll" && (
       <div>

        {rolledHP!==null && (

          <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,rolledHP+conMod)} HP</span>
         </div>
        )}
       </div>
      )}
      {hpMode==="max" && (
       <div style={{ textAlign:"center",padding:"12px",background:`${theme.accent}0d`,
        borderRadius:10,border:`1px solid ${theme.accent}33` }}>
        <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:4 }}>{lang==="en"?"Maximum + CON":"Maximum + CON"}</div>
        <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{dieSides}</span>
        <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
        <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
        <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
        <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,dieSides+conMod)} HP</span>
       </div>
      )}
      {hpMode==="manual" && (
       <div>
        <input type="number" min="1" max={dieSides} value={manualHP}
         onChange={e=>setManualHP(e.target.value)}
         placeholder={`1–${dieSides}`}
         style={{...inp,fontSize:22,fontWeight:900,textAlign:"center",padding:"10px"}}/>
        {manualHP && (
         <div style={{ textAlign:"center",marginTop:8,padding:"8px",
          background:`${theme.accent}0d`,borderRadius:10,border:`1px solid ${theme.accent}33`,fontSize:14 }}>
          <span style={{ color:theme.accent,fontWeight:800 }}>{manualHP}</span>
          <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>+</span>

         const delta = count - (oldSlots?.[i]||0);
         return (
          <div key={i} style={{ background:"rgba(192,132,252,0.12)",border:"1px solid rgba(192,132,252,0.35)",
           borderRadius:10,padding:"6px 12px",textAlign:"center" }}>
           <div style={{ fontSize:10,color:"rgba(192,132,252,0.7)",fontWeight:800 }}>{lang==="en"?`LEVEL ${i+1}`:`GRAD ${i+1}`}</div>
           <div style={{ fontSize:18,fontWeight:900,color:"#c084fc" }}>{count}</div>
           {delta>0 && <div style={{ fontSize:10,color:"#4ade80",fontWeight:700 }}>+{delta}</div>}
          </div>
         );
        }).filter(Boolean)}
       </div>
      </div>
     )}

     {/* ASI */}
     {isASI && (
      <div style={{ background:"rgba(12,12,18,0.90)",border:`1px solid ${theme.accent}33`,
       borderRadius:14,padding:"14px 16px" }}>
       <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:4 }}>
        💪 {lang==="en"?"ABILITY SCORE IMPROVEMENT (ASI)":"ATTRIBUTSTEIGERUNG (ASI)"}
       </div>
       <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:12 }}>
        {lang==="en"
         ?<>Distribute <strong style={{color:theme.accent}}>{asiPoints}</strong> point{asiPoints!==1?"s":""} among your attributes (max. +2 per attribute). Or skip for a Feat.</>
         :<>Verteile <strong style={{color:theme.accent}}>{asiPoints}</strong> Punkt{asiPoints!==1?"e":""} auf deine Attribute (max. +2 pro Attribut). Oder überspringe für einen Feat.</>}
       </div>
       <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 }}>
        {STAT_KEYS.map(k=>(
         <div key={k} style={{ textAlign:"center",background:"rgba(12,12,18,0.88)",
          border:`1px solid ${asiStats[k]>0?STAT_COLORS[k]+"55":"rgba(255,255,255,0.1)"}`,
          borderRadius:10,padding:"8px 4px" }}>
          <div style={{ fontSize:10,fontWeight:800,color:STAT_COLORS[k] }}>{STAT_LABELS[k]}</div>
          <div style={{ fontSize:16,fontWeight:900,color:"rgba(255,255,255,0.6)",margin:"3px 0" }}>
           {(ch.stats?.[k]||10)+asiStats[k]}
           {asiStats[k]>0 && <span style={{color:"#4ade80",fontSize:12}}> +{asiStats[k]}</span>}
          </div>
          <div style={{ display:"flex",gap:3 }}>
           <button onClick={()=>{if(asiStats[k]>0)setAsiStats(s=>({...s,[k]:s[k]-1}));setAsiPoints(p=>Math.min(2,p+1));}}
            disabled={asiStats[k]===0}
            style={{ flex:1,background:"rgba(239,68,68,0.2)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",
             borderRadius:6,padding:"2px 0",fontSize:13,cursor:asiStats[k]===0?"not-allowed":"pointer",
             fontFamily:"inherit",opacity:asiStats[k]===0?0.3:1 }}>−</button>
           <button onClick={()=>{if(asiPoints>0&&asiStats[k]<2&&(ch.stats?.[k]||10)+asiStats[k]<20){setAsiStats(s=>({...s,[k]:s[k]+1}));setAsiPoints(p=>p-1);}}}
            disabled={asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20}
            style={{ flex:1,background:"rgba(34,197,94,0.2)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",
             borderRadius:6,padding:"2px 0",fontSize:13,fontFamily:"inherit",
             cursor:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?"not-allowed":"pointer",
             opacity:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?0.3:1 }}>+</button>
          </div>
         </div>
        ))}
       </div>
       {asiPoints > 0 && (
        <div style={{ marginTop:10,fontSize:12,color:"rgba(255,255,255,0.3)",fontStyle:"italic",textAlign:"center" }}>
         {lang==="en"
          ? `${asiPoints} point${asiPoints!==1?"s":""} remaining – or leave them for a Feat.`
          : `Noch ${asiPoints} Punkt${asiPoints!==1?"e":""} übrig – oder lass sie frei für einen Feat.`}
        </div>
       )}
      </div>
     )}

     {/* Confirm */}
     <button onClick={handleConfirm} disabled={!canConfirm} style={{
      width:"100%",background:canConfirm?`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`:"rgba(15,15,22,0.85)",
      color:canConfirm?"white":"rgba(255,255,255,0.2)",border:"none",borderRadius:12,
      padding:"13px 0",fontWeight:900,cursor:canConfirm?"pointer":"not-allowed",
      fontSize:15,fontFamily:"inherit",transition:"all 0.2s",
     }}>
      {canConfirm
       ? (lang==="en" ? `⬆ Confirm Level ${newLevel} (+${Math.max(1,hpGain)} HP)` : `⬆ Level ${newLevel} bestätigen (+${Math.max(1,hpGain)} HP)`)
       : (lang==="en" ? "Set HP first" : "Erst HP festlegen")}
     </button>
    </div>
   </div>
  </div>
 );
}

function WizardLanguagesPicker({ race, subrace, background, cls, fixedLanguages, freeCount, chosen, onChange, theme }) {
 const uiLang = localStorage.getItem("dnd5e_lang") || "de";

 const knownSet = new Set([
  ...fixedLanguages.filter(l =>
   l && !l.startsWith("+") && !l.includes("eine weitere") && !l.includes("nach Wahl") && !l.includes("weitere")
  ),
 ]);
 const chosenSet = new Set(chosen);

 const suggestions = new Set([
  ...(cls?.name ? (LANGUAGE_SUGGESTIONS.byClass[cls.name]||[]) : []),
  ...(race?.name ? (LANGUAGE_SUGGESTIONS.byRace[race.name]||[]) : []),
 ]);

 const toggle = (lang) => {
  if (knownSet.has(lang)) return;
  if (chosenSet.has(lang)) {
   onChange(chosen.filter(l=>l!==lang));
  } else if (chosen.length < freeCount) {
   onChange([...chosen, lang]);
  }
 };

 const addCustom = (val) => {
  const t = val.trim();
  if (!t || chosenSet.has(t) || chosen.length >= freeCount) return;
  onChange([...chosen, t]);
 };

 const [customInput, setCustomInput] = useState("");

 if (freeCount === 0) return null;

 return (

   <div style={{marginBottom:8}}>

    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
     {STANDARD_LANGUAGES.map(lo=>{
      const active = chosenSet.has(lo.name);
      const known  = knownSet.has(lo.name);
      const disabled = known || (!active && chosen.length >= freeCount);
      return (
       <button key={lo.name} onClick={()=>!known&&toggle(lo.name)}

         cursor:known?"not-allowed":disabled?"not-allowed":"pointer",transition:"all 0.15s",
         background:known?"rgba(56,189,248,0.1)":active?`${theme.accent}22`:"rgba(15,15,22,0.85)",
         color:known?"#38bdf8":active?theme.accent:"rgba(255,255,255,0.55)",
         border:`1px solid ${known?"rgba(56,189,248,0.3)":active?`${theme.accent}55`:"rgba(255,255,255,0.12)"}`,

         border:`1px solid ${known?"rgba(167,139,250,0.3)":active?"rgba(167,139,250,0.5)":"rgba(167,139,250,0.15)"}`,
         opacity:(!active&&!known&&disabled)?0.35:1}}>
        {known?(uiLang==="en"?"✓ known ":"✓ bekannt "):active?"✓ ":""}{lo.name}
       </button>
      );
     })}
    </div>
   </div>

   <div style={{display:"flex",gap:6}}>
    <input value={customInput} onChange={e=>setCustomInput(e.target.value)}
     placeholder={uiLang==="en"?"Enter custom language…":"Eigene Sprache eingeben…"}

      background:!customInput.trim()||chosen.length>=freeCount?"rgba(12,12,18,0.88)":`${theme.accent}22`,
      color:!customInput.trim()||chosen.length>=freeCount?"rgba(255,255,255,0.2)":theme.accent,
      border:`1px solid ${!customInput.trim()||chosen.length>=freeCount?"rgba(255,255,255,0.08)":`${theme.accent}44`}`}}>
     + {uiLang==="en"?"Add":"Hinzufügen"}
    </button>
   </div>
  </div>
 );
}
function LanguagesCard({ ch, upCh, theme, S, lang }) {
 if(!lang) lang="de";
 const [addLangOpen, setAddLangOpen] = useState(false);
 const [customLang, setCustomLang]   = useState("");

 const langs = (ch.languages||[]).filter(l=>l&&!l.includes("eine weitere")&&!l.includes("nach Wahl")&&!l.includes("weitere")&&!l.startsWith("+"));
 const knownSet = new Set(langs);
 const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
 const raceName   = (ch.race||"").split(" ")[0];
 const suggestions = new Set([
  ...classNames.flatMap(cn => LANGUAGE_SUGGESTIONS.byClass[cn]||[]),
  ...(LANGUAGE_SUGGESTIONS.byRace[raceName]||[]),
 ]);

 const addLang = (l) => {
  const t = l.trim();
  if (!t) return;
  upCh(n => { if (!(n.languages||[]).includes(t)) { n.languages = [...(n.languages||[]), t]; } return n; });
 };

 return (

     style={{...S.btnGhost,fontSize:12,padding:"4px 12px"}}>
     {addLangOpen?(lang==="en"?"✕ Close":"✕ Schließen"):(lang==="en"?"+ Add Language":"+ Sprache hinzufügen")}
    </button>
   </div>

   {langs.length===0
    ? <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>{lang==="en"?"No languages added yet.":"Noch keine Sprachen eingetragen."}</div>
    : <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:addLangOpen?12:0}}>

        borderRadius:20,padding:"3px 10px"}}>
        <span style={{fontSize:12,fontWeight:700,color:"#38bdf8"}}>🗣 {l}</span>
        <button onClick={()=>upCh(n=>{n.languages=(n.languages||[]).filter((_,i)=>i!==li);return n;})}
         style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.3)",
          cursor:"pointer",fontSize:12,lineHeight:1,padding:"0 2px"}}>✕</button>
       </div>
      ))}
     </div>
   }

   {addLangOpen&&(
    <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:10}}>
     {suggestions.size>0&&(
      <div style={{marginBottom:8}}>
       <div style={{fontSize:10,fontWeight:800,color:"rgba(74,222,128,0.7)",letterSpacing:"0.07em",marginBottom:5}}>✦ {lang==="en"?"RECOMMENDED":"EMPFOHLEN"}</div>
       <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {[...suggestions].filter(l=>!knownSet.has(l)).map(l=>(
         <button key={l} onClick={()=>addLang(l)}
          style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background:"rgba(74,222,128,0.08)",color:"rgba(74,222,128,0.7)",border:"1px solid rgba(74,222,128,0.25)"}}>{l}</button>
        ))}
       </div>
      </div>
     )}
     <div style={{marginBottom:6}}>
      <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.3)",letterSpacing:"0.07em",marginBottom:5}}>{lang==="en"?"STANDARD":"STANDARD"}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
       {STANDARD_LANGUAGES.map(lo=>(
        <button key={lo.name} onClick={()=>!knownSet.has(lo.name)&&addLang(lo.name)}
         title={lo.speakers}
         style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:knownSet.has(lo.name)?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:700,
          background:knownSet.has(lo.name)?"rgba(56,189,248,0.1)":"rgba(15,15,22,0.85)",
          color:knownSet.has(lo.name)?"#38bdf8":"rgba(255,255,255,0.5)",
          border:`1px solid ${knownSet.has(lo.name)?"rgba(56,189,248,0.3)":"rgba(255,255,255,0.1)"}`,
          opacity:knownSet.has(lo.name)?0.6:1}}>
         {knownSet.has(lo.name)?"✓ ":""}{lo.name}
        </button>
       ))}
      </div>
     </div>
     <div style={{marginBottom:8}}>
      <div style={{fontSize:10,fontWeight:800,color:"rgba(167,139,250,0.6)",letterSpacing:"0.07em",marginBottom:5}}>{lang==="en"?"EXOTIC ✦":"EXOTISCH ✦"}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
       {EXOTIC_LANGUAGES.map(lo=>(
        <button key={lo.name} onClick={()=>!knownSet.has(lo.name)&&addLang(lo.name)}
         title={`${lo.speakers} · ${lang==="en"?"Script":"Schrift"}: ${lo.script}`}
         style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:knownSet.has(lo.name)?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:700,
          background:knownSet.has(lo.name)?"rgba(167,139,250,0.1)":"rgba(15,15,22,0.85)",

          opacity:knownSet.has(lo.name)?0.6:1}}>
         {knownSet.has(lo.name)?"✓ ":""}{lo.name}
        </button>
       ))}
      </div>
     </div>
     <div style={{display:"flex",gap:6}}>
      <input value={customLang} onChange={e=>setCustomLang(e.target.value)}
       placeholder={lang==="en"?"Enter custom language…":"Eigene Sprache eingeben…"}
       onKeyDown={e=>{if(e.key==="Enter"){addLang(customLang);setCustomLang("");}}}
       style={{flex:1,background:"rgba(12,12,18,0.9)",border:"1px solid rgba(255,255,255,0.12)",
        borderRadius:8,padding:"5px 10px",color:"white",fontFamily:"inherit",fontSize:12}}/>
      <button onClick={()=>{addLang(customLang);setCustomLang("");}}
       style={{...S.btnPrimary,padding:"5px 12px",fontSize:12}}>+ {lang==="en"?"Add":"Hinzufügen"}</button>
     </div>
    </div>
   )}
  </div>
 );
}

function App(){
 const [themeId,setThemeId]=useState(()=>localStorage.getItem("dnd5e_theme")||"black");
 const theme=THEMES.find(t=>t.id===themeId)||THEMES[0];
 const [lang,setLang]=useState(()=>localStorage.getItem("dnd5e_lang")||"de");
 const L=LANG[lang]||LANG.de;
 const toggleLang=()=>{const nl=lang==="de"?"en":"de";setLang(nl);localStorage.setItem("dnd5e_lang",nl);};
 const FEATURE_TYPES_ACTIVE = lang==="en" ? FEATURE_TYPES_EN : FEATURE_TYPES;
 const RESET_TYPES_ACTIVE   = lang==="en" ? RESET_TYPES_EN   : RESET_TYPES;
 const ITEM_TYPES_ACTIVE    = lang==="en" ? ITEM_TYPES_EN    : ITEM_TYPES;
 const WEAPON_PROPS_ACTIVE  = lang==="en" ? WEAPON_PROPS_EN  : WEAPON_PROPS;
 const DAMAGE_TYPES_ACTIVE  = lang==="en" ? DAMAGE_TYPES_EN  : DAMAGE_TYPES;
 const [screen,setScreen]=useState("select");
 const [currentId,setCurId]=useState(null);
 const [ch,setCh]=useState(DEFAULT);
 const [tab,setTab]=useState("overview");
 const [saved,setSaved]=useState(false);
 const [expandedItem,setExpandedItem]=useState(null);
 const [wepCatalogOpen,setWepCatalogOpen]=useState(false);
 const [wepCatalogFilter,setWepCatalogFilter]=useState({cat:"alle",range:"alle",search:""});
 const [armorCatalogOpen,setArmorCatalogOpen]=useState(false);
 const [packCatalogOpen,setPackCatalogOpen]=useState(false);
 const [charImage,setCharImage]=useState(null);
 const [deathSaves,setDeathSaves]=useState({success:0,fail:0});
 const [deathInput,setDeathInput]=useState("");
 const [deathBanner,setDeathBanner]=useState(null);
 const [restModal,setRestModal]=useState(null);
 const [pendingId,setPendingId]=useState(null);

 const [showInfo,setShowInfo]=useState(false);
 const [levelUpModal,setLevelUpModal]=useState(null);

 const changeTheme=id=>{setThemeId(id);localStorage.setItem("dnd5e_theme",id);document.documentElement.style.background=THEMES.find(t=>t.id===id)?.bg||"#0f1117";};
 useEffect(()=>{document.documentElement.style.background=theme.bg;},[theme]);

 const saveChar=useCallback((data,id)=>{
  try{const all=loadAllChars();const idx=all.findIndex(c=>c.id===id);if(idx>=0)all[idx]={...data,id};else all.push({...data,id});saveAllChars(all);setSaved(true);setTimeout(()=>setSaved(false),1500);}catch{}
 },[]);

 const openChar=(id,data)=>{setCh(mergeChar(data));setCurId(id);setScreen("sheet");setTab("overview");setDeathSaves({success:0,fail:0});setDeathInput("");setDeathBanner(null);setRestModal(null);try{setCharImage(localStorage.getItem(imgKey(id))||null);}catch{setCharImage(null);}};

 const newChar=()=>{
  const id=Date.now().toString();
  setPendingId(id);
  setScreen("wizard");
 };

 const finishWizard=(wizardData)=>{
  const id=pendingId||Date.now().toString();
  const base={...DEFAULT,...wizardData};
  setCh(mergeChar(base));
  setCurId(id);
  saveChar({...base,id},id);
  setScreen("sheet");
  setTab("overview");
  setCharImage(null);
  setDeathSaves({success:0,fail:0});
  setDeathInput("");
  setDeathBanner(null);
  setRestModal(null);
 };

 const skipWizard=()=>{
  const id=pendingId||Date.now().toString();
  setCh({...DEFAULT});
  setCurId(id);
  setScreen("sheet");
  setTab("overview");
  setCharImage(null);
  setDeathSaves({success:0,fail:0});
  setDeathInput("");
  setDeathBanner(null);

 const handleLevelUp=(clsIndex,result)=>{
  upCh(n=>{

   n.classes[clsIndex].level = result.newLevel;

   n.maxHP = (n.maxHP||0) + Math.max(1, result.hpIncrease);
   n.currentHP = (n.currentHP||0) + Math.max(1, result.hpIncrease);

   if(result.asiStats){
    Object.keys(result.asiStats).forEach(k=>{
     if(result.asiStats[k]>0) n.stats[k]=(n.stats[k]||10)+result.asiStats[k];
    });

    if(result.asiStats.con>0){
     const oldConMod=Math.floor(((n.stats.con-result.asiStats.con)-10)/2);
     const newConMod=Math.floor((n.stats.con-10)/2);
     const modDelta=newConMod-oldConMod;
     if(modDelta>0){
      const newTotalLevel=n.classes.reduce((s,c)=>s+(c.level||0),0)||1;
      const extraHP=modDelta*newTotalLevel;
      n.maxHP+=extraHP; n.currentHP+=extraHP;
     }
    }
   }

   if(result.newSlots){
    result.newSlots.forEach((count,i)=>{
     const grade=i+1;
     if(count>0){
      const prevMax=n.spellSlots[grade]?.[1]||0;
      const prevCur=n.spellSlots[grade]?.[0]||0;
      const delta=count-prevMax;
      n.spellSlots[grade]=[Math.min(prevCur+Math.max(0,delta),count),count];
     }
    });
   }

   if(result.newFeatures && result.newFeatures.length>0){
    result.newFeatures.forEach(f=>{
     if(f.includes("ASI")||f.includes("Attributsteigerung")) return;
     n.featureList=n.featureList||[];

      ...DEFAULT_FEATURE,
      keyword:f.length>40?f.slice(0,40)+"…":f,
      desc:f, type:"passive", active:true,
     }));
    });
   }

   n.featureList = syncKiAbilities(n.featureList||[], n.classes);
   return n;
  });
  setLevelUpModal(null);
 };

 activeF.filter(f=>f.type==="passive"||f.type==="other").forEach(f => {

   }

 });

 const totalAC = (() => {
  const dexM = statMod(effStat("dex"));

  const wisM = statMod(effStat("wis"));
  const extras = shieldACBonus + magicACBonus + acBonusF;
  const className = ch.classes?.[0]?.name || "";
  if (!equippedArmor) {
   if (className === "Barbar" || className === "Barbarian") return 10 + dexM + conM + extras;
   if (className === "Mönch"  || className === "Monk")  return 10 + dexM + wisM + extras;
   return 10 + dexM + extras;
  }
  const baseAC = equippedArmor.armor?.ac || 10;
  const bonus  = armorACBonus;
  const armorAddDex = equippedArmor.armor?.addDex ?? ARMOR_CATALOG.find(a => a.name === equippedArmor.name)?.addDex;
  const armorMaxDex = equippedArmor.armor?.maxDex ?? ARMOR_CATALOG.find(a => a.name === equippedArmor.name)?.maxDex;
  if (armorAddDex) {
   const effectiveDex = (armorMaxDex !== null && armorMaxDex !== undefined)
    ? Math.min(dexM, armorMaxDex) : dexM;
   return baseAC + effectiveDex + bonus + extras;
  }
  return baseAC + bonus + extras;
 })();

  <svg style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}} xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="d20grad" cx="50%" cy="40%" r="60%"><stop offset="0%" stopColor={theme.accent} stopOpacity="0.25"/><stop offset="100%" stopColor={theme.accent} stopOpacity="0"/></radialGradient></defs><g transform="translate(50%,50%)" opacity="0.07"><g transform="translate(-120,-120)"><polygon points="120,0 220,60 220,160 170,240 70,240 20,160 20,60" fill="url(#d20grad)" stroke={theme.accent} strokeWidth="1.5"/><line x1="120" y1="0" x2="20" y2="60" stroke={theme.accent} strokeWidth="1"/><line x1="120" y1="0" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="120" y1="0" x2="220" y2="60" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="60" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="60" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="60" x2="20" y2="160" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="60" x2="220" y2="160" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="160" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="160" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="160" x2="70" y2="240" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="160" x2="170" y2="240" stroke={theme.accent} strokeWidth="1"/><line x1="70" y1="240" x2="120" y2="90" stroke={theme.accent} strokeWidth="0.7" strokeDasharray="4,3"/><line x1="170" y1="240" x2="120" y2="90" stroke={theme.accent} strokeWidth="0.7" strokeDasharray="4,3"/><line x1="70" y1="240" x2="170" y2="240" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="160" x2="220" y2="160" stroke={theme.accent} strokeWidth="0.7" strokeDasharray="4,3"/><text x="120" y="145" textAnchor="middle" fontSize="42" fontWeight="900" fill={theme.accent} opacity="0.9" fontFamily="system-ui,sans-serif" letterSpacing="-2">20</text></g></g></svg>

  {deathBanner&&(<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{textAlign:"center",padding:"32px 40px",borderRadius:24,border:`3px solid ${deathBanner==="dead"?"#dc2626":"#16a34a"}`,background:"rgba(10,10,20,0.97)",animation:"flyIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards"}}><div style={{fontSize:64,marginBottom:12}}>{deathBanner==="dead"?"💀":"💚"}</div><div style={{fontSize:32,fontWeight:900,color:deathBanner==="dead"?"#ef4444":"#4ade80",letterSpacing:4}}>{deathBanner==="dead"?(lang==="en"?"DIED":"GESTORBEN"):(lang==="en"?"SURVIVED":"AM LEBEN")}</div></div></div>)}

  {isDying&&(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.92)"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:"32px 24px",width:"100%",maxWidth:380}}>
   {isDead&&<div style={{textAlign:"center"}}><div style={{fontSize:48}}>💀</div><div style={{fontSize:28,fontWeight:900,color:"#ef4444"}}>{lang==="en"?"DEAD":"TOT"}</div></div>}
   {isStable&&!isDead&&<div style={{textAlign:"center"}}><div style={{fontSize:48}}>💚</div><div style={{fontSize:28,fontWeight:900,color:"#4ade80"}}>{lang==="en"?"STABLE":"STABIL"}</div></div>}
   {!isDead&&!isStable&&<div style={{textAlign:"center"}}><div style={{fontSize:48}}>⚰️</div><div style={{fontSize:22,fontWeight:900,color:"#f87171"}}>{lang==="en"?"UNCONSCIOUS":"BEWUSSTLOS"}</div></div>}
   <div style={{...S.card,width:"100%"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{color:"#4ade80",fontWeight:700,fontSize:14}}>✓ {L.successes}</span><div style={{display:"flex",gap:8}}>{[0,1,2].map(i=><div key={i} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${i<deathSaves.success?"#4ade80":"rgba(255,255,255,0.15)"}`,background:i<deathSaves.success?"#16a34a":"transparent"}}/>)}</div></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#f87171",fontWeight:700,fontSize:14}}>✗ {L.failures}</span><div style={{display:"flex",gap:8}}>{[0,1,2].map(i=><div key={i} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${i<deathSaves.fail?"#f87171":"rgba(255,255,255,0.15)"}`,background:i<deathSaves.fail?"#dc2626":"transparent"}}/>)}</div></div></div>
   {!isDead&&!isStable&&(<div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}><label style={{fontSize:11,color:"rgba(255,255,255,0.45)",textAlign:"center",fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>{lang==="en"?"What did you roll? (1–20)":"Was hast du gewürfelt? (1–20)"}</label><div style={{display:"flex",gap:8}}><input type="number" min="1" max="20" value={deathInput} onChange={e=>setDeathInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitDeathSave()} placeholder={lang==="en"?"e.g. 14":"z.B. 14"} style={{...S.input,flex:1,fontSize:24,fontWeight:900,textAlign:"center",padding:"12px 16px"}}/><button onClick={submitDeathSave} style={{...S.btnPrimary,padding:"12px 20px",fontSize:18}}>✓</button></div></div>)}

  <RestModals restModal={restModal} setRestModal={setRestModal} ch={ch} upCh={upCh} totalLevel={totalLevel} deathSaves={deathSaves} setDeathSaves={setDeathSaves} theme={theme} L={L} lang={lang}/>

  {/* ── Waffenkatalog Modal ── */}
  {wepCatalogOpen&&(()=>{
   const filtered = WEAPON_CATALOG.filter(w => {
    if (w.id === "unarmed") return false;
    if (wepCatalogFilter.cat !== "alle" && w.category !== wepCatalogFilter.cat) return false;
    if (wepCatalogFilter.range !== "alle" && w.range !== wepCatalogFilter.range) return false;
    if (wepCatalogFilter.search) {
     const s = wepCatalogFilter.search.toLowerCase();
     if (!w.name.toLowerCase().includes(s) && !w.type.toLowerCase().includes(s) && !(w.props||[]).join(" ").toLowerCase().includes(s)) return false;
    }
    return true;
   });
   const addWep = (w) => {
    const rangeStr = w.rangeStr && w.rangeStr !== "—" ? w.rangeStr : "";
    upCh(n => {
     n.inventory.push({
      ...DEFAULT_ITEM,
      name: w.name, type:"weapon", qty:1, weight: w.weight||0, equipped:false,
      weapon:{
       damage: w.damage, damageType: w.type, damageVers: w.damageVers||null,
       scale: w.scale, bonus:0, props: [...(w.props||[])], range: rangeStr,
       note: w.note||"", catalogId: w.id, category: w.category,
      },
     });
     return n;
    });
    setExpandedItem(ch.inventory.length);
    setWepCatalogOpen(false);
   };
   const catLabels = lang==="en" ? {alle:"All",einfach:"Simple",kriegs:"Martial"} : {alle:"Alle",einfach:"Einfach",kriegs:"Kriegs"};

     <div style={{...S.card,maxWidth:560,width:"95%",maxHeight:"88vh",display:"flex",flexDirection:"column",padding:0,overflow:"hidden",WebkitOverflowScrolling:"touch"}} onClick={e=>e.stopPropagation()}>
      <div style={{padding:"16px 18px 12px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
       <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:900,fontSize:16,color:theme.accent}}>⚔ {lang==="en"?"Add Weapon from Catalog":"Waffe aus Katalog hinzufügen"}</div>
        <button onClick={()=>setWepCatalogOpen(false)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
       </div>
       <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <input
         value={wepCatalogFilter.search}
         onChange={e=>setWepCatalogFilter(f=>({...f,search:e.target.value}))}
         placeholder={lang==="en"?"Search…":"Suche…"}
         style={{...S.input,flex:"1 1 120px",fontSize:12,padding:"5px 10px"}}
        />
        {["alle","einfach","kriegs"].map(c=>(
         <button key={c} onClick={()=>setWepCatalogFilter(f=>({...f,cat:c}))}
          style={{padding:"5px 11px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background: wepCatalogFilter.cat===c ? `${theme.accent}22` : "rgba(15,15,22,0.85)",
           color:      wepCatalogFilter.cat===c ? theme.accent : "rgba(255,255,255,0.4)",
           border:`1px solid ${wepCatalogFilter.cat===c ? theme.accent+"55" : "rgba(255,255,255,0.1)"}`,
          }}>{catLabels[c]}</button>
        ))}
        {["alle","nah","fern"].map(r=>(
         <button key={r} onClick={()=>setWepCatalogFilter(f=>({...f,range:r}))}
          style={{padding:"5px 11px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background: wepCatalogFilter.range===r ? "rgba(251,191,36,0.15)" : "rgba(15,15,22,0.85)",
           color:      wepCatalogFilter.range===r ? "#fbbf24" : "rgba(255,255,255,0.4)",
           border:`1px solid ${wepCatalogFilter.range===r ? "rgba(251,191,36,0.4)" : "rgba(255,255,255,0.1)"}`,
          }}>{rangeLabels[r]}</button>
        ))}
       </div>
      </div>
      <div style={{overflowY:"auto",flex:1,padding:"8px 10px"}}>
       {filtered.length === 0 && (
        <div style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:13,padding:32}}>{lang==="en"?"No weapons found":"Keine Waffen gefunden"}</div>
       )}
       {filtered.map(w => {
        const twoH = handsNeeded(w.props) === 2;
        const versMatch = (w.props||[]).find(p => p.startsWith("Vielseitig"));
        const handIcon = twoH ? "🤲" : "✋";
        const handLabel = twoH ? "2H" : versMatch ? "1H / 2H" : "1H";
        const handColor = twoH ? "#f87171" : versMatch ? "#fbbf24" : "#4ade80";
        return (
         <div key={w.id} onClick={()=>addWep(w)}
          style={{display:"flex",gap:10,alignItems:"flex-start",padding:"9px 10px",borderRadius:10,marginBottom:4,cursor:"pointer",

           transition:"all 0.15s"}}

          <div style={{flex:1,minWidth:0}}>
           <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>

             background: w.category==="einfach" ? "rgba(96,165,250,0.15)" : "rgba(251,191,36,0.15)",
             color:      w.category==="einfach" ? "#60a5fa" : "#fbbf24",
             border:`1px solid ${w.category==="einfach" ? "rgba(96,165,250,0.3)" : "rgba(251,191,36,0.3)"}`,
            }}>{w.category==="einfach"?(lang==="en"?"Simple":"Einfach"):(lang==="en"?"Martial":"Kriegs")}</span>
            <span style={{fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:700,

           </div>
           <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>

       <button onClick={()=>{upCh(n=>{n.inventory.push({...DEFAULT_ITEM,type:"weapon"});return n;});setExpandedItem(ch.inventory.length);setWepCatalogOpen(false);}}
        style={{...S.btnGhost,fontSize:11,padding:"5px 12px"}}>
        ✏ {lang==="en"?"Enter custom weapon":"Eigene Waffe eingeben"}
       </button>
      </div>
     </div>
    </div>
   );
  })()}

  {/* ── Rüstungskatalog Modal ── */}
  {armorCatalogOpen&&(()=>{
   const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
   const strScore = ch.stats?.str||10;
   const addArmor = (a) => {
    upCh(n=>{
     n.inventory.push({
      ...DEFAULT_ITEM,
      name:a.name, type:"armor", qty:1, weight:a.weight||0, equipped:false,
      armor:{
       ac:a.baseAC, stealthDisadv:a.stealthDisadv,
       profCategory:a.profCategory, minStr:a.minStr||0, bonus:0,
       addDex:a.addDex, maxDex:a.maxDex,
      },
     });
     return n;
    });
    setExpandedItem(ch.inventory.length);
    setArmorCatalogOpen(false);
   };
   const catColors = { keine:"rgba(255,255,255,0.3)", leicht:"#4ade80", mittel:"#60a5fa", schwer:"#f87171" };
   const catLabels = lang==="en"
    ? { keine:"None", leicht:"Light", mittel:"Medium", schwer:"Heavy" }
    : { keine:"Keine", leicht:"Leicht", mittel:"Mittel", schwer:"Schwer" };
   const activeArmorCatalog = lang==="en" ? ARMOR_CATALOG_EN : ARMOR_CATALOG;
   return (

      <div style={{padding:"16px 18px 12px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
       <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontWeight:900,fontSize:16,color:theme.accent}}>🛡 {lang==="en"?"Add Armor from Catalog":"Rüstung aus Katalog hinzufügen"}</div>
        <button onClick={()=>setArmorCatalogOpen(false)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
       </div>
       <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:8,lineHeight:1.5}}>

        {" · "}STR: <span style={{color:"rgba(255,255,255,0.6)",fontWeight:700}}>{strScore}</span>
       </div>
       <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {["keine","leicht","mittel","schwer"].map(cat=>{
         const prof = hasArmorProf(classNames, cat);
         return (
          <div key={cat} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700,
           background:`${catColors[cat]}15`, color:catColors[cat],
           border:`1px solid ${catColors[cat]}40`,
           opacity: prof||cat==="keine" ? 1 : 0.4,
          }}>
           {prof||cat==="keine"?"✓":"✗"} {catLabels[cat]}
          </div>
         );

       </div>

        const catColor = catColors[a.profCategory]||"rgba(255,255,255,0.3)";

         ? `${a.baseAC} + DEX${a.maxDex!=null?` (max +${a.maxDex})`:""}`

       { test: t => /heilen|healing|lay on hands|heilende hände/i.test(t),

      const getBadges = (f) => {
       const text = (f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"");
       return BADGE_DEFS.filter(d => d.test(text)).map(d => ({

      const allCount = resist.length+adv.length+disadv.length+extraAtk.length+

          {atkBonus.map((f,i)=><Tag key={i} color="#fbbf24" bg="rgba(251,191,36,0.15)" border="#fbbf24" shape="sharp" note={f.note||f.desc||""}>🎯 {kw(f)}{val(f)}</Tag>)}
         </Section>}

         </Section>}

         </Section>}


        </div>
       </div>

     })()}

     {/* ── KI-POOL & Ki-Fähigkeiten ── */}

      ch.featureList.filter(f=>f.type==="ki_pool"&&f.active!==false).map((f,fi_)=>{
       const fi = ch.featureList.indexOf(f);
       const maxU = f.maxUses ?? ch.classes.reduce((s,c)=>s+(c.level||0),0) ?? 1;

       const kiAbils = ch.featureList.filter(x=>x.type==="ki_ability"&&x.active!==false&&(x.kiCost||0)>0);
       return (

         ...S.card,
         border:`2px solid ${isEmpty?"rgba(248,113,113,0.4)":"rgba(56,189,248,0.45)"}`,

           <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>

               {usesLeft} / {maxU}

              border:`1px solid ${canUse?"rgba(56,189,248,0.2)":"rgba(15,15,22,0.87)"}`,

      {equippedWeapons.length===0&&ch.attacks.length===0&&(

         {lang==="en"

    {tab==="spells"&&<>
     <div style={S.card}><div style={S.section}>✨ {lang==="en"?"Spellcasting":"Zauberwirken"}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><div><Label>{lang==="en"?"Spell Ability":"Zaubermerkmal"}</Label><AT path="spellcastingAbility" placeholder="INT / WIS / CHA"/></div><div><Label>{lang==="en"?"Spell Save DC":"Zauber-SG"}</Label><input type="number" value={ch.spellSaveDC} onChange={e=>up("spellSaveDC",+e.target.value)} style={S.input}/></div><div><Label>{lang==="en"?"Spell Attack":"Zauberangriff"}</Label><input type="number" value={ch.spellAttackBonus} onChange={e=>up("spellAttackBonus",+e.target.value)} style={S.input}/></div></div></div>

a(255,255,255,0.2)",fontStyle:"italic"}}>{lang==="en"?"No spells":"Keine Zauber"}</div>}</div></div>))}

       <button onClick={()=>setWepCatalogOpen(true)} style={{...S.btnGhost,fontSize:12,padding:"6px 14px"}}>⚔ {lang==="en"?"Add Weapon":"Waffe hinzufügen"}</button>

      </div>
     </div>
      {ch.inventory.length===0
       ? <div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",padding:"32px 0",fontSize:13}}>{lang==="en"?"Inventory is empty":"Inventar ist leer"}</div>
       : <div style={{display:"flex",flexDirection:"column",gap:8}}>
         {ch.inventory.map((it,i)=>{
          const isContainer = Array.isArray(it.contents) && it.contents.length > 0;
          const canEquip = it.type==="weapon"||it.type==="armor"||it.type==="shield"||it.type==="magic";
          const typeColors = { weapon:"#f87171", armor:"#60a5fa", shield:"#4ade80", magic:"#c084fc", potion:"#fbbf24", misc:"rgba(255,255,255,0.4)" };
          const typeEmojis = { weapon:"⚔", armor:"🛡", shield:"🔰", magic:"✨", potion:"🧪", misc: isContainer ? "🎒" : "📦" };
          const col = it.equipped ? typeColors[it.type] || theme.accent : "rgba(255,255,255,0.15)";

           <div key={i} style={{
            borderRadius:14, overflow:"hidden",

               const handsUsed = ch.inventory.reduce((sum, x, j) => {

                if (x.type === "shield") return sum + 1;
                if (x.type === "misc" && /fackel|torch/i.test(x.name)) return sum + 1;
                if (x.type === "weapon") return sum + handsNeeded(x.weapon?.props, x.weapon);
                return sum;
               }, 0);
               const thisHands = it.type === "shield" ? 1
                : it.type === "misc" && /fackel|torch/i.test(it.name) ? 1
                : it.type === "weapon" ? handsNeeded(it.weapon?.props, it.weapon)
                : 0;
               const needsHands = thisHands > 0;
               const blocked = !it.equipped && needsHands && (handsUsed + thisHands > 2);
               const conflictMsg = blocked
                ? thisHands === 2
                 ? `Zweihänder – braucht 2 Hände (${handsUsed}/2 belegt)`

                : null;

               const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
               const armorWarns = it.type==="armor"

               return (
                <>
                 <button

                   if (it.equipped) {

                  }}
                  title={conflictMsg || (hasArmorWarn ? armorWarns.join(" | ") : "")}
                  style={{
                   padding:"5px 10px", borderRadius:8,

                   fontFamily:"inherit", fontWeight:800, fontSize:11,

                   background: it.equipped

                    : blocked ? "rgba(248,113,113,0.08)"

                   color: it.equipped
                    ? (hasArmorWarn ? "#fbbf24" : col)
                    : blocked ? "#f87171"
                    : "rgba(255,255,255,0.45)",
                   border:`1px solid ${it.equipped
                    ? (hasArmorWarn ? "rgba(251,191,36,0.5)" : col+"66")
                    : blocked ? "rgba(248,113,113,0.3)"
                    : "rgba(255,255,255,0.12)"}`,
                  }}>
                  {it.equipped
                   ? (hasArmorWarn ? (lang==="en"?"⚠ Equipped":"⚠ Ausgerüstet") : (lang==="en"?"✓ Equipped":"✓ Ausgerüstet"))
                   : blocked ? (lang==="en"?"✗ No space":"✗ Kein Platz")
                   : (lang==="en"?"Equip":"Ausrüsten")}
                 </button>
                 {it.equipped && (
                  <button
                   onClick={()=>upCh(n=>{n.inventory[i].equipped=false;return n;})}
                   style={{
                    padding:"4px 10px", borderRadius:8, cursor:"pointer",
                    fontFamily:"inherit", fontWeight:700, fontSize:10,
                    whiteSpace:"nowrap", transition:"all 0.15s",
                    background:"rgba(15,15,22,0.87)",
                    color:"rgba(255,255,255,0.35)",
                    border:"1px solid rgba(255,255,255,0.1)",
                   }}>
                   {lang==="en"?"Unequip":"Ablegen"}
                  </button>
                 )}

                  <div key={wi} style={{
                   fontSize:10, color:"#fbbf24", textAlign:"left",
                   background:"rgba(251,191,36,0.08)",
                   border:"1px solid rgba(251,191,36,0.25)",
                   borderRadius:6, padding:"3px 8px", lineHeight:1.4,
                   maxWidth:180,
                  }}>⚠ {w}</div>
                 ))}
                 {needsHands && (
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>
                   {it.equipped
                    ? `${thisHands === 2 ? "🤲" : "✋"} ${thisHands}H · ${handsUsed + thisHands}/2 belegt`
                    : blocked
                     ? <span style={{color:"#f87171"}}>{conflictMsg}</span>
                     : `${thisHands}H · ${handsUsed}/2 belegt`
                   }

              <div style={{display:"flex",gap:4}}>

                  border:`1px solid ${it.isOpen?"rgba(251,191,36,0.5)":"rgba(255,255,255,0.1)"}`,
                  borderRadius:7,padding:"4px 8px",cursor:"pointer",
                  color:it.isOpen?"#fbbf24":"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"inherit",fontWeight:700}}
                 title={lang==="en"?"Open/close backpack":"Rucksack öffnen/schließen"}>
                 🎒 {it.isOpen?"▲":"▼"}
                </button>
               )}
               <button onClick={()=>setExpandedItem(expandedItem===i?null:i)}
                style={{flex:1,background:"rgba(15,15,22,0.87)",border:"1px solid rgba(255,255,255,0.1)",
                 borderRadius:7,padding:"4px 6px",cursor:"pointer",
                 color:"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"inherit"}}>
                {expandedItem===i?"▲":"▼"}
               </button>
               <button onClick={()=>{upCh(n=>{n.inventory.splice(i,1);return n;});if(expandedItem===i)setExpandedItem(null);}}
                style={{...S.btnDanger,padding:"4px 8px",fontSize:11}}>✕</button>
              </div>
             </div>
            </div>

            {/* ── WEAPON STAT BAR ── */}
            {it.type==="weapon"&&it.weapon?.damage&&(()=>{
             const wProps = it.weapon.props||[];
             const isVers = wProps.some(p=>p.startsWith("Vielseitig"));
             const alwaysTwoH = wProps.some(p=>p==="Zweihändig"||p==="2H");
             const activeTwo = alwaysTwoH || (isVers && !!it.weapon.twoHanded);
             const wHands = activeTwo ? 2 : 1;
             const activeDmg = (isVers && activeTwo && it.weapon.damageVers) ? it.weapon.damageVers : it.weapon.damage;

             const handColor = activeTwo ? "#fbbf24" : "#4ade80";

             return (
             <div style={{
              display:"flex",gap:6,padding:"6px 12px 10px",flexWrap:"wrap",
              borderTop:`1px solid ${it.equipped ? col+"33" : "rgba(15,15,22,0.87)"}`,
             }}>
              {/* ATK Bonus */}
              <div style={{display:"flex",alignItems:"center",gap:5,
               background:it.equipped?"rgba(74,222,128,0.12)":"rgba(15,15,22,0.87)",
               border:`1px solid ${it.equipped?"rgba(74,222,128,0.3)":"rgba(255,255,255,0.1)"}`,
               borderRadius:8,padding:"3px 9px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>ATK</span>

              <div style={{display:"flex",alignItems:"center",gap:5,
               background:it.equipped?"rgba(248,113,113,0.12)":"rgba(15,15,22,0.87)",

               borderRadius:8,padding:"3px 9px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>DMG</span>

                 style={{
                  padding:"5px 12px",fontSize:12,fontWeight:900,cursor: it.weapon.twoHanded?"pointer":"default",
                  fontFamily:"inherit",border:"none",transition:"all 0.2s",lineHeight:1,
                  background: !it.weapon.twoHanded
                   ? "linear-gradient(135deg,rgba(74,222,128,0.35),rgba(74,222,128,0.2))"

                 </div>
                </button>

                <div style={{width:2,background: activeTwo ? "#fbbf2444" : "#4ade8044"}}/>

                {/* 2H Button – legt alles andere auto ab */}

                 onClick={()=>{
                  if(it.weapon.twoHanded) return;
                  upCh(n=>{

                    if(x.type==="weapon"||x.type==="shield"||(x.type==="misc"&&/fackel|torch/i.test(x.name))) {
                     n.inventory[j].equipped=false;
                    }
                   });
                   n.inventory[i].weapon.twoHanded=true;
                   return n;
                  });
                 }}
                 title="Zweihändig führen – andere Hand-Items werden automatisch abgelegt"
                 style={{
                  padding:"5px 12px",fontSize:12,fontWeight:900,cursor: it.weapon.twoHanded?"default":"pointer",
                  fontFamily:"inherit",border:"none",transition:"all 0.2s",lineHeight:1,
                  background: it.weapon.twoHanded
                   ? "linear-gradient(135deg,rgba(251,191,36,0.35),rgba(251,191,36,0.2))"
                   : "rgba(15,15,22,0.9)",
                  color: it.weapon.twoHanded ? "#fbbf24" : "rgba(255,255,255,0.25)",
                 }}>
                 <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                  <span>🤲 2H</span>
                  <span style={{fontSize:10,fontWeight:700,opacity:0.85}}>{it.weapon.damageVers}</span>
                 </div>

              {/* Hände-Badge (bei nicht-Vielseitig) */}
              {!isVers&&(
               <div style={{display:"flex",alignItems:"center",

                borderRadius:8,padding:"3px 8px"}}>
