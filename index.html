  <style>*{box-sizing:border-box;margin:0;padding:0;} html{transition:background 0.5s;} body{color:white;font-family:system-ui,sans-serif;background:transparent;} input[type=number]::-webkit-inner-spin-button{opacity:0.4;} input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2);} select option{background:#1a1d2e;} ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;} .stat-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;} .stat-grid-rk{display:grid;grid-template-columns:52px repeat(6,1fr);gap:6px;} .rk-box-mobile{display:none;} .skills-mobile{display:none;} .tab-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;} .tab-bar button{text-align:center;min-height:36px;} @media (max-width:600px){.stat-grid-6{grid-template-columns:repeat(3,1fr);gap:6px;} .stat-grid-rk{grid-template-columns:repeat(3,1fr);gap:6px;} .rk-box-desktop{display:none !important;} .rk-box-mobile{display:flex !important;} .overview-grid{grid-template-columns:1fr !important;} .skills-sidebar{display:none !important;} .skills-mobile{display:block !important;} .tab-bar{gap:3px !important;} .tab-bar button{font-size:10px !important;padding:8px 3px !important;min-height:34px !important;} .wizard-nav{flex-direction:column !important;} .wizard-nav button{width:100% !important;} .feature-tags{flex-direction:column !important;} .feature-tags >div{max-width:100% !important;width:100% !important;} .inv-action-col{flex-direction:row !important;flex-wrap:wrap !important;} .wizard-card-grid{grid-template-columns:1fr !important;} .rk-preview-row{gap:12px !important;padding:12px !important;} .ki-ability-row{flex-wrap:wrap !important;} .ki-ability-row button{align-self:flex-start !important;} .sheet-card{padding:10px 10px !important;} .lu-row{flex-wrap:wrap !important;gap:8px !important;} } @media (min-width:601px){.skills-mobile{display:none !important;} } #root >*{position:relative;z-index:1;} @keyframes flyIn{0%{transform:translateY(-300px) scale(0.5);opacity:0}60%{transform:translateY(20px) scale(1.08);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}} @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}} @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}} @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}} .wizard-fade{animation:fadeIn 0.35s ease forwards;} .wizard-slide{animation:slideIn 0.3s ease forwards;} @keyframes rollPulse{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}} .card-hover{transition:all 0.2s ease;cursor:pointer;} .card-hover:hover{transform:translateY(-2px);} *{-webkit-tap-highlight-color:transparent;} button,select,input,textarea{touch-action:manipulation;} input[type="number"]{-webkit-appearance:none;} button{user-select:none;-webkit-user-select:none;} @media (max-width:600px){.tab-bar button{min-height:44px !important;} select,input,textarea{font-size:16px !important;} }</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

function InfoModal({ onClose, theme }) {
 return (
  <div
   style={{
    position: "fixed", inset: 0, zIndex: 100,
    display: "flex", alignItems: "center", justifyContent: "center",
    background: "rgba(0,0,0,0.85)", backdropFilter: "blur(6px)",
    padding: "16px",
   }}
   onClick={onClose}
  >
   <div
    onClick={e => e.stopPropagation()}
    style={{
     maxWidth: 420, width: "100%",
     background: "#0f1117",
     border: `1px solid ${theme.accent}44`,
     borderRadius: 20,
     padding: "28px 24px",
     boxShadow: `0 0 60px ${theme.accent}22, 0 24px 60px rgba(0,0,0,0.8)`,
     animation: "modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",
     position: "relative",
    }}
   >
    {/* Close button */}
    <button
     onClick={onClose}
     style={{
      position: "absolute", top: 14, right: 14,
      background: "rgba(18,18,25,0.83)",
      border: "1px solid rgba(255,255,255,0.1)",
      borderRadius: 8, width: 30, height: 30,
      color: "rgba(255,255,255,0.5)", cursor: "pointer",
      fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "inherit",
     }}
    >✕</button>

    {/* Header */}
    <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
     <div style={{
      width: 52, height: 52, borderRadius: 14, flexShrink: 0,
      background: `${theme.accent}18`,
      border: `2px solid ${theme.accent}55`,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: 26,
     }}>⚔</div>
     <div>
      <div style={{ fontSize: 20, fontWeight: 900, color: theme.accent, lineHeight: 1.2 }}>
       D&amp;D 5e Sheet
      </div>
      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>
       Persönliches Hobbyprojekt
      </div>
     </div>
    </div>

    {/* Description */}
    <div style={{
     fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.75,
     marginBottom: 20,
    }}>
     Dieses Tool ist ein digitales Charakterblatt für{" "}
     <span style={{ color: theme.accent, fontWeight: 700 }}>Dungeons &amp; Dragons 5e</span>.
     Es ersetzt das klassische Papierblatt und bietet einen geführten Charakter-Wizard,
     automatische Berechnungen für Modifikatoren, Fertigkeiten und Rettungswürfe,
     sowie eine vollständige Inventar- und Zauberverwaltung.
    </div>

    {/* Features list */}
    <div style={{
     background: "rgba(12,12,18,0.90)",
     border: "1px solid rgba(255,255,255,0.08)",
     borderRadius: 12, padding: "14px 16px", marginBottom: 20,
    }}>
     <div style={{ fontSize: 11, fontWeight: 800, color: theme.accent, letterSpacing: "0.07em", marginBottom: 10 }}>
      ✦ WAS DIESES TOOL KANN
     </div>
     {[
      ["🧙", "Charakter-Wizard mit Klassen, Rassen & Hintergrund"],
      ["⚔", "Kampf-Tracker mit HP, RK, Initiative & Rast-Funktionen"],
      ["✨", "Zauberverwaltung mit Slots für alle Grade"],
      ["🎒", "Inventar mit Waffen, Rüstungen & Münzen"],
      ["💾", "Automatisches Speichern – alles bleibt erhalten"],
      ["📱", "Funktioniert auf Handy und Desktop"],
     ].map(([icon, text], i) => (
      <div key={i} style={{
       display: "flex", gap: 10, alignItems: "flex-start",
       marginBottom: i < 5 ? 8 : 0,
       fontSize: 13, color: "rgba(255,255,255,0.65)",
      }}>
       <span style={{ flexShrink: 0, fontSize: 15 }}>{icon}</span>
       <span>{text}</span>
      </div>
     ))}
    </div>

    {/* Footer note */}
    <div style={{
     display: "flex", alignItems: "center", gap: 10,
     background: `${theme.accent}0d`,
     border: `1px solid ${theme.accent}33`,
     borderRadius: 10, padding: "10px 14px",
     fontSize: 12, color: "rgba(255,255,255,0.5)", lineHeight: 1.6,
    }}>
     <span style={{ fontSize: 18, flexShrink: 0 }}>🛠</span>
     <span>
      Dieses Projekt wird persönlich gepflegt und ständig weiterentwickelt.
      Neue Features und Verbesserungen kommen regelmäßig dazu.
     </span>
    </div>

    {/* Close button bottom */}
    <button
     onClick={onClose}
     style={{
      width: "100%", marginTop: 20,
      background: `linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`,
      color: "white", border: "none", borderRadius: 12,
      padding: "11px 0", fontWeight: 800, cursor: "pointer",
      fontSize: 14, fontFamily: "inherit",
     }}
    >
     Verstanden ✓
    </button>
   </div>
  </div>
 );
}

const STANDARD_LANGUAGES = [
 { name:"Gemeinsprache",   script:"Gemein",    speakers:"Menschen, Halblinge, Halb-Elfen, Halborks",      type:"standard" },
 { name:"Zwergisch",       script:"Zwergisch", speakers:"Zwerge",                                         type:"standard" },
 { name:"Elfisch",         script:"Elfisch",   speakers:"Elfen",                                          type:"standard" },
 { name:"Riesisch",        script:"Zwergisch", speakers:"Oger, Riesen",                                   type:"standard" },
 { name:"Gnomisch",        script:"Zwergisch", speakers:"Gnome",                                          type:"standard" },
 { name:"Goblinisch",      script:"Zwergisch", speakers:"Goblins, Hobgoblins, Bugbears",                  type:"standard" },
 { name:"Halblingisch",    script:"Gemein",    speakers:"Halblinge",                                      type:"standard" },
 { name:"Orkisch",         script:"Zwergisch", speakers:"Orks",                                           type:"standard" },
];

const EXOTIC_LANGUAGES = [
 { name:"Abyssisch",       script:"Infernalisch", speakers:"Dämonen, chaotisch-böse Außenweltler",        type:"exotic" },
 { name:"Celestisch",      script:"Celestisch",   speakers:"Himmlische, gutartige Außerweltler",          type:"exotic" },
 { name:"Drakonisch",      script:"Drakonisch",   speakers:"Drachen, Drachenborn, Kobolds",               type:"exotic" },
 { name:"Tiefensprache",   script:"—",            speakers:"Illithiden, Aboleths (Telepathie-Zeichen)",   type:"exotic" },
 { name:"Infernalisch",    script:"Infernalisch", speakers:"Teufel, Tieflinge",                           type:"exotic" },
 { name:"Sylvanisch",      script:"Elfisch",      speakers:"Fey-Kreaturen, Waldgeister",                  type:"exotic" },
 { name:"Unterdunkel",     script:"Elfisch",      speakers:"Drow und Unterdunkelwesen",                   type:"exotic" },
 { name:"Primordialisch",  script:"Zwergisch",    speakers:"Elementarwesen (inkl. Auran, Aquan, Ignan, Terran)", type:"exotic" },
 { name:"Gnollisch",       script:"—",            speakers:"Gnolls",                                      type:"exotic" },
 { name:"Koboldisch",      script:"Drakonisch",   speakers:"Kobolds",                                     type:"exotic" },
];
const ALL_LANGUAGES = [...STANDARD_LANGUAGES, ...EXOTIC_LANGUAGES].map(l=>l.name);

const LANGUAGE_SUGGESTIONS = {

 byClass: {
  "Kleriker":           ["Celestisch","Infernalisch","Abyssisch"],
  "Paladin":            ["Celestisch","Infernalisch"],
  "Zauberer (Magier)":  ["Drakonisch","Sylvanisch","Primordialisch"],
  "Hexenmeister":       ["Abyssisch","Infernalisch","Sylvanisch"],
  "Druide":             ["Sylvanisch","Primordialisch","Riesisch"],
  "Waldläufer":         ["Elfisch","Orkisch","Goblinisch"],
  "Barde":              ["Elfisch","Sylvanisch","Gnomisch"],
  "Barbar":             ["Riesisch","Orkisch","Gnollisch"],
  "Kämpfer":            ["Orkisch","Goblinisch","Riesisch"],
  "Schurke":            ["Goblinisch","Unterdunkel","Infernalisch"],
  "Mönch":              ["Drakonisch","Celestisch","Sylvanisch"],
 },

 byRace: {
  "Zwerg":    ["Riesisch","Goblinisch","Orkisch"],
  "Elf":      ["Sylvanisch","Unterdunkel","Primordialisch"],
  "Halbling": ["Gnomisch","Goblinisch","Zwergisch"],
  "Mensch":   ["Elfisch","Zwergisch","Drakonisch"],
  "Dragonborn":["Drakonisch","Infernalisch","Riesisch"],
  "Gnom":     ["Sylvanisch","Goblinisch","Zwergisch"],
  "Halb-Elf": ["Sylvanisch","Unterdunkel","Elfisch"],
  "Halbork":  ["Riesisch","Goblinisch","Orkisch"],
  "Tiefling": ["Infernalisch","Abyssisch","Drakonisch"],
 },
};

const ALL_LANGUAGES_WITH_META = [...STANDARD_LANGUAGES, ...EXOTIC_LANGUAGES];

const ALL_SKILLS_LIST = [
 "Akrobatik","Arkane Kunde","Athletik","Auftreten","Einschüchtern","Geschichte",
 "Heimlichkeit","Medizin","Mit Tieren umgehen","Motiv erkennen","Natur","Überleben",
 "Überzeugung","Taschendiebstahl","Täuschen","Wahrnehmung","Religion","Untersuchen",
];

const STAT_KEYS_ALL  = ["str","dex","con","int","wis","cha"];
const STAT_LABELS_FC = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
const STAT_COLORS_FC = { str:"#ef4444",dex:"#4ade80",con:"#f97316",int:"#818cf8",wis:"#86efac",cha:"#ec4899" };

function detectFreeChoices(race, subrace, background) {
 const choices = [];
 const raceName = race?.name || "";
 const srName   = subrace?.name || "";

 if (srName.includes("Varianten-Mensch")) {
  choices.push({ id:"vm_stats", type:"stat_free", count:2, label:"Attributsteigerung (Varianten-Mensch)", desc:"Wähle 2 verschiedene Attribute, die je +1 erhalten.", max1perStat:true });
  choices.push({ id:"vm_skill", type:"skill_free", count:1, label:"Fertigkeit (Varianten-Mensch)", desc:"Wähle 1 Fertigkeit als geübt." });
 }

 if (raceName === "Halb-Elf") {
  choices.push({ id:"halfelf_stats", type:"stat_free", count:2, label:"Attributsteigerung (Halb-Elf)", desc:"Wähle 2 verschiedene Attribute (nicht CHA), die je +1 erhalten.", exclude:["cha"] });
  choices.push({ id:"halfelf_skills", type:"skill_free", count:2, label:"Fertigkeiten (Skill Versatility)", desc:"Wähle 2 Fertigkeiten als geübt." });
 }

 if (srName.includes("Hochelf")) {
  choices.push({ id:"highelf_lang", type:"language_free", count:1, label:"Sprache (Hochelf)", desc:"Hochelfen lernen eine weitere Sprache ihrer Wahl.", suggestFor:{race:raceName} });
 }

 if (raceName === "Mensch" && !srName.includes("Varianten")) {
  choices.push({ id:"human_lang", type:"language_free", count:1, label:"Sprache (Mensch)", desc:"Menschen sprechen die Gemeinsprache und eine weitere Sprache ihrer Wahl.", suggestFor:{race:"Mensch"} });
 }

 if (raceName === "Halb-Elf") {
  choices.push({ id:"halfelf_lang", type:"language_free", count:1, label:"Sprache (Halb-Elf)", desc:"Halb-Elfen sprechen eine weitere Sprache ihrer Wahl.", suggestFor:{race:"Halb-Elf"} });
 }

 const bgLangCount = typeof background?.languages === "number" ? background.languages : 0;
 if (bgLangCount > 0) {
  choices.push({
   id:"bg_lang",
   type:"language_free",
   count: bgLangCount,
   label:`Sprache${bgLangCount>1?"n":""} (${background?.name||"Hintergrund"})`,
   desc:`Dein Hintergrund gibt dir ${bgLangCount} freie Sprachenwahl${bgLangCount>1?"en":""}.`,
   suggestFor:{ class: null },
  });
 }

 return choices;
}

function FreeChoiceModal({ choices, currentStats, currentSkillProfs, onConfirm, onClose, theme }) {

 const initState = () => {
  const s = {};
  choices.forEach(c => {
   if (c.type === "stat_free")     s[c.id] = {};
   if (c.type === "skill_free")    s[c.id] = [];
   if (c.type === "language_free") s[c.id] = [];
   if (c.type === "custom_text")   s[c.id] = "";
  });
  return s;
 };
 const [values, setValues] = useState(initState);
 const [customInputs, setCustomInputs] = useState({});

 const upVal = (id, val) => setValues(v => ({ ...v, [id]: val }));

 const isChoiceComplete = (c) => {
  const val = values[c.id];
  if (c.type === "stat_free") {
   const total = Object.values(val).reduce((s,v)=>s+(v||0),0);
   return total === c.count;
  }
  if (c.type === "skill_free")    return (val||[]).length === c.count;
  if (c.type === "language_free") return (val||[]).length === c.count;
  if (c.type === "custom_text")   return (val||"").trim().length > 0;
  return true;
 };
 const allComplete = choices.every(isChoiceComplete);

 const handleConfirm = () => {
  if (!allComplete) return;
  onConfirm(values);
 };

 const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:10, padding:"7px 10px", color:"white", fontSize:13, outline:"none",
  width:"100%", fontFamily:"inherit" };

 return (
  <div style={{ position:"fixed",inset:0,zIndex:110,display:"flex",alignItems:"center",
   justifyContent:"center",background:"rgba(0,0,0,0.9)",backdropFilter:"blur(8px)",padding:16 }}
   onClick={onClose}>
   <div onClick={e=>e.stopPropagation()} style={{
    maxWidth:500,width:"100%",maxHeight:"92vh",overflowY:"auto",WebkitOverflowScrolling:"touch",
    background:"#0f1117",border:`2px solid ${theme.accent}55`,borderRadius:20,
    padding:"24px 20px",
    boxShadow:`0 0 60px ${theme.accent}22,0 24px 60px rgba(0,0,0,0.8)`,
    animation:"modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",
    position:"relative",
   }}>
    {/* Header */}
    <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:6 }}>
     <div style={{ width:48,height:48,borderRadius:12,flexShrink:0,
      background:`${theme.accent}18`,border:`2px solid ${theme.accent}55`,
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:24 }}>🎲</div>
     <div>
      <div style={{ fontSize:20,fontWeight:900,color:theme.accent }}>Freie Auswahl</div>
      <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)" }}>
       Deine Rasse gibt dir noch {choices.length} freie Wahl{choices.length!==1?"en":""}
      </div>
     </div>
    </div>
    <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",lineHeight:1.6,marginBottom:20,
     paddingBottom:16,borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
     Wähle aus den Vorschlägen oder trage eigene Werte ein. Alle Felder müssen ausgefüllt sein.
    </div>

    <div style={{ display:"flex",flexDirection:"column",gap:18 }}>
     {choices.map((c, ci) => {
      const complete = isChoiceComplete(c);
      return (
       <div key={c.id} style={{
        background:"rgba(12,12,18,0.90)",
        border:`2px solid ${complete?theme.accent+"55":"rgba(255,255,255,0.08)"}`,
        borderRadius:14,padding:"14px 16px",transition:"border 0.2s",
       }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6 }}>
         <div style={{ fontSize:14,fontWeight:800,color:complete?theme.accent:"rgba(255,255,255,0.7)" }}>
          {complete?"✓ ":""}{c.label}
         </div>
         {c.count > 1 && (
          <span style={{ fontSize:11,fontWeight:800,
           background:`${theme.accent}18`,color:theme.accent,
           border:`1px solid ${theme.accent}44`,borderRadius:20,padding:"2px 8px" }}>
           {c.type==="stat_free"
            ? `${Object.values(values[c.id]||{}).reduce((s,v)=>s+(v||0),0)}/${c.count} Punkte`
            : `${(values[c.id]||[]).length}/${c.count} gewählt`}
          </span>
         )}
        </div>
        <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:12 }}>{c.desc}</div>

        {/* STAT FREE CHOICE */}
        {c.type === "stat_free" && (() => {
         const val = values[c.id] || {};
         const used = Object.values(val).reduce((s,v)=>s+(v||0),0);
         const avail = c.count - used;
         const excluded = c.exclude || [];
         return (
          <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 }}>
           {STAT_KEYS_ALL.filter(k => !excluded.includes(k)).map(k => {
            const cur = val[k] || 0;
            const base = currentStats?.[k] || 10;
            return (
             <div key={k} style={{ textAlign:"center",borderRadius:10,padding:"8px 4px",
              background:cur>0?`${STAT_COLORS_FC[k]}15`:"rgba(12,12,18,0.88)",
              border:`1px solid ${cur>0?STAT_COLORS_FC[k]+"55":"rgba(255,255,255,0.1)"}`,
              transition:"all 0.15s" }}>
              <div style={{ fontSize:10,fontWeight:800,color:STAT_COLORS_FC[k] }}>{STAT_LABELS_FC[k]}</div>
              <div style={{ fontSize:18,fontWeight:900,color:"rgba(255,255,255,0.7)",margin:"2px 0" }}>
               {base+cur}
               {cur>0&&<span style={{color:"#4ade80",fontSize:11}}> +{cur}</span>}
              </div>
              <div style={{ display:"flex",gap:3 }}>
               <button onClick={()=>{if(cur>0){const nv={...val,[k]:cur-1};upVal(c.id,nv);}}}
                disabled={cur===0}
                style={{ flex:1,background:"rgba(239,68,68,0.2)",color:"#f87171",
                 border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,
                 padding:"2px 0",fontSize:12,cursor:cur===0?"not-allowed":"pointer",
                 fontFamily:"inherit",opacity:cur===0?0.3:1 }}>−</button>
               <button onClick={()=>{if(avail>0&&(c.max1perStat?cur<1:cur<c.count)){const nv={...val,[k]:cur+1};upVal(c.id,nv);}}}
                disabled={avail===0||(c.max1perStat?cur>=1:cur>=c.count)}
                style={{ flex:1,background:"rgba(34,197,94,0.2)",color:"#4ade80",
                 border:"1px solid rgba(34,197,94,0.3)",borderRadius:6,
                 padding:"2px 0",fontSize:12,fontFamily:"inherit",
                 cursor:(avail===0||(c.max1perStat?cur>=1:cur>=c.count))?"not-allowed":"pointer",
                 opacity:(avail===0||(c.max1perStat?cur>=1:cur>=c.count))?0.3:1 }}>+</button>
              </div>
             </div>
            );
           })}
          </div>
         );
        })()}

        {/* SKILL FREE CHOICE */}
        {c.type === "skill_free" && (() => {
         const chosen = values[c.id] || [];
         const alreadyProf = Object.keys(currentSkillProfs||{}).filter(k=>(currentSkillProfs||{})[k]);
         return (
          <div>
           <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:10 }}>
            {ALL_SKILLS_LIST.map(sk => {
             const isChosen   = chosen.includes(sk);
             const isProf     = alreadyProf.includes(sk);
             const canAdd     = !isChosen && !isProf && chosen.length < c.count;
             return (
              <button key={sk} onClick={()=>{
               if(isChosen) upVal(c.id, chosen.filter(s=>s!==sk));
               else if(canAdd) upVal(c.id,[...chosen,sk]);
              }} style={{
               fontSize:12,padding:"4px 10px",borderRadius:20,cursor:isProf?"not-allowed":"pointer",
               fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
               background:isChosen?`${theme.accent}22`:isProf?"rgba(12,12,18,0.88)":"rgba(15,15,22,0.85)",

              }}>
               {isChosen?"✓ ":isProf?"✓ (bereits) ":""}{sk}
              </button>
             );
            })}
           </div>
           {/* Custom entry */}
           <CustomEntry id={c.id} placeholder="Oder eigene Fertigkeit eingeben..."
            onAdd={v=>{if(chosen.length<c.count&&!chosen.includes(v))upVal(c.id,[...chosen,v]);}}
            theme={theme} inp={inp}/>
          </div>
         );
        })()}

        {/* LANGUAGE FREE CHOICE */}
        {c.type === "language_free" && (() => {
         const chosen = values[c.id] || [];
         const suggestions = new Set([
          ...(c.className ? (LANGUAGE_SUGGESTIONS.byClass[c.className]||[]) : []),
          ...(c.raceName  ? (LANGUAGE_SUGGESTIONS.byRace[c.raceName]||[])   : []),
         ]);
         const alreadyKnown = new Set(
          Object.entries(values)
           .filter(([k]) => k !== c.id)

             <div style={{display:"flex",flexWrap:"wrap",gap:5}}>

               const isChosen = chosen.includes(lang);
               const canAdd = !isChosen && chosen.length < c.count;
               const meta = ALL_LANGUAGES_WITH_META.find(l=>l.name===lang);
               return (
                <button key={lang} onClick={()=>{
                 if(isChosen) upVal(c.id,chosen.filter(l=>l!==lang));
                 else if(canAdd) upVal(c.id,[...chosen,lang]);

                style={{
                 fontSize:12,padding:"4px 11px",borderRadius:20,cursor:canAdd||isChosen?"pointer":"not-allowed",
                 fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
                 background:isChosen?"rgba(74,222,128,0.25)":"rgba(74,222,128,0.08)",
                 color:isChosen?"#4ade80":"rgba(74,222,128,0.7)",
                 border:`1px solid ${isChosen?"rgba(74,222,128,0.6)":"rgba(74,222,128,0.25)"}`,
                 opacity:(!canAdd&&!isChosen)?0.4:1,
                }}>
                 {isChosen?"✓ ":""}{lang}{meta?.type==="exotic"&&<span style={{fontSize:9,marginLeft:4,opacity:0.6}}>✦</span>}
                </button>
               );
              })}
             </div>
            </div>
           )}
           <div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.3)",letterSpacing:"0.07em",marginBottom:5}}>STANDARD</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
             {STANDARD_LANGUAGES.map(langObj => {
              const lang = langObj.name;
              const isChosen = chosen.includes(lang);
              const isKnown = alreadyKnown.has(lang);
              const canAdd = !isChosen && !isKnown && chosen.length < c.count;
              return (
               <button key={lang} onClick={()=>{
                if(isChosen) upVal(c.id,chosen.filter(l=>l!==lang));
                else if(canAdd) upVal(c.id,[...chosen,lang]);
               }} title={langObj.speakers}
               style={{
                fontSize:12,padding:"4px 10px",borderRadius:20,
                cursor:isKnown?"not-allowed":canAdd||isChosen?"pointer":"not-allowed",
                fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
                background:isChosen?`${theme.accent}22`:isKnown?"rgba(12,12,18,0.7)":"rgba(15,15,22,0.85)",
                color:isChosen?theme.accent:isKnown?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.55)",
                border:`1px solid ${isChosen?`${theme.accent}66`:isKnown?"rgba(15,15,22,0.6)":"rgba(255,255,255,0.12)"}`,
                opacity:(!canAdd&&!isChosen&&!isKnown)?0.4:1,
               }}>
                {isChosen?"✓ ":isKnown?"✓ ":""}{lang}{isKnown&&<span style={{fontSize:9,marginLeft:3,opacity:0.5}}>(bekannt)</span>}
               </button>
              );
             })}
            </div>
           </div>
           <div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:800,color:"rgba(167,139,250,0.6)",letterSpacing:"0.07em",marginBottom:5}}>EXOTISCH ✦</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
             {EXOTIC_LANGUAGES.map(langObj => {
              const lang = langObj.name;
              const isChosen = chosen.includes(lang);
              const isKnown = alreadyKnown.has(lang);
              const canAdd = !isChosen && !isKnown && chosen.length < c.count;
              return (
               <button key={lang} onClick={()=>{
                if(isChosen) upVal(c.id,chosen.filter(l=>l!==lang));
                else if(canAdd) upVal(c.id,[...chosen,lang]);
               }} title={`${langObj.speakers} · Schrift: ${langObj.script}`}
               style={{
                fontSize:12,padding:"4px 10px",borderRadius:20,
                cursor:isKnown?"not-allowed":canAdd||isChosen?"pointer":"not-allowed",
                fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
                background:isChosen?"rgba(167,139,250,0.2)":isKnown?"rgba(12,12,18,0.7)":"rgba(15,15,22,0.85)",
                color:isChosen?"#a78bfa":isKnown?"rgba(255,255,255,0.2)":"rgba(167,139,250,0.55)",
                border:`1px solid ${isChosen?"rgba(167,139,250,0.5)":isKnown?"rgba(15,15,22,0.6)":"rgba(167,139,250,0.2)"}`,
                opacity:(!canAdd&&!isChosen&&!isKnown)?0.4:1,
               }}>
                {isChosen?"✓ ":isKnown?"✓ ":""}{lang}{isKnown&&<span style={{fontSize:9,marginLeft:3,opacity:0.5}}>(bekannt)</span>}
               </button>
              );
             })}
            </div>
           </div>
           <CustomEntry id={c.id} placeholder="Oder eigene Sprache eingeben..."
            onAdd={v=>{if(chosen.length<c.count&&!chosen.includes(v))upVal(c.id,[...chosen,v]);}}
            theme={theme} inp={inp}/>
          </div>
         );
        })()}
       </div>
      );
     })}
    </div>

    {/* Confirm */}
    <button onClick={handleConfirm} disabled={!allComplete} style={{
     width:"100%",marginTop:20,
     background:allComplete?`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`:"rgba(15,15,22,0.85)",
     color:allComplete?"white":"rgba(255,255,255,0.2)",
     border:"none",borderRadius:12,padding:"13px 0",
     fontWeight:900,cursor:allComplete?"pointer":"not-allowed",
     fontSize:15,fontFamily:"inherit",transition:"all 0.2s",
    }}>
     {allComplete ? "✓ Auswahl bestätigen & Charakter erstellen" : "Bitte alle Felder ausfüllen"}
    </button>
   </div>
  </div>
 );
}

function CustomEntry({ id, placeholder, onAdd, theme, inp }) {
 const [val, setVal] = useState("");
 const submit = () => {
  const t = val.trim();
  if (t) { onAdd(t); setVal(""); }
 };
 return (
  <div style={{ display:"flex",gap:6,marginTop:4 }}>
   <input type="text" value={val} onChange={e=>setVal(e.target.value)}
    onKeyDown={e=>e.key==="Enter"&&submit()}
    placeholder={placeholder}
    style={{...inp,flex:1,fontSize:12,padding:"5px 10px"}}/>
   <button onClick={submit} disabled={!val.trim()} style={{
    background:`${theme.accent}18`,border:`1px solid ${theme.accent}55`,
    borderRadius:8,padding:"5px 12px",cursor:val.trim()?"pointer":"not-allowed",
    color:theme.accent,fontWeight:800,fontSize:13,fontFamily:"inherit",
    opacity:val.trim()?1:0.4,
   }}>+</button>
  </div>
 );
}

  </div>
 );

function hasArmorProf(classNames, profCategory) {
 if (profCategory === "keine") return true;
 for (const cls of (classNames||[])) {
  const profs = ARMOR_PROFICIENCY[cls] || [];
  if (profs.includes(profCategory)) return true;
 }
 return false;
}

function armorWarnings(armorItem, classNames, strScore) {
 const warnings = [];
 const cat = armorItem?.armor?.profCategory || armorItem?.profCategory;
 if (!cat || cat === "keine") return warnings;
 if (!hasArmorProf(classNames, cat)) {
  const catLabel = cat === "leicht" ? "Leichter Rüstung" : cat === "mittel" ? "Mittlerer Rüstung" : "Schwerer Rüstung";
  warnings.push(`Nicht geübt mit ${catLabel} – kein Übungsbonus auf ATK/Rettungswürfe & Nachteil auf STR/DEX-Würfe!`);
 }
 const minStr = armorItem?.armor?.minStr ?? armorItem?.minStr ?? 0;
 if (minStr > 0 && (strScore||10) < minStr) {
  warnings.push(`STR ${strScore||10} zu niedrig – Mindest-STR ${minStr} nötig! Bewegungsrate −10 ft.`);
 }
 return warnings;
}

function handsNeeded(propsArr, weaponObj) {
 if (!propsArr) return 1;
 if (propsArr.some(p => p === "Zweihändig" || p === "2H")) return 2;

 const isVers = propsArr.some(p => p.startsWith("Vielseitig"));
 if (isVers && weaponObj?.twoHanded) return 2;
 return 1;
}

function calcAC(armorId, hasShield, stats, className) {
 const armor = ARMOR_CATALOG.find(a => a.id === armorId) || ARMOR_CATALOG[0];
 const dexMod = Math.floor(((stats?.dex || 10) - 10) / 2);
 const conMod = Math.floor(((stats?.con || 10) - 10) / 2);
 const wisMod = Math.floor(((stats?.wis || 10) - 10) / 2);
 const shieldBonus = hasShield ? 2 : 0;

 let ac = armor.baseAC;

 if (armorId === "unarmored") {
  if (className === "Barbar") {
   ac = 10 + dexMod + conMod;
  } else if (className === "Mönch") {
   ac = 10 + dexMod + wisMod;
  } else {
   ac = 10 + dexMod;
  }
 } else if (armor.addDex) {
  const effectiveDex = armor.maxDex !== null ? Math.min(dexMod, armor.maxDex) : dexMod;
  ac = armor.baseAC + effectiveDex;
 }

 return ac + shieldBonus;
}

     <div style={{ fontSize:11, fontWeight:800, color:item.color, letterSpacing:"0.07em", marginBottom:8 }}>⚡ RASSENMERKMALE</div>
     {(item.traits||[]).map((t,i) => (
      <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:5, fontSize:13, color:"rgba(255,255,255,0.7)" }}>
       <span style={{ color:item.color, flexShrink:0 }}>✦</span>{t}
      </div>
     ))}
    </div>
    {item.subraces && (item.subraces||[]).length > 0 && (
     <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:11, fontWeight:800, color:item.color, letterSpacing:"0.07em", marginBottom:8 }}>🌿 UNTERRASSEN</div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
       {(item.subraces||[]).map((sr,i) => (
        <div key={i} style={{ background:`${item.color}0d`, border:`1px solid ${item.color}33`,
         borderRadius:10, padding:"10px 12px" }}>
         <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
          <span style={{ fontWeight:800, fontSize:13, color:item.color }}>{sr.name}</span>
          <span style={{ fontSize:11, background:`${item.color}22`, color:item.color,
           border:`1px solid ${item.color}44`, borderRadius:20, padding:"2px 8px", fontWeight:700 }}>{sr.bonus}</span>
         </div>
         {(sr.traits||[]).map((t,j) => (
          <div key={j} style={{ fontSize:12, color:"rgba(255,255,255,0.6)", marginBottom:2 }}>
           <span style={{ color:item.color, marginRight:5 }}>·</span>{t}
          </div>
         ))}
         {sr.note && (
          <div style={{ marginTop:6, fontSize:11, color:"rgba(255,255,255,0.4)", fontStyle:"italic" }}>
           💡 {sr.note}
          </div>
         )}
        </div>
       ))}
      </div>
     </div>
    )}
    {/* ── Rassenmerkmale aus PHB ── */}
    {RACE_FEATURES[item.name] && RACE_FEATURES[item.name].length > 0 && (
     <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:11, fontWeight:800, color:item.color, letterSpacing:"0.07em", marginBottom:8 }}>
       ⚡ MECHANISCHE MERKMALE
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
       {RACE_FEATURES[item.name].map((f, i) => (
        <div key={i} style={{
         background:`${item.color}0d`, borderRadius:9,
         border:`1px solid ${item.color}2a`, padding:"7px 11px",
        }}>
         <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:f.note?3:0 }}>
          <span style={{ fontSize:11, color:item.color, fontWeight:900 }}>
           {f.type==="advantage"?"🟢":f.type==="resistance"?"🛡":f.type==="limited_use"?"🔢":"✦"}
          </span>
          <span style={{ fontWeight:800, fontSize:12, color:"rgba(255,255,255,0.9)" }}>{f.keyword}</span>
         </div>
         {f.note && (
          <div style={{ fontSize:11, color:`${item.color}bb`, fontWeight:600, marginBottom:2 }}>{f.note}</div>
         )}
         {f.desc && (
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", lineHeight:1.5 }}>{f.desc}</div>
         )}
        </div>
       ))}
      </div>
     </div>
    )}
    {item.classTip && (
     <div style={{ background:"rgba(74,222,128,0.07)", border:"1px solid rgba(74,222,128,0.25)",
      borderRadius:10, padding:"10px 14px", fontSize:13, color:"rgba(255,255,255,0.7)", lineHeight:1.6 }}>
      🎯 <span style={{ fontWeight:700, color:"#4ade80" }}>Klassen-Tipp:</span> {item.classTip}
     </div>
    )}
    {item.subraces && (item.subraces||[]).length > 1 && onOpenSubraceModal && (
     <button
      onClick={() => onOpenSubraceModal(item)}
      style={{
       width: "100%", marginTop: 12,
       background: selectedSubrace
        ? `${item.color}22`
        : `rgba(255,255,255,0.05)`,
       border: `2px solid ${selectedSubrace ? item.color : "rgba(255,255,255,0.15)"}`,
       borderRadius: 12, padding: "10px 14px",
       cursor: "pointer", fontFamily: "inherit",
       display: "flex", alignItems: "center", justifyContent: "space-between",
       transition: "all 0.2s",
      }}
     >
      <span style={{ fontSize: 13, fontWeight: 700,
       color: selectedSubrace ? item.color : "rgba(255,255,255,0.5)" }}>
       🌿 Unterrasse wählen
      </span>
      <span style={{
       fontSize: 12, fontWeight: 800,
       color: selectedSubrace ? item.color : "rgba(255,255,255,0.3)",
       background: selectedSubrace ? `${item.color}22` : "rgba(18,18,25,0.83)",
       border: `1px solid ${selectedSubrace ? `${item.color}55` : "rgba(255,255,255,0.1)"}`,
       borderRadius: 20, padding: "2px 10px",
      }}>
       {selectedSubrace ? `✓ ${selectedSubrace.name}` : "Noch keine"}
      </span>
     </button>
    )}
   </>}

   {type==="background" && <>
    <div style={{ marginBottom:12 }}>
     <div style={{ fontSize:11, fontWeight:800, color:item.color, letterSpacing:"0.07em", marginBottom:8 }}>🎓 FERTIGKEITEN</div>
     <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
      {item.proficiencies?.map((p,i) => (
       <span key={i} style={{ background:`${item.color}18`, border:`1px solid ${item.color}44`,
        borderRadius:20, padding:"3px 10px", fontSize:12, color:item.color, fontWeight:600 }}>{p}</span>
      ))}
     </div>
    </div>
    {item.tools && <div style={{ marginBottom:10, fontSize:13, color:"rgba(255,255,255,0.6)" }}>🔧 <b>Werkzeuge:</b> {item.tools}</div>}
    {item.languages && typeof item.languages === "number" && <div style={{ marginBottom:10, fontSize:13, color:"rgba(255,255,255,0.6)" }}>🗣 <b>Sprachen:</b> {item.languages} nach Wahl</div>}
    <div style={{ background:`${item.color}10`, border:`1px solid ${item.color}33`,
     borderRadius:10, padding:"10px 14px", marginBottom:10, fontSize:13 }}>
     <div style={{ fontWeight:700, color:item.color, marginBottom:4 }}>✨ Feature</div>
     <div style={{ color:"rgba(255,255,255,0.7)", lineHeight:1.6 }}>{item.feature}</div>
    </div>
    <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", fontStyle:"italic", marginBottom:6 }}>
     💡 <span style={{ color:"rgba(255,255,255,0.7)" }}>Ideal:</span> {item.ideal}
    </div>
    <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", fontStyle:"italic" }}>
     🔗 <span style={{ color:"rgba(255,255,255,0.7)" }}>Bindung:</span> {item.bond}
    </div>
   </>}

   {type==="alignment" && <>
    <div style={{ background:`${item.color}10`, border:`1px solid ${item.color}33`,
     borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13,
     color:"rgba(255,255,255,0.7)", lineHeight:1.6 }}>
     🎭 <span style={{ fontWeight:700, color:item.color }}>Typische Charaktere:</span> {item.examples}
    </div>
   </>}
  </div>
 );
}

function AttributeExplainer({ theme, chosenClass, onStatsChange, mode, onModeChange, manualVals, onManualValsChange, rollResults, onRollResultsChange, assigned, onAssignedChange, chosenRace, chosenSubrace, freeStatChoices, onFreeStatChoicesChange }) {
 const recommended = chosenClass?.primaryStats || [];
 const STAT_KEYS = ["str","dex","con","int","wis","cha"];
 const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };

 const setMode = onModeChange;
 const setManualVals = onManualValsChange;
 const setRollResults = onRollResultsChange;
 const setAssigned = onAssignedChange;
 const [selected, setSelected] = useState(() => {
  if (recommended.length > 0) {
   const first = WIZARD_ATTRIBUTES.find(a => a.key === recommended[0]);
   return first || WIZARD_ATTRIBUTES[0];
  }
  return WIZARD_ATTRIBUTES[0];
 });

 const [rolling, setRolling]     = useState(false);
 const [rollAnim, setRollAnim]   = useState(false);

 const rollStat = () => {
  const rolls = Array.from({length:4}, () => Math.floor(Math.random()*6)+1);
  rolls.sort((a,b)=>b-a);
  return { rolls, total: rolls.slice(0,3).reduce((s,v)=>s+v,0) };
 };

 const doRollAll = () => {
  setRolling(true); setRollAnim(true);
  setTimeout(() => {
   setRollResults(Array.from({length:6}, rollStat));
   setAssigned({str:null,dex:null,con:null,int:null,wis:null,cha:null});
   setRolling(false);
   setTimeout(() => setRollAnim(false), 400);
  }, 600);
 };

 const assignRoll = (statKey, resultIdx) => {
  const newAssigned = {...assigned};

  const prevOwner = Object.keys(newAssigned).find(k => newAssigned[k] === resultIdx && k !== statKey);
  if (prevOwner) {

   newAssigned[prevOwner] = newAssigned[statKey];
  } else {

   Object.keys(newAssigned).forEach(k => { if (newAssigned[k] === resultIdx) newAssigned[k] = null; });
  }
  newAssigned[statKey] = resultIdx;
  setAssigned(newAssigned);
  if (onStatsChange) {
   const vals = {};
   Object.keys(newAssigned).forEach(k => {
    vals[k] = newAssigned[k] !== null ? rollResults[newAssigned[k]].total : "";
   });
   onStatsChange(vals);
  }
 };

 const usedIndices = Object.values(assigned).filter(v => v !== null);

 const handleManualChange = (key, val) => {
  const next = {...manualVals, [key]: val};
  setManualVals(next);
  if (onStatsChange) onStatsChange(next);
 };

 const statMod = v => { const n = parseInt(v); return isNaN(n) ? null : Math.floor((n-10)/2); };
 const fmtM = v => v === null ? "—" : (v >= 0 ? "+" : "") + v;

 const S2 = {
  modeBtn: (active) => ({
   flex:1, padding:"10px 8px", fontWeight:800, fontSize:13, borderRadius:12, cursor:"pointer",
   fontFamily:"inherit", border:`2px solid ${active ? theme.accent : "rgba(255,255,255,0.1)"}`,
   background: active ? `${theme.accent}22` : "rgba(12,12,18,0.88)",
   color: active ? theme.accent : "rgba(255,255,255,0.45)", transition:"all 0.18s",
  }),
  statBox: (key) => {
   const isRec = recommended.includes(key);
   const isPrim = recommended[0] === key;
   return {
    borderRadius:12, padding:"10px 8px", textAlign:"center",
    border:`2px solid ${isPrim ? theme.accent : isRec ? `${theme.accent}55` : "rgba(255,255,255,0.1)"}`,
    background: isPrim ? `${theme.accent}12` : isRec ? `${theme.accent}07` : "rgba(12,12,18,0.90)",
    position:"relative",
   };
  },
 };

 const SLBL = { str:"STR", dex:"DEX", con:"CON", int:"INT", wis:"WIS", cha:"CHA" };
 const _rb = chosenRace?.statBonuses || {};
 const _sb = chosenSubrace?.statBonuses || {};
 const _raceBonuses = {};
 Object.entries(_rb).forEach(([k,v]) => { if(v) _raceBonuses[k]=(_raceBonuses[k]||0)+v; });
 Object.entries(_sb).forEach(([k,v]) => { if(v) _raceBonuses[k]=(_raceBonuses[k]||0)+v; });
 const _bonusEntries = Object.entries(_raceBonuses).filter(([,v])=>v>0);
 const _freeCount = (chosenRace?.extraChoices?.freeStats||0) + (chosenSubrace?.extraChoices?.freeStats||0);
 const _freeAmt   = chosenRace?.extraChoices?.statAmount || chosenSubrace?.extraChoices?.statAmount || 1;
 const _allSK = ["str","dex","con","int","wis","cha"];

 return (
  <div className="wizard-fade">
   <>
     {(_bonusEntries.length > 0 || _freeCount > 0) && (
      <div style={{ background:"rgba(139,92,246,0.08)", border:"1px solid rgba(139,92,246,0.3)",
       borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13 }}>
       <div style={{ fontWeight:800, color:"#a78bfa", marginBottom:8, fontSize:11, letterSpacing:"0.07em" }}>
        ⚡ RASSENBONI – werden automatisch addiert
       </div>
       <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:_freeCount>0?10:0 }}>
        {_bonusEntries.map(([k,v]) => (
         <span key={k} style={{ background:"rgba(139,92,246,0.2)", border:"1px solid #a78bfa88",
          borderRadius:20, padding:"2px 10px", color:"#c4b5fd", fontWeight:800 }}>
          {SLBL[k]} +{v}
         </span>
        ))}
       </div>
       {_freeCount > 0 && (
        <div>
         <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:8 }}>
          Wähle {_freeCount}× +{_freeAmt} für ein Attribut nach Wahl:
         </div>
         <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {_allSK.map(sk => {
           const chosen = (freeStatChoices||[]).includes(sk);
           const full   = !chosen && (freeStatChoices||[]).length >= _freeCount;
           return (
            <button key={sk} disabled={full}
             onClick={() => {
              if (!onFreeStatChoicesChange) return;
              if (chosen) onFreeStatChoicesChange((freeStatChoices||[]).filter(s=>s!==sk));
              else if ((freeStatChoices||[]).length < _freeCount) onFreeStatChoicesChange([...(freeStatChoices||[]), sk]);
             }}
             style={{ padding:"4px 12px", borderRadius:20, fontWeight:800,
              fontSize:13, fontFamily:"inherit", cursor:full?"not-allowed":"pointer",
              background: chosen?"rgba(139,92,246,0.35)":"rgba(255,255,255,0.05)",
              border: chosen?"2px solid #a78bfa":"1px solid rgba(255,255,255,0.15)",
              color: chosen?"#c4b5fd": full?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.7)" }}>
             {SLBL[sk]}{chosen?` +${_freeAmt}`:""}
            </button>
           );
          })}
         </div>
         {(freeStatChoices||[]).length < _freeCount && (
          <div style={{ fontSize:11, color:"#fbbf24", marginTop:6 }}>
           ⚠ Noch {_freeCount-(freeStatChoices||[]).length} Attribut(e) wählen
          </div>
         )}
        </div>
       )}
      </div>
     )}
     {chosenClass && recommended.length > 0 && (
      <div style={{ background:"rgba(74,222,128,0.07)", border:"1px solid rgba(74,222,128,0.25)",
       borderRadius:10, padding:"10px 14px", marginBottom:16, fontSize:13, color:"rgba(255,255,255,0.7)" }}>
       🎯 <span style={{ fontWeight:700, color:"#4ade80" }}>Für {chosenClass.name} wichtig:</span>{" "}
       {recommended.map(k => {
        const a = WIZARD_ATTRIBUTES.find(x => x.key === k);
        return a ? <span key={k} style={{ fontWeight:800, color:a.color, marginRight:8 }}>{a.emoji} {a.short}</span> : null;
       })}
      </div>
     )}
    </>

   <div style={{ display:"flex", gap:8, marginBottom:20 }}>
    <button style={S2.modeBtn(mode==="info")}    onClick={() => setMode("info")}>📖 Erklärer</button>
    <button style={S2.modeBtn(mode==="manual")}  onClick={() => setMode("manual")}>✏️ Manuell eingeben</button>
    <button style={S2.modeBtn(mode==="roll")}    onClick={() => setMode("roll")}>🎲 Würfeln</button>
   </div>

   {mode === "info" && <>
    <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:20 }}>
     {WIZARD_ATTRIBUTES.map(a => {
      const isRec = recommended.includes(a.key);
      const isPrimary = recommended[0] === a.key;
      return (
       <button key={a.key} onClick={() => setSelected(a)}
        style={{
         background: selected.key === a.key ? `${a.color}22` : isRec ? `${a.color}0e` : "rgba(12,12,18,0.88)",
         border: `2px solid ${selected.key === a.key ? a.color : isRec ? `${a.color}55` : "rgba(255,255,255,0.1)"}`,
         borderRadius:10, padding:"8px 14px", cursor:"pointer", fontFamily:"inherit",
         color: selected.key === a.key ? a.color : isRec ? a.color : "rgba(255,255,255,0.6)",
         fontWeight: isRec ? 800 : 700, fontSize:13, transition:"all 0.2s", position:"relative",
        }}>
        {a.emoji} {a.short}
        {isPrimary && <span style={{ position:"absolute", top:-6, right:-4, fontSize:10,
         background:"#4ade80", color:"#000", borderRadius:20, padding:"1px 5px", fontWeight:900 }}>★</span>}
       </button>
      );
     })}
    </div>
    <div className="wizard-slide" key={selected.key}>
     <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
      <span style={{ fontSize:36 }}>{selected.emoji}</span>
      <div>
       <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ fontSize:20, fontWeight:900, color:selected.color }}>{selected.name} ({selected.short})</div>
        {recommended.includes(selected.key) && (
         <span style={{ fontSize:11, fontWeight:800, color:"#4ade80", background:"rgba(74,222,128,0.15)",
          border:"1px solid rgba(74,222,128,0.3)", borderRadius:20, padding:"2px 8px" }}>
          {recommended[0] === selected.key ? "★ Hauptattribut" : "✦ Wichtig"}
         </span>
        )}
       </div>
      </div>
     </div>
     <div style={{ fontSize:14, color:"rgba(255,255,255,0.75)", lineHeight:1.7, marginBottom:16 }}>{selected.description}</div>
     <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:11, fontWeight:800, color:selected.color, letterSpacing:"0.07em", marginBottom:8 }}>📊 BEEINFLUSST</div>
      {selected.affects.map((a,i) => (
       <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:5, fontSize:13, color:"rgba(255,255,255,0.7)" }}>
        <span style={{ color:selected.color, flexShrink:0 }}>✦</span>{a}
       </div>
      ))}
     </div>
     <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:11, fontWeight:800, color:selected.color, letterSpacing:"0.07em", marginBottom:8 }}>🏆 WICHTIG FÜR</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
       {selected.important.map((c,i) => (
        <span key={i} style={{ background:`${selected.color}18`, border:`1px solid ${selected.color}44`,
         borderRadius:20, padding:"3px 10px", fontSize:12, color:selected.color, fontWeight:600 }}>{c}</span>
       ))}
      </div>
     </div>
    </div>
    <div style={{ marginTop:20, padding:"14px 16px", background:"rgba(12,12,18,0.90)",
     borderRadius:12, border:"1px solid rgba(255,255,255,0.08)", fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.7 }}>
     💡 <strong style={{ color:"rgba(255,255,255,0.7)" }}>Standard-Array:</strong> Verteile 15, 14, 13, 12, 10, 8 auf deine Attribute.
    </div>
   </>}

   {mode === "manual" && (
    <div>
     <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:14, lineHeight:1.6 }}>
      Trage deine Würfelergebnisse direkt ein. Empfohlen: <strong style={{color:"rgba(255,255,255,0.7)"}}>Standard-Array</strong> 15 · 14 · 13 · 12 · 10 · 8, oder freies Würfeln (4W6, niedrigsten streichen).
     </div>
     <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16 }}>
      {STAT_KEYS.map(key => {
       const a = WIZARD_ATTRIBUTES.find(x => x.key === key);
       const isRec = recommended.includes(key);
       const isPrim = recommended[0] === key;
       const mod = statMod(manualVals[key]);
       return (
        <div key={key} style={S2.statBox(key)}>
         {isPrim && <span style={{ position:"absolute", top:-7, right:-4, fontSize:10,
          background:"#4ade80", color:"#000", borderRadius:20, padding:"1px 5px", fontWeight:900, zIndex:1 }}>★</span>}
         <div style={{ fontSize:10, color: isRec ? a.color : "rgba(255,255,255,0.35)", fontWeight:800,
          textTransform:"uppercase", marginBottom:4 }}>{a.emoji} {STAT_LABELS[key]}</div>
         <input type="number" min="1" max="20" value={manualVals[key]}
          onChange={e => handleManualChange(key, e.target.value)}
          placeholder="—"
          style={{ width:"100%", background:"rgba(18,18,25,0.83)", border:`1px solid ${isRec ? `${a.color}55` : "rgba(255,255,255,0.12)"}`,
           borderRadius:8, padding:"6px 4px", color:"white", fontSize:20, fontWeight:900,
           textAlign:"center", outline:"none", fontFamily:"inherit" }}/>
         <div style={{ fontSize:12, color: mod !== null ? (mod >= 0 ? "#4ade80":"#f87171") : "rgba(255,255,255,0.2)",
          fontWeight:700, marginTop:4 }}>{fmtM(mod)}</div>
        </div>
       );
      })}
     </div>
     <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", justifyContent:"center" }}>
      <div style={{ display:"flex", gap:4, flexWrap:"wrap", justifyContent:"center" }}>
       {[15,14,13,12,10,8].map(v => (
        <span key={v} style={{ background:"rgba(15,15,22,0.85)", border:"1px solid rgba(255,255,255,0.12)",
         borderRadius:8, padding:"4px 12px", fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.5)" }}>{v}</span>
       ))}
      </div>
      <button
       onClick={() => {
        const arr = [15,14,13,12,10,8];
        const allKeys = ["str","dex","con","int","wis","cha"];
        const rec = recommended.length > 0 ? [...recommended] : [];

        if (!rec.includes("con")) rec.push("con");

        const rest = allKeys.filter(k => !rec.includes(k));
        const order = [...rec, ...rest].slice(0, 6);
        const newVals = {};
        order.forEach((k, i) => { newVals[k] = arr[i]; });
        setManualVals(newVals);
        if (onStatsChange) onStatsChange(newVals);
       }}
       style={{
        padding:"6px 16px", borderRadius:10, cursor:"pointer", fontFamily:"inherit",
        fontWeight:800, fontSize:12, transition:"all 0.2s", whiteSpace:"nowrap",
        background:`${theme.accent}22`, color:theme.accent,
        border:`1px solid ${theme.accent}55`,
       }}>
       ↓ Standard-Array einfügen
      </button>
     </div>
    </div>
   )}

   {mode === "roll" && (
    <div>
     <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:14, lineHeight:1.6 }}>
      Würfle 6× (4W6, niedrigsten streichen) und weise die Ergebnisse deinen Attributen zu.
     </div>
     <button onClick={doRollAll} disabled={rolling}
      style={{ width:"100%", marginBottom:20, padding:"13px 0", fontWeight:900, fontSize:16,
       fontFamily:"inherit", borderRadius:12, cursor: rolling ? "not-allowed":"pointer",
       border:`2px solid ${theme.accent}`, color: rolling ? "rgba(255,255,255,0.3)" : theme.accent,
       background: rolling ? "rgba(12,12,18,0.90)" : `${theme.accent}18`,
       transition:"all 0.2s",
       animation: rollAnim ? "rollPulse 0.4s ease" : "none" }}>
      {rolling ? "🎲 Würfle..." : rollResults ? "🎲 Nochmal würfeln" : "🎲 Jetzt würfeln!"}
     </button>

     {rollResults && (
      <>
       {/* Würfelergebnisse – sortiert von hoch nach niedrig */}
       <div style={{ display:"flex", gap:6, marginBottom:18, flexWrap:"wrap" }}>
        {[...rollResults]
         .map((r, idx) => ({ r, idx }))
         .sort((ra, rb) => rb.r.total - ra.r.total)
         .map(({ r, idx }) => {
         const isUsed = usedIndices.includes(idx);
         const assignedTo = Object.keys(assigned).find(k => assigned[k] === idx);
         const aData = assignedTo ? WIZARD_ATTRIBUTES.find(x => x.key === assignedTo) : null;
         return (
          <div key={idx} style={{ flex:"1 1 60px", background: isUsed ? `${aData?.color || theme.accent}22` : "rgba(15,15,22,0.87)",
           border:`2px solid ${isUsed ? (aData?.color || theme.accent) : "rgba(255,255,255,0.12)"}`,
           borderRadius:10, padding:"8px 6px", textAlign:"center", transition:"all 0.2s",
           opacity: isUsed ? 0.65 : 1 }}>
           <div style={{ fontSize:22, fontWeight:900, color: isUsed ? (aData?.color||theme.accent) : "white" }}>{r.total}</div>
           <div style={{ fontSize:9, color:"rgba(255,255,255,0.3)", marginTop:2 }}>
            [{r.rolls.map((v,i) => (
             <span key={i} style={{ color: i===r.rolls.indexOf(Math.min(...r.rolls)) && r.rolls.filter(x=>x===Math.min(...r.rolls)).length===1 ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.5)" }}>{v}{i<3?",":""}</span>
            ))}]
           </div>
           {assignedTo && <div style={{ fontSize:9, fontWeight:800, color:aData?.color||theme.accent, marginTop:2 }}>{STAT_LABELS[assignedTo]}</div>}
          </div>
         );
        })}
       </div>

       <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
        {STAT_KEYS.map(key => {
         const a = WIZARD_ATTRIBUTES.find(x => x.key === key);
         const isRec = recommended.includes(key);
         const isPrim = recommended[0] === key;
         const assignedIdx = assigned[key];
         const assignedVal = assignedIdx !== null ? rollResults[assignedIdx]?.total : null;
         const mod = assignedVal !== null ? Math.floor((assignedVal-10)/2) : null;
         return (
          <div key={key} style={{ ...S2.statBox(key), padding:"10px 8px" }}>
           {isPrim && <span style={{ position:"absolute", top:-7, right:-4, fontSize:10,
            background:"#4ade80", color:"#000", borderRadius:20, padding:"1px 5px", fontWeight:900, zIndex:1 }}>★</span>}
           <div style={{ fontSize:10, color: isRec ? a.color : "rgba(255,255,255,0.35)", fontWeight:800,
            textTransform:"uppercase", marginBottom:6 }}>{a.emoji} {STAT_LABELS[key]}</div>
           <select
            value={assignedIdx !== null ? assignedIdx : ""}
            onChange={e => e.target.value !== "" && assignRoll(key, parseInt(e.target.value))}
            style={{ width:"100%", background:"rgba(18,18,25,0.83)", border:`1px solid ${isRec ? `${a.color}55`:"rgba(255,255,255,0.12)"}`,
             borderRadius:8, padding:"5px 4px", color:"white", fontSize:13, fontWeight:700,
             outline:"none", fontFamily:"inherit", textAlign:"center", cursor:"pointer" }}>
            <option value="">—</option>
            {[...rollResults]
             .map((r, idx) => ({ r, idx }))
             .sort((ra, rb) => rb.r.total - ra.r.total)
             .map(({ r, idx }) => {
              const ownerKey = Object.keys(assigned).find(k => assigned[k] === idx && k !== key);
              const ownerLabel = ownerKey ? STAT_LABELS[ownerKey] : null;
              const topThree = r.rolls.slice().sort((x,y)=>y-x).slice(0,3);
              return (
               <option key={idx} value={idx}>
                {r.total} [{topThree.join(",")}]{ownerLabel ? ` ⇄ ${ownerLabel}` : ""}
               </option>
              );
             })
            }
           </select>
           <div style={{ fontSize:14, fontWeight:900, marginTop:6,
            color: mod !== null ? (mod >= 0 ? "#4ade80":"#f87171") : "rgba(255,255,255,0.2)" }}>
            {assignedVal !== null ? assignedVal : "—"}
            <span style={{ fontSize:11, marginLeft:4, color: mod !== null ? (mod>=0?"#4ade80":"#f87171"):"rgba(255,255,255,0.2)" }}>
             ({fmtM(mod)})
            </span>
           </div>
          </div>
         );
        })}
       </div>
      </>
     )}
    </div>
   )}
  </div>
 );
}

function WizardSummary({ data, theme, onFinish, onBack, selectedSubrace, rolledStats, selectedEquipment, freeStatChoices, wizardLanguages }) {
 const STAT_KEYS2 = ["str","dex","con","int","wis","cha"];
 const missing = [];
 if (!data.name?.trim())  missing.push({ field:"name",      label:"✏️ Name",           hint:"Gib deinem Charakter einen Namen." });
 if (!data.race)          missing.push({ field:"race",      label:"🌍 Rasse",           hint:"Wähle eine Rasse im Rassen-Schritt." });
 if (!data.class)         missing.push({ field:"class",     label:"⚔️ Klasse",          hint:"Wähle eine Klasse im Klassen-Schritt." });
 if (!data.background)    missing.push({ field:"background",label:"📖 Hintergrund",     hint:"Wähle einen Hintergrund." });
 if (!data.alignment)     missing.push({ field:"alignment", label:"☯️ Gesinnung",       hint:"Wähle eine Gesinnung." });

 const allStatsSet = rolledStats && STAT_KEYS2.every(k => {
  const v = parseInt(rolledStats[k]);
  return !isNaN(v) && v >= 1;
 });
 if (!allStatsSet)
  missing.push({ field:"attributes", label:"💪 Attribute", hint:"Alle 6 Attributwerte müssen ausgefüllt sein." });

 const requiredFreeStats = (data.race?.extraChoices?.freeStats || 0) +
               (selectedSubrace?.extraChoices?.freeStats || 0);
 const chosenFreeStats   = (freeStatChoices || []).length;
 if (requiredFreeStats > 0 && chosenFreeStats < requiredFreeStats)
  missing.push({
   field: "freeStats",
   label: "⚡ Freie Attributwahl",
   hint: `Deine Rasse gibt dir ${requiredFreeStats} freie +1 Boni – du hast erst ${chosenFreeStats} von ${requiredFreeStats} gewählt. Gehe zum Attribut-Schritt.`
  });
 if (!selectedEquipment)  missing.push({ field:"equipment", label:"🎒 Ausrüstung",      hint:"Wähle ein Ausrüstungspaket." });
 const allDone = missing.length === 0;

 const STAT_KEYS = ["str","dex","con","int","wis","cha"];
 const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
 const hasStats = rolledStats && STAT_KEYS.some(k => rolledStats[k] !== "");
 const statMod = v => { const n=parseInt(v); return isNaN(n)?null:Math.floor((n-10)/2); };
 const fmtM = v => v===null?"—":(v>=0?"+":"")+v;

 return (
  <div className="wizard-fade">
   <div style={{ fontSize:20, fontWeight:900, color:theme.accent, marginBottom:6 }}>📋 Zusammenfassung</div>
   <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:20 }}>
    Überprüfe deine Auswahl und starte dann mit dem Charakter-Sheet.
   </div>
   <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:24 }}>
    {[
     { label:"Name", value:data.name || "—", emoji:"✏️" },
     { label:"Rasse", value:data.race?.name || "—", emoji:data.race?.emoji || "🌍",
      sub: selectedSubrace ? `Unterrasse: ${selectedSubrace.name} · ${selectedSubrace.bonus}` : null },
     { label:"Klasse", value:data.class?.name || "—", emoji:data.class?.emoji || "⚔️",
      sub: data.class ? `${data.class.hitDie} · ${data.class.primaryStat}` : null },
     { label:"Hintergrund", value:data.background?.name || "—", emoji:data.background?.emoji || "📖",
      sub: data.background ? data.background.proficiencies?.join(", ") : null },
     { label:"Gesinnung", value:data.alignment?.name || "—", emoji:data.alignment?.emoji || "☯️" },
     ...((wizardLanguages||[]).length > 0 ? [{
      label:"Sprachen (frei)",
      value: (wizardLanguages||[]).join(", "),
      emoji:"🗣",
     }] : []),
     ...(selectedEquipment ? [{
      label:"Ausrüstung",
      value: (() => {
       const a = ARMOR_CATALOG.find(x=>x.id===selectedEquipment.armorId);
       const parts = [a?.name||"Keine Rüstung"];
       if(selectedEquipment.hasShield) parts.push("Schild");
       return parts.join(" + ");
      })(),
      emoji:"🛡️",
      sub: selectedEquipment.weaponIds?.length
       ? selectedEquipment.weaponIds.map(wid=>WEAPON_CATALOG.find(w=>w.id===wid)?.name).filter(Boolean).join(", ")
       : null
     }] : []),
    ].map(row => (
     <div key={row.label} style={{ display:"flex", alignItems:"center", gap:12,
      background:"rgba(12,12,18,0.88)", borderRadius:12,
      border:"1px solid rgba(255,255,255,0.08)", padding:"12px 16px" }}>
      <span style={{ fontSize:22, flexShrink:0 }}>{row.emoji}</span>
      <div style={{ flex:1, minWidth:0 }}>
       <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", fontWeight:700, textTransform:"uppercase" }}>{row.label}</div>
       <div style={{ fontSize:15, fontWeight:800, color:row.value==="—"?"rgba(255,255,255,0.2)":"white" }}>{row.value}</div>
       {row.sub && <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{row.sub}</div>}
      </div>
     </div>
    ))}
    {hasStats && (
     <div style={{ background:"rgba(12,12,18,0.88)", borderRadius:12,
      border:"1px solid rgba(255,255,255,0.08)", padding:"12px 16px" }}>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", fontWeight:700,
       textTransform:"uppercase", marginBottom:10 }}>💪 Attribute</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:6 }}>
       {STAT_KEYS.map(k => {
        const val = rolledStats[k];
        const m = statMod(val);
        const a = WIZARD_ATTRIBUTES.find(x=>x.key===k);
        return (
         <div key={k} style={{ textAlign:"center", background:`${a.color}0d`,
          border:`1px solid ${a.color}33`, borderRadius:8, padding:"6px 4px" }}>
          <div style={{ fontSize:9, color:a.color, fontWeight:800 }}>{STAT_LABELS[k]}</div>
          <div style={{ fontSize:16, fontWeight:900, color:"white" }}>{val||"—"}</div>
          <div style={{ fontSize:10, color:m!==null?(m>=0?"#4ade80":"#f87171"):"rgba(255,255,255,0.2)", fontWeight:700 }}>{fmtM(m)}</div>
         </div>
        );
       })}
      </div>
     </div>
    )}
   </div>
   {missing.length > 0 && (
    <div style={{ background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.3)",
     borderRadius:10, padding:"10px 14px", marginBottom:16, fontSize:13, color:"#f87171" }}>
     ⚠️ Noch nicht ausgefüllt: {missing.join(", ")}
    </div>
   )}
   <div style={{ display:"flex", gap:10 }}>
    <button onClick={onBack}
     style={{ background:"rgba(18,18,25,0.83)", color:"rgba(255,255,255,0.7)",
      border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"12px 20px",
      fontWeight:600, cursor:"pointer", fontSize:14, fontFamily:"inherit" }}>
     ← Zurück
    </button>
    {missing.length > 0 && (
     <div style={{
      width:"100%", marginBottom:12,
      background:"rgba(239,68,68,0.08)",
      border:"1px solid rgba(239,68,68,0.25)",
      borderRadius:12, padding:"12px 14px",
     }}>
      <div style={{ fontSize:12, fontWeight:800, color:"#f87171", marginBottom:8, letterSpacing:"0.05em" }}>
       ⚠ Noch nicht vollständig – bitte ausfüllen:
      </div>
      {missing.map((m,i) => (
       <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom: i < missing.length-1 ? 6 : 0 }}>
        <span style={{ fontSize:13, fontWeight:700, color:"#f87171", flexShrink:0 }}>{m.label}</span>
        <span style={{ fontSize:12, color:"rgba(255,255,255,0.45)", lineHeight:1.5 }}>{m.hint}</span>
       </div>
      ))}
     </div>
    )}
    <button onClick={allDone ? onFinish : undefined} disabled={!allDone}
     style={{ flex:1, background: allDone
      ? `linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`
      : "rgba(255,255,255,0.08)",
      color: allDone ? "white" : "rgba(255,255,255,0.3)",
      border:"none", borderRadius:12, padding:"12px 0",
      fontWeight:800, cursor: allDone ? "pointer" : "not-allowed",
      fontSize:15, fontFamily:"inherit", transition:"all 0.2s" }}>
     ⚔ Charakter erstellen!
    </button>
   </div>
  </div>
 );
}

const CUSTOM_RACES_KEY = "dnd5e_custom_races";
function loadCustomRaces() { try { return JSON.parse(localStorage.getItem(CUSTOM_RACES_KEY) || "[]"); } catch { return []; } }
function saveCustomRaces(arr) { localStorage.setItem(CUSTOM_RACES_KEY, JSON.stringify(arr)); }

const EMOJI_PRESETS = ["🧝","🧟","🧛","🧞","🧜","🐉","🦊","🐺","🦅","🐗","🌊","🌋","⚡","🌑","🌿","🔮","💀","👁","🦋","🐲","🗿","🌀","🦄","🐻","🦁"];
const COLOR_PRESETS = ["#ef4444","#f97316","#fbbf24","#4ade80","#38bdf8","#818cf8","#c084fc","#ec4899","#fb923c","#86efac","#60a5fa","#a78bfa","#f87171","#94a3b8","#ffffff"];

function CustomRaceModal({ editRace, onSave, onClose, theme }) {
 const blank = { name:"", emoji:"🧝", color:"#a78bfa", tagline:"", description:"",
  traits:[""], size:"Mittelgroß", speed:"30 ft", languages:["Gemeinsprache"],
  subraces:[], classTip:"", lore:"", suggestedFor:{ classes:[] }, isCustom:true };
 const [form, setForm] = useState(editRace ? { ...blank, ...editRace } : blank);
 const [subraceOpen, setSubraceOpen] = useState(null);

 const upF = (key, val) => setForm(f => ({ ...f, [key]: val }));

 const addTrait    = () => upF("traits", [...(form.traits||[]), ""]);
 const updTrait    = (i, v) => { const t=[...(form.traits||[])]; t[i]=v; upF("traits",t); };
 const delTrait    = i => upF("traits", (form.traits||[]).filter((_,j)=>j!==i));

 const addSubrace  = () => upF("subraces", [...(form.subraces||[]), { name:"", bonus:"", traits:[""], note:"" }]);
 const delSubrace  = i => { upF("subraces", (form.subraces||[]).filter((_,j)=>j!==i)); if(subraceOpen===i) setSubraceOpen(null); };
 const upSR        = (i, key, val) => { const s=[...(form.subraces||[])]; s[i]={...s[i],[key]:val}; upF("subraces",s); };
 const addSRTrait  = i => { const s=[...(form.subraces||[])]; s[i]={...s[i],traits:[...(s[i].traits||[]),""]};upF("subraces",s); };
 const upSRTrait   = (i,j,v) => { const s=[...(form.subraces||[])]; const t=[...(s[i].traits||[])];t[j]=v;s[i]={...s[i],traits:t};upF("subraces",s); };
 const delSRTrait  = (i,j) => { const s=[...(form.subraces||[])]; s[i]={...s[i],traits:(s[i].traits||[]).filter((_,k)=>k!==j)};upF("subraces",s); };

 const canSave = form.name.trim().length > 0;

 const handleSave = () => {
  if (!canSave) return;
  const race = {
   ...form,
   name: form.name.trim(),
   tagline: form.tagline.trim() || "Eigene Rasse",
   description: form.description.trim() || "Eine selbst erstellte Rasse.",
   traits: (form.traits||[]).filter(t => t.trim()),
   lore: form.lore.trim(),
   classTip: form.classTip.trim(),
   subraces: (form.subraces||[])
    .filter(sr => sr.name.trim())
    .map(sr => ({
     ...sr,
     name: sr.name.trim(),
     bonus: (sr.bonus||"").trim(),
     traits: (sr.traits||[]).filter(t => t.trim()),
     note: (sr.note||"").trim(),
    })),
   isCustom: true,
   id: editRace?.id || Date.now().toString(),
  };
  onSave(race);
 };

 const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:10, padding:"7px 10px", color:"white", fontSize:13, outline:"none",
  width:"100%", fontFamily:"inherit" };
 const label = txt => <div style={{ fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.35)",
  letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:4 }}>{txt}</div>;

 return (
  <div style={{ position:"fixed", inset:0, zIndex:110, display:"flex", alignItems:"center",
   justifyContent:"center", background:"rgba(0,0,0,0.9)", backdropFilter:"blur(8px)", padding:16 }}
   onClick={onClose}>
   <div onClick={e => e.stopPropagation()} style={{
    maxWidth:520, width:"100%", maxHeight:"92vh", overflowY:"auto", WebkitOverflowScrolling:"touch",
    background:"#0f1117", border:`2px solid ${form.color}55`,
    borderRadius:20, padding:"24px 20px",
    boxShadow:`0 0 60px ${form.color}22, 0 24px 60px rgba(0,0,0,0.8)`,

     background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.1)",
     borderRadius:8, width:30, height:30, color:"rgba(255,255,255,0.5)", cursor:"pointer",
     fontSize:16, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"inherit" }}>✕</button>

    <div style={{ fontSize:20, fontWeight:900, color:form.color, marginBottom:4 }}>
     {editRace ? "✏️ Rasse bearbeiten" : "✨ Neue Rasse erstellen"}
    </div>
    <div style={{ fontSize:12, color:"rgba(255,255,255,0.3)", marginBottom:20 }}>
     Erstelle eine eigene Rasse für den Charakter-Wizard.
    </div>

    {/* Preview */}
    <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", marginBottom:20,
     background:`${form.color}0d`, border:`1px solid ${form.color}44`, borderRadius:14 }}>
     <span style={{ fontSize:36 }}>{form.emoji}</span>

      <div style={{ fontSize:17, fontWeight:900, color:form.color }}>{form.name||"Rasse"}</div>

     </div>
    </div>

    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

     {/* Name + Emoji */}
     <div style={{ display:"grid", gridTemplateColumns:"1fr 100px", gap:10 }}>
      <div>{label("Name *")}<input type="text" value={form.name} onChange={e=>upF("name",e.target.value)}
       placeholder="z.B. Drachengeborene" style={inp} autoFocus/></div>
      <div>{label("Emoji")}<input type="text" value={form.emoji} onChange={e=>upF("emoji",e.target.value)}
       placeholder="🧝" style={{...inp, fontSize:22, textAlign:"center"}}/></div>
     </div>

     {/* Emoji presets */}
     <div>
      <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)", marginBottom:6, fontWeight:700 }}>SCHNELLAUSWAHL EMOJI</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
       {EMOJI_PRESETS.map(e => (
        <button key={e} onClick={()=>upF("emoji",e)} style={{ width:32, height:32, fontSize:18,

         border:`1px solid ${form.emoji===e?form.color:"rgba(255,255,255,0.1)"}`,

       ))}
      </div>
     </div>

     {/* Color */}
     <div>
      {label("Farbe")}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
       {COLOR_PRESETS.map(c => (
        <button key={c} onClick={()=>upF("color",c)} style={{ width:28, height:28, borderRadius:"50%",
         background:c, border:`3px solid ${form.color===c?"white":"transparent"}`,
         cursor:"pointer", padding:0 }}/>
       ))}
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
       <input type="color" value={form.color} onChange={e=>upF("color",e.target.value)}
        style={{ width:36, height:36, border:"none", background:"none", cursor:"pointer", padding:0 }}/>
       <span style={{ fontSize:12, color:"rgba(255,255,255,0.3)" }}>Eigene Farbe</span>
      </div>
     </div>

     {/* Tagline + Size + Speed */}
     <div>{label("Tagline")}<input type="text" value={form.tagline} onChange={e=>upF("tagline",e.target.value)}
      placeholder="z.B. Zäh wie Fels, stolz wie Gold" style={inp}/></div>

     <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
      <div>{label("Größe")}<input type="text" value={form.size} onChange={e=>upF("size",e.target.value)}
       placeholder="Mittelgroß" style={inp}/></div>
      <div>{label("Bewegungsrate")}<input type="text" value={form.speed} onChange={e=>upF("speed",e.target.value)}
       placeholder="30 ft" style={inp}/></div>
     </div>

     {/* Description */}
     <div>{label("Beschreibung")}
      <textarea value={form.description} onChange={e=>upF("description",e.target.value)}
       placeholder="Beschreibe die Rasse..." rows={3}
       style={{...inp, resize:"vertical"}}/></div>

     {/* Traits */}
     <div>
      {label("Rassenmerkmale")}
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
       {(form.traits||[]).map((t,i) => (
        <div key={i} style={{ display:"flex", gap:6 }}>
         <input type="text" value={t} onChange={e=>updTrait(i,e.target.value)}
          placeholder={`Merkmal ${i+1}`} style={{...inp, flex:1}}/>
         <button onClick={()=>delTrait(i)} style={{ background:"rgba(239,68,68,0.15)",
          color:"#f87171", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8,
          padding:"6px 10px", cursor:"pointer", fontFamily:"inherit" }}>✕</button>
        </div>
       ))}
       <button onClick={addTrait} style={{ background:"rgba(15,15,22,0.87)",
        border:"1px dashed rgba(255,255,255,0.15)", borderRadius:10, padding:"7px",
        color:"rgba(255,255,255,0.4)", cursor:"pointer", fontSize:12,
        fontFamily:"inherit", fontWeight:600 }}>+ Merkmal hinzufügen</button>
      </div>
     </div>

     {/* Lore + Classtip */}
     <div>{label("Klassen-Tipp (optional)")}
      <input type="text" value={form.classTip} onChange={e=>upF("classTip",e.target.value)}
