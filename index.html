  <svg style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}} xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="d20grad" cx="50%" cy="40%" r="60%"><stop offset="0%" stopColor={theme.accent} stopOpacity="0.25"/><stop offset="100%" stopColor={theme.accent} stopOpacity="0"/></radialGradient></defs><g transform="translate(50%,50%)" opacity="0.07"><g transform="translate(-120,-120)"><polygon points="120,0 220,60 220,160 170,240 70,240 20,160 20,60" fill="url(#d20grad)" stroke={theme.accent} strokeWidth="1.5"/><line x1="120" y1="0" x2="20" y2="60" stroke={theme.accent} strokeWidth="1"/><line x1="120" y1="0" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="120" y1="0" x2="220" y2="60" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="60" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="60" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="60" x2="20" y2="160" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="60" x2="220" y2="160" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="160" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="160" x2="120" y2="90" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="160" x2="70" y2="240" stroke={theme.accent} strokeWidth="1"/><line x1="220" y1="160" x2="170" y2="240" stroke={theme.accent} strokeWidth="1"/><line x1="70" y1="240" x2="120" y2="90" stroke={theme.accent} strokeWidth="0.7" strokeDasharray="4,3"/><line x1="170" y1="240" x2="120" y2="90" stroke={theme.accent} strokeWidth="0.7" strokeDasharray="4,3"/><line x1="70" y1="240" x2="170" y2="240" stroke={theme.accent} strokeWidth="1"/><line x1="20" y1="160" x2="220" y2="160" stroke={theme.accent} strokeWidth="0.7" strokeDasharray="4,3"/><text x="120" y="145" textAnchor="middle" fontSize="42" fontWeight="900" fill={theme.accent} opacity="0.9" fontFamily="system-ui,sans-serif" letterSpacing="-2">20</text></g></g></svg>

  {deathBanner&&(<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{textAlign:"center",padding:"32px 40px",borderRadius:24,border:`3px solid ${deathBanner==="dead"?"#dc2626":"#16a34a"}`,background:"rgba(10,10,20,0.97)",animation:"flyIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards"}}><div style={{fontSize:64,marginBottom:12}}>{deathBanner==="dead"?"💀":"💚"}</div><div style={{fontSize:32,fontWeight:900,color:deathBanner==="dead"?"#ef4444":"#4ade80",letterSpacing:4}}>{deathBanner==="dead"?"GESTORBEN":"AM LEBEN"}</div></div></div>)}

  {isDying&&(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.92)"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:"32px 24px",width:"100%",maxWidth:380}}>
   {isDead&&<div style={{textAlign:"center"}}><div style={{fontSize:48}}>💀</div><div style={{fontSize:28,fontWeight:900,color:"#ef4444"}}>TOT</div></div>}
   {isStable&&!isDead&&<div style={{textAlign:"center"}}><div style={{fontSize:48}}>💚</div><div style={{fontSize:28,fontWeight:900,color:"#4ade80"}}>STABIL</div></div>}
   {!isDead&&!isStable&&<div style={{textAlign:"center"}}><div style={{fontSize:48}}>⚰️</div><div style={{fontSize:22,fontWeight:900,color:"#f87171"}}>BEWUSSTLOS</div></div>}
   <div style={{...S.card,width:"100%"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{color:"#4ade80",fontWeight:700,fontSize:14}}>✓ Erfolge</span><div style={{display:"flex",gap:8}}>{[0,1,2].map(i=><div key={i} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${i<deathSaves.success?"#4ade80":"rgba(255,255,255,0.15)"}`,background:i<deathSaves.success?"#16a34a":"transparent"}}/>)}</div></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#f87171",fontWeight:700,fontSize:14}}>✗ Misserfolge</span><div style={{display:"flex",gap:8}}>{[0,1,2].map(i=><div key={i} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${i<deathSaves.fail?"#f87171":"rgba(255,255,255,0.15)"}`,background:i<deathSaves.fail?"#dc2626":"transparent"}}/>)}</div></div></div>
   {!isDead&&!isStable&&(<div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}><label style={{fontSize:11,color:"rgba(255,255,255,0.45)",textAlign:"center",fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>Was hast du gewürfelt? (1–20)</label><div style={{display:"flex",gap:8}}><input type="number" min="1" max="20" value={deathInput} onChange={e=>setDeathInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitDeathSave()} placeholder="z.B. 14" style={{...S.input,flex:1,fontSize:24,fontWeight:900,textAlign:"center",padding:"12px 16px"}}/><button onClick={submitDeathSave} style={{...S.btnPrimary,padding:"12px 20px",fontSize:18}}>✓</button></div></div>)}
   <div style={{display:"flex",gap:10,width:"100%"}}><button onClick={()=>{up("currentHP",1);resetDeathSaves();}} style={{...S.btnGreen,flex:1,borderRadius:12}}>💉 Stabilisiert (1 HP)</button><button onClick={resetDeathSaves} style={{...S.btnGhost,padding:"8px 16px",borderRadius:12}}>Reset</button></div>
  </div></div>)}

  <RestModals restModal={restModal} setRestModal={setRestModal} ch={ch} upCh={upCh} totalLevel={totalLevel} deathSaves={deathSaves} setDeathSaves={setDeathSaves} theme={theme}/>

  {/* ── Waffenkatalog Modal ── */}
  {wepCatalogOpen&&(()=>{
   const filtered = WEAPON_CATALOG.filter(w => {
    if (w.id === "unarmed") return false;
    if (wepCatalogFilter.cat !== "alle" && w.category !== wepCatalogFilter.cat) return false;
    if (wepCatalogFilter.range !== "alle" && w.range !== wepCatalogFilter.range) return false;
    if (wepCatalogFilter.search) {
     const s = wepCatalogFilter.search.toLowerCase();
     if (!w.name.toLowerCase().includes(s) && !w.type.toLowerCase().includes(s) && !(w.props||[]).join(" ").toLowerCase().includes(s)) return false;
    }
    return true;
   });
   const addWep = (w) => {
    const rangeStr = w.rangeStr && w.rangeStr !== "—" ? w.rangeStr : "";
    upCh(n => {
     n.inventory.push({
      ...DEFAULT_ITEM,
      name: w.name, type:"weapon", qty:1, weight: w.weight||0, equipped:false,
      weapon:{
       damage: w.damage, damageType: w.type, damageVers: w.damageVers||null,
       scale: w.scale, bonus:0, props: [...(w.props||[])], range: rangeStr,
       note: w.note||"", catalogId: w.id, category: w.category,
      },
     });
     return n;
    });
    setExpandedItem(ch.inventory.length);
    setWepCatalogOpen(false);
   };
   const catLabels = {alle:"Alle",einfach:"Einfach",kriegs:"Kriegs"};
   const rangeLabels = {alle:"Alle",nah:"Nahkampf",fern:"Fernkampf"};
   return (
    <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.88)"}} onClick={()=>setWepCatalogOpen(false)}>
     <div style={{...S.card,maxWidth:560,width:"95%",maxHeight:"88vh",display:"flex",flexDirection:"column",padding:0,overflow:"hidden",WebkitOverflowScrolling:"touch"}} onClick={e=>e.stopPropagation()}>
      {/* Header */}
      <div style={{padding:"16px 18px 12px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
       <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:900,fontSize:16,color:theme.accent}}>⚔ Waffe aus Katalog hinzufügen</div>
        <button onClick={()=>setWepCatalogOpen(false)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
       </div>
       {/* Filter Bar */}
       <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <input
         value={wepCatalogFilter.search}
         onChange={e=>setWepCatalogFilter(f=>({...f,search:e.target.value}))}
         placeholder="Suche…"
         style={{...S.input,flex:"1 1 120px",fontSize:12,padding:"5px 10px"}}
        />
        {["alle","einfach","kriegs"].map(c=>(
         <button key={c} onClick={()=>setWepCatalogFilter(f=>({...f,cat:c}))}
          style={{padding:"5px 11px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background: wepCatalogFilter.cat===c ? `${theme.accent}22` : "rgba(15,15,22,0.85)",
           color:      wepCatalogFilter.cat===c ? theme.accent : "rgba(255,255,255,0.4)",
           border:`1px solid ${wepCatalogFilter.cat===c ? theme.accent+"55" : "rgba(255,255,255,0.1)"}`,
          }}>{catLabels[c]}</button>
        ))}
        {["alle","nah","fern"].map(r=>(
         <button key={r} onClick={()=>setWepCatalogFilter(f=>({...f,range:r}))}
          style={{padding:"5px 11px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background: wepCatalogFilter.range===r ? "rgba(251,191,36,0.15)" : "rgba(15,15,22,0.85)",
           color:      wepCatalogFilter.range===r ? "#fbbf24" : "rgba(255,255,255,0.4)",
           border:`1px solid ${wepCatalogFilter.range===r ? "rgba(251,191,36,0.4)" : "rgba(255,255,255,0.1)"}`,
          }}>{rangeLabels[r]}</button>
        ))}
       </div>
      </div>
      {/* Weapon List */}
      <div style={{overflowY:"auto",flex:1,padding:"8px 10px"}}>
       {filtered.length === 0 && (
        <div style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:13,padding:32}}>Keine Waffen gefunden</div>
       )}
       {filtered.map(w => {
        const twoH = handsNeeded(w.props) === 2;
        const versMatch = (w.props||[]).find(p => p.startsWith("Vielseitig"));
        const handIcon = twoH ? "🤲" : "✋";
        const handLabel = twoH ? "2H" : versMatch ? "1H / 2H" : "1H";
        const handColor = twoH ? "#f87171" : versMatch ? "#fbbf24" : "#4ade80";
        return (
         <div key={w.id} onClick={()=>addWep(w)}
          style={{display:"flex",gap:10,alignItems:"flex-start",padding:"9px 10px",borderRadius:10,marginBottom:4,cursor:"pointer",
           background:"rgba(15,15,22,0.85)",border:`1px solid rgba(255,255,255,0.07)`,
           transition:"all 0.15s"}}
          >
          <div style={{fontSize:22,flexShrink:0,lineHeight:1.2}}>{w.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
           <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontWeight:800,fontSize:13,color:"white"}}>{w.name}</span>
            <span style={{fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:700,
             background: w.category==="einfach" ? "rgba(96,165,250,0.15)" : "rgba(251,191,36,0.15)",
             color:      w.category==="einfach" ? "#60a5fa" : "#fbbf24",
             border:`1px solid ${w.category==="einfach" ? "rgba(96,165,250,0.3)" : "rgba(251,191,36,0.3)"}`,
            }}>{w.category==="einfach"?"Einfach":"Kriegs"}</span>
            <span style={{fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:700,
             background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.45)",border:"1px solid rgba(255,255,255,0.1)",
            }}>{w.range==="fern"?"🏹 Fern":"⚔ Nah"}</span>
           </div>
           <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {/* Schaden */}
            <span style={{fontSize:12,fontWeight:900,color:"#f87171",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:7,padding:"2px 8px"}}>
             {w.damage}{w.damageVers ? ` / ${w.damageVers}` : ""} {w.type}
            </span>
            {/* Hände */}
            <span style={{fontSize:11,fontWeight:700,color:handColor,background:`${handColor}15`,border:`1px solid ${handColor}30`,borderRadius:7,padding:"2px 8px"}}>
             {handIcon} {handLabel}

            {/* Scale */}
            <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",background:"rgba(12,12,18,0.88)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:7,padding:"2px 7px"}}>{w.scale}</span>

            {(w.props||[]).filter(p=>!p.startsWith("Munition")).map(p=>(

            ))}

            {w.rangeStr && w.rangeStr !== "—" && (
             <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",borderRadius:6,padding:"2px 6px"}}>{w.rangeStr}</span>
            )}

           {w.note && <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:3,fontStyle:"italic"}}>{w.note}</div>}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:theme.accent,flexShrink:0,alignSelf:"center",opacity:0.7}}>+ Hinzufügen</div>
         </div>
        );
       })}
      </div>
      {/* Footer */}
      <div style={{padding:"10px 18px",borderTop:"1px solid rgba(255,255,255,0.07)",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

       <button onClick={()=>{upCh(n=>{n.inventory.push({...DEFAULT_ITEM,type:"weapon"});return n;});setExpandedItem(ch.inventory.length);setWepCatalogOpen(false);}}
        style={{...S.btnGhost,fontSize:11,padding:"5px 12px"}}>
        ✏ Eigene Waffe eingeben
       </button>
      </div>
     </div>
    </div>
   );
  })()}

  {/* ── Rüstungskatalog Modal ── */}
  {armorCatalogOpen&&(()=>{
   const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
   const strScore = ch.stats?.str||10;
   const addArmor = (a) => {
    upCh(n=>{
     n.inventory.push({
      ...DEFAULT_ITEM,
      name:a.name, type:"armor", qty:1, weight:a.weight||0, equipped:false,
      armor:{
       ac:a.baseAC, stealthDisadv:a.stealthDisadv,
       profCategory:a.profCategory, minStr:a.minStr||0, bonus:0,
       addDex:a.addDex, maxDex:a.maxDex,
      },
     });
     return n;
    });
    setExpandedItem(ch.inventory.length);
    setArmorCatalogOpen(false);
   };
   const catColors = { keine:"rgba(255,255,255,0.3)", leicht:"#4ade80", mittel:"#60a5fa", schwer:"#f87171" };
   const catLabels = { keine:"Keine", leicht:"Leicht", mittel:"Mittel", schwer:"Schwer" };
   return (
    <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.88)"}} onClick={()=>setArmorCatalogOpen(false)}>
     <div style={{...S.card,maxWidth:540,width:"95%",maxHeight:"88vh",display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
      {/* Header */}
      <div style={{padding:"16px 18px 12px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
       <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontWeight:900,fontSize:16,color:theme.accent}}>🛡 Rüstung aus Katalog hinzufügen</div>
        <button onClick={()=>setArmorCatalogOpen(false)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
       </div>
       {/* Übungs-Info */}
       <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:8,lineHeight:1.5}}>
        Deine Klassen: <span style={{color:"rgba(255,255,255,0.6)",fontWeight:700}}>{classNames.length?classNames.join(", "):"—"}</span>
        {" · "}STR: <span style={{color:"rgba(255,255,255,0.6)",fontWeight:700}}>{strScore}</span>
       </div>
       {/* Legende */}
       <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {["keine","leicht","mittel","schwer"].map(cat=>{
         const prof = hasArmorProf(classNames, cat);
         return (
          <div key={cat} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700,
           background:`${catColors[cat]}15`, color:catColors[cat],
           border:`1px solid ${catColors[cat]}40`,
           opacity: prof||cat==="keine" ? 1 : 0.4,
          }}>
           {prof||cat==="keine"?"✓":"✗"} {catLabels[cat]}
          </div>
         );
        })}
        <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",alignSelf:"center"}}>✓ = geübt · ✗ = nicht geübt</div>
       </div>
      </div>
      {/* List */}
      <div style={{overflowY:"auto",flex:1,padding:"8px 10px"}}>
       {ARMOR_CATALOG.map(a=>{
        const prof = hasArmorProf(classNames, a.profCategory);
        const warns = armorWarnings(a, classNames, strScore);
        const catColor = catColors[a.profCategory]||"rgba(255,255,255,0.3)";
        const acDisplay = a.addDex
         ? `${a.baseAC} + DEX${a.maxDex!=null?` (max +${a.maxDex})`:""}`
         : `${a.baseAC}`;
        return (
         <div key={a.id} onClick={()=>addArmor(a)}
          style={{display:"flex",gap:10,alignItems:"flex-start",padding:"9px 10px",borderRadius:10,marginBottom:4,cursor:"pointer",
           background: warns.length ? "rgba(251,191,36,0.04)" : "rgba(15,15,22,0.85)",
           border:`1px solid ${warns.length ? "rgba(251,191,36,0.2)" : "rgba(255,255,255,0.07)"}`,
           transition:"all 0.15s",
           opacity: 1,
          }}

    {tab==="inventory"&&<>
     <div style={S.card}><Wallet currency={ch.currency} onUpdate={c=>upCh(n=>{n.currency=c;return n;})} theme={theme}/></div>
     <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={S.section}>🎒 Inventar</div>
      <div style={{display:"flex",gap:6}}>
       <button onClick={()=>setWepCatalogOpen(true)} style={{...S.btnGhost,fontSize:12,padding:"6px 14px"}}>⚔ Waffe hinzufügen</button>
       <button onClick={()=>setArmorCatalogOpen(true)} style={{...S.btnGhost,fontSize:12,padding:"6px 14px"}}>🛡 Rüstung hinzufügen</button>
       <button onClick={()=>{upCh(n=>{n.inventory.push({...DEFAULT_ITEM});return n;});setExpandedItem(ch.inventory.length);}} style={{...S.btnPrimary,fontSize:12,padding:"6px 14px"}}>+ Gegenstand</button>
      </div>
     </div>
      {ch.inventory.length===0
       ? <div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",padding:"32px 0",fontSize:13}}>Inventar ist leer</div>
       : <div style={{display:"flex",flexDirection:"column",gap:8}}>
         {ch.inventory.map((it,i)=>{
          const isContainer = Array.isArray(it.contents) && it.contents.length > 0;
          const canEquip = it.type==="weapon"||it.type==="armor"||it.type==="shield"||it.type==="magic";
          const typeColors = { weapon:"#f87171", armor:"#60a5fa", shield:"#4ade80", magic:"#c084fc", potion:"#fbbf24", misc:"rgba(255,255,255,0.4)" };
          const typeEmojis = { weapon:"⚔", armor:"🛡", shield:"🔰", magic:"✨", potion:"🧪", misc: isContainer ? "🎒" : "📦" };
          const col = it.equipped ? typeColors[it.type] || theme.accent : "rgba(255,255,255,0.15)";
          return (
           <div key={i} style={{
            borderRadius:14, overflow:"hidden",
            border:`2px solid ${it.equipped ? col+"88" : isContainer ? "rgba(251,191,36,0.25)" : "rgba(255,255,255,0.08)"}`,
            background: it.equipped ? `${col}0d` : isContainer ? "rgba(251,191,36,0.04)" : theme.card,
            transition:"all 0.2s",
           }}>
            {/* ── TOP ROW ── */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px"}}>
             {/* Type icon */}
             <div style={{
              width:32, height:32, borderRadius:8, flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:16,
              background: it.equipped ? `${col}22` : "rgba(15,15,22,0.85)",
              border:`1px solid ${it.equipped ? col+"55" : "rgba(255,255,255,0.1)"}`,
             }}>{typeEmojis[it.type]||"📦"}</div>

             {/* Name + type */}
             <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
               <input type="text" value={it.name}
                onChange={e=>upCh(n=>{n.inventory[i].name=e.target.value;return n;})}
                placeholder="Name"
                style={{...S.input,flex:1,minWidth:80,fontSize:13,fontWeight:700,
                 padding:"3px 8px",
                 color: it.equipped ? col : "white",
                 border:`1px solid ${it.equipped ? col+"44" : "rgba(255,255,255,0.12)"}`,
                }}/>
               <input type="number" min="1" value={it.qty}
                onChange={e=>upCh(n=>{n.inventory[i].qty=+e.target.value;return n;})}
                style={{...S.input,width:44,textAlign:"center",padding:"3px 4px",fontSize:12}}
                title="Anzahl"/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
               <select value={it.type}
                onChange={e=>upCh(n=>{n.inventory[i].type=e.target.value;n.inventory[i].equipped=false;return n;})}
                style={{...S.input,width:"auto",fontSize:10,padding:"1px 5px"}}>
                {ITEM_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
               </select>
              </div>
             </div>

             {/* Action buttons */}
             <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
              {canEquip && (() => {

               const handsUsed = ch.inventory.reduce((sum, x, j) => {
                if (j === i || !x.equipped) return sum;
                if (x.type === "shield") return sum + 1;
                if (x.type === "misc" && /fackel|torch/i.test(x.name)) return sum + 1;
                if (x.type === "weapon") return sum + handsNeeded(x.weapon?.props, x.weapon);
                return sum;
               }, 0);
               const thisHands = it.type === "shield" ? 1
                : it.type === "misc" && /fackel|torch/i.test(it.name) ? 1
                : it.type === "weapon" ? handsNeeded(it.weapon?.props, it.weapon)
                : 0;
               const needsHands = thisHands > 0;
               const blocked = !it.equipped && needsHands && (handsUsed + thisHands > 2);
               const conflictMsg = blocked
                ? thisHands === 2
                 ? `Zweihänder – braucht 2 Hände (${handsUsed}/2 belegt)`
                 : `Keine Hand frei (${handsUsed}/2 belegt)`
                : null;

               const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
               const armorWarns = it.type==="armor"
                ? armorWarnings(it, classNames, ch.stats?.str)
                : [];
               const hasArmorWarn = armorWarns.length > 0;

               return (
                <>
                 <button
                  onClick={() => {
                   if (it.equipped) {
                    upCh(n => { n.inventory[i].equipped = false; return n; });
                   } else if (!blocked) {
                    upCh(n => { n.inventory[i].equipped = true; return n; });
                   }
                  }}
                  title={conflictMsg || (hasArmorWarn ? armorWarns.join(" | ") : "")}
                  style={{
                   padding:"5px 10px", borderRadius:8,
                   cursor: blocked ? "not-allowed" : "pointer",
                   fontFamily:"inherit", fontWeight:800, fontSize:11,
                   transition:"all 0.15s", whiteSpace:"nowrap",
                   background: it.equipped
                    ? (hasArmorWarn ? "rgba(251,191,36,0.15)" : `${col}22`)
                    : blocked ? "rgba(248,113,113,0.08)"
                    : "rgba(15,15,22,0.85)",
                   color: it.equipped
                    ? (hasArmorWarn ? "#fbbf24" : col)
                    : blocked ? "#f87171"
                    : "rgba(255,255,255,0.45)",
                   border:`1px solid ${it.equipped
                    ? (hasArmorWarn ? "rgba(251,191,36,0.5)" : col+"66")
                    : blocked ? "rgba(248,113,113,0.3)"
                    : "rgba(255,255,255,0.12)"}`,
                  }}>
                  {it.equipped
                   ? (hasArmorWarn ? "⚠ Ausgerüstet" : "✓ Ausgerüstet")
                   : blocked ? "✗ Kein Platz"
                   : "Ausrüsten"}
                 </button>
                 {it.equipped && (
                  <button
                   onClick={()=>upCh(n=>{n.inventory[i].equipped=false;return n;})}
                   style={{
                    padding:"4px 10px", borderRadius:8, cursor:"pointer",
                    fontFamily:"inherit", fontWeight:700, fontSize:10,
                    whiteSpace:"nowrap", transition:"all 0.15s",
                    background:"rgba(15,15,22,0.87)",
                    color:"rgba(255,255,255,0.35)",
                    border:"1px solid rgba(255,255,255,0.1)",
                   }}>
                   Ablegen
                  </button>
                 )}
                 {/* Rüstungs-Warnungen */}
                 {it.type==="armor" && hasArmorWarn && armorWarns.map((w,wi)=>(
                  <div key={wi} style={{
                   fontSize:10, color:"#fbbf24", textAlign:"left",
                   background:"rgba(251,191,36,0.08)",
                   border:"1px solid rgba(251,191,36,0.25)",
                   borderRadius:6, padding:"3px 8px", lineHeight:1.4,
                   maxWidth:180,
                  }}>⚠ {w}</div>
                 ))}
                 {needsHands && (
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>
                   {it.equipped
                    ? `${thisHands === 2 ? "🤲" : "✋"} ${thisHands}H · ${handsUsed + thisHands}/2 belegt`
                    : blocked
                     ? <span style={{color:"#f87171"}}>{conflictMsg}</span>
                     : `${thisHands}H · ${handsUsed}/2 belegt`
                   }
                  </div>
                 )}
                </>
               );
              })()}
              <div style={{display:"flex",gap:4}}>
               {isContainer && (
                <button onClick={()=>upCh(n=>{n.inventory[i].isOpen=!n.inventory[i].isOpen;return n;})}
                 style={{background:it.isOpen?"rgba(251,191,36,0.2)":"rgba(15,15,22,0.87)",
                  border:`1px solid ${it.isOpen?"rgba(251,191,36,0.5)":"rgba(255,255,255,0.1)"}`,
                  borderRadius:7,padding:"4px 8px",cursor:"pointer",
                  color:it.isOpen?"#fbbf24":"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"inherit",fontWeight:700}}
                 title="Rucksack öffnen/schließen">
                 🎒 {it.isOpen?"▲":"▼"}
                </button>
               )}
               <button onClick={()=>setExpandedItem(expandedItem===i?null:i)}
                style={{flex:1,background:"rgba(15,15,22,0.87)",border:"1px solid rgba(255,255,255,0.1)",
                 borderRadius:7,padding:"4px 6px",cursor:"pointer",
                 color:"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"inherit"}}>
                {expandedItem===i?"▲":"▼"}
               </button>
               <button onClick={()=>{upCh(n=>{n.inventory.splice(i,1);return n;});if(expandedItem===i)setExpandedItem(null);}}
                style={{...S.btnDanger,padding:"4px 8px",fontSize:11}}>✕</button>
              </div>
             </div>
            </div>

            {/* ── WEAPON STAT BAR ── */}
            {it.type==="weapon"&&it.weapon?.damage&&(()=>{
             const wProps = it.weapon.props||[];
             const isVers = wProps.some(p=>p.startsWith("Vielseitig"));
             const alwaysTwoH = wProps.some(p=>p==="Zweihändig"||p==="2H");
             const activeTwo = alwaysTwoH || (isVers && !!it.weapon.twoHanded);
             const wHands = activeTwo ? 2 : 1;
             const activeDmg = (isVers && activeTwo && it.weapon.damageVers) ? it.weapon.damageVers : it.weapon.damage;

             const handColor = activeTwo ? "#fbbf24" : "#4ade80";

             return (
             <div style={{
              display:"flex",gap:6,padding:"6px 12px 10px",flexWrap:"wrap",
              borderTop:`1px solid ${it.equipped ? col+"33" : "rgba(15,15,22,0.87)"}`,
             }}>
              {/* ATK Bonus */}
              <div style={{display:"flex",alignItems:"center",gap:5,
               background:it.equipped?"rgba(74,222,128,0.12)":"rgba(15,15,22,0.87)",
               border:`1px solid ${it.equipped?"rgba(74,222,128,0.3)":"rgba(255,255,255,0.1)"}`,
               borderRadius:8,padding:"3px 9px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>ATK</span>
               <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#4ade80":"rgba(255,255,255,0.5)"}}>{fmtMod(weaponAtkBonus(it))}</span>
              </div>

              {/* Aktiver Schaden */}
              <div style={{display:"flex",alignItems:"center",gap:5,
               background:it.equipped?"rgba(248,113,113,0.12)":"rgba(15,15,22,0.87)",
               border:`1px solid ${it.equipped?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.1)"}`,
               borderRadius:8,padding:"3px 9px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>DMG</span>
               <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#f87171":"rgba(255,255,255,0.5)"}}>
                {activeDmg}{it.weapon.damageType?` ${it.weapon.damageType}`:""}
               </span>
              </div>

              {/* 1H / 2H Toggle – nur bei Vielseitig */}
              {isVers&&it.weapon.damageVers&&(
               <div style={{
                display:"flex",borderRadius:10,overflow:"hidden",flexShrink:0,
                border:`2px solid ${activeTwo ? "#fbbf24" : "#4ade80"}`,
                boxShadow:`0 0 10px ${activeTwo ? "#fbbf2455" : "#4ade8055"}`,
                transition:"all 0.2s",
               }}>
                {/* 1H Button */}
                <button
                 onClick={()=>{
                  if(!it.weapon.twoHanded) return;
                  upCh(n=>{n.inventory[i].weapon.twoHanded=false;return n;});
                 }}
                 title="Einhändig führen – freie Hand bleibt verfügbar"
                 style={{
                  padding:"5px 12px",fontSize:12,fontWeight:900,cursor: it.weapon.twoHanded?"pointer":"default",
                  fontFamily:"inherit",border:"none",transition:"all 0.2s",lineHeight:1,
                  background: !it.weapon.twoHanded
                   ? "linear-gradient(135deg,rgba(74,222,128,0.35),rgba(74,222,128,0.2))"
                   : "rgba(15,15,22,0.9)",
                  color: !it.weapon.twoHanded ? "#4ade80" : "rgba(255,255,255,0.25)",
                 }}>
                 <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                  <span>✋ 1H</span>
                  <span style={{fontSize:10,fontWeight:700,opacity:0.85}}>{it.weapon.damage}</span>
                 </div>
                </button>

                {/* Trennlinie */}
                <div style={{width:2,background: activeTwo ? "#fbbf2444" : "#4ade8044"}}/>

                {/* 2H Button – legt alles andere auto ab */}
                <button
                 onClick={()=>{
                  if(it.weapon.twoHanded) return;
                  upCh(n=>{

                   n.inventory.forEach((x,j)=>{
                    if(j===i) return;
                    if(!x.equipped) return;
                    if(x.type==="weapon"||x.type==="shield"||(x.type==="misc"&&/fackel|torch/i.test(x.name))) {
                     n.inventory[j].equipped=false;
                    }
                   });
                   n.inventory[i].weapon.twoHanded=true;
                   return n;
                  });
                 }}
                 title="Zweihändig führen – andere Hand-Items werden automatisch abgelegt"
                 style={{
                  padding:"5px 12px",fontSize:12,fontWeight:900,cursor: it.weapon.twoHanded?"default":"pointer",
                  fontFamily:"inherit",border:"none",transition:"all 0.2s",lineHeight:1,
                  background: it.weapon.twoHanded
                   ? "linear-gradient(135deg,rgba(251,191,36,0.35),rgba(251,191,36,0.2))"
                   : "rgba(15,15,22,0.9)",
                  color: it.weapon.twoHanded ? "#fbbf24" : "rgba(255,255,255,0.25)",
                 }}>
                 <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                  <span>🤲 2H</span>
                  <span style={{fontSize:10,fontWeight:700,opacity:0.85}}>{it.weapon.damageVers}</span>
                 </div>
                </button>
               </div>
              )}

              {/* Hände-Badge (bei nicht-Vielseitig) */}
              {!isVers&&(
               <div style={{display:"flex",alignItems:"center",
                background:`${handColor}12`,border:`1px solid ${handColor}30`,
                borderRadius:8,padding:"3px 8px"}}>
                <span style={{fontSize:10,color:handColor,fontWeight:700}}>
                 {alwaysTwoH ? "🤲 2H" : "✋ 1H"}
                </span>
               </div>
              )}

              {/* Skalierung */}
              {it.weapon.scale&&<div style={{display:"flex",alignItems:"center",
               background:"rgba(12,12,18,0.88)",border:"1px solid rgba(255,255,255,0.08)",
               borderRadius:8,padding:"3px 8px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:700}}>{it.weapon.scale}</span>
              </div>}

              {/* Props */}
              {wProps.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
               {wProps.map(p=><span key={p} style={{fontSize:10,color:"rgba(255,255,255,0.3)",
                background:"rgba(12,12,18,0.88)",borderRadius:6,padding:"3px 7px"}}>{p}</span>)}
              </div>}
             </div>
             );
            })()}

            {/* ── ARMOR STAT BAR ── */}
            {(it.type==="armor"||it.type==="shield")&&(()=>{
             const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
             const aWarns = it.type==="armor" ? armorWarnings(it, classNames, ch.stats?.str) : [];
             const profCat = it.armor?.profCategory;
             const catColors2 = {leicht:"#4ade80",mittel:"#60a5fa",schwer:"#f87171"};
             const catLabels2 = {keine:"Keine",leicht:"Leicht",mittel:"Mittel",schwer:"Schwer"};
             return (
             <div style={{
              display:"flex",gap:6,padding:"6px 12px 8px",flexWrap:"wrap",
              borderTop:`1px solid ${it.equipped ? col+"33" : "rgba(15,15,22,0.87)"}`,
             }}>
              {/* RK */}
              <div style={{display:"flex",alignItems:"center",gap:5,
               background:it.equipped?"rgba(96,165,250,0.12)":"rgba(15,15,22,0.87)",
               border:`1px solid ${it.equipped?"rgba(96,165,250,0.3)":"rgba(255,255,255,0.1)"}`,
               borderRadius:8,padding:"3px 9px"}}>
               <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>RK</span>
               <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#60a5fa":"rgba(255,255,255,0.5)"}}>
                {it.type==="armor"
                 ? `${it.armor?.ac||10}${it.armor?.bonus?` +${it.armor.bonus}`:""}`
                 : `+${it.shield?.acBonus||2}`}
               </span>
              </div>
              {/* Kategorie-Badge */}
              {it.type==="armor"&&profCat&&profCat!=="keine"&&(()=>{
               const prof = hasArmorProf(classNames, profCat);
               const cc = catColors2[profCat]||"rgba(255,255,255,0.3)";
               return (
                <div style={{display:"flex",alignItems:"center",gap:4,
                 background: prof?`${cc}12`:"rgba(248,113,113,0.08)",
                 border:`1px solid ${prof?cc+"30":"rgba(248,113,113,0.3)"}`,
                 borderRadius:8,padding:"3px 9px"}}>
                 <span style={{fontSize:10,fontWeight:700,color:prof?cc:"#f87171"}}>
                  {prof?"✓":"✗"} {catLabels2[profCat]}
                 </span>
                </div>
               );
              })()}
              {/* STR-Anforderung */}
              {it.type==="armor"&&(it.armor?.minStr||0)>0&&(()=>{
               const ok = (ch.stats?.str||10) >= it.armor.minStr;
               return (
                <div style={{display:"flex",alignItems:"center",gap:4,
                 background:ok?"rgba(12,12,18,0.88)":"rgba(248,113,113,0.08)",
                 border:`1px solid ${ok?"rgba(255,255,255,0.08)":"rgba(248,113,113,0.3)"}`,
                 borderRadius:8,padding:"3px 9px"}}>
                 <span style={{fontSize:10,fontWeight:700,color:ok?"rgba(255,255,255,0.35)":"#f87171"}}>
                  STR {it.armor.minStr}+{!ok&&" ⚠"}
                 </span>
                </div>
               );
              })()}
              {/* Heimlichkeit */}
              {it.type==="armor"&&it.armor?.stealthDisadv&&(
               <div style={{display:"flex",alignItems:"center",gap:4,
                background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.2)",
                borderRadius:8,padding:"3px 9px"}}>
                <span style={{fontSize:10,color:"#f87171",fontWeight:700}}>⚠ Heimlichkeit</span>
               </div>
              )}
             </div>
             );
            })()}

            {/* ── EXPANDED DETAIL ── */}
            {expandedItem===i&&<div style={{padding:"0 12px 12px",borderTop:`1px solid ${it.equipped?col+"22":"rgba(15,15,22,0.87)"}`}}><ItemDetail it={it} i={i}/></div>}
            {/* ── CONTAINER INHALT ── */}
            {isContainer && it.isOpen && (
             <div style={{padding:"0 12px 12px",borderTop:"1px solid rgba(251,191,36,0.15)"}}>
              <div style={{fontSize:10,fontWeight:800,color:"rgba(251,191,36,0.6)",letterSpacing:"0.07em",marginBottom:8,marginTop:8}}>INHALT</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
               {it.contents.map((c,ci)=>(
                <div key={ci} style={{display:"flex",alignItems:"center",gap:5,
                 background:"rgba(12,12,18,0.9)",border:"1px solid rgba(255,255,255,0.1)",
                 borderRadius:8,padding:"3px 10px",fontSize:12}}>
                 <span style={{color:"rgba(255,255,255,0.6)"}}>{c.qty>1?`${c.qty}× `:""}{c.name}</span>
                 <button onClick={()=>upCh(n=>{
                  const newContents = n.inventory[i].contents.filter((_,j)=>j!==ci);
                  if(newContents.length===0){n.inventory[i].contents=null;n.inventory[i].isOpen=false;}
                  else n.inventory[i].contents=newContents;
                  return n;
                 })} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.25)",
                  cursor:"pointer",fontSize:11,padding:"0 1px",lineHeight:1}}>✕</button>
                </div>
               ))}
              </div>
              <button onClick={()=>{

               upCh(n=>{
                const contents = n.inventory[i].contents||[];
                contents.forEach(c=>{
                 const exists = n.inventory.some((x,xi)=>xi!==i&&x.name===c.name&&x.type==="misc");
                 if(!exists) n.inventory.push({...DEFAULT_ITEM,name:c.name,type:"misc",qty:c.qty,equipped:false});
                });
                n.inventory[i].contents=null;
                n.inventory[i].isOpen=false;
                n.inventory[i].name=n.inventory[i].name.replace(/ \(.*\)/,"");
                n.inventory[i].desc="Ausgeleert";
                return n;
               });
              }} style={{marginTop:8,fontSize:11,padding:"4px 10px",borderRadius:8,cursor:"pointer",
               background:"rgba(251,191,36,0.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.3)",
               fontFamily:"inherit",fontWeight:700}}>
               📤 Alles auspacken
              </button>
             </div>
            )}
           </div>
          );
         })}
         <div style={{textAlign:"right",fontSize:11,color:"rgba(255,255,255,0.25)",paddingTop:4}}>
          Gewicht: {ch.inventory.reduce((s,it)=>s+(it.weight*it.qty),0).toFixed(1)} / {ch.stats.str*15} lbs
         </div>
        </div>
      }
     </div>
    </>}

    {tab==="features"&&<>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={S.section}>✨ Features &amp; Klassenmerkmale</div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:-6,marginBottom:10}}>Attribut- &amp; Fertigkeitsboni werden überall eingerechnet.</div></div><button onClick={()=>upCh(n=>{n.featureList.push({...DEFAULT_FEATURE});return n;})} style={{...S.btnPrimary,fontSize:12,padding:"6px 14px"}}>+ Feature</button></div>

     {/* ── Ki-Fähigkeiten Sektion ── */}
     {ch.featureList.some(f=>f.type==="ki_pool"&&f.active!==false)&&(()=>{
      const charLevel = ch.classes.reduce((s,c)=>s+(c.level||0),0)||1;

      const pool = Object.values(KNOWN_RESOURCE_POOLS).find(p =>
       p.type==="ki_pool" && p.abilities.length > 0 &&
       ch.featureList.some(f=>f.type==="ki_pool"&&p.keywords.some(kw=>((f.keyword||"")+(f.desc||"")).toLowerCase().includes(kw)))
      );
      const futureAbils = pool ? pool.abilities.filter(ab=>(ab.minLevel||1)>charLevel) : [];
      return (
       <div style={{...S.card,border:"2px solid rgba(56,189,248,0.35)",background:"rgba(56,189,248,0.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
         <div>
          <div style={{fontWeight:800,fontSize:14,color:"#38bdf8"}}>⚡ Ki-Fähigkeiten</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>✓ = in Übersicht sichtbar · Immer aktiv · werden automatisch pro Level ergänzt</div>
         </div>
         <button onClick={()=>upCh(n=>{n.featureList.push({...DEFAULT_FEATURE,type:"ki_ability",kiCost:1,kiAction:"Bonus-Aktion",active:true});return n;})}
          style={{fontSize:11,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background:"rgba(56,189,248,0.15)",color:"#38bdf8",border:"1px solid rgba(56,189,248,0.35)"}}>
          + Manuell
         </button>
        </div>

        {/* Aktuelle Ki-Fähigkeiten (editierbar, immer aktiv) */}
        {ch.featureList.filter(f=>f.type==="ki_ability").length===0
         ? <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontStyle:"italic",marginBottom:futureAbils.length?10:0}}>Noch keine Ki-Fähigkeiten für dieses Level.</div>
         : ch.featureList.map((f,i)=>{
          if(f.type!=="ki_ability") return null;
          const isActive = f.active !== false;
          return (
           <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"8px 10px",borderRadius:10,marginBottom:6,
            transition:"all 0.2s",
            background:isActive?"rgba(56,189,248,0.07)":"rgba(255,255,255,0.02)",
            border:`1px solid ${isActive?"rgba(56,189,248,0.2)":"rgba(18,18,25,0.83)"}`,
            opacity:isActive?1:0.45}}>
            <input type="checkbox" checked={isActive}
             onChange={e=>upCh(n=>{n.featureList[i].active=e.target.checked;return n;})}
             style={{accentColor:"#38bdf8",marginTop:4,flexShrink:0,width:15,height:15,cursor:"pointer"}}
             title={isActive?"In Übersicht anzeigen (abwählen zum Ausblenden)":"Ausgeblendet (anwählen zum Anzeigen)"}/>
            <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 60px 1fr",gap:8,alignItems:"start"}}>
             <div><Label>Name</Label>
              <AutoTextarea value={f.keyword||""} onChange={e=>upCh(n=>{n.featureList[i].keyword=e.target.value;return n;})} placeholder="Flurry of Blows"/>
             </div>
             <div><Label>Ki-Kosten</Label>
              <input type="number" min="0" max="10" value={f.kiCost??1}
               onChange={e=>upCh(n=>{n.featureList[i].kiCost=+e.target.value;return n;})}
               style={{...S.input,textAlign:"center",padding:"4px"}}/>
             </div>
             <div><Label>Aktion</Label>
              <select value={f.kiAction||"Bonus-Aktion"} onChange={e=>upCh(n=>{n.featureList[i].kiAction=e.target.value;return n;})} style={S.input}>
               {["Bonus-Aktion","Aktion","Reaktion","Nach Treffer","Passiv"].map(a=><option key={a}>{a}</option>)}
              </select>
             </div>
             <div style={{gridColumn:"1/-1"}}><Label>Beschreibung</Label>
              <AutoTextarea value={f.desc||""} onChange={e=>upCh(n=>{n.featureList[i].desc=e.target.value;return n;})} placeholder="Was macht diese Fähigkeit?" minRows={1}/>
             </div>
            </div>
           </div>
          );
         })
        }

        {/* Zukünftige Fähigkeiten – gesperrt */}
        {futureAbils.length>0&&(
         <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",letterSpacing:"0.06em",marginBottom:6}}>🔒 NOCH NICHT VERFÜGBAR</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
           {futureAbils.map(ab=>(
            <div key={ab.name} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,
             background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",opacity:0.5}}>
             <span style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.3)",flex:1}}>{ab.name}</span>
             <span style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontWeight:600}}>Ab Level {ab.minLevel}</span>
            </div>
           ))}
          </div>
         </div>
        )}
       </div>
      );
     })()}
     {ch.featureList.filter(f=>f.type!=="ki_pool"&&f.type!=="ki_ability").length===0
      ?(<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",padding:"40px 0",fontSize:13}}>Noch keine Features</div>)
      :(() => {

       const TYPE_ORDER = {
        limited_use:1, extra_attack:2, sneak_attack:3, attack_bonus:4, bonus_damage:5,
        ac_bonus:6, speed_bonus:7, stat_bonus:8, skill_bonus:9,
        resistance:10, advantage:11, disadvantage:12,
        passive:13, other:14,
       };
       return [...ch.featureList]
        .map((f,i) => ({f,i}))
        .filter(({f}) => f.type!=="ki_pool" && f.type!=="ki_ability")
        .sort((a,b) => (TYPE_ORDER[a.f.type]??99) - (TYPE_ORDER[b.f.type]??99))
        .map(({f,i}) => {
       const isLU = f.type==="limited_use";
       const maxUses  = f.maxUses ?? 1;
       const usesLeft = f.usesLeft ?? maxUses;
       const resetLabel = RESET_TYPES.find(r=>r.value===f.resetOn)?.label || "🌙 Lange Rast";
       return (
        <div key={i} style={{...S.card,
         opacity:f.active!==false?1:0.45,
         border:`1px solid ${isLU?(usesLeft>0?`${theme.accent}55`:"rgba(248,113,113,0.3)"):theme.border}`,
         background: theme.card,
         borderLeft: isLU ? `3px solid ${usesLeft>0?theme.accent:"#f87171"}` : undefined,
        }}>
         <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <input type="checkbox" checked={f.active!==false}
           onChange={e=>upCh(n=>{n.featureList[i].active=e.target.checked;return n;})}
           style={{accentColor:theme.accent,marginTop:4}}/>
          <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
           <div><Label>Schlagwort</Label><AutoTextarea value={f.keyword||""} onChange={e=>upCh(n=>{n.featureList[i].keyword=e.target.value;const upd=autoClassifyFeature({...n.featureList[i]});if(upd.type!==n.featureList[i].type&&(n.featureList[i].type==="passive"||n.featureList[i].type==="other"))n.featureList[i]={...upd};else n.featureList[i].keyword=e.target.value;return n;})} placeholder="z.B. Sneak Attack"/></div>
           <div><Label>Typ</Label><select value={f.type} onChange={e=>upCh(n=>{const newType=e.target.value;n.featureList[i].type=newType;n.featureList[i].target="";if(newType==="limited_use"){n.featureList[i].usesLeft=n.featureList[i].maxUses??1;}return n;})} style={S.input}>{FEATURE_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}</select></div>
           <div style={{gridColumn:"1/-1"}}><Label>Beschreibung</Label><AutoTextarea value={f.desc||""} onChange={e=>upCh(n=>{n.featureList[i].desc=e.target.value;const upd=autoClassifyFeature({...n.featureList[i]});if(upd.type!==n.featureList[i].type&&(n.featureList[i].type==="passive"||n.featureList[i].type==="other")){n.featureList[i]={...upd};}else{n.featureList[i].desc=e.target.value;}return n;})} placeholder="Wie funktioniert es?" minRows={2}/></div>

           {/* Limited Use fields */}
           {isLU && <>
            <div>
             <Label>Max. Nutzungen</Label>
             <input type="number" min="1" max="20" value={f.maxUses||1}
              onChange={e=>upCh(n=>{const v=Math.max(1,+e.target.value);const wasF=n.featureList[i].usesLeft==null||(n.featureList[i].usesLeft??n.featureList[i].maxUses)>=(n.featureList[i].maxUses||1);n.featureList[i].maxUses=v;n.featureList[i].usesLeft=wasF?v:Math.min(n.featureList[i].usesLeft??v,v);return n;})}
              style={S.input}/>
            </div>
            <div>
             <Label>Reset bei</Label>
             <select value={f.resetOn||"long"} onChange={e=>upCh(n=>{n.featureList[i].resetOn=e.target.value;return n;})} style={S.input}>
              {RESET_TYPES.map(r=><option key={r.value} value={r.value}>{r.label}</option>)}
             </select>
            </div>
            {/* Manual reset button */}
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:8}}>
             <button onClick={()=>upCh(n=>{n.featureList[i].usesLeft=Math.max(0,(n.featureList[i].usesLeft??1)-1);return n;})}
              disabled={usesLeft<=0}
              style={{background:usesLeft>0?"rgba(248,113,113,0.15)":"rgba(15,15,22,0.87)",
               color:usesLeft>0?"#f87171":"rgba(255,255,255,0.2)",
               border:`1px solid ${usesLeft>0?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.08)"}`,
               borderRadius:8,padding:"5px 12px",cursor:usesLeft>0?"pointer":"not-allowed",
               fontSize:12,fontWeight:800,fontFamily:"inherit"}}>
              − Verwenden
             </button>
             <button onClick={()=>upCh(n=>{n.featureList[i].usesLeft=n.featureList[i].maxUses||1;return n;})}
              style={{...S.btnGhost,fontSize:12,padding:"5px 12px"}}>↺ Reset</button>
             <div style={{display:"flex",gap:4,marginLeft:4,flexWrap:"wrap"}}>
              {Array.from({length:maxUses}).map((_,di)=>(
               <div key={di} onClick={()=>upCh(n=>{n.featureList[i].usesLeft=maxUses-di;return n;})}
                style={{width:18,height:18,borderRadius:"50%",cursor:"pointer",transition:"all 0.15s",
                 background:di<usesLeft?theme.accent:"rgba(255,255,255,0.1)",
                 border:`2px solid ${di<usesLeft?theme.accent:"rgba(255,255,255,0.15)"}`,
                 boxShadow:di<usesLeft?`0 0 6px ${theme.accent}88`:"none"}}/>
              ))}
             </div>
             <span style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginLeft:4}}>
              {usesLeft}/{maxUses} · {resetLabel}
             </span>
            </div>
           </>}

           {/* Non-limited-use fields */}
           {!isLU && <>
            {f.type!=="passive"&&f.type!=="other"&&f.type!=="resistance"&&f.type!=="advantage"&&f.type!=="disadvantage"&&(
             <div><Label>{f.type==="extra_attack"?"Anzahl":f.type==="bonus_damage"||f.type==="sneak_attack"?"Würfel":"Bonus +X"}</Label>
              <AutoTextarea value={f.value} onChange={e=>upCh(n=>{n.featureList[i].value=e.target.value;return n;})}
               placeholder={f.type==="extra_attack"?"1":f.type==="bonus_damage"||f.type==="sneak_attack"?"2d6":"2"}/></div>
            )}
            {f.type==="stat_bonus"?(<div><Label>Attribut</Label><select value={f.target} onChange={e=>upCh(n=>{n.featureList[i].target=e.target.value;return n;})} style={S.input}><option value="">— wählen —</option>{SAVES.map(s=><option key={s} value={s}>{STAT_NAMES[s]}</option>)}</select></div>)
             :f.type==="skill_bonus"?(<div><Label>Fertigkeit</Label><select value={f.target} onChange={e=>upCh(n=>{n.featureList[i].target=e.target.value;return n;})} style={S.input}><option value="">— wählen —</option>{SKILLS.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}</select></div>)
             :(<div><Label>Notiz</Label><AutoTextarea value={f.note} onChange={e=>upCh(n=>{n.featureList[i].note=e.target.value;return n;})} placeholder="z.B. einmal pro Runde"/></div>)}
           </>}
          </div>
          <button onClick={()=>upCh(n=>{n.featureList.splice(i,1);return n;})} style={{...S.btnDanger,padding:"4px 10px",fontSize:13}}>✕</button>
         </div>
        </div>
       );
      })
     })()}
    </>}

    {tab==="notes"&&<>
     <TraitNotesTab ch={ch} upCh={upCh} up={up} theme={theme} S={S} AT={AT}/>
     {/* ── Sprachen ── */}
     <LanguagesCard ch={ch} upCh={upCh} theme={theme} S={S}/>
          <div style={S.card}><div style={S.section}>📝 Notizen</div><AT path="notes" placeholder="Freie Notizen..." minRows={8}/></div>
    </>}
   </div>}
  </div>
 </div>);
}

class AppErrorBoundary extends React.Component {
 constructor(props) { super(props); this.state = { hasError:false, error:null }; }
 static getDerivedStateFromError(e) { return { hasError:true, error:e }; }
 componentDidCatch(err, info) { console.error("App crash:", err, info); }
 render() {
  if (this.state.hasError) return (
   <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column",
    alignItems:"center", justifyContent:"center", color:"white",
    fontFamily:"system-ui", textAlign:"center", padding:32 }}>
    <div style={{ fontSize:48, marginBottom:16 }}>⚠️</div>
    <div style={{ fontSize:22, fontWeight:800, marginBottom:8 }}>Etwas ist schiefgelaufen</div>
    <div style={{ fontSize:14, color:"#f87171", marginBottom:8,
     fontFamily:"monospace", background:"rgba(239,68,68,0.1)",
     padding:"10px 16px", borderRadius:8, maxWidth:500, wordBreak:"break-all" }}>
     {this.state.error?.message || "Unbekannter Fehler"}
    </div>
    <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:24,
     fontFamily:"monospace", maxWidth:600, textAlign:"left", wordBreak:"break-all",
     whiteSpace:"pre-wrap" }}>
     {(this.state.error?.stack||"").slice(0,800)}
    </div>
    <button onClick={()=>this.setState({hasError:false,error:null})}
     style={{ background:"#fbbf24", color:"#0f1117", border:"none", borderRadius:10,
      padding:"10px 24px", fontWeight:800, fontSize:14, cursor:"pointer" }}>
     Neu laden
    </button>
   </div>
  );
  return this.props.children;
 }
}
const _appRoot = ReactDOM.createRoot(document.getElementById("root"));
_appRoot.render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
