const HIT_DICE_SIDES = { "1d12":12,"1d10":10,"1d8":8,"1d6":6 };

// ═══════════════════════════════════════════════════════
// LEVEL UP MODAL
// ═══════════════════════════════════════════════════════

function LevelUpModal({ cls, currentLevel, ch, onConfirm, onClose, theme }) {
  const newLevel = currentLevel + 1;
  const clsData  = LEVEL_UP_DATA[cls?.name] || null;
  const hitDie   = clsData?.hitDie || cls?.hitDie || ch.hitDice || "1d8";
  const dieSides = HIT_DICE_SIDES[hitDie] || 8;
  const conMod   = Math.floor(((ch.stats?.con || 10) - 10) / 2);
  const newFeatures = clsData?.features?.[newLevel] || [];
  const newPB    = Math.ceil(newLevel / 4) + 1;
  const oldPB    = Math.ceil(currentLevel / 4) + 1;
  const pbChanged = newPB !== oldPB;

  // Spell slots
  const newSlots = clsData?.spellSlots?.[newLevel] || null;
  const oldSlots = clsData?.spellSlots?.[currentLevel] || null;
  const slotChanges = newSlots ? newSlots.map((v, i) => v - (oldSlots?.[i] || 0)).filter((d, i) => d > 0 ? i : false).map((d, i) => d > 0 ? { grade: i+1, delta: d } : null).filter(Boolean) : [];

  // ASI flag
  const isASI = newFeatures.some(f => f.includes("ASI") || f.includes("Attributsteigerung"));

  // HP rolling
  const [hpMode, setHpMode]       = useState("roll");
  const [rolledHP, setRolledHP]   = useState(null);
  const [manualHP, setManualHP]   = useState("");
  const [rolling, setRolling]     = useState(false);
  const [asiStats, setAsiStats]   = useState({ str:0,dex:0,con:0,int:0,wis:0,cha:0 });
  const [asiPoints, setAsiPoints] = useState(2); // 2 points to distribute

  const rollHP = () => {
    setRolling(true);
    setTimeout(() => {
      setRolledHP(Math.floor(Math.random() * dieSides) + 1);
      setRolling(false);
    }, 500);
  };

  const hpGain = hpMode === "max"
    ? dieSides + conMod
    : hpMode === "roll"
    ? (rolledHP !== null ? rolledHP + conMod : null)
    : (parseInt(manualHP) ? parseInt(manualHP) + conMod : null);

  const canConfirm = hpGain !== null && hpGain !== undefined;

  const handleConfirm = () => {
    if (!canConfirm) return;
    onConfirm({
      newLevel,
      hpIncrease: Math.max(1, hpGain),
      newFeatures,
      newSlots,
      asiStats: isASI ? asiStats : null,
      pbChanged,
      newPB,
    });
  };

  const STAT_KEYS = ["str","dex","con","int","wis","cha"];
  const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
  const STAT_COLORS = { str:"#ef4444",dex:"#4ade80",con:"#f97316",int:"#818cf8",wis:"#86efac",cha:"#ec4899" };

  const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
    borderRadius:10, padding:"7px 10px", color:"white", fontSize:14, outline:"none",
    width:"100%", fontFamily:"inherit" };

  return (
    <div style={{ position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",
      justifyContent:"center",background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",padding:16 }}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        maxWidth:480,width:"100%",maxHeight:"92vh",overflowY:"auto",
        background:"#0f1117",border:`2px solid ${theme.accent}55`,borderRadius:20,
        padding:"24px 20px",boxShadow:`0 0 60px ${theme.accent}22,0 24px 60px rgba(0,0,0,0.8)`,
        animation:"modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",position:"relative",
      }}>
        {/* Close */}
        <button onClick={onClose} style={{ position:"absolute",top:14,right:14,
          background:"rgba(18,18,25,0.83)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:8,width:30,height:30,color:"rgba(255,255,255,0.5)",cursor:"pointer",
          fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>✕</button>

        {/* Header */}
        <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:20 }}>
          <div style={{ width:52,height:52,borderRadius:14,flexShrink:0,
            background:`${theme.accent}18`,border:`2px solid ${theme.accent}55`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:26 }}>⬆</div>
          <div>
            <div style={{ fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.3)",
              letterSpacing:"0.08em",textTransform:"uppercase" }}>Level Up!</div>
            <div style={{ fontSize:22,fontWeight:900,color:theme.accent }}>
              {cls?.name || "Klasse"} – Level {newLevel}
            </div>
            {pbChanged && (
              <div style={{ fontSize:12,color:"#4ade80",fontWeight:700,marginTop:2 }}>
                ✦ Übungsbonus steigt auf +{newPB}
              </div>
            )}
          </div>
        </div>

        <div style={{ display:"flex",flexDirection:"column",gap:16 }}>

          {/* HP SECTION */}
          <div style={{ background:"rgba(12,12,18,0.90)",border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:14,padding:"14px 16px" }}>
            <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:12 }}>
              ❤️ TREFFERPUNKTE
            </div>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:10 }}>
              Trefferwürfel: <strong style={{color:"rgba(255,255,255,0.7)"}}>{hitDie}</strong> &nbsp;·&nbsp;
              CON-Mod: <strong style={{color:conMod>=0?"#4ade80":"#f87171"}}>{conMod>=0?"+":""}{conMod}</strong>
            </div>

            {/* Mode switcher */}
            <div style={{ display:"flex",gap:6,marginBottom:12 }}>
              {[["roll","🎲 Würfeln"],["max","⬆ Maximum"],["manual","✏ Manuell"]].map(([m,l])=>(
                <button key={m} onClick={()=>setHpMode(m)} style={{
                  flex:1,padding:"7px 4px",fontSize:11,fontWeight:800,
                  borderRadius:10,cursor:"pointer",fontFamily:"inherit",
                  border:`2px solid ${hpMode===m?theme.accent:"rgba(255,255,255,0.1)"}`,
                  background:hpMode===m?`${theme.accent}22`:"rgba(12,12,18,0.88)",
                  color:hpMode===m?theme.accent:"rgba(255,255,255,0.4)",transition:"all 0.15s",
                }}>{l}</button>
              ))}
            </div>

            {hpMode==="roll" && (
              <div>
                <button onClick={rollHP} disabled={rolling} style={{
                  width:"100%",padding:"11px",fontWeight:900,fontSize:15,
                  fontFamily:"inherit",borderRadius:12,cursor:rolling?"not-allowed":"pointer",
                  border:`2px solid ${theme.accent}`,color:rolling?"rgba(255,255,255,0.3)":theme.accent,
                  background:rolling?"rgba(12,12,18,0.90)":`${theme.accent}18`,
                  marginBottom:10,transition:"all 0.2s",
                  animation:rolling?"rollPulse 0.5s ease infinite":"none",
                }}>{rolling?"🎲 Würfle...":rolledHP!==null?`🎲 Neu würfeln (letztes: ${rolledHP})`:"🎲 Jetzt würfeln"}</button>
                {rolledHP!==null && (
                  <div style={{ textAlign:"center",padding:"10px",background:`${theme.accent}0d`,
                    borderRadius:10,border:`1px solid ${theme.accent}33` }}>
                    <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{rolledHP}</span>
                    <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
                    <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
                    <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
                    <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,rolledHP+conMod)} HP</span>
                  </div>
                )}
              </div>
            )}
            {hpMode==="max" && (
              <div style={{ textAlign:"center",padding:"12px",background:`${theme.accent}0d`,
                borderRadius:10,border:`1px solid ${theme.accent}33` }}>
                <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:4 }}>Maximum + CON</div>
                <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{dieSides}</span>
                <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
                <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
                <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
                <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,dieSides+conMod)} HP</span>
              </div>
            )}
            {hpMode==="manual" && (
              <div>
                <input type="number" min="1" max={dieSides} value={manualHP}
                  onChange={e=>setManualHP(e.target.value)}
                  placeholder={`1–${dieSides}`}
                  style={{...inp,fontSize:22,fontWeight:900,textAlign:"center",padding:"10px"}}/>
                {manualHP && (
                  <div style={{ textAlign:"center",marginTop:8,padding:"8px",
                    background:`${theme.accent}0d`,borderRadius:10,border:`1px solid ${theme.accent}33`,fontSize:14 }}>
                    <span style={{ color:theme.accent,fontWeight:800 }}>{manualHP}</span>
                    <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>+</span>
                    <span style={{ color:conMod>=0?"#4ade80":"#f87171",fontWeight:800 }}>{conMod>=0?"+":""}{conMod}</span>
                    <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>=</span>
                    <span style={{ color:"#4ade80",fontWeight:900 }}>+{Math.max(1,(parseInt(manualHP)||0)+conMod)} HP</span>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* NEW FEATURES */}
          {newFeatures.length > 0 && (
            <div style={{ background:"rgba(12,12,18,0.90)",border:"1px solid rgba(255,255,255,0.08)",
              borderRadius:14,padding:"14px 16px" }}>
              <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:10 }}>
                ✨ NEUE FEATURES AUF LEVEL {newLevel}
              </div>
              <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                {newFeatures.map((f,i)=>(
                  <div key={i} style={{ display:"flex",gap:8,alignItems:"flex-start",
                    padding:"6px 10px",background:`${theme.accent}0d`,borderRadius:8,
                    border:`1px solid ${theme.accent}22` }}>
                    <span style={{ color:theme.accent,flexShrink:0,fontWeight:800 }}>✦</span>
                    <span style={{ fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.5 }}>{f}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* SPELL SLOTS */}
          {newSlots && slotChanges.length > 0 && (
            <div style={{ background:"rgba(192,132,252,0.06)",border:"1px solid rgba(192,132,252,0.25)",
              borderRadius:14,padding:"14px 16px" }}>
              <div style={{ fontSize:11,fontWeight:800,color:"#c084fc",letterSpacing:"0.07em",marginBottom:10 }}>
                ✨ NEUE ZAUBERSLOTS
              </div>
              <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                {newSlots.map((count,i)=>{
                  if(count===0) return null;
                  const delta = count - (oldSlots?.[i]||0);
                  return (
                    <div key={i} style={{ background:"rgba(192,132,252,0.12)",border:"1px solid rgba(192,132,252,0.35)",
                      borderRadius:10,padding:"6px 12px",textAlign:"center" }}>
                      <div style={{ fontSize:10,color:"rgba(192,132,252,0.7)",fontWeight:800 }}>GRAD {i+1}</div>
                      <div style={{ fontSize:18,fontWeight:900,color:"#c084fc" }}>{count}</div>
                      {delta>0 && <div style={{ fontSize:10,color:"#4ade80",fontWeight:700 }}>+{delta}</div>}
                    </div>
                  );
                }).filter(Boolean)}
              </div>
            </div>
          )}

          {/* ASI */}
          {isASI && (
            <div style={{ background:"rgba(12,12,18,0.90)",border:`1px solid ${theme.accent}33`,
              borderRadius:14,padding:"14px 16px" }}>
              <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:4 }}>
                💪 ATTRIBUTSTEIGERUNG (ASI)
              </div>
              <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:12 }}>
                Verteile <strong style={{color:theme.accent}}>{asiPoints}</strong> Punkt{asiPoints!==1?"e":""} auf deine Attribute (max. +2 pro Attribut). Oder überspringe für einen Feat.
              </div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 }}>
                {STAT_KEYS.map(k=>(
                  <div key={k} style={{ textAlign:"center",background:"rgba(12,12,18,0.88)",
                    border:`1px solid ${asiStats[k]>0?STAT_COLORS[k]+"55":"rgba(255,255,255,0.1)"}`,
                    borderRadius:10,padding:"8px 4px" }}>
                    <div style={{ fontSize:10,fontWeight:800,color:STAT_COLORS[k] }}>{STAT_LABELS[k]}</div>
                    <div style={{ fontSize:16,fontWeight:900,color:"rgba(255,255,255,0.6)",margin:"3px 0" }}>
                      {(ch.stats?.[k]||10)+asiStats[k]}
                      {asiStats[k]>0 && <span style={{color:"#4ade80",fontSize:12}}> +{asiStats[k]}</span>}
                    </div>
                    <div style={{ display:"flex",gap:3 }}>
                      <button onClick={()=>{if(asiStats[k]>0)setAsiStats(s=>({...s,[k]:s[k]-1}));setAsiPoints(p=>Math.min(2,p+1));}}
                        disabled={asiStats[k]===0}
                        style={{ flex:1,background:"rgba(239,68,68,0.2)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",
                          borderRadius:6,padding:"2px 0",fontSize:13,cursor:asiStats[k]===0?"not-allowed":"pointer",
                          fontFamily:"inherit",opacity:asiStats[k]===0?0.3:1 }}>−</button>
                      <button onClick={()=>{if(asiPoints>0&&asiStats[k]<2&&(ch.stats?.[k]||10)+asiStats[k]<20){setAsiStats(s=>({...s,[k]:s[k]+1}));setAsiPoints(p=>p-1);}}}
                        disabled={asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20}
                        style={{ flex:1,background:"rgba(34,197,94,0.2)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",
                          borderRadius:6,padding:"2px 0",fontSize:13,fontFamily:"inherit",
                          cursor:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?"not-allowed":"pointer",
                          opacity:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?0.3:1 }}>+</button>
                    </div>
                  </div>
                ))}
              </div>
              {asiPoints > 0 && (
                <div style={{ marginTop:10,fontSize:12,color:"rgba(255,255,255,0.3)",fontStyle:"italic",textAlign:"center" }}>
                  Noch {asiPoints} Punkt{asiPoints!==1?"e":""} übrig – oder lass sie frei für einen Feat.
                </div>
              )}
            </div>
          )}

          {/* Confirm */}
          <button onClick={handleConfirm} disabled={!canConfirm} style={{
            width:"100%",background:canConfirm?`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`:"rgba(15,15,22,0.85)",
            color:canConfirm?"white":"rgba(255,255,255,0.2)",border:"none",borderRadius:12,
            padding:"13px 0",fontWeight:900,cursor:canConfirm?"pointer":"not-allowed",
            fontSize:15,fontFamily:"inherit",transition:"all 0.2s",
          }}>
            {canConfirm ? `⬆ Level ${newLevel} bestätigen (+${Math.max(1,hpGain)} HP)` : "Erst HP festlegen"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [themeId,setThemeId]=useState(()=>localStorage.getItem("dnd5e_theme")||"black");
  const theme=THEMES.find(t=>t.id===themeId)||THEMES[0];
  const [screen,setScreen]=useState("select");
  const [currentId,setCurId]=useState(null);
  const [ch,setCh]=useState(DEFAULT);
  const [tab,setTab]=useState("overview");
  const [saved,setSaved]=useState(false);
  const [expandedItem,setExpandedItem]=useState(null);
  const [charImage,setCharImage]=useState(null);
  const [deathSaves,setDeathSaves]=useState({success:0,fail:0});
  const [deathInput,setDeathInput]=useState("");
  const [deathBanner,setDeathBanner]=useState(null);
  const [restModal,setRestModal]=useState(null);
  const [pendingId,setPendingId]=useState(null);
  // ── NEW: Info modal state ──
  const [showInfo,setShowInfo]=useState(false);
  const [levelUpModal,setLevelUpModal]=useState(null); // {clsIndex, cls}

  const changeTheme=id=>{setThemeId(id);localStorage.setItem("dnd5e_theme",id);document.documentElement.style.background=THEMES.find(t=>t.id===id)?.bg||"#0f1117";};
  useEffect(()=>{document.documentElement.style.background=theme.bg;},[theme]);

  const saveChar=useCallback((data,id)=>{
    try{const all=loadAllChars();const idx=all.findIndex(c=>c.id===id);if(idx>=0)all[idx]={...data,id};else all.push({...data,id});saveAllChars(all);setSaved(true);setTimeout(()=>setSaved(false),1500);}catch{}
  },[]);

  const openChar=(id,data)=>{setCh(mergeChar(data));setCurId(id);setScreen("sheet");setTab("overview");setDeathSaves({success:0,fail:0});setDeathInput("");setDeathBanner(null);setRestModal(null);try{setCharImage(localStorage.getItem(imgKey(id))||null);}catch{setCharImage(null);}};

  const newChar=()=>{
    const id=Date.now().toString();
    setPendingId(id);
    setScreen("wizard");
  };

  const finishWizard=(wizardData)=>{
    const id=pendingId||Date.now().toString();
    const base={...DEFAULT,...wizardData};
    setCh(mergeChar(base));
    setCurId(id);
    saveChar({...base,id},id);
    setScreen("sheet");
    setTab("overview");
    setCharImage(null);
    setDeathSaves({success:0,fail:0});
    setDeathInput("");
    setDeathBanner(null);
    setRestModal(null);
  };

  const skipWizard=()=>{
    const id=pendingId||Date.now().toString();
    setCh({...DEFAULT});
    setCurId(id);
    setScreen("sheet");
    setTab("overview");
    setCharImage(null);
    setDeathSaves({success:0,fail:0});
    setDeathInput("");
    setDeathBanner(null);
    setRestModal(null);
  };

  const up=(path,val)=>{setCh(prev=>{const next=JSON.parse(JSON.stringify(prev));const keys=path.split(".");let obj=next;for(let i=0;i<keys.length-1;i++)obj=obj[keys[i]];obj[keys[keys.length-1]]=val;saveChar(next,currentId);return next;});};
  const upCh=fn=>{setCh(prev=>{const next=fn(JSON.parse(JSON.stringify(prev)));saveChar(next,currentId);return next;});};

  const handleLevelUp=(clsIndex,result)=>{
    upCh(n=>{
      // Level erhöhen
      n.classes[clsIndex].level = result.newLevel;
      // HP
      n.maxHP = (n.maxHP||0) + Math.max(1, result.hpIncrease);
      n.currentHP = (n.currentHP||0) + Math.max(1, result.hpIncrease);
      // ASI
      if(result.asiStats){
        Object.keys(result.asiStats).forEach(k=>{
          if(result.asiStats[k]>0) n.stats[k]=(n.stats[k]||10)+result.asiStats[k];
        });
        // CON geändert → HP nochmal anpassen (rückwirkend)
        if(result.asiStats.con>0){
          const extraHP=result.asiStats.con;
          n.maxHP+=extraHP; n.currentHP+=extraHP;
        }
      }
      // Zauberslots
      if(result.newSlots){
        result.newSlots.forEach((count,i)=>{
          const grade=i+1;
          if(count>0){n.spellSlots[grade]=[count,count];}
        });
      }
      // Features hinzufügen
      if(result.newFeatures && result.newFeatures.length>0){
        result.newFeatures.forEach(f=>{
          if(f.includes("ASI")||f.includes("Attributsteigerung")) return;
          n.featureList=n.featureList||[];
          n.featureList.push(autoClassifyFeature({
            ...DEFAULT_FEATURE,
            keyword:f.length>40?f.slice(0,40)+"…":f,
            desc:f, type:"passive", active:true,
          }));
        });
      }
      // Ki-Fähigkeiten und Ki-Pool-Level synchronisieren
      n.featureList = syncKiAbilities(n.featureList||[], n.classes);
      return n;
    });
    setLevelUpModal(null);
  };
  const handleImageUpload=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{setCharImage(ev.target.result);try{localStorage.setItem(imgKey(currentId),ev.target.result);}catch{}};r.readAsDataURL(file);};

  if(screen==="select") return <>
    <CharacterSelect onSelect={openChar} onNew={newChar} theme={theme} onThemeChange={changeTheme} onShowInfo={()=>setShowInfo(true)}/>
    {showInfo && <InfoModal onClose={()=>setShowInfo(false)} theme={theme}/>}
  </>;
  if(screen==="wizard") return <CharacterWizard theme={theme} onFinish={finishWizard} onSkip={skipWizard}/>;

  const S={
    card:{background:theme.card,borderRadius:16,border:`1px solid ${theme.border}`,padding:16},
    cardSm:{background:theme.card,borderRadius:12,border:`1px solid ${theme.border}`,padding:12},
    input:{background:"rgba(18,18,25,0.83)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"6px 10px",color:"white",fontSize:14,outline:"none",width:"100%",fontFamily:"inherit"},
    label:{fontSize:11,color:"rgba(255,255,255,0.45)",display:"block",marginBottom:4,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"},
    badge:{borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4},
    btnPrimary:{background:`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`,color:"white",border:"none",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"},
    btnGhost:{background:"rgba(18,18,25,0.83)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"6px 12px",fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit"},
    btnDanger:{background:"rgba(239,68,68,0.15)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"6px 12px",fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit"},
    btnGreen:{background:"rgba(34,197,94,0.15)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"},
    statBox:{background:"rgba(12,12,18,0.88)",borderRadius:14,border:`1px solid ${theme.border}`,padding:"10px 6px",textAlign:"center"},
    section:{color:theme.accent,fontWeight:800,fontSize:15,marginBottom:10},
  };
  const Label=({children})=><label style={S.label}>{children}</label>;
  const Check=({path,label})=>(<label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,color:"rgba(255,255,255,0.5)"}}><input type="checkbox" checked={path.split(".").reduce((o,k)=>o?.[k]??false,ch)} onChange={e=>up(path,e.target.checked)} style={{accentColor:theme.accent}}/>{label}</label>);
  const AT=({path,placeholder,style={},minRows=1})=>(<AutoTextarea value={path.split(".").reduce((o,k)=>o?.[k]??"",ch)} onChange={e=>up(path,e.target.value)} placeholder={placeholder} style={style} minRows={minRows}/>);

  const activeF=ch.featureList.filter(f=>f.active!==false);
  const statBonuses=Object.fromEntries(SAVES.map(s=>[s,0]));
  const skillBonuses=Object.fromEntries(SKILLS.map(s=>[s.name,0]));
  activeF.filter(f=>f.type==="stat_bonus"&&f.target).forEach(f=>{if(statBonuses[f.target]!==undefined)statBonuses[f.target]+=parseInt(f.value)||0;});
  activeF.filter(f=>f.type==="skill_bonus"&&f.target).forEach(f=>{if(skillBonuses[f.target]!==undefined)skillBonuses[f.target]+=parseInt(f.value)||0;});
  const equipped=ch.inventory.filter(it=>it.equipped);
  const equippedWeapons=equipped.filter(it=>it.type==="weapon");
  const equippedArmor=equipped.find(it=>it.type==="armor");
  const equippedShield=equipped.find(it=>it.type==="shield");
  const equippedMagic=equipped.filter(it=>it.type==="magic"&&it.magic?.bonus);
  const armorACBonus=equippedArmor?(equippedArmor.armor?.bonus||0):0;
  const shieldACBonus=equippedShield?(equippedShield.shield?.acBonus||0):0;
  const magicACBonus=equippedMagic.reduce((s,it)=>s+(parseInt(it.magic?.bonus)||0),0);
  const totalLevel=ch.classes.reduce((s,c)=>s+(c.level||0),0)||1;
  const pb=profB(totalLevel);
  const effStat=k=>ch.stats[k]+(statBonuses[k]||0);
  const skillMod=skill=>{const s=SKILLS.find(x=>x.name===skill);const base=statMod(effStat(s.stat))+(skillBonuses[skill]||0);if(ch.skillExpertise[skill])return base+pb*2;if(ch.skillProficiencies[skill])return base+pb;return base;};
  const saveMod=stat=>{const base=statMod(effStat(stat));return ch.saveProficiencies[stat]?base+pb:base;};
  const passivePerc=10+skillMod("Wahrnehmung");
  const attackBonusF=activeF.filter(f=>f.type==="attack_bonus").reduce((s,f)=>s+(parseInt(f.value)||0),0);
  const acBonusF=activeF.filter(f=>f.type==="ac_bonus").reduce((s,f)=>s+(parseInt(f.value)||0),0);

  // Dynamische RK – direkt aus ausgerüsteten Items, korrekte Klassen-Spezialregeln
  const totalAC = (() => {
    const dexM = statMod(effStat("dex"));
    const conM = statMod(effStat("con"));
    const wisM = statMod(effStat("wis"));
    const extras = shieldACBonus + magicACBonus + acBonusF;
    const className = ch.classes?.[0]?.name || "";
    if (!equippedArmor) {
      if (className === "Barbar") return 10 + dexM + conM + extras;
      if (className === "Mönch")  return 10 + dexM + wisM + extras;
      return 10 + dexM + extras;
    }
    const baseAC = equippedArmor.armor?.ac || 10;
    const bonus  = armorACBonus;
    const armorCatItem = ARMOR_CATALOG.find(a => a.name === equippedArmor.name);
    if (armorCatItem?.addDex) {
      const effectiveDex = (armorCatItem.maxDex !== null && armorCatItem.maxDex !== undefined)
        ? Math.min(dexM, armorCatItem.maxDex) : dexM;
      return baseAC + effectiveDex + bonus + extras;
    }
    return baseAC + bonus + extras;
  })();
  const hpRatio=ch.currentHP/Math.max(1,ch.maxHP);
  const hpColor=hpRatio>0.5?"#22c55e":hpRatio>0.25?"#f59e0b":"#ef4444";
  const weaponAtkBonus=w=>{const sc=w.weapon?.scale||"STR";let m=0;if(sc==="STR")m=statMod(effStat("str"));else if(sc==="DEX")m=statMod(effStat("dex"));else if(sc==="STR oder DEX")m=Math.max(statMod(effStat("str")),statMod(effStat("dex")));else if(sc==="INT")m=statMod(effStat("int"));else if(sc==="WIS")m=statMod(effStat("wis"));else if(sc==="CHA")m=statMod(effStat("cha"));return m+pb+(parseInt(w.weapon?.bonus)||0)+attackBonusF;};
  const availableHitDice=Math.max(0,totalLevel-(ch.usedHitDice||0));
  const preparedSpells=[];
  for(let lvl=0;lvl<=9;lvl++){(ch.spells[lvl]||[]).forEach(sp=>{if((lvl===0||sp.prepared)&&sp.name&&sp.name.trim()!=="")preparedSpells.push({name:sp.name,level:lvl});});}
  const isDying=ch.currentHP<=0,isDead=deathSaves.fail>=3,isStable=deathSaves.success>=3;
  const submitDeathSave=()=>{const roll=parseInt(deathInput);if(isNaN(roll)||roll<1||roll>20)return;setDeathInput("");setDeathSaves(prev=>{let next;if(roll===20)next={success:Math.min(3,prev.success+2),fail:prev.fail};else if(roll===1)next={success:prev.success,fail:Math.min(3,prev.fail+2)};else if(roll>=10)next={success:Math.min(3,prev.success+1),fail:prev.fail};else next={success:prev.success,fail:Math.min(3,prev.fail+1)};if(next.fail>=3)setTimeout(()=>{setDeathBanner("dead");setTimeout(()=>setDeathBanner(null),3500);},100);if(next.success>=3)setTimeout(()=>{setDeathBanner("alive");setTimeout(()=>setDeathBanner(null),3500);},100);return next;});};
  const resetDeathSaves=()=>{setDeathSaves({success:0,fail:0});setDeathInput("");setDeathBanner(null);};

  const ItemDetail=({it,i})=>{
    const sub=(cat,field,val)=>upCh(n=>{n.inventory[i][cat][field]=val;return n;});
    const toggleProp=prop=>upCh(n=>{const props=n.inventory[i].weapon.props||[];n.inventory[i].weapon.props=props.includes(prop)?props.filter(p=>p!==prop):[...props,prop];return n;});
    return(<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",gap:12}}>
      {it.type==="weapon"&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Label>Schaden</Label><AutoTextarea value={it.weapon.damage} onChange={e=>sub("weapon","damage",e.target.value)} placeholder="1d6"/></div><div><Label>Schadenstyp</Label><select value={it.weapon.damageType} onChange={e=>sub("weapon","damageType",e.target.value)} style={S.input}>{DAMAGE_TYPES.map(d=><option key={d}>{d}</option>)}</select></div><div><Label>Skalierung</Label><select value={it.weapon.scale} onChange={e=>sub("weapon","scale",e.target.value)} style={S.input}>{SCALE_STATS.map(s=><option key={s}>{s}</option>)}</select></div><div><Label>Mag. Bonus</Label><input type="number" value={it.weapon.bonus} onChange={e=>sub("weapon","bonus",+e.target.value)} style={S.input}/></div></div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{WEAPON_PROPS.map(p=><button key={p} onClick={()=>toggleProp(p)} style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:(it.weapon.props||[]).includes(p)?`${theme.accent}22`:"rgba(15,15,22,0.87)",color:(it.weapon.props||[]).includes(p)?theme.accent:"rgba(255,255,255,0.35)",border:`1px solid ${(it.weapon.props||[]).includes(p)?`${theme.accent}66`:"rgba(255,255,255,0.1)"}`}}>{p}</button>)}</div></>}
      {it.type==="armor"&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Label>Basis-RK</Label><input type="number" value={it.armor.ac} onChange={e=>sub("armor","ac",+e.target.value)} style={S.input}/></div><div><Label>Mag. Bonus</Label><input type="number" value={it.armor.bonus} onChange={e=>sub("armor","bonus",+e.target.value)} style={S.input}/></div></div><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"rgba(255,255,255,0.6)"}}><input type="checkbox" checked={it.armor.stealthDisadv} onChange={e=>sub("armor","stealthDisadv",e.target.checked)} style={{accentColor:theme.accent}}/>Nachteil Heimlichkeit</label></>}
      {it.type==="shield"&&<div><Label>RK-Bonus</Label><input type="number" value={it.shield.acBonus} onChange={e=>sub("shield","acBonus",+e.target.value)} style={{...S.input,width:80}}/></div>}
      {it.type==="potion"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Label>Heilung</Label><AutoTextarea value={it.potion.healing} onChange={e=>sub("potion","healing",e.target.value)} placeholder="2d4+2"/></div><div><Label>Effekt</Label><AutoTextarea value={it.potion.effect} onChange={e=>sub("potion","effect",e.target.value)} placeholder="Heilt HP..."/></div></div>}

                                if (x.type === "misc" && /fackel|torch/i.test(x.name)) return sum + 1;
                                if (x.type === "weapon") {
                                  const twoH = (x.weapon?.props||[]).some(p => p === "Zweihändig" || p.startsWith("Zweihändig"));
                                  return sum + (twoH ? 2 : 1);
                                }
                                return sum;
                              }, 0);
                              const thisHands = it.type === "shield" ? 1
                                : it.type === "misc" && /fackel|torch/i.test(it.name) ? 1
                                : it.type === "weapon"
                                  ? ((it.weapon?.props||[]).some(p => p === "Zweihändig" || p.startsWith("Zweihändig")) ? 2 : 1)
                                : 0; // armor/magic = keine Hände
                              const needsHands = thisHands > 0;
                              const blocked = !it.equipped && needsHands && (handsUsed + thisHands > 2);
                              const handsAfter = handsUsed + thisHands;
                              const conflictMsg = blocked
                                ? thisHands === 2
                                  ? `Zweihänder – braucht 2 Hände (${handsUsed}/2 belegt)`
                                  : `Keine Hand frei (${handsUsed}/2 belegt)`
                                : null;
                              return (
                                <>
                                  <button
                                    onClick={() => {
                                      if (it.equipped) {
                                        upCh(n => { n.inventory[i].equipped = false; return n; });
                                      } else if (!blocked) {
                                        upCh(n => { n.inventory[i].equipped = true; return n; });
                                      }
                                    }}
                                    title={conflictMsg || ""}
                                    style={{
                                      padding:"5px 10px", borderRadius:8,
                                      cursor: blocked ? "not-allowed" : "pointer",
                                      fontFamily:"inherit", fontWeight:800, fontSize:11,
                                      transition:"all 0.15s", whiteSpace:"nowrap",
                                      background: it.equipped ? `${col}22` : blocked ? "rgba(248,113,113,0.08)" : "rgba(15,15,22,0.85)",
                                      color:      it.equipped ? col : blocked ? "#f87171" : "rgba(255,255,255,0.45)",
                                      border:`1px solid ${it.equipped ? col+"66" : blocked ? "rgba(248,113,113,0.3)" : "rgba(255,255,255,0.12)"}`,
                                    }}>
                                    {it.equipped ? "✓ Ausgerüstet" : blocked ? "✗ Kein Platz" : "Ausrüsten"}
                                  </button>
                                  {it.equipped && (
                                    <button
                                      onClick={()=>upCh(n=>{n.inventory[i].equipped=false;return n;})}
                                      style={{
                                        padding:"4px 10px", borderRadius:8, cursor:"pointer",
                                        fontFamily:"inherit", fontWeight:700, fontSize:10,
                                        whiteSpace:"nowrap", transition:"all 0.15s",
                                        background:"rgba(15,15,22,0.87)",
                                        color:"rgba(255,255,255,0.35)",
                                        border:"1px solid rgba(255,255,255,0.1)",
                                      }}>
                                      Ablegen
                                    </button>
                                  )}
                                  {needsHands && (
                                    <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>
                                      {it.equipped
                                        ? `${thisHands === 2 ? "🤲" : "✋"} ${thisHands}H · ${handsUsed + thisHands}/2 belegt`
                                        : blocked
                                          ? <span style={{color:"#f87171"}}>{conflictMsg}</span>
                                          : `${thisHands}H · ${handsUsed}/2 belegt`
                                      }
                                    </div>
                                  )}
                                </>
                              );
                            })()}
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>setExpandedItem(expandedItem===i?null:i)}
                                style={{flex:1,background:"rgba(15,15,22,0.87)",border:"1px solid rgba(255,255,255,0.1)",
                                  borderRadius:7,padding:"4px 6px",cursor:"pointer",
                                  color:"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"inherit"}}>
                                {expandedItem===i?"▲":"▼"}
                              </button>
                              <button onClick={()=>{upCh(n=>{n.inventory.splice(i,1);return n;});if(expandedItem===i)setExpandedItem(null);}}
                                style={{...S.btnDanger,padding:"4px 8px",fontSize:11}}>✕</button>
                            </div>
                          </div>
                        </div>

                        {/* ── WEAPON STAT BAR ── */}
                        {it.type==="weapon"&&it.weapon?.damage&&(
                          <div style={{
                            display:"flex",gap:6,padding:"6px 12px 8px",
                            borderTop:`1px solid ${it.equipped ? col+"33" : "rgba(15,15,22,0.87)"}`,
                          }}>
                            <div style={{display:"flex",alignItems:"center",gap:5,
                              background:it.equipped?"rgba(74,222,128,0.12)":"rgba(15,15,22,0.87)",
                              border:`1px solid ${it.equipped?"rgba(74,222,128,0.3)":"rgba(255,255,255,0.1)"}`,
                              borderRadius:8,padding:"3px 9px"}}>
                              <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>ATK</span>
                              <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#4ade80":"rgba(255,255,255,0.5)"}}>{fmtMod(weaponAtkBonus(it))}</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:5,
                              background:it.equipped?"rgba(248,113,113,0.12)":"rgba(15,15,22,0.87)",
                              border:`1px solid ${it.equipped?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.1)"}`,
                              borderRadius:8,padding:"3px 9px"}}>
                              <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>DMG</span>
                              <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#f87171":"rgba(255,255,255,0.5)"}}>
                                {it.weapon.damage}{it.weapon.damageType?` ${it.weapon.damageType}`:""}
                              </span>
                            </div>
                            {it.weapon.scale&&<div style={{display:"flex",alignItems:"center",
                              background:"rgba(12,12,18,0.88)",border:"1px solid rgba(255,255,255,0.08)",
                              borderRadius:8,padding:"3px 8px"}}>
                              <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:700}}>{it.weapon.scale}</span>
                            </div>}
                            {(it.weapon.props||[]).length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                              {it.weapon.props.map(p=><span key={p} style={{fontSize:10,color:"rgba(255,255,255,0.3)",
                                background:"rgba(12,12,18,0.88)",borderRadius:6,padding:"3px 7px"}}>{p}</span>)}
                            </div>}
                          </div>
                        )}

                        {/* ── ARMOR STAT BAR ── */}
                        {(it.type==="armor"||it.type==="shield")&&(
                          <div style={{
                            display:"flex",gap:6,padding:"6px 12px 8px",
                            borderTop:`1px solid ${it.equipped ? col+"33" : "rgba(15,15,22,0.87)"}`,
                          }}>
                            <div style={{display:"flex",alignItems:"center",gap:5,
                              background:it.equipped?"rgba(96,165,250,0.12)":"rgba(15,15,22,0.87)",
                              border:`1px solid ${it.equipped?"rgba(96,165,250,0.3)":"rgba(255,255,255,0.1)"}`,
                              borderRadius:8,padding:"3px 9px"}}>
                              <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:700}}>RK</span>
                              <span style={{fontSize:13,fontWeight:900,color:it.equipped?"#60a5fa":"rgba(255,255,255,0.5)"}}>
                                {it.type==="armor"
                                  ? `${it.armor?.ac||10}${it.armor?.bonus?` +${it.armor.bonus}`:""}`
                                  : `+${it.shield?.acBonus||2}`}
                              </span>
                            </div>
                            {it.type==="armor"&&it.armor?.stealthDisadv&&(
                              <div style={{display:"flex",alignItems:"center",gap:4,
                                background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.2)",
                                borderRadius:8,padding:"3px 9px"}}>
                                <span style={{fontSize:10,color:"#f87171",fontWeight:700}}>⚠ Heimlichkeit</span>
                              </div>
                            )}
                          </div>
                        )}

                        {/* ── EXPANDED DETAIL ── */}
                        {expandedItem===i&&<div style={{padding:"0 12px 12px",borderTop:`1px solid ${it.equipped?col+"22":"rgba(15,15,22,0.87)"}`}}><ItemDetail it={it} i={i}/></div>}
                      </div>
                    );
                  })}
                  <div style={{textAlign:"right",fontSize:11,color:"rgba(255,255,255,0.25)",paddingTop:4}}>
                    Gewicht: {ch.inventory.reduce((s,it)=>s+(it.weight*it.qty),0).toFixed(1)} / {ch.stats.str*15} lbs
                  </div>
                </div>
            }
          </div>
        </>}

        {tab==="features"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={S.section}>✨ Features &amp; Klassenmerkmale</div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:-6,marginBottom:10}}>Attribut- &amp; Fertigkeitsboni werden überall eingerechnet.</div></div><button onClick={()=>upCh(n=>{n.featureList.push({...DEFAULT_FEATURE});return n;})} style={{...S.btnPrimary,fontSize:12,padding:"6px 14px"}}>+ Feature</button></div>

          {/* ── Ki-Fähigkeiten Sektion ── */}
          {ch.featureList.some(f=>f.type==="ki_pool"&&f.active!==false)&&(()=>{
            const charLevel = ch.classes.reduce((s,c)=>s+(c.level||0),0)||1;
            // Welcher Pool ist aktiv?
            const pool = Object.values(KNOWN_RESOURCE_POOLS).find(p =>
              p.type==="ki_pool" && p.abilities.length > 0 &&
              ch.featureList.some(f=>f.type==="ki_pool"&&p.keywords.some(kw=>((f.keyword||"")+(f.desc||"")).toLowerCase().includes(kw)))
            );
            const futureAbils = pool ? pool.abilities.filter(ab=>(ab.minLevel||1)>charLevel) : [];
            return (
              <div style={{...S.card,border:"2px solid rgba(56,189,248,0.35)",background:"rgba(56,189,248,0.05)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:14,color:"#38bdf8"}}>⚡ Ki-Fähigkeiten</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>✓ = in Übersicht sichtbar · Immer aktiv · werden automatisch pro Level ergänzt</div>
                  </div>
                  <button onClick={()=>upCh(n=>{n.featureList.push({...DEFAULT_FEATURE,type:"ki_ability",kiCost:1,kiAction:"Bonus-Aktion",active:true});return n;})}
                    style={{fontSize:11,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
                      background:"rgba(56,189,248,0.15)",color:"#38bdf8",border:"1px solid rgba(56,189,248,0.35)"}}>
                    + Manuell
                  </button>
                </div>

                {/* Aktuelle Ki-Fähigkeiten (editierbar, immer aktiv) */}
                {ch.featureList.filter(f=>f.type==="ki_ability").length===0
                  ? <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontStyle:"italic",marginBottom:futureAbils.length?10:0}}>Noch keine Ki-Fähigkeiten für dieses Level.</div>
                  : ch.featureList.map((f,i)=>{
                    if(f.type!=="ki_ability") return null;
                    const isActive = f.active !== false;
                    return (
                      <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"8px 10px",borderRadius:10,marginBottom:6,
                        transition:"all 0.2s",
                        background:isActive?"rgba(56,189,248,0.07)":"rgba(255,255,255,0.02)",
                        border:`1px solid ${isActive?"rgba(56,189,248,0.2)":"rgba(18,18,25,0.83)"}`,
                        opacity:isActive?1:0.45}}>
                        <input type="checkbox" checked={isActive}
                          onChange={e=>upCh(n=>{n.featureList[i].active=e.target.checked;return n;})}
                          style={{accentColor:"#38bdf8",marginTop:4,flexShrink:0,width:15,height:15,cursor:"pointer"}}
                          title={isActive?"In Übersicht anzeigen (abwählen zum Ausblenden)":"Ausgeblendet (anwählen zum Anzeigen)"}/>
                        <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 60px 1fr",gap:8,alignItems:"start"}}>
                          <div><Label>Name</Label>
                            <AutoTextarea value={f.keyword||""} onChange={e=>upCh(n=>{n.featureList[i].keyword=e.target.value;return n;})} placeholder="Flurry of Blows"/>
                          </div>
                          <div><Label>Ki-Kosten</Label>
                            <input type="number" min="0" max="10" value={f.kiCost??1}
                              onChange={e=>upCh(n=>{n.featureList[i].kiCost=+e.target.value;return n;})}
                              style={{...S.input,textAlign:"center",padding:"4px"}}/>
                          </div>
                          <div><Label>Aktion</Label>
                            <select value={f.kiAction||"Bonus-Aktion"} onChange={e=>upCh(n=>{n.featureList[i].kiAction=e.target.value;return n;})} style={S.input}>
                              {["Bonus-Aktion","Aktion","Reaktion","Nach Treffer","Passiv"].map(a=><option key={a}>{a}</option>)}
                            </select>
                          </div>
                          <div style={{gridColumn:"1/-1"}}><Label>Beschreibung</Label>
                            <AutoTextarea value={f.desc||""} onChange={e=>upCh(n=>{n.featureList[i].desc=e.target.value;return n;})} placeholder="Was macht diese Fähigkeit?" minRows={1}/>
                          </div>
                        </div>
                      </div>
                    );
                  })
                }

                {/* Zukünftige Fähigkeiten – gesperrt */}
                {futureAbils.length>0&&(
                  <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
                    <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",letterSpacing:"0.06em",marginBottom:6}}>🔒 NOCH NICHT VERFÜGBAR</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {futureAbils.map(ab=>(
                        <div key={ab.name} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,
                          background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",opacity:0.5}}>
                          <span style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.3)",flex:1}}>{ab.name}</span>
                          <span style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontWeight:600}}>Ab Level {ab.minLevel}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
          {ch.featureList.filter(f=>f.type!=="ki_pool"&&f.type!=="ki_ability").length===0
            ?(<div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",padding:"40px 0",fontSize:13}}>Noch keine Features</div>)
            :ch.featureList.map((f,i)=>{
              if(f.type==="ki_pool"||f.type==="ki_ability") return null;
              const isLU = f.type==="limited_use";
              const usesLeft = f.usesLeft ?? f.maxUses ?? 1;
              const maxUses  = f.maxUses ?? 1;
              const resetLabel = RESET_TYPES.find(r=>r.value===f.resetOn)?.label || "🌙 Lange Rast";
              return (
                <div key={i} style={{...S.card,
                  opacity:f.active!==false?1:0.45,
                  border:`1px solid ${isLU?(usesLeft>0?`${theme.accent}55`:"rgba(248,113,113,0.3)"):theme.border}`,
                  background:isLU?(usesLeft>0?`${theme.accent}08`:"rgba(248,113,113,0.06)"):theme.card,
                }}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <input type="checkbox" checked={f.active!==false}
                      onChange={e=>upCh(n=>{n.featureList[i].active=e.target.checked;return n;})}
                      style={{accentColor:theme.accent,marginTop:4}}/>
                    <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <div><Label>Schlagwort</Label><AutoTextarea value={f.keyword||""} onChange={e=>upCh(n=>{n.featureList[i].keyword=e.target.value;const upd=autoClassifyFeature({...n.featureList[i]});if(upd.type!==n.featureList[i].type&&(n.featureList[i].type==="passive"||n.featureList[i].type==="other"))n.featureList[i]={...upd};else n.featureList[i].keyword=e.target.value;return n;})} placeholder="z.B. Sneak Attack"/></div>
                      <div><Label>Typ</Label><select value={f.type} onChange={e=>upCh(n=>{n.featureList[i].type=e.target.value;n.featureList[i].target="";return n;})} style={S.input}>{FEATURE_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}</select></div>
                      <div style={{gridColumn:"1/-1"}}><Label>Beschreibung</Label><AutoTextarea value={f.desc||""} onChange={e=>upCh(n=>{n.featureList[i].desc=e.target.value;const upd=autoClassifyFeature({...n.featureList[i]});if(upd.type!==n.featureList[i].type&&(n.featureList[i].type==="passive"||n.featureList[i].type==="other")){n.featureList[i]={...upd};}else{n.featureList[i].desc=e.target.value;}return n;})} placeholder="Wie funktioniert es?" minRows={2}/></div>

                      {/* Limited Use fields */}
                      {isLU && <>
                        <div>
                          <Label>Max. Nutzungen</Label>
                          <input type="number" min="1" max="20" value={f.maxUses||1}
                            onChange={e=>upCh(n=>{const v=Math.max(1,+e.target.value);n.featureList[i].maxUses=v;n.featureList[i].usesLeft=Math.min(n.featureList[i].usesLeft??v,v);return n;})}
                            style={S.input}/>
                        </div>
                        <div>
                          <Label>Reset bei</Label>
                          <select value={f.resetOn||"long"} onChange={e=>upCh(n=>{n.featureList[i].resetOn=e.target.value;return n;})} style={S.input}>
                            {RESET_TYPES.map(r=><option key={r.value} value={r.value}>{r.label}</option>)}
                          </select>
                        </div>
                        {/* Manual reset button */}
                        <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:8}}>
                          <button onClick={()=>upCh(n=>{n.featureList[i].usesLeft=Math.max(0,(n.featureList[i].usesLeft??1)-1);return n;})}
                            disabled={usesLeft<=0}
                            style={{background:usesLeft>0?"rgba(248,113,113,0.15)":"rgba(15,15,22,0.87)",
                              color:usesLeft>0?"#f87171":"rgba(255,255,255,0.2)",
                              border:`1px solid ${usesLeft>0?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.08)"}`,
                              borderRadius:8,padding:"5px 12px",cursor:usesLeft>0?"pointer":"not-allowed",
                              fontSize:12,fontWeight:800,fontFamily:"inherit"}}>
                            − Verwenden
                          </button>
                          <button onClick={()=>upCh(n=>{n.featureList[i].usesLeft=n.featureList[i].maxUses||1;return n;})}
                            style={{...S.btnGhost,fontSize:12,padding:"5px 12px"}}>↺ Reset</button>
                          <div style={{display:"flex",gap:4,marginLeft:4,flexWrap:"wrap"}}>
                            {Array.from({length:maxUses}).map((_,di)=>(
                              <div key={di} onClick={()=>upCh(n=>{n.featureList[i].usesLeft=maxUses-di;return n;})}
                                style={{width:18,height:18,borderRadius:"50%",cursor:"pointer",transition:"all 0.15s",
                                  background:di<usesLeft?theme.accent:"rgba(255,255,255,0.1)",
                                  border:`2px solid ${di<usesLeft?theme.accent:"rgba(255,255,255,0.15)"}`,
                                  boxShadow:di<usesLeft?`0 0 6px ${theme.accent}88`:"none"}}/>
                            ))}
                          </div>
                          <span style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginLeft:4}}>
                            {usesLeft}/{maxUses} · {resetLabel}
                          </span>
                        </div>
                      </>}

                      {/* Non-limited-use fields */}
                      {!isLU && <>
                        {f.type!=="passive"&&f.type!=="other"&&f.type!=="resistance"&&f.type!=="advantage"&&f.type!=="disadvantage"&&(
                          <div><Label>{f.type==="extra_attack"?"Anzahl":f.type==="bonus_damage"||f.type==="sneak_attack"?"Würfel":"Bonus +X"}</Label>
                            <AutoTextarea value={f.value} onChange={e=>upCh(n=>{n.featureList[i].value=e.target.value;return n;})}
                              placeholder={f.type==="extra_attack"?"1":f.type==="bonus_damage"||f.type==="sneak_attack"?"2d6":"2"}/></div>
                        )}
                        {f.type==="stat_bonus"?(<div><Label>Attribut</Label><select value={f.target} onChange={e=>upCh(n=>{n.featureList[i].target=e.target.value;return n;})} style={S.input}><option value="">— wählen —</option>{SAVES.map(s=><option key={s} value={s}>{STAT_NAMES[s]}</option>)}</select></div>)
                         :f.type==="skill_bonus"?(<div><Label>Fertigkeit</Label><select value={f.target} onChange={e=>upCh(n=>{n.featureList[i].target=e.target.value;return n;})} style={S.input}><option value="">— wählen —</option>{SKILLS.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}</select></div>)
                         :(<div><Label>Notiz</Label><AutoTextarea value={f.note} onChange={e=>upCh(n=>{n.featureList[i].note=e.target.value;return n;})} placeholder="z.B. einmal pro Runde"/></div>)}
                      </>}
                    </div>
                    <button onClick={()=>upCh(n=>{n.featureList.splice(i,1);return n;})} style={{...S.btnDanger,padding:"4px 10px",fontSize:13}}>✕</button>
                  </div>
                </div>
              );
            })
          }
        </>}

        {tab==="notes"&&<>
          <TraitNotesTab ch={ch} upCh={upCh} up={up} theme={theme} S={S} AT={AT}/>
          <div style={S.card}><div style={S.section}>📝 Notizen</div><AT path="notes" placeholder="Freie Notizen..." minRows={8}/></div>
        </>}
      </div>}
    </div>
  </div>);
}

class AppErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError:false, error:null }; }
  static getDerivedStateFromError(e) { return { hasError:true, error:e }; }
  componentDidCatch(err, info) { console.error("App crash:", err, info); }
  render() {
    if (this.state.hasError) return (
      <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", color:"white",
        fontFamily:"system-ui", textAlign:"center", padding:32 }}>
        <div style={{ fontSize:48, marginBottom:16 }}>⚠️</div>
        <div style={{ fontSize:22, fontWeight:800, marginBottom:8 }}>Etwas ist schiefgelaufen</div>
        <div style={{ fontSize:14, color:"#f87171", marginBottom:8, 
          fontFamily:"monospace", background:"rgba(239,68,68,0.1)", 
          padding:"10px 16px", borderRadius:8, maxWidth:500, wordBreak:"break-all" }}>
          {this.state.error?.message || "Unbekannter Fehler"}
        </div>
        <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:24,
          fontFamily:"monospace", maxWidth:600, textAlign:"left", wordBreak:"break-all",
          whiteSpace:"pre-wrap" }}>
          {(this.state.error?.stack||"").slice(0,800)}
        </div>
        <button onClick={()=>this.setState({hasError:false,error:null})}
          style={{ background:"#fbbf24", color:"#0f1117", border:"none", borderRadius:10,
            padding:"10px 24px", fontWeight:800, fontSize:14, cursor:"pointer" }}>
          Neu laden
        </button>
      </div>
    );
    return this.props.children;
  }
}
const _appRoot = ReactDOM.createRoot(document.getElementById("root"));
_appRoot.render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
