    </div>
   </>}

   {type==="alignment" && <>
    <div style={{ background:`${item.color}10`, border:`1px solid ${item.color}33`,
     borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13,
     color:"rgba(255,255,255,0.7)", lineHeight:1.6 }}>
     🎭 <span style={{ fontWeight:700, color:item.color }}>{lang==="en"?"Typical characters:":"Typische Charaktere:"}</span> {item.examples}
    </div>
   </>}
  </div>
 );
}

function AttributeExplainer({ theme, chosenClass, onStatsChange, mode, onModeChange, manualVals, onManualValsChange, rollResults, onRollResultsChange, assigned, onAssignedChange, chosenRace, chosenSubrace, freeStatChoices, onFreeStatChoicesChange, lang }) {
 if(!lang) lang="de";
 const WIZARD_ATTRIBUTES_USED = lang==="en" ? WIZARD_ATTRIBUTES_EN : WIZARD_ATTRIBUTES;
 const recommended = chosenClass?.primaryStats || [];
 const STAT_KEYS = ["str","dex","con","int","wis","cha"];
 const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };

 const setMode = onModeChange;
 const setManualVals = onManualValsChange;
 const setRollResults = onRollResultsChange;
 const setAssigned = onAssignedChange;
 const [selected, setSelected] = useState(() => {
  if (recommended.length > 0) {
   const first = WIZARD_ATTRIBUTES_USED.find(a => a.key === recommended[0]);
   return first || WIZARD_ATTRIBUTES_USED[0];
  }
  return WIZARD_ATTRIBUTES_USED[0];
 });

 const [rolling, setRolling]     = useState(false);
 const [rollAnim, setRollAnim]   = useState(false);

 const rollStat = () => {
  const rolls = Array.from({length:4}, () => Math.floor(Math.random()*6)+1);
  rolls.sort((a,b)=>b-a);
  return { rolls, total: rolls.slice(0,3).reduce((s,v)=>s+v,0) };
 };

 const doRollAll = () => {
  setRolling(true); setRollAnim(true);
  setTimeout(() => {
   setRollResults(Array.from({length:6}, rollStat));
   setAssigned({str:null,dex:null,con:null,int:null,wis:null,cha:null});
   setRolling(false);
   setTimeout(() => setRollAnim(false), 400);
  }, 600);
 };

 const assignRoll = (statKey, resultIdx) => {
  const newAssigned = {...assigned};

  const prevOwner = Object.keys(newAssigned).find(k => newAssigned[k] === resultIdx && k !== statKey);
  if (prevOwner) {

   newAssigned[prevOwner] = newAssigned[statKey];
  } else {

   Object.keys(newAssigned).forEach(k => { if (newAssigned[k] === resultIdx) newAssigned[k] = null; });
  }
  newAssigned[statKey] = resultIdx;
  setAssigned(newAssigned);
  if (onStatsChange) {
   const vals = {};
   Object.keys(newAssigned).forEach(k => {
    vals[k] = newAssigned[k] !== null ? rollResults[newAssigned[k]].total : "";
   });
   onStatsChange(vals);
  }
 };

 const usedIndices = Object.values(assigned).filter(v => v !== null);

 const handleManualChange = (key, val) => {
  const next = {...manualVals, [key]: val};
  setManualVals(next);
  if (onStatsChange) onStatsChange(next);
 };

 const statMod = v => { const n = parseInt(v); return isNaN(n) ? null : Math.floor((n-10)/2); };
 const fmtM = v => v === null ? "—" : (v >= 0 ? "+" : "") + v;

 const S2 = {
  modeBtn: (active) => ({
   flex:1, padding:"10px 8px", fontWeight:800, fontSize:13, borderRadius:12, cursor:"pointer",
   fontFamily:"inherit", border:`2px solid ${active ? theme.accent : "rgba(255,255,255,0.1)"}`,
   background: active ? `${theme.accent}22` : "rgba(12,12,18,0.88)",
   color: active ? theme.accent : "rgba(255,255,255,0.45)", transition:"all 0.18s",
  }),
  statBox: (key) => {
   const isRec = recommended.includes(key);
   const isPrim = recommended[0] === key;
   return {
    borderRadius:12, padding:"10px 8px", textAlign:"center",
    border:`2px solid ${isPrim ? theme.accent : isRec ? `${theme.accent}55` : "rgba(255,255,255,0.1)"}`,
    background: isPrim ? `${theme.accent}12` : isRec ? `${theme.accent}07` : "rgba(12,12,18,0.90)",
    position:"relative",
   };
  },
 };

 const SLBL = { str:"STR", dex:"DEX", con:"CON", int:"INT", wis:"WIS", cha:"CHA" };
 const _rb = chosenRace?.statBonuses || {};
 const _sb = chosenSubrace?.statBonuses || {};
 const _raceBonuses = {};
 Object.entries(_rb).forEach(([k,v]) => { if(v) _raceBonuses[k]=(_raceBonuses[k]||0)+v; });
 Object.entries(_sb).forEach(([k,v]) => { if(v) _raceBonuses[k]=(_raceBonuses[k]||0)+v; });
 const _bonusEntries = Object.entries(_raceBonuses).filter(([,v])=>v>0);
 const _freeCount = (chosenRace?.extraChoices?.freeStats||0) + (chosenSubrace?.extraChoices?.freeStats||0);
 const _freeAmt   = chosenRace?.extraChoices?.statAmount || chosenSubrace?.extraChoices?.statAmount || 1;
 const _allSK = ["str","dex","con","int","wis","cha"];

 return (
  <div className="wizard-fade">
   <>
     {(_bonusEntries.length > 0 || _freeCount > 0) && (
      <div style={{ background:"rgba(139,92,246,0.08)", border:"1px solid rgba(139,92,246,0.3)",
       borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13 }}>
       <div style={{ fontWeight:800, color:"#a78bfa", marginBottom:8, fontSize:11, letterSpacing:"0.07em" }}>
        ⚡ {lang==="en"?"RACIAL BONUSES – added automatically":"RASSENBONI – werden automatisch addiert"}
       </div>
       <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:_freeCount>0?10:0 }}>
        {_bonusEntries.map(([k,v]) => (
         <span key={k} style={{ background:"rgba(139,92,246,0.2)", border:"1px solid #a78bfa88",
          borderRadius:20, padding:"2px 10px", color:"#c4b5fd", fontWeight:800 }}>
          {SLBL[k]} +{v}
         </span>
        ))}
       </div>
       {_freeCount > 0 && (
        <div>
         <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:8 }}>
          {lang==="en"?`Choose ${_freeCount}× +${_freeAmt} for an attribute of your choice:`:`Wähle ${_freeCount}× +${_freeAmt} für ein Attribut nach Wahl:`}
         </div>
         <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {_allSK.map(sk => {
           const chosen = (freeStatChoices||[]).includes(sk);
           const full   = !chosen && (freeStatChoices||[]).length >= _freeCount;
           return (
            <button key={sk} disabled={full}
             onClick={() => {
              if (!onFreeStatChoicesChange) return;
              if (chosen) onFreeStatChoicesChange((freeStatChoices||[]).filter(s=>s!==sk));
              else if ((freeStatChoices||[]).length < _freeCount) onFreeStatChoicesChange([...(freeStatChoices||[]), sk]);
             }}
             style={{ padding:"4px 12px", borderRadius:20, fontWeight:800,
              fontSize:13, fontFamily:"inherit", cursor:full?"not-allowed":"pointer",
              background: chosen?"rgba(139,92,246,0.35)":"rgba(255,255,255,0.05)",
              border: chosen?"2px solid #a78bfa":"1px solid rgba(255,255,255,0.15)",
              color: chosen?"#c4b5fd": full?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.7)" }}>
             {SLBL[sk]}{chosen?` +${_freeAmt}`:""}
            </button>
           );
          })}
         </div>
         {(freeStatChoices||[]).length < _freeCount && (
          <div style={{ fontSize:11, color:"#fbbf24", marginTop:6 }}>
           ⚠ {lang==="en"?`Still ${_freeCount-(freeStatChoices||[]).length} attribute(s) to choose`:`Noch ${_freeCount-(freeStatChoices||[]).length} Attribut(e) wählen`}
          </div>
         )}
        </div>
       )}
      </div>
     )}
     {chosenClass && recommended.length > 0 && (
      <div style={{ background:"rgba(74,222,128,0.07)", border:"1px solid rgba(74,222,128,0.25)",
       borderRadius:10, padding:"10px 14px", marginBottom:16, fontSize:13, color:"rgba(255,255,255,0.7)" }}>
       🎯 <span style={{ fontWeight:700, color:"#4ade80" }}>{lang==="en"?`Important for ${chosenClass.name}:`:`Für ${chosenClass.name} wichtig:`}</span>{" "}
       {recommended.map(k => {
        const a = WIZARD_ATTRIBUTES_USED.find(x => x.key === k);
        return a ? <span key={k} style={{ fontWeight:800, color:a.color, marginRight:8 }}>{a.emoji} {a.short}</span> : null;
       })}
      </div>
     )}
    </>

   <div style={{ display:"flex", gap:8, marginBottom:20 }}>
    <button style={S2.modeBtn(mode==="info")}    onClick={() => setMode("info")}>📖 {lang==="en"?"Explainer":"Erklärer"}</button>
    <button style={S2.modeBtn(mode==="manual")}  onClick={() => setMode("manual")}>✏️ {lang==="en"?"Enter manually":"Manuell eingeben"}</button>
    <button style={S2.modeBtn(mode==="roll")}    onClick={() => setMode("roll")}>🎲 {lang==="en"?"Roll dice":"Würfeln"}</button>
   </div>

   {mode === "info" && <>
    <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:20 }}>
     {WIZARD_ATTRIBUTES_USED.map(a => {
      const isRec = recommended.includes(a.key);
      const isPrimary = recommended[0] === a.key;
      return (
       <button key={a.key} onClick={() => setSelected(a)}
        style={{
         background: selected.key === a.key ? `${a.color}22` : isRec ? `${a.color}0e` : "rgba(12,12,18,0.88)",
         border: `2px solid ${selected.key === a.key ? a.color : isRec ? `${a.color}55` : "rgba(255,255,255,0.1)"}`,
         borderRadius:10, padding:"8px 14px", cursor:"pointer", fontFamily:"inherit",
         color: selected.key === a.key ? a.color : isRec ? a.color : "rgba(255,255,255,0.6)",
         fontWeight: isRec ? 800 : 700, fontSize:13, transition:"all 0.2s", position:"relative",
        }}>
        {a.emoji} {a.short}
        {isPrimary && <span style={{ position:"absolute", top:-6, right:-4, fontSize:10,
         background:"#4ade80", color:"#000", borderRadius:20, padding:"1px 5px", fontWeight:900 }}>★</span>}
       </button>
      );
     })}
    </div>
    <div className="wizard-slide" key={selected.key}>
     <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
      <span style={{ fontSize:36 }}>{selected.emoji}</span>
      <div>
       <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ fontSize:20, fontWeight:900, color:selected.color }}>{selected.name} ({selected.short})</div>
        {recommended.includes(selected.key) && (
         <span style={{ fontSize:11, fontWeight:800, color:"#4ade80", background:"rgba(74,222,128,0.15)",
          border:"1px solid rgba(74,222,128,0.3)", borderRadius:20, padding:"2px 8px" }}>
          {recommended[0] === selected.key ? (lang==="en"?"★ Primary Stat":"★ Hauptattribut") : (lang==="en"?"✦ Important":"✦ Wichtig")}
         </span>
        )}
       </div>
      </div>
     </div>
     <div style={{ fontSize:14, color:"rgba(255,255,255,0.75)", lineHeight:1.7, marginBottom:16 }}>{selected.description}</div>
     <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:11, fontWeight:800, color:selected.color, letterSpacing:"0.07em", marginBottom:8 }}>📊 {lang==="en"?"AFFECTS":"BEEINFLUSST"}</div>
      {selected.affects.map((a,i) => (
       <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:5, fontSize:13, color:"rgba(255,255,255,0.7)" }}>
        <span style={{ color:selected.color, flexShrink:0 }}>✦</span>{a}
       </div>
      ))}
     </div>
     <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:11, fontWeight:800, color:selected.color, letterSpacing:"0.07em", marginBottom:8 }}>🏆 {lang==="en"?"IMPORTANT FOR":"WICHTIG FÜR"}</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
       {selected.important.map((c,i) => (
        <span key={i} style={{ background:`${selected.color}18`, border:`1px solid ${selected.color}44`,
         borderRadius:20, padding:"3px 10px", fontSize:12, color:selected.color, fontWeight:600 }}>{c}</span>
       ))}
      </div>
     </div>
    </div>
    <div style={{ marginTop:20, padding:"14px 16px", background:"rgba(12,12,18,0.90)",
     borderRadius:12, border:"1px solid rgba(255,255,255,0.08)", fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.7 }}>
     💡 <strong style={{ color:"rgba(255,255,255,0.7)" }}>Standard Array:</strong> {lang==="en"?"Distribute 15, 14, 13, 12, 10, 8 among your attributes.":"Verteile 15, 14, 13, 12, 10, 8 auf deine Attribute."}
    </div>
   </>}

   {mode === "manual" && (
    <div>
     <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:14, lineHeight:1.6 }}>
      {lang==="en"
       ? <>Enter your roll results directly. Recommended: <strong style={{color:"rgba(255,255,255,0.7)"}}>Standard Array</strong> 15 · 14 · 13 · 12 · 10 · 8, or free rolling (4d6, drop lowest).</>
       : <>Trage deine Würfelergebnisse direkt ein. Empfohlen: <strong style={{color:"rgba(255,255,255,0.7)"}}>Standard-Array</strong> 15 · 14 · 13 · 12 · 10 · 8, oder freies Würfeln (4W6, niedrigsten streichen).</>}
     </div>
     <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16 }}>
      {STAT_KEYS.map(key => {
       const a = WIZARD_ATTRIBUTES_USED.find(x => x.key === key);
       const isRec = recommended.includes(key);
       const isPrim = recommended[0] === key;
       const mod = statMod(manualVals[key]);
       return (
        <div key={key} style={S2.statBox(key)}>
         {isPrim && <span style={{ position:"absolute", top:-7, right:-4, fontSize:10,
          background:"#4ade80", color:"#000", borderRadius:20, padding:"1px 5px", fontWeight:900, zIndex:1 }}>★</span>}
         <div style={{ fontSize:10, color: isRec ? a.color : "rgba(255,255,255,0.35)", fontWeight:800,
          textTransform:"uppercase", marginBottom:4 }}>{a.emoji} {STAT_LABELS[key]}</div>
         <input type="number" min="1" max="20" value={manualVals[key]}
          onChange={e => handleManualChange(key, e.target.value)}
          placeholder="—"
          style={{ width:"100%", background:"rgba(18,18,25,0.83)", border:`1px solid ${isRec ? `${a.color}55` : "rgba(255,255,255,0.12)"}`,
           borderRadius:8, padding:"6px 4px", color:"white", fontSize:20, fontWeight:900,
           textAlign:"center", outline:"none", fontFamily:"inherit" }}/>
         <div style={{ fontSize:12, color: mod !== null ? (mod >= 0 ? "#4ade80":"#f87171") : "rgba(255,255,255,0.2)",
          fontWeight:700, marginTop:4 }}>{fmtM(mod)}</div>
        </div>
       );
      })}
     </div>
     <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", justifyContent:"center" }}>
      <div style={{ display:"flex", gap:4, flexWrap:"wrap", justifyContent:"center" }}>
       {[15,14,13,12,10,8].map(v => (
        <span key={v} style={{ background:"rgba(15,15,22,0.85)", border:"1px solid rgba(255,255,255,0.12)",
         borderRadius:8, padding:"4px 12px", fontSize:13, fontWeight:700, color:"rgba(255,255,255,0.5)" }}>{v}</span>
       ))}
      </div>
      <button
       onClick={() => {
        const arr = [15,14,13,12,10,8];
        const allKeys = ["str","dex","con","int","wis","cha"];
        const rec = recommended.length > 0 ? [...recommended] : [];

        if (!rec.includes("con")) rec.push("con");

        const rest = allKeys.filter(k => !rec.includes(k));
        const order = [...rec, ...rest].slice(0, 6);
        const newVals = {};
        order.forEach((k, i) => { newVals[k] = arr[i]; });
        setManualVals(newVals);
        if (onStatsChange) onStatsChange(newVals);
       }}
       style={{
        padding:"6px 16px", borderRadius:10, cursor:"pointer", fontFamily:"inherit",
        fontWeight:800, fontSize:12, transition:"all 0.2s", whiteSpace:"nowrap",
        background:`${theme.accent}22`, color:theme.accent,
        border:`1px solid ${theme.accent}55`,
       }}>
       ↓ {lang==="en"?"Insert Standard Array":"Standard-Array einfügen"}
      </button>
     </div>
    </div>
   )}

   {mode === "roll" && (
    <div>
     <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:14, lineHeight:1.6 }}>
      {lang==="en"?"Roll 6× (4d6, drop lowest) and assign the results to your attributes.":"Würfle 6× (4W6, niedrigsten streichen) und weise die Ergebnisse deinen Attributen zu."}
     </div>
     <button onClick={doRollAll} disabled={rolling}
      style={{ width:"100%", marginBottom:20, padding:"13px 0", fontWeight:900, fontSize:16,
       fontFamily:"inherit", borderRadius:12, cursor: rolling ? "not-allowed":"pointer",
       border:`2px solid ${theme.accent}`, color: rolling ? "rgba(255,255,255,0.3)" : theme.accent,
       background: rolling ? "rgba(12,12,18,0.90)" : `${theme.accent}18`,
       transition:"all 0.2s",
       animation: rollAnim ? "rollPulse 0.4s ease" : "none" }}>
      {rolling ? (lang==="en"?"🎲 Rolling...":"🎲 Würfle...") : rollResults ? (lang==="en"?"🎲 Roll again":"🎲 Nochmal würfeln") : (lang==="en"?"🎲 Roll now!":"🎲 Jetzt würfeln!")}
     </button>

     {rollResults && (
      <>
       {/* Würfelergebnisse – sortiert von hoch nach niedrig */}
       <div style={{ display:"flex", gap:6, marginBottom:18, flexWrap:"wrap" }}>
        {[...rollResults]
         .map((r, idx) => ({ r, idx }))
         .sort((ra, rb) => rb.r.total - ra.r.total)
         .map(({ r, idx }) => {
         const isUsed = usedIndices.includes(idx);
         const assignedTo = Object.keys(assigned).find(k => assigned[k] === idx);
         const aData = assignedTo ? WIZARD_ATTRIBUTES_USED.find(x => x.key === assignedTo) : null;
         return (
          <div key={idx} style={{ flex:"1 1 60px", background: isUsed ? `${aData?.color || theme.accent}22` : "rgba(15,15,22,0.87)",
           border:`2px solid ${isUsed ? (aData?.color || theme.accent) : "rgba(255,255,255,0.12)"}`,
           borderRadius:10, padding:"8px 6px", textAlign:"center", transition:"all 0.2s",
           opacity: isUsed ? 0.65 : 1 }}>
           <div style={{ fontSize:22, fontWeight:900, color: isUsed ? (aData?.color||theme.accent) : "white" }}>{r.total}</div>
           <div style={{ fontSize:9, color:"rgba(255,255,255,0.3)", marginTop:2 }}>
            [{r.rolls.map((v,i) => (
             <span key={i} style={{ color: i===r.rolls.indexOf(Math.min(...r.rolls)) && r.rolls.filter(x=>x===Math.min(...r.rolls)).length===1 ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.5)" }}>{v}{i<3?",":""}</span>
            ))}]
           </div>
           {assignedTo && <div style={{ fontSize:9, fontWeight:800, color:aData?.color||theme.accent, marginTop:2 }}>{STAT_LABELS[assignedTo]}</div>}
          </div>
         );
        })}
       </div>

       <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
        {STAT_KEYS.map(key => {
         const a = WIZARD_ATTRIBUTES_USED.find(x => x.key === key);
         const isRec = recommended.includes(key);
         const isPrim = recommended[0] === key;
         const assignedIdx = assigned[key];
         const assignedVal = assignedIdx !== null ? rollResults[assignedIdx]?.total : null;
         const mod = assignedVal !== null ? Math.floor((assignedVal-10)/2) : null;
         return (
          <div key={key} style={{ ...S2.statBox(key), padding:"10px 8px" }}>
           {isPrim && <span style={{ position:"absolute", top:-7, right:-4, fontSize:10,
            background:"#4ade80", color:"#000", borderRadius:20, padding:"1px 5px", fontWeight:900, zIndex:1 }}>★</span>}
           <div style={{ fontSize:10, color: isRec ? a.color : "rgba(255,255,255,0.35)", fontWeight:800,
            textTransform:"uppercase", marginBottom:6 }}>{a.emoji} {STAT_LABELS[key]}</div>
           <select
            value={assignedIdx !== null ? assignedIdx : ""}
            onChange={e => e.target.value !== "" && assignRoll(key, parseInt(e.target.value))}
            style={{ width:"100%", background:"rgba(18,18,25,0.83)", border:`1px solid ${isRec ? `${a.color}55`:"rgba(255,255,255,0.12)"}`,
             borderRadius:8, padding:"5px 4px", color:"white", fontSize:13, fontWeight:700,
             outline:"none", fontFamily:"inherit", textAlign:"center", cursor:"pointer" }}>
            <option value="">—</option>
            {[...rollResults]
             .map((r, idx) => ({ r, idx }))
             .sort((ra, rb) => rb.r.total - ra.r.total)
             .map(({ r, idx }) => {
              const ownerKey = Object.keys(assigned).find(k => assigned[k] === idx && k !== key);
              const ownerLabel = ownerKey ? STAT_LABELS[ownerKey] : null;
              const topThree = r.rolls.slice().sort((x,y)=>y-x).slice(0,3);
              return (
               <option key={idx} value={idx}>
                {r.total} [{topThree.join(",")}]{ownerLabel ? ` ⇄ ${ownerLabel}` : ""}
               </option>
              );
             })
            }
           </select>
           <div style={{ fontSize:14, fontWeight:900, marginTop:6,
            color: mod !== null ? (mod >= 0 ? "#4ade80":"#f87171") : "rgba(255,255,255,0.2)" }}>
            {assignedVal !== null ? assignedVal : "—"}
            <span style={{ fontSize:11, marginLeft:4, color: mod !== null ? (mod>=0?"#4ade80":"#f87171"):"rgba(255,255,255,0.2)" }}>
             ({fmtM(mod)})
            </span>
           </div>
          </div>
         );
        })}
       </div>
      </>
     )}
    </div>
   )}
  </div>
 );
}

function WizardSummary({ data, theme, onFinish, onBack, selectedSubrace, rolledStats, selectedEquipment, freeStatChoices, wizardLanguages, lang }) {
 if(!lang) lang="de";
 const WIZARD_ATTRIBUTES_USED = lang==="en" ? WIZARD_ATTRIBUTES_EN : WIZARD_ATTRIBUTES;
 const STAT_KEYS2 = ["str","dex","con","int","wis","cha"];
 const missing = [];
 if (!data.name?.trim())  missing.push({ field:"name",      label:lang==="en"?"✏️ Name":"✏️ Name",              hint:lang==="en"?"Give your character a name.":"Gib deinem Charakter einen Namen." });
 if (!data.race)          missing.push({ field:"race",      label:lang==="en"?"🌍 Race":"🌍 Rasse",             hint:lang==="en"?"Choose a race in the race step.":"Wähle eine Rasse im Rassen-Schritt." });
 if (!data.class)         missing.push({ field:"class",     label:lang==="en"?"⚔️ Class":"⚔️ Klasse",          hint:lang==="en"?"Choose a class in the class step.":"Wähle eine Klasse im Klassen-Schritt." });
 if (!data.background)    missing.push({ field:"background",label:lang==="en"?"📖 Background":"📖 Hintergrund", hint:lang==="en"?"Choose a background.":"Wähle einen Hintergrund." });
 if (!data.alignment)     missing.push({ field:"alignment", label:lang==="en"?"☯️ Alignment":"☯️ Gesinnung",   hint:lang==="en"?"Choose an alignment.":"Wähle eine Gesinnung." });

 const allStatsSet = rolledStats && STAT_KEYS2.every(k => {
  const v = parseInt(rolledStats[k]);
  return !isNaN(v) && v >= 1;
 });
 if (!allStatsSet)
  missing.push({ field:"attributes", label:lang==="en"?"💪 Attributes":"💪 Attribute", hint:lang==="en"?"All 6 attribute values must be filled in.":"Alle 6 Attributwerte müssen ausgefüllt sein." });

 const requiredFreeStats = (data.race?.extraChoices?.freeStats || 0) +
               (selectedSubrace?.extraChoices?.freeStats || 0);
 const chosenFreeStats   = (freeStatChoices || []).length;
 if (requiredFreeStats > 0 && chosenFreeStats < requiredFreeStats)
  missing.push({
   field: "freeStats",
   label: lang==="en"?"⚡ Free Attribute Choice":"⚡ Freie Attributwahl",
   hint: lang==="en"
    ? `Your race gives you ${requiredFreeStats} free +1 bonuses – you've chosen ${chosenFreeStats} of ${requiredFreeStats}. Go to the attributes step.`
    : `Deine Rasse gibt dir ${requiredFreeStats} freie +1 Boni – du hast erst ${chosenFreeStats} von ${requiredFreeStats} gewählt. Gehe zum Attribut-Schritt.`
  });
 if (!selectedEquipment)  missing.push({ field:"equipment", label:lang==="en"?"🎒 Equipment":"🎒 Ausrüstung", hint:lang==="en"?"Choose an equipment package.":"Wähle ein Ausrüstungspaket." });
 const allDone = missing.length === 0;

 const STAT_KEYS = ["str","dex","con","int","wis","cha"];
 const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
 const hasStats = rolledStats && STAT_KEYS.some(k => rolledStats[k] !== "");
 const statMod = v => { const n=parseInt(v); return isNaN(n)?null:Math.floor((n-10)/2); };
 const fmtM = v => v===null?"—":(v>=0?"+":"")+v;

 return (
  <div className="wizard-fade">
   <div style={{ fontSize:20, fontWeight:900, color:theme.accent, marginBottom:6 }}>📋 {lang==="en"?"Summary":"Zusammenfassung"}</div>
   <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:20 }}>
    {lang==="en"?"Review your choices and then start with the character sheet.":"Überprüfe deine Auswahl und starte dann mit dem Charakter-Sheet."}
   </div>
   <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:24 }}>
    {[
     { label:lang==="en"?"Name":"Name", value:data.name || "—", emoji:"✏️" },
     { label:lang==="en"?"Race":"Rasse", value:data.race?.name || "—", emoji:data.race?.emoji || "🌍",
      sub: selectedSubrace ? `${lang==="en"?"Subrace":"Unterrasse"}: ${selectedSubrace.name} · ${selectedSubrace.bonus}` : null },
     { label:lang==="en"?"Class":"Klasse", value:data.class?.name || "—", emoji:data.class?.emoji || "⚔️",
      sub: data.class ? `${data.class.hitDie} · ${data.class.primaryStat}` : null },
     { label:lang==="en"?"Background":"Hintergrund", value:data.background?.name || "—", emoji:data.background?.emoji || "📖",
      sub: data.background ? data.background.proficiencies?.join(", ") : null },
     { label:lang==="en"?"Alignment":"Gesinnung", value:data.alignment?.name || "—", emoji:data.alignment?.emoji || "☯️" },
     ...((wizardLanguages||[]).length > 0 ? [{
      label:lang==="en"?"Languages (free)":"Sprachen (frei)",
      value: (wizardLanguages||[]).join(", "),
      emoji:"🗣",
     }] : []),
     ...(selectedEquipment ? [{
      label:lang==="en"?"Equipment":"Ausrüstung",
      value: (() => {
       const a = lang==="en"
        ? (ARMOR_CATALOG_EN.find(x=>x.id===selectedEquipment.armorId) || ARMOR_CATALOG.find(x=>x.id===selectedEquipment.armorId))
        : (ARMOR_CATALOG.find(x=>x.id===selectedEquipment.armorId) || ARMOR_CATALOG_EN.find(x=>x.id===selectedEquipment.armorId));
       const parts = [a?.name||(lang==="en"?"No Armor":"Keine Rüstung")];
       if(selectedEquipment.hasShield) parts.push(lang==="en"?"Shield":"Schild");
       return parts.join(" + ");
      })(),
      emoji:"🛡️",
      sub: selectedEquipment.weaponIds?.length
       ? selectedEquipment.weaponIds.map(wid=>WEAPON_CATALOG.find(w=>w.id===wid)?.name).filter(Boolean).join(", ")
       : null
     }] : []),
    ].map(row => (
     <div key={row.label} style={{ display:"flex", alignItems:"center", gap:12,
      background:"rgba(12,12,18,0.88)", borderRadius:12,
      border:"1px solid rgba(255,255,255,0.08)", padding:"12px 16px" }}>
      <span style={{ fontSize:22, flexShrink:0 }}>{row.emoji}</span>
      <div style={{ flex:1, minWidth:0 }}>
       <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", fontWeight:700, textTransform:"uppercase" }}>{row.label}</div>
       <div style={{ fontSize:15, fontWeight:800, color:row.value==="—"?"rgba(255,255,255,0.2)":"white" }}>{row.value}</div>
       {row.sub && <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{row.sub}</div>}
      </div>
     </div>
    ))}
    {hasStats && (
     <div style={{ background:"rgba(12,12,18,0.88)", borderRadius:12,
      border:"1px solid rgba(255,255,255,0.08)", padding:"12px 16px" }}>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", fontWeight:700,
       textTransform:"uppercase", marginBottom:10 }}>💪 {lang==="en"?"Attributes":"Attribute"}</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:6 }}>
       {STAT_KEYS.map(k => {
        const val = rolledStats[k];
        const m = statMod(val);
        const a = WIZARD_ATTRIBUTES_USED.find(x=>x.key===k);
        return (
         <div key={k} style={{ textAlign:"center", background:`${a.color}0d`,
          border:`1px solid ${a.color}33`, borderRadius:8, padding:"6px 4px" }}>
          <div style={{ fontSize:9, color:a.color, fontWeight:800 }}>{STAT_LABELS[k]}</div>
          <div style={{ fontSize:16, fontWeight:900, color:"white" }}>{val||"—"}</div>
          <div style={{ fontSize:10, color:m!==null?(m>=0?"#4ade80":"#f87171"):"rgba(255,255,255,0.2)", fontWeight:700 }}>{fmtM(m)}</div>
         </div>
        );
       })}
      </div>
     </div>
    )}
   </div>
   {missing.length > 0 && (
    <div style={{ background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.3)",
     borderRadius:10, padding:"10px 14px", marginBottom:16, fontSize:13, color:"#f87171" }}>
     ⚠️ {lang==="en"?"Not yet filled in:":"Noch nicht ausgefüllt:"} {missing.join(", ")}
    </div>
   )}
   <div style={{ display:"flex", gap:10 }}>
    <button onClick={onBack}
     style={{ background:"rgba(18,18,25,0.83)", color:"rgba(255,255,255,0.7)",
      border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"12px 20px",
      fontWeight:600, cursor:"pointer", fontSize:14, fontFamily:"inherit" }}>
     ← {lang==="en"?"Back":"Zurück"}
    </button>
    {missing.length > 0 && (
     <div style={{
      width:"100%", marginBottom:12,
      background:"rgba(239,68,68,0.08)",
      border:"1px solid rgba(239,68,68,0.25)",
      borderRadius:12, padding:"12px 14px",
     }}>
      <div style={{ fontSize:12, fontWeight:800, color:"#f87171", marginBottom:8, letterSpacing:"0.05em" }}>
       ⚠ {lang==="en"?"Not complete yet – please fill in:":"Noch nicht vollständig – bitte ausfüllen:"}
      </div>
      {missing.map((m,i) => (
       <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom: i < missing.length-1 ? 6 : 0 }}>
        <span style={{ fontSize:13, fontWeight:700, color:"#f87171", flexShrink:0 }}>{m.label}</span>
        <span style={{ fontSize:12, color:"rgba(255,255,255,0.45)", lineHeight:1.5 }}>{m.hint}</span>
       </div>
      ))}
     </div>
    )}
    <button onClick={allDone ? onFinish : undefined} disabled={!allDone}
     style={{ flex:1, background: allDone
      ? `linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`
      : "rgba(255,255,255,0.08)",
      color: allDone ? "white" : "rgba(255,255,255,0.3)",
      border:"none", borderRadius:12, padding:"12px 0",
      fontWeight:800, cursor: allDone ? "pointer" : "not-allowed",
      fontSize:15, fontFamily:"inherit", transition:"all 0.2s" }}>
     ⚔ {lang==="en"?"Create Character!":"Charakter erstellen!"}
    </button>
   </div>
  </div>
 );
}

const CUSTOM_RACES_KEY = "dnd5e_custom_races";
function loadCustomRaces() { try { return JSON.parse(localStorage.getItem(CUSTOM_RACES_KEY) || "[]"); } catch { return []; } }
function saveCustomRaces(arr) { localStorage.setItem(CUSTOM_RACES_KEY, JSON.stringify(arr)); }

const EMOJI_PRESETS = ["🧝","🧟","🧛","🧞","🧜","🐉","🦊","🐺","🦅","🐗","🌊","🌋","⚡","🌑","🌿","🔮","💀","👁","🦋","🐲","🗿","🌀","🦄","🐻","🦁"];
const COLOR_PRESETS = ["#ef4444","#f97316","#fbbf24","#4ade80","#38bdf8","#818cf8","#c084fc","#ec4899","#fb923c","#86efac","#60a5fa","#a78bfa","#f87171","#94a3b8","#ffffff"];

function CustomRaceModal({ editRace, onSave, onClose, theme }) {
 const lang = localStorage.getItem("dnd5e_lang") || "de";
 const blank = { name:"", emoji:"🧝", color:"#a78bfa", tagline:"", description:"",
  traits:[""], size:"Mittelgroß", speed:"30 ft", languages:["Gemeinsprache"],
  subraces:[], classTip:"", lore:"", suggestedFor:{ classes:[] }, isCustom:true };
 const [form, setForm] = useState(editRace ? { ...blank, ...editRace } : blank);
 const [subraceOpen, setSubraceOpen] = useState(null);

 const upF = (key, val) => setForm(f => ({ ...f, [key]: val }));

 const addTrait    = () => upF("traits", [...(form.traits||[]), ""]);
 const updTrait    = (i, v) => { const t=[...(form.traits||[])]; t[i]=v; upF("traits",t); };
 const delTrait    = i => upF("traits", (form.traits||[]).filter((_,j)=>j!==i));

 const addSubrace  = () => upF("subraces", [...(form.subraces||[]), { name:"", bonus:"", traits:[""], note:"" }]);
 const delSubrace  = i => { upF("subraces", (form.subraces||[]).filter((_,j)=>j!==i)); if(subraceOpen===i) setSubraceOpen(null); };
 const upSR        = (i, key, val) => { const s=[...(form.subraces||[])]; s[i]={...s[i],[key]:val}; upF("subraces",s); };
 const addSRTrait  = i => { const s=[...(form.subraces||[])]; s[i]={...s[i],traits:[...(s[i].traits||[]),""]};upF("subraces",s); };
 const upSRTrait   = (i,j,v) => { const s=[...(form.subraces||[])]; const t=[...(s[i].traits||[])];t[j]=v;s[i]={...s[i],traits:t};upF("subraces",s); };
 const delSRTrait  = (i,j) => { const s=[...(form.subraces||[])]; s[i]={...s[i],traits:(s[i].traits||[]).filter((_,k)=>k!==j)};upF("subraces",s); };

 const canSave = form.name.trim().length > 0;

 const handleSave = () => {
  if (!canSave) return;
  const race = {
   ...form,
   name: form.name.trim(),
   tagline: form.tagline.trim() || "Eigene Rasse",
   description: form.description.trim() || "Eine selbst erstellte Rasse.",
   traits: (form.traits||[]).filter(t => t.trim()),
   lore: form.lore.trim(),
   classTip: form.classTip.trim(),
   subraces: (form.subraces||[])
    .filter(sr => sr.name.trim())
    .map(sr => ({
     ...sr,
     name: sr.name.trim(),
     bonus: (sr.bonus||"").trim(),
     traits: (sr.traits||[]).filter(t => t.trim()),
     note: (sr.note||"").trim(),
    })),
   isCustom: true,
   id: editRace?.id || Date.now().toString(),
  };
  onSave(race);
 };

 const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:10, padding:"7px 10px", color:"white", fontSize:13, outline:"none",
  width:"100%", fontFamily:"inherit" };
 const label = txt => <div style={{ fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.35)",
  letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:4 }}>{txt}</div>;

 return (
  <div style={{ position:"fixed", inset:0, zIndex:110, display:"flex", alignItems:"center",
   justifyContent:"center", background:"rgba(0,0,0,0.9)", backdropFilter:"blur(8px)", padding:16 }}
   onClick={onClose}>
   <div onClick={e => e.stopPropagation()} style={{
    maxWidth:520, width:"100%", maxHeight:"92vh", overflowY:"auto", WebkitOverflowScrolling:"touch",
    background:"#0f1117", border:`2px solid ${form.color}55`,
    borderRadius:20, padding:"24px 20px",
    boxShadow:`0 0 60px ${form.color}22, 0 24px 60px rgba(0,0,0,0.8)`,
    animation:"modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",
    position:"relative",
   }}>
    {/* Close */}
    <button onClick={onClose} style={{ position:"absolute", top:14, right:14,
     background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.1)",
     borderRadius:8, width:30, height:30, color:"rgba(255,255,255,0.5)", cursor:"pointer",
     fontSize:16, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"inherit" }}>✕</button>

    <div style={{ fontSize:20, fontWeight:900, color:form.color, marginBottom:4 }}>
     {editRace ? (lang==="en"?"✏️ Edit Race":"✏️ Rasse bearbeiten") : (lang==="en"?"✨ Create Race":"✨ Neue Rasse erstellen")}
    </div>
    <div style={{ fontSize:12, color:"rgba(255,255,255,0.3)", marginBottom:20 }}>
     {lang==="en"?"Create a custom race for the character wizard.":"Erstelle eine eigene Rasse für den Charakter-Wizard."}
    </div>

    {/* Preview */}
    <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", marginBottom:20,
     background:`${form.color}0d`, border:`1px solid ${form.color}44`, borderRadius:14 }}>
     <span style={{ fontSize:36 }}>{form.emoji}</span>
     <div>
      <div style={{ fontSize:17, fontWeight:900, color:form.color }}>{form.name||(lang==="en"?"Race":"Rasse")}</div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>{form.tagline||"Tagline..."}</div>
     </div>
    </div>

    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

     {/* Name + Emoji */}
     <div style={{ display:"grid", gridTemplateColumns:"1fr 100px", gap:10 }}>
      <div>{label("Name *")}<input type="text" value={form.name} onChange={e=>upF("name",e.target.value)}
       placeholder={lang==="en"?"e.g. Dragonborn":"z.B. Drachengeborene"} style={inp} autoFocus/></div>
      <div>{label("Emoji")}<input type="text" value={form.emoji} onChange={e=>upF("emoji",e.target.value)}
       placeholder="🧝" style={{...inp, fontSize:22, textAlign:"center"}}/></div>
     </div>

     {/* Emoji presets */}
     <div>
      <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)", marginBottom:6, fontWeight:700 }}>{lang==="en"?"QUICK PICK EMOJI":"SCHNELLAUSWAHL EMOJI"}</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
       {EMOJI_PRESETS.map(e => (
        <button key={e} onClick={()=>upF("emoji",e)} style={{ width:32, height:32, fontSize:18,
         background:form.emoji===e?`${form.color}22`:"rgba(15,15,22,0.87)",
         border:`1px solid ${form.emoji===e?form.color:"rgba(255,255,255,0.1)"}`,
         borderRadius:8, cursor:"pointer", fontFamily:"inherit" }}>{e}</button>
       ))}
      </div>
     </div>

     {/* Color */}
     <div>
      {label(lang==="en"?"Color":"Farbe")}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
       {COLOR_PRESETS.map(c => (
        <button key={c} onClick={()=>upF("color",c)} style={{ width:28, height:28, borderRadius:"50%",
         background:c, border:`3px solid ${form.color===c?"white":"transparent"}`,
         cursor:"pointer", padding:0 }}/>
       ))}
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
       <input type="color" value={form.color} onChange={e=>upF("color",e.target.value)}
        style={{ width:36, height:36, border:"none", background:"none", cursor:"pointer", padding:0 }}/>
       <span style={{ fontSize:12, color:"rgba(255,255,255,0.3)" }}>{lang==="en"?"Custom color":"Eigene Farbe"}</span>
      </div>
     </div>

     {/* Tagline + Size + Speed */}
     <div>{label("Tagline")}<input type="text" value={form.tagline} onChange={e=>upF("tagline",e.target.value)}
      placeholder={lang==="en"?"e.g. Tough as rock, proud as gold":"z.B. Zäh wie Fels, stolz wie Gold"} style={inp}/></div>

     <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
      <div>{label(lang==="en"?"Size":"Größe")}<input type="text" value={form.size} onChange={e=>upF("size",e.target.value)}
       placeholder={lang==="en"?"Medium":"Mittelgroß"} style={inp}/></div>
      <div>{label(lang==="en"?"Speed":"Bewegungsrate")}<input type="text" value={form.speed} onChange={e=>upF("speed",e.target.value)}
       placeholder="30 ft" style={inp}/></div>
     </div>

     {/* Description */}
     <div>{label(lang==="en"?"Description":"Beschreibung")}
      <textarea value={form.description} onChange={e=>upF("description",e.target.value)}
       placeholder={lang==="en"?"Describe the race...":"Beschreibe die Rasse..."} rows={3}
       style={{...inp, resize:"vertical"}}/></div>

     {/* Traits */}
     <div>
      {label(lang==="en"?"Racial Traits":"Rassenmerkmale")}
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
       {(form.traits||[]).map((t,i) => (
        <div key={i} style={{ display:"flex", gap:6 }}>
         <input type="text" value={t} onChange={e=>updTrait(i,e.target.value)}
          placeholder={lang==="en"?`Trait ${i+1}`:`Merkmal ${i+1}`} style={{...inp, flex:1}}/>
         <button onClick={()=>delTrait(i)} style={{ background:"rgba(239,68,68,0.15)",
          color:"#f87171", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8,
          padding:"6px 10px", cursor:"pointer", fontFamily:"inherit" }}>✕</button>
        </div>
       ))}
       <button onClick={addTrait} style={{ background:"rgba(15,15,22,0.87)",
        border:"1px dashed rgba(255,255,255,0.15)", borderRadius:10, padding:"7px",
        color:"rgba(255,255,255,0.4)", cursor:"pointer", fontSize:12,
        fontFamily:"inherit", fontWeight:600 }}>+ {lang==="en"?"Add Trait":"Merkmal hinzufügen"}</button>
      </div>
     </div>

     {/* Lore + Classtip */}
     <div>{label(lang==="en"?"Class Tip (optional)":"Klassen-Tipp (optional)")}
      <input type="text" value={form.classTip} onChange={e=>upF("classTip",e.target.value)}
       placeholder={lang==="en"?"Works for: Fighter, Barbarian...":"Passt zu: Kämpfer, Barbar..."} style={inp}/></div>

     <div>{label(lang==="en"?"Lore (optional)":"Lore (optional)")}
      <textarea value={form.lore} onChange={e=>upF("lore",e.target.value)}
       placeholder={lang==="en"?"Race backstory...":"Hintergrundgeschichte der Rasse..."} rows={2}
       style={{...inp, resize:"vertical"}}/></div>

     {/* Subraces */}
     <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
       {label(lang==="en"?"Subraces (optional)":"Unterrassen (optional)")}
       <button onClick={addSubrace} style={{ background:`${form.color}18`,
        border:`1px solid ${form.color}55`, borderRadius:8, padding:"4px 12px",
        color:form.color, cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:700 }}>
        + Unterrasse
       </button>
      </div>
      {(form.subraces||[]).length === 0 && (
       <div style={{ fontSize:12, color:"rgba(255,255,255,0.2)", fontStyle:"italic",
        textAlign:"center", padding:"10px 0" }}>
        {lang==="en"?"No subraces – optional.":"Keine Unterrassen – optional."}
       </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
       {(form.subraces||[]).map((sr, i) => (
        <div key={i} style={{ background:`${form.color}0a`,
         border:`1px solid ${form.color}33`, borderRadius:12, overflow:"hidden" }}>
         {/* Subrace header row */}
         <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px" }}>
          <button onClick={()=>setSubraceOpen(subraceOpen===i?null:i)}
           style={{ background:"transparent", border:"none", color:form.color,
            cursor:"pointer", fontSize:13, padding:0, fontFamily:"inherit",
            fontWeight:800, flex:1, textAlign:"left" }}>
           {subraceOpen===i?"▼":"▶"} {sr.name||(lang==="en"?`Subrace ${i+1}`:`Unterrasse ${i+1}`)}
           {sr.bonus && <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)",
            fontWeight:600, marginLeft:8 }}>{sr.bonus}</span>}
          </button>
          <button onClick={()=>delSubrace(i)} style={{ background:"rgba(239,68,68,0.15)",
           color:"#f87171", border:"1px solid rgba(239,68,68,0.3)",
           borderRadius:7, padding:"4px 9px", cursor:"pointer",
           fontSize:12, fontFamily:"inherit" }}>✕</button>
         </div>
         {subraceOpen===i && (
          <div style={{ padding:"0 12px 12px", display:"flex", flexDirection:"column", gap:8 }}>
           <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div>{label("Name")}
             <input type="text" value={sr.name} onChange={e=>upSR(i,"name",e.target.value)}
              placeholder={lang==="en"?"e.g. Hill Dwarf":"z.B. Hügelzwerg"} style={inp}/></div>
            <div>{label(lang==="en"?"Attribute Bonus":"Attribut-Bonus")}
             <input type="text" value={sr.bonus} onChange={e=>upSR(i,"bonus",e.target.value)}
              placeholder="WIS +1" style={inp}/></div>
           </div>
           <div>
            {label(lang==="en"?"Traits":"Merkmale")}
            {(sr.traits||[]).map((t,j) => (
             <div key={j} style={{ display:"flex", gap:6, marginBottom:5 }}>
              <input type="text" value={t} onChange={e=>upSRTrait(i,j,e.target.value)}
               placeholder={lang==="en"?`Trait ${j+1}`:`Merkmal ${j+1}`} style={{...inp,flex:1}}/>
              <button onClick={()=>delSRTrait(i,j)} style={{ background:"rgba(239,68,68,0.12)",
               color:"#f87171", border:"1px solid rgba(239,68,68,0.25)",
               borderRadius:7, padding:"5px 8px", cursor:"pointer", fontFamily:"inherit" }}>✕</button>
             </div>
            ))}
            <button onClick={()=>addSRTrait(i)} style={{ background:"transparent",
             border:"1px dashed rgba(255,255,255,0.12)", borderRadius:8, padding:"5px",
             color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:11,
             fontFamily:"inherit", width:"100%" }}>+ {lang==="en"?"Trait":"Merkmal"}</button>
           </div>
           <div>{label(lang==="en"?"Note / Recommendation (optional)":"Notiz / Empfehlung (optional)")}
            <input type="text" value={sr.note||""} onChange={e=>upSR(i,"note",e.target.value)}
             placeholder={lang==="en"?"e.g. Ideal for Clerics":"z.B. Ideal für Kleriker"} style={inp}/></div>
          </div>
         )}
        </div>
       ))}
      </div>
     </div>

     {/* Save */}
     <button onClick={handleSave} disabled={!canSave} style={{
      width:"100%", marginTop:4,
      background: canSave ? `linear-gradient(135deg,${form.color}cc,${form.color}77)` : "rgba(15,15,22,0.85)",
      color: canSave ? "white" : "rgba(255,255,255,0.2)",
      border:"none", borderRadius:12, padding:"13px 0",
      fontWeight:900, cursor: canSave ? "pointer" : "not-allowed",
      fontSize:15, fontFamily:"inherit", transition:"all 0.2s",
     }}>
      {editRace ? (lang==="en"?"✓ Save Changes":"✓ Änderungen speichern") : (lang==="en"?"✨ Create Race":"✨ Rasse erstellen")}
     </button>
    </div>
   </div>
  </div>
 );
}

function CharacterWizard({ theme, onFinish, onSkip }) {
 const lang = localStorage.getItem("dnd5e_lang") || "de";
 const L = LANG[lang] || LANG.de;
 const WIZARD_CLASSES_ACTIVE = lang==="en" ? WIZARD_CLASSES_EN : WIZARD_CLASSES;
 const WIZARD_RACES_ACTIVE   = lang==="en" ? WIZARD_RACES_EN   : WIZARD_RACES;
 const WIZARD_BACKGROUNDS_ACTIVE = lang==="en" ? WIZARD_BACKGROUNDS_EN : WIZARD_BACKGROUNDS;
 const WIZARD_ALIGNMENTS_ACTIVE  = lang==="en" ? WIZARD_ALIGNMENTS_EN  : WIZARD_ALIGNMENTS;
 const WIZARD_ATTRIBUTES_ACTIVE  = lang==="en" ? WIZARD_ATTRIBUTES_EN  : WIZARD_ATTRIBUTES;
 const [step, setStep] = useState(0);
 const [data, setData] = useState({ name:"", race:null, class:null, background:null, alignment:null });
 const [detailItem, setDetailItem] = useState(null);
 const [nameInput, setNameInput] = useState("");
 const [selectedSubrace, setSelectedSubrace] = useState(null);
 const [customBgOpen, setCustomBgOpen] = useState(false);
 const [customBg, setCustomBg] = useState({
  name:"", emoji:"✨", color:"#a78bfa",
  description:"", proficiencies:[], tools:"", languages:0,
  equipment:"", feature:"", ideal:"", bond:"",
 });
 const [rolledStats, setRolledStats] = useState(null);
 const [subraceModalRace, setSubraceModalRace] = useState(null);
 const [customRaces, setCustomRaces] = useState(() => loadCustomRaces());
 const [showCustomRaceModal, setShowCustomRaceModal] = useState(false);
 const [freeChoiceModal, setFreeChoiceModal] = useState(null);
 const [editingCustomRace, setEditingCustomRace] = useState(null);
 const [selectedEquipment, setSelectedEquipment] = useState(null);
 const [wizardLanguages, setWizardLanguages] = useState([]);

 const [attrMode,        setAttrMode]        = useState("info");
 const [attrManualVals,  setAttrManualVals]  = useState({str:"",dex:"",con:"",int:"",wis:"",cha:""});
 const [attrRollResults, setAttrRollResults] = useState(null);
 const [attrAssigned,    setAttrAssigned]    = useState({str:null,dex:null,con:null,int:null,wis:null,cha:null});
 const [freeStatChoices, setFreeStatChoices] = useState([]);
 const [freeStepChoices, setFreeStepChoices] = useState({});

 const allRaces = [...WIZARD_RACES_ACTIVE, ...customRaces];

 const saveAndRefreshCustomRaces = races => { saveCustomRaces(races); setCustomRaces(races); };

 const handleSaveCustomRace = race => {
  const idx = customRaces.findIndex(r => r.id === race.id);
  const updated = idx >= 0 ? customRaces.map((r,i) => i===idx ? race : r) : [...customRaces, race];
  saveAndRefreshCustomRaces(updated);
  setShowCustomRaceModal(false);
  setEditingCustomRace(null);
 };

 const handleDeleteCustomRace = id => {
  saveAndRefreshCustomRaces(customRaces.filter(r => r.id !== id));
  if (data.race?.id === id) { set("race", null); setDetailItem(null); setSelectedSubrace(null); }
 };

 const steps = lang==="en" ? [
  { id:"class",      label:"Class",      emoji:"⚔️"  },
  { id:"race",       label:"Race",       emoji:"🌍"  },
  { id:"background", label:"Background", emoji:"📖"  },
  { id:"attributes", label:"Attributes", emoji:"💪"  },
  { id:"alignment",  label:"Alignment",  emoji:"☯️"  },
  { id:"equipment",  label:"Equipment",  emoji:"🛡️"  },
  { id:"name",       label:"Name",       emoji:"✏️"  },
  { id:"summary",    label:"Overview",   emoji:"📋"  },
 ] : WIZARD_STEPS;
 const currentStep = steps[step];

 const set = (key, val) => setData(d => ({...d, [key]:val}));

 const handleNext = () => {
  if (step < steps.length - 1) {

   if (currentStep.id === "attributes") {
    const freeChoices = detectFreeChoices(data.race, selectedSubrace, data.background)
     .filter(fc => fc.type !== "stat_free" && fc.type !== "language_free");
    if (freeChoices.length > 0) {

     setFreeChoiceModal({ choices: freeChoices, pendingCharData: null, fromStep: true });
     return;
    }
   }
   setStep(s => s + 1);
   setDetailItem(null);
  }
 };
 const handleBack = () => {
  if (step > 0) { setStep(s => s - 1); setDetailItem(null); }
 };

 const handleFinish = () => {
  const parseS = v => { const n = parseInt(v); return isNaN(n) ? 10 : Math.max(1,Math.min(30,n)); };
  const baseStats = rolledStats
   ? { str:parseS(rolledStats.str), dex:parseS(rolledStats.dex), con:parseS(rolledStats.con),
     int:parseS(rolledStats.int), wis:parseS(rolledStats.wis), cha:parseS(rolledStats.cha) }
   : { str:10, dex:10, con:10, int:10, wis:10, cha:10 };

  const cls   = data.class;
  const race  = data.race;
  const sr    = selectedSubrace;
  const bg    = data.background;

  const stats = { ...baseStats };

  const applyStatBonuses = (bonuses) => {
   if (!bonuses) return;
   Object.entries(bonuses).forEach(([k,v]) => {
    if (v && stats[k] !== undefined) stats[k] = (stats[k] || 10) + v;
   });
  };

  applyStatBonuses(race?.statBonuses);

  applyStatBonuses(sr?.statBonuses);

  const freeAmt = race?.extraChoices?.statAmount || sr?.extraChoices?.statAmount || 1;
  freeStatChoices.forEach(sk => {
   if (stats[sk] !== undefined) stats[sk] = (stats[sk] || 10) + freeAmt;
  });

  const applyStatBonus = (bonusStr) => {
   if (!bonusStr) return;
   const map = { STR:"str", DEX:"dex", CON:"con", INT:"int", WIS:"wis", CHA:"cha" };
   const re = /\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi;
   let m;
   while ((m = re.exec(bonusStr)) !== null) {
    const key = map[m[1].toUpperCase()];
    if (key) stats[key] = (stats[key] || 10) + parseInt(m[2]);
   }
  };

  let speed = typeof race?.speed === 'number' ? race.speed : 30;
  if (sr?.speedOverride) speed = sr.speedOverride;

  if (typeof race?.speed === 'string') {
   const sp = parseInt(race.speed); if (!isNaN(sp)) speed = sp;
  }

  const CLASS_SAVES = {
   "Barbar":                  ["str","con"],
   "Barde":                   ["dex","cha"],
   "Kleriker":                ["wis","cha"],
   "Druide":                  ["int","wis"],
   "Kämpfer":                 ["str","con"],
   "Mönch":                   ["str","dex"],
   "Paladin":                 ["wis","cha"],
   "Waldläufer":              ["str","dex"],
   "Schurke":                 ["dex","int"],
   "Zauberer (Magier)":       ["int","wis"],
   "Hexenmeister":            ["wis","cha"],
   "Zauberwirker (Sorcerer)": ["con","cha"],
  };
  const saveProficiencies = { str:false, dex:false, con:false, int:false, wis:false, cha:false };
  if (cls) {
   const clsKeyForSaves = EN_TO_DE_CLASS[cls.name] || cls.name;
   const saves = CLASS_SAVES[clsKeyForSaves] || CLASS_SAVES[cls.name] || [];
   saves.forEach(s => { saveProficiencies[s] = true; });
  }

  const CLASS_SKILLS = {
   "Barbar":                  ["Athletik","Einschüchtern","Natur","Wahrnehmung","Überleben","Mit Tieren umgehen"],
   "Barde":                   ["Akrobatik","Athletik","Auftreten","Überzeugung","Geschichte","Heimlichkeit","Täuschen","Wahrnehmung","Einschüchtern"],
   "Kleriker":                ["Geschichte","Einblick","Medizin","Überzeugung","Religion"],
   "Druide":                  ["Arkane Kunde","Mit Tieren umgehen","Einblick","Medizin","Natur","Wahrnehmung","Religion","Überleben"],
   "Kämpfer":                 ["Akrobatik","Athletik","Geschichte","Einblick","Einschüchtern","Wahrnehmung","Überleben"],
   "Mönch":                   ["Akrobatik","Athletik","Geschichte","Einblick","Religion","Heimlichkeit"],
   "Paladin":                 ["Athletik","Einblick","Einschüchtern","Medizin","Überzeugung","Religion"],
   "Waldläufer":              ["Mit Tieren umgehen","Athletik","Einblick","Ermitteln","Natur","Wahrnehmung","Heimlichkeit","Überleben"],
   "Schurke":                 ["Akrobatik","Athletik","Täuschen","Einblick","Einschüchtern","Ermitteln","Wahrnehmung","Auftreten","Überzeugung","Heimlichkeit","Fingerfertigkeit"],
   "Zauberer (Magier)":       ["Arkane Kunde","Geschichte","Einblick","Ermitteln","Medizin","Religion"],
   "Hexenmeister":            ["Arkane Kunde","Täuschen","Geschichte","Einschüchtern","Natur","Religion"],
   "Zauberwirker (Sorcerer)": ["Arkane Kunde","Täuschen","Einblick","Einschüchtern","Überzeugung","Religion"],
  };
  const skillProficiencies = Object.fromEntries(SKILLS.map(s => [s.name, false]));

  if (cls) {
   const clsKeyForSkills = EN_TO_DE_CLASS[cls.name] || cls.name;
   const pool = CLASS_SKILLS[clsKeyForSkills] || CLASS_SKILLS[cls.name] || [];
   pool.slice(0, 2).forEach(sk => {
    if (skillProficiencies.hasOwnProperty(sk)) skillProficiencies[sk] = true;
   });
  }

  const RACE_SKILL_MAP = {
   "Elf":        ["Wahrnehmung"],
   "Halbork":    ["Einschüchtern"],
   "Elf":        ["Wahrnehmung"],
   "Half-Orc":   ["Einschüchtern"],
  };
  if (race) {
   const raceSkills = RACE_SKILL_MAP[race.name] || [];
   raceSkills.forEach(sk => { if (skillProficiencies.hasOwnProperty(sk)) skillProficiencies[sk] = true; });
  }

  if (bg?.proficiencies) {

   const BG_SKILL_NORMALIZE = {
    "Einblick": "Motiv erkennen",
    "Ermitteln": "Untersuchen",
   };
   bg.proficiencies.forEach(p => {
    // EN skill name → DE for lookup
    const deP = SKILL_EN_TO_DE[p] || p;
    const normalized = BG_SKILL_NORMALIZE[deP] || deP;
    if (skillProficiencies.hasOwnProperty(normalized)) skillProficiencies[normalized] = true;
    else if (skillProficiencies.hasOwnProperty(deP)) skillProficiencies[deP] = true;
    else if (skillProficiencies.hasOwnProperty(p)) skillProficiencies[p] = true;
   });
  }

  const languages = [];
  if (race?.languages) {
   race.languages.forEach(l => {

    if (!l.startsWith("+") && !l.includes("eine weitere") && !l.includes("nach Wahl") && !l.includes("weitere")) {
     languages.push(l);
    }
   });
  }

  const CLASS_SPELLCASTING = {
   "Barde":                   { ability:"CHA", dc: 8, bonus: 2 },
   "Kleriker":                { ability:"WIS", dc: 8, bonus: 2 },
   "Druide":                  { ability:"WIS", dc: 8, bonus: 2 },
   "Hexenmeister":            { ability:"CHA", dc: 8, bonus: 2 },
   "Paladin":                 { ability:"CHA", dc: 8, bonus: 2 },
   "Waldläufer":              { ability:"WIS", dc: 8, bonus: 2 },
   "Zauberer (Magier)":       { ability:"INT", dc: 8, bonus: 2 },
   "Zauberwirker (Sorcerer)": { ability:"CHA", dc: 8, bonus: 2 },
  };
  const spellData = cls ? CLASS_SPELLCASTING[cls.name] || CLASS_SPELLCASTING[EN_TO_DE_CLASS[cls.name]] || null : null;

  const HIT_DIE_MAX = { "1d12":12, "1d10":10, "1d8":8, "1d6":6 };
  const hitDie = cls?.hitDie || "1d8";
  const conMod = Math.floor((stats.con - 10) / 2);
  const maxHP = (HIT_DIE_MAX[hitDie] || 8) + conMod;

  const featureList = [];

const raceName = race?.name || "";
  const raceNameDE = EN_TO_DE_CLASS[raceName] || ({
   "Human":"Mensch","Dwarf":"Zwerg","Elf":"Elf","Half-Elf":"Halb-Elf",
   "Half-Orc":"Halbork","Halfling":"Halbling","Gnome":"Gnom",
   "Dragonborn":"Drachenblütiger","Tiefling":"Tiefling",
  }[raceName]) || raceName;
  const raceFeatures = lang==="en"
   ? (RACE_FEATURES_EN[raceName] || RACE_FEATURES[raceNameDE] || RACE_FEATURES[raceName] || [])
   : (RACE_FEATURES[raceNameDE] || RACE_FEATURES[raceName] || []);
  raceFeatures.forEach(f => featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE, ...f, active: true })));

  const dvRange = sr?.darkvision ?? race?.darkvision ?? 0;
  if (dvRange > 0) {
   const dvExists = featureList.some(f => f.keyword?.toLowerCase().includes('dunkelsicht') || f.keyword?.toLowerCase().includes('darkvision'));
   if (!dvExists) featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE,
    keyword:`Dunkelsicht (${dvRange} ft)`, type:"passive", active:true,
    note:`${dvRange} ft · Dämmerlicht wie Helles Licht · Dunkelheit wie Dämmerlicht`,
    desc:`Du siehst in dunklen Bedingungen bis ${dvRange} ft als wäre es Dämmerlicht, und in Dunkelheit als wäre es Dämmerlicht.`
   }));
  }

  const allResistances = [...(race?.resistances||[]), ...(sr?.resistances||[])];
  allResistances.forEach(res => {
   const resExists = featureList.some(f => f.keyword?.includes(res));
   if (!resExists) featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE,
    keyword:`Resistenz: ${res}`, type:"resistance", active:true,
    note:`Resistenz gegen ${res} (halber Schaden)`,
    desc:`Du hast Resistenz gegen ${res}. Du nimmst nur die Hälfte des Schadens dieses Typs.`
   }));
  });

  if (sr?.name?.includes("Hügelzwerg")) {
   featureList.push({ ...DEFAULT_FEATURE,
    keyword:"Zwergische Zähigkeit", type:"passive",
    note:"+1 TP pro Stufe (bereits in Max-TP eingerechnet ab Level 2)",
    desc:"Deine Trefferpunktmaximum erhöht sich um 1, und es erhöht sich um weitere 1 jedes Mal, wenn du eine Stufe aufsteigst.",
    active:true });
  }

  const monkLevel = 1;
const chaModFinal = Math.max(1, Math.floor(((stats?.cha||10)-10)/2));
  const deClsNameFinal = EN_TO_DE_CLASS[cls?.name] || cls?.name;
  const classFeaturesData = lang==="en"
   ? (CLASS_FEATURES_EN[cls?.name] || CLASS_FEATURES[deClsNameFinal] || CLASS_FEATURES[cls?.name] || [])
   : (CLASS_FEATURES[deClsNameFinal] || CLASS_FEATURES[cls?.name] || []);
  const classFeatures = classFeaturesData.map(f => {
   if (f.keyword && (f.keyword.includes("Bardic Inspiration") || f.keyword.includes("Bardische Inspiration"))) return { ...f, maxUses: chaModFinal };
   if (f.keyword && (f.keyword.includes("Lay on Hands") || f.keyword.includes("Heilende Hände"))) return { ...f, maxUses: 5 };
   return f;
  });
  classFeatures.forEach(f => featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE, ...f, active: true })));

  const raceName2 = selectedSubrace
   ? `${race?.name || ""} (${selectedSubrace.name})`
   : race?.name || "";

  const notes = languages.length > 0
   ? `${lang==="en"?"Languages":"Sprachen"}: ${[...new Set(languages)].join(", ")}`
   : "";

  const eq = selectedEquipment;

  const inventoryFromEquip = [];

  if (eq?.armorId && eq.armorId !== "unarmored") {
   const armorObj = lang==="en"
    ? (ARMOR_CATALOG_EN.find(a => a.id === eq.armorId) || ARMOR_CATALOG.find(a => a.id === eq.armorId))
    : (ARMOR_CATALOG.find(a => a.id === eq.armorId) || ARMOR_CATALOG_EN.find(a => a.id === eq.armorId));
   if (armorObj) inventoryFromEquip.push({
    ...DEFAULT_ITEM, name: armorObj.name, type:"armor", equipped:true, qty:1,
    armor:{ ac: armorObj.baseAC, stealthDisadv: armorObj.stealthDisadv, profCategory: armorObj.profCategory, minStr: armorObj.minStr||0, bonus:0, addDex: armorObj.addDex, maxDex: armorObj.maxDex },
   });
  }

  const handItems = [];
  if (eq?.hasShield) handItems.push({ kind:"shield" });
  (eq?.weaponIds || []).forEach(wid => {
   const w = WEAPON_CATALOG.find(x => x.id === wid);
   if (w) handItems.push({ kind:"weapon", w });
  });

  handItems.sort((a, b) => {
   const handsOf = item => {
    if (item.kind === "shield") return 1;
    if (item.kind === "weapon") return handsNeeded(item.w.props);
    return 0;
   };
   return handsOf(b) - handsOf(a);
  });

  let handsUsed = 0;
  handItems.forEach(item => {
   if (item.kind === "shield") {
    const fits = handsUsed + 1 <= 2;
    inventoryFromEquip.push({
     ...DEFAULT_ITEM, name:lang==="en"?"Shield":"Schild", type:"shield", equipped: fits, qty:1,
     shield:{ acBonus:2 },
    });
    if (fits) handsUsed += 1;
   } else if (item.kind === "weapon") {
    const w = item.w;
    const hands = handsNeeded(w.props);
    const fits = handsUsed + hands <= 2;
    const rangeStr = w.rangeStr && w.rangeStr !== "—" ? w.rangeStr : (w.range === "fern" ? "30/120 ft" : "");
    inventoryFromEquip.push({
     ...DEFAULT_ITEM, name: lang==="en" ? (WEAPON_NAME_EN[w.name] || w.name) : w.name, type:"weapon", equipped: fits, qty:1,
     weapon:{
      damage: w.damage, damageType: w.type, damageVers: w.damageVers || null,
      scale: w.scale, bonus:0, props: w.props, range: rangeStr,
      note: w.note || "", catalogId: w.id, category: w.category,
     },
    });
    if (fits) handsUsed += hands;
   }
  });

  const equippedArmorItem = inventoryFromEquip.find(x => x.type === "armor" && x.equipped);
  const equippedShieldItem = inventoryFromEquip.find(x => x.type === "shield" && x.equipped);

  const packId = eq?.packageId || "a";
  const deClsName = EN_TO_DE_CLASS[cls?.name] || cls?.name;
  const packMapForClass = CLASS_PACK_MAP[deClsName] || CLASS_PACK_MAP[cls?.name] || {};
  const packKey = packMapForClass[packId];
  const selectedPkg = (EQUIPMENT_RECOMMENDATIONS[deClsName]?.packages || EQUIPMENT_RECOMMENDATIONS[cls?.name]?.packages || []).find(p => p.id === packId);

  const backpackContents = [];

  if (packKey && ITEM_PACKS[packKey]) {
   ITEM_PACKS[packKey].items
    .filter(item => item.name !== "Rucksack")
    .forEach(item => backpackContents.push({ name: item.name, qty: item.qty }));
  }

  (CLASS_MISC_ITEMS[deClsName] || CLASS_MISC_ITEMS[cls?.name] || []).forEach(item => {
   if (item.qty > 0) backpackContents.push({ name: item.name, qty: item.qty });
  });

  const bgName = (bg?.name || data?.background?.name || "").trim();
  const bgPackageId = eq?.bgPackageId || "a";

  const bgMiscItems = bgPackageId === "b" ? [] : (
   BACKGROUND_MISC_ITEMS[bgName]
   || BACKGROUND_MISC_ITEMS[Object.keys(BACKGROUND_MISC_ITEMS).find(k => k.trim().toLowerCase() === bgName.toLowerCase())]
   || []
  );
  bgMiscItems.forEach(item => {
   const alreadyIn = backpackContents.some(c => c.name === item.name);
   if (!alreadyIn) backpackContents.push({ name: item.name, qty: item.qty });
  });

  if (backpackContents.length > 0) {
   const packLabel = packKey && ITEM_PACKS[packKey] ? ITEM_PACKS[packKey].label : (lang==="en"?"Equipment":"Ausrüstung");
   inventoryFromEquip.push({
    ...DEFAULT_ITEM,
    name: lang==="en"?"Backpack":"Rucksack",
    type: "misc", qty: 1, equipped: false,
    desc: packLabel + " · " + backpackContents.length + (lang==="en"?" items":" Gegenstände"),
    contents: backpackContents,
    isOpen: false,
   });
  }
  const computedAC = (() => {
   const dex = Math.floor((stats.dex - 10) / 2);
   const con = Math.floor((stats.con - 10) / 2);
   const wis = Math.floor((stats.wis - 10) / 2);
   const shieldBonus = equippedShieldItem ? (equippedShieldItem.shield?.acBonus || 2) : 0;
   if (!equippedArmorItem) {
    if (cls?.name === "Barbar" || cls?.name === "Barbarian") return 10 + dex + con + shieldBonus;
    if (cls?.name === "Mönch"  || cls?.name === "Monk")  return 10 + dex + wis + shieldBonus;
    return 10 + dex + shieldBonus;
   }
   const baseAC = equippedArmorItem.armor?.ac || 10;
   const armorAddDex = equippedArmorItem.armor?.addDex ?? (ARMOR_CATALOG.find(a => a.name === equippedArmorItem.name) || ARMOR_CATALOG_EN.find(a => a.name === equippedArmorItem.name))?.addDex;
   const armorMaxDex = equippedArmorItem.armor?.maxDex ?? (ARMOR_CATALOG.find(a => a.name === equippedArmorItem.name) || ARMOR_CATALOG_EN.find(a => a.name === equippedArmorItem.name))?.maxDex;
   if (armorAddDex) {
    const effectiveDex = (armorMaxDex !== null && armorMaxDex !== undefined) ? Math.min(dex, armorMaxDex) : dex;
    return baseAC + effectiveDex + shieldBonus;
   }
   return baseAC + shieldBonus;
  })();

  const charData = {
   name:       nameInput.trim() || "Unbenannt",
   race:       raceName2,
   background: bg?.name || "",
   alignment:  data.alignment?.name || "",
   classes:    [{ name: cls?.name || "", subclass:"", level:1 }],
   hitDice:    hitDie,
   stats,
   maxHP:      Math.max(1, maxHP),
   currentHP:  Math.max(1, maxHP),
   speed,
   ac:         computedAC,
   saveProficiencies,
   skillProficiencies,
   featureList,
   notes:      "",
   languages:  [...new Set([
    ...languages.filter(l =>
     !l.startsWith("+") &&
     !l.includes("eine weitere") &&
     !l.includes("nach Wahl") &&
     !l.includes("weitere") &&
     l.trim() !== ""
    ),
    ...wizardLanguages.filter(l => l.trim() !== ""),
   ])],
   inventory:  inventoryFromEquip,
   currency: { pp:0, gp: (selectedPkg?.gold || CLASS_STARTING_GOLD[cls?.name] || 0) + (bgPackageId === "b" ? 50 : 0), ep:0, sp:0, cp:0 },
   ...(spellData ? {
    spellcastingAbility: spellData.ability,
    spellSaveDC:         8 + 2 + Math.floor((stats[spellData.ability.toLowerCase()] - 10) / 2),
    spellAttackBonus:    2 + Math.floor((stats[spellData.ability.toLowerCase()] - 10) / 2),
   } : {}),
  };

  const remainingFreeChoices = detectFreeChoices(race, sr, bg)
   .filter(fc => {
    if (fc.type === "stat_free") return false;
    if (fc.type === "language_free") return false;
    return !Object.keys(freeStepChoices).some(k => k.startsWith(fc.id));
   })

   .map(fc => ({ ...fc, className: cls?.name || "", raceName: race?.name || "" }));
  if (remainingFreeChoices.length > 0) {
   setFreeChoiceModal({ choices: remainingFreeChoices, pendingCharData: charData });
   return;
  }

  if (Object.keys(freeStepChoices).length > 0) {
   const updated = JSON.parse(JSON.stringify(charData));
   Object.entries(freeStepChoices).forEach(([k, v]) => {
    if (k.startsWith("skill_")) {
     const sk = k.replace("skill_", "");
     if (updated.skillProficiencies?.[sk] !== undefined) updated.skillProficiencies[sk] = true;
    } else if (k.startsWith("lang_")) {
     if (!updated.languages) updated.languages = [];
     if (!updated.languages.includes(v)) updated.languages.push(v);
    }
   });
   onFinish(updated);
   return;
  }

  onFinish(charData);
 };

 const handleFreeChoiceConfirm = (choiceValues, pendingCharData) => {

  if (!pendingCharData) {

   setFreeChoiceModal(null);

   setFreeStepChoices(prev => ({...prev, ...choiceValues}));
   setStep(s => s + 1);
   setDetailItem(null);
   return;
  }
  const updated = JSON.parse(JSON.stringify(pendingCharData));
  Object.entries(choiceValues).forEach(([id, val]) => {

   if (typeof val === "object" && !Array.isArray(val)) {
    Object.entries(val).forEach(([k, bonus]) => {
     if (bonus > 0) updated.stats[k] = (updated.stats[k] || 10) + bonus;
    });

    if (val.con > 0) { updated.maxHP += val.con; updated.currentHP += val.con; }
   }

   if (Array.isArray(val) && id.includes("skill")) {
    val.forEach(sk => { if (updated.skillProficiencies?.[sk] !== undefined) updated.skillProficiencies[sk] = true; });
   }

   if (Array.isArray(val) && id.includes("lang")) {
    if (!updated.languages) updated.languages = [];
    val.forEach(l => { if (!updated.languages.includes(l)) updated.languages.push(l); });
   }
  });
  setFreeChoiceModal(null);
  onFinish(updated);
 };

             style={{ background:"rgba(239,68,68,0.2)", border:"1px solid rgba(239,68,68,0.4)",
              borderRadius:7, padding:"3px 7px", cursor:"pointer", fontSize:11,
              color:"#f87171", fontFamily:"inherit", fontWeight:700 }}>✕</button>
           </div>
          )}
         </div>
        ))}
        {currentStep.id === "race" && (
         <button onClick={() => { setEditingCustomRace(null); setShowCustomRaceModal(true); }}
          style={{ marginTop:4, padding:"11px 14px", borderRadius:14, cursor:"pointer",
           fontFamily:"inherit", fontWeight:700, fontSize:13,
           background:"rgba(12,12,18,0.90)",
           border:"2px dashed rgba(255,255,255,0.15)",
           color:"rgba(255,255,255,0.4)",
           display:"flex", alignItems:"center", justifyContent:"center", gap:8,
           transition:"all 0.2s",
          }}>
          <span style={{ fontSize:18 }}>✨</span> {lang==="en"?"Create Custom Race":"Eigene Rasse erstellen"}
         </button>
        )}
       </div>
       <div style={{ ...S.card, background:"rgba(255,255,255,0.02)", maxHeight:480, overflowY:"auto" }}>
        <WizardDetailErrorBoundary key={detailItem?.name||selected?.name}>
        <WizardDetail item={detailItem || selected} theme={theme} type={type}
         onOpenSubraceModal={currentStep.id === "race" ? (race) => setSubraceModalRace(race) : undefined}
         selectedSubrace={currentStep.id === "race" ? selectedSubrace : undefined} />
        </WizardDetailErrorBoundary>
       </div>
      </div>
     </div>
    );
   }

   case "attributes":
    return (
     <div className="wizard-fade">
      <div style={{ fontSize:18, fontWeight:900, color:theme.accent, marginBottom:4 }}>💪 {lang==="en"?"Attributes":"Attribute"}</div>
      <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:16 }}>
       {lang==="en"
        ? "Learn what each attribute means, enter values manually, or roll them directly here."
        : "Lerne was jedes Attribut bedeutet, trage Werte manuell ein oder würfle sie direkt hier."}
       {(data.race?.extraChoices?.freeStats || selectedSubrace?.extraChoices?.freeStats) && (
        <span style={{ color:"#a78bfa" }}> · {lang==="en"?"Select your free attribute choice from your race below.":"Freie Attributwahl aus deiner Rasse unten auswählen."}</span>
       )}
      </div>
      <AttributeExplainer theme={theme} chosenClass={data.class}
       onStatsChange={vals => setRolledStats(vals)}
       mode={attrMode} onModeChange={setAttrMode}
       manualVals={attrManualVals} onManualValsChange={setAttrManualVals}
       rollResults={attrRollResults} onRollResultsChange={setAttrRollResults}
       assigned={attrAssigned} onAssignedChange={setAttrAssigned}
       chosenRace={data.race} chosenSubrace={selectedSubrace}
       freeStatChoices={freeStatChoices} onFreeStatChoicesChange={setFreeStatChoices}
       lang={lang}
      />
     </div>
    );

   case "equipment":
    return (
     <div className="wizard-fade">
     {!selectedEquipment && data.class && (
      <div style={{
       marginBottom:12, padding:"10px 14px", borderRadius:10,
       background:"rgba(251,191,36,0.08)", border:"1px solid rgba(251,191,36,0.3)",
       fontSize:13, color:"#fbbf24", display:"flex", alignItems:"center", gap:8
      }}>
       <span>⚠</span>
       <span>{lang==="en"?"Class changed – please reselect your equipment package.":"Klasse geändert – bitte wähle dein Ausrüstungspaket neu."}</span>
      </div>
     )}
     <WizardEquipmentStep
      cls={data.class}
      stats={rolledStats ? (() => {
       const parseS = v => { const n=parseInt(v); return isNaN(n)?10:Math.max(1,Math.min(30,n)); };
       const base = { str:parseS(rolledStats.str),dex:parseS(rolledStats.dex),con:parseS(rolledStats.con),int:parseS(rolledStats.int),wis:parseS(rolledStats.wis),cha:parseS(rolledStats.cha) };

  const _previewRace = data.race;
  const _previewSr   = selectedSubrace;
  const raceSkills = [...(_previewRace?.skillProfs||[]), ...(_previewSr?.skillProfs||[])];
  raceSkills.forEach(sk => {
   if (!base.skills) base.skills = [];
   if (!base.skills.some(s => s.name === sk))
    base.skills = [...base.skills, { name:sk, proficient:true, source:"Rasse" }];
  });
  const extraHPperLevel = _previewSr?.extraHP ?? _previewRace?.extraHP ?? 0;
  if (extraHPperLevel > 0) base.hpBonus = (base.hpBonus||0) + extraHPperLevel;

       data.race?.traits?.forEach(t => {
        const re=/\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi; let m;
        const map={STR:"str",DEX:"dex",CON:"con",INT:"int",WIS:"wis",CHA:"cha"};
        while((m=re.exec(t))!==null){ const k=map[m[1].toUpperCase()]; if(k) base[k]=(base[k]||10)+parseInt(m[2]); }
       });
       if (selectedSubrace?.bonus) {
        const re=/\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi; let m;
        const map={STR:"str",DEX:"dex",CON:"con",INT:"int",WIS:"wis",CHA:"cha"};
        while((m=re.exec(selectedSubrace.bonus))!==null){ const k=map[m[1].toUpperCase()]; if(k) base[k]=(base[k]||10)+parseInt(m[2]); }
       }
       return base;
      })() : {str:10,dex:10,con:10,int:10,wis:10,cha:10}}
      theme={theme}
      selectedEquipment={selectedEquipment}
      onEquipmentChange={eq => setSelectedEquipment(eq)}
      bg={data.background}
      lang={lang}
     />
     </div>
    );

   case "summary":
    return <WizardSummary data={{...data, name:nameInput}} theme={theme}
     onFinish={handleFinish} onBack={handleBack}
     selectedSubrace={selectedSubrace} rolledStats={rolledStats}
     selectedEquipment={selectedEquipment}
     freeStatChoices={freeStatChoices}
     wizardLanguages={wizardLanguages}
     lang={lang} />;

   default: return null;
  }
 };

 return (
  <div style={{ minHeight:"100vh", background:"transparent", color:"white", padding:"12px 10px" }}>
   {/* Unterrassen-Modal */}
   {subraceModalRace && (
    <SubraceModal
     race={subraceModalRace}
     selectedSubrace={selectedSubrace}
     onSelect={sr => setSelectedSubrace(sr)}
     onClose={() => setSubraceModalRace(null)}
     theme={theme}
    />
   )}
   {/* Custom-Rasse Modal */}
   {showCustomRaceModal && (
    <CustomRaceModal
     editRace={editingCustomRace}
     onSave={handleSaveCustomRace}
     onClose={() => { setShowCustomRaceModal(false); setEditingCustomRace(null); }}
     theme={theme}
    />
   )}
   {/* Freie Auswahl Modal */}
   {freeChoiceModal && (
    <FreeChoiceModal
     choices={freeChoiceModal.choices}
     currentStats={freeChoiceModal.pendingCharData?.stats}

     onConfirm={vals => handleFreeChoiceConfirm(vals, freeChoiceModal.pendingCharData)}
     onClose={() => setFreeChoiceModal(null)}
     theme={theme}
    />
   )}
   <div style={{ maxWidth:800, margin:"0 auto" }}>
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
     <div>
      <div style={{ fontSize:22, fontWeight:900, color:theme.accent }}>⚔ {lang==="en"?"Create Character":"Charakter erstellen"}</div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.3)", marginTop:2 }}>
       {lang==="en"?`Step ${step+1} of ${steps.length}: ${currentStep.label}`:`Schritt ${step+1} von ${steps.length}: ${currentStep.label}`}
      </div>
     </div>
     <button onClick={onSkip}
      style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)",
       color:"rgba(255,255,255,0.35)", borderRadius:10, padding:"6px 14px",
       cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>
      {lang==="en"?"Skip →":"Überspringen →"}
     </button>
    </div>

    <WizardProgressBar step={step} total={steps.length} theme={theme} />

    <div style={{ display:"grid", gridTemplateColumns:`repeat(${steps.length},1fr)`, gap:4, marginBottom:20 }}>
     {steps.map((s,i) => {
      const isComplete = (() => {
       if (s.id === "name")       return nameInput.trim().length > 0;
       if (s.id === "class")      return !!data.class;
       if (s.id === "race")       return !!data.race;
       if (s.id === "background") return !!data.background;
       if (s.id === "alignment")  return !!data.alignment;
       if (s.id === "attributes") {
       const _statsSet = rolledStats && ["str","dex","con","int","wis","cha"].every(k => {
        const v = parseInt(rolledStats[k]); return !isNaN(v) && v >= 1;
       });
       const _reqFree = (data.race?.extraChoices?.freeStats||0) + (selectedSubrace?.extraChoices?.freeStats||0);
       const _hasFree = (freeStatChoices||[]).length >= _reqFree;
       return !!(_statsSet && _hasFree);
      }
       if (s.id === "equipment")  return !!selectedEquipment;
       return false;
      })();
      const isCurrent = i === step;
      return (
      <button key={s.id} onClick={() => { setStep(i); setDetailItem(null); }}
       style={{
        padding:"6px 4px", fontSize:10, fontWeight:700, borderRadius:8,
        border: isCurrent
         ? `2px solid ${theme.accent}`
         : isComplete
          ? `2px solid ${theme.accent}bb`
          : step >= steps.length-1
           ? "2px solid rgba(239,68,68,0.5)"
           : "1px solid rgba(255,255,255,0.08)",
        cursor: "pointer", fontFamily:"inherit",
        background: isCurrent ? `${theme.accent}22` : isComplete ? `${theme.accent}0e` : step >= steps.length-1 ? "rgba(239,68,68,0.08)" : "transparent",
        color: isCurrent ? theme.accent : isComplete ? theme.accent+"cc" : step >= steps.length-1 ? "#f87171" : "rgba(255,255,255,0.25)",
        whiteSpace:"nowrap", textOverflow:"ellipsis", overflow:"hidden",
        boxShadow: isComplete && !isCurrent ? `inset 0 0 0 1px ${theme.accent}44, 0 0 8px ${theme.accent}22` : "none",
       }}>
       {isComplete && !isCurrent ? "✓ " : ""}{s.emoji} {s.label}
      </button>
      );
     })}
    </div>

    <div style={{ ...S.card, minHeight:200 }} key={step}>
     {renderStep()}
    </div>

    {currentStep.id !== "summary" && (
     <div className="wizard-nav" style={{ display:"flex", gap:10, marginTop:14 }}>
      {step > 0 && (
       <button onClick={handleBack}
        style={{ background:"rgba(18,18,25,0.83)", color:"rgba(255,255,255,0.7)",
         border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"12px 20px",
         fontWeight:600, cursor:"pointer", fontSize:14, fontFamily:"inherit" }}>
        ← {lang==="en"?"Back":"Zurück"}
       </button>
      )}
      <button onClick={handleNext} disabled={!canNext() && (currentStep.id === "name" || currentStep.id === "race" || currentStep.id === "class")}
       style={{
        flex:1,
        background: canNext() ? `linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)` : "rgba(15,15,22,0.87)",
        color: canNext() ? "white" : "rgba(255,255,255,0.2)",
        border:"none", borderRadius:12, padding:"12px 0",
        fontWeight:800, cursor: canNext() ? "pointer" : "not-allowed",
        fontSize:15, fontFamily:"inherit", transition:"all 0.2s"
       }}>
       {step === steps.length - 2 ? (lang==="en"?"📋 Overview →":"📋 Übersicht →") : (lang==="en"?"Next →":"Weiter →")}
      </button>
     </div>
    )}
   </div>
  </div>
 );
}
