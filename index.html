// CHARACTER WIZARD
// ═══════════════════════════════════════════════════════

function CharacterWizard({ theme, onFinish, onSkip }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ name:"", race:null, class:null, background:null, alignment:null });
  const [detailItem, setDetailItem] = useState(null);
  const [nameInput, setNameInput] = useState("");
  const [selectedSubrace, setSelectedSubrace] = useState(null);
  const [rolledStats, setRolledStats] = useState(null);
  const [subraceModalRace, setSubraceModalRace] = useState(null);
  const [customRaces, setCustomRaces] = useState(() => loadCustomRaces());
  const [showCustomRaceModal, setShowCustomRaceModal] = useState(false);
  const [freeChoiceModal, setFreeChoiceModal] = useState(null); // {choices, pendingCharData}
  const [editingCustomRace, setEditingCustomRace] = useState(null);
  const [selectedEquipment, setSelectedEquipment] = useState(null);

  const allRaces = [...WIZARD_RACES, ...customRaces];

  const saveAndRefreshCustomRaces = races => { saveCustomRaces(races); setCustomRaces(races); };

  const handleSaveCustomRace = race => {
    const idx = customRaces.findIndex(r => r.id === race.id);
    const updated = idx >= 0 ? customRaces.map((r,i) => i===idx ? race : r) : [...customRaces, race];
    saveAndRefreshCustomRaces(updated);
    setShowCustomRaceModal(false);
    setEditingCustomRace(null);
  };

  const handleDeleteCustomRace = id => {
    saveAndRefreshCustomRaces(customRaces.filter(r => r.id !== id));
    if (data.race?.id === id) { set("race", null); setDetailItem(null); setSelectedSubrace(null); }
  };

  const steps = WIZARD_STEPS;
  const currentStep = steps[step];

  const set = (key, val) => setData(d => ({...d, [key]:val}));

  const handleNext = () => {
    if (step < steps.length - 1) {
      setStep(s => s + 1);
      setDetailItem(null);
    }
  };
  const handleBack = () => {
    if (step > 0) { setStep(s => s - 1); setDetailItem(null); }
  };

  const handleFinish = () => {
    const parseS = v => { const n = parseInt(v); return isNaN(n) ? 10 : Math.max(1,Math.min(30,n)); };
    const baseStats = rolledStats
      ? { str:parseS(rolledStats.str), dex:parseS(rolledStats.dex), con:parseS(rolledStats.con),
          int:parseS(rolledStats.int), wis:parseS(rolledStats.wis), cha:parseS(rolledStats.cha) }
      : { str:10, dex:10, con:10, int:10, wis:10, cha:10 };

    const cls   = data.class;
    const race  = data.race;
    const sr    = selectedSubrace;
    const bg    = data.background;

    // ── Attribut-Boni aus Rasse + Unterrasse ──────────────────────────────
    const stats = { ...baseStats };
    const applyStatBonus = (bonusStr) => {
      if (!bonusStr) return;
      const map = { STR:"str", DEX:"dex", CON:"con", INT:"int", WIS:"wis", CHA:"cha" };
      // Parst z.B. "CON +2", "STR +2, CON +1", "CHA +2, 2× frei +1" (frei = ignoriert)
      const re = /\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi;
      let m;
      while ((m = re.exec(bonusStr)) !== null) {
        const key = map[m[1].toUpperCase()];
        if (key) stats[key] = (stats[key] || 10) + parseInt(m[2]);
      }
    };
    // Rassentraits (z.B. "CON +2", "DEX +2", "STR +2, CON +1")
    if (race?.traits) {
      race.traits.forEach(t => applyStatBonus(t));
    }
    // Unterrassen-Bonus (z.B. "WIS +1", "STR +2")
    if (sr?.bonus) applyStatBonus(sr.bonus);

    // ── Speed aus Unterrasse überschreiben ────────────────────────────────
    let speed = 30;
    if (race?.speed) {
      const sp = parseInt(race.speed);
      if (!isNaN(sp)) speed = sp;
    }
    // Waldelfe: 35 ft
    if (sr?.traits) {
      sr.traits.forEach(t => {
        const m = t.match(/Speed\s+(\d+)\s*ft/i);
        if (m) speed = parseInt(m[1]);
      });
    }

    // ── Rettungswurf-Proficiencies aus Klasse (PHB-Regeln) ────────────────
    const CLASS_SAVES = {
      "Barbar":                  ["str","con"],
      "Barde":                   ["dex","cha"],
      "Kleriker":                ["wis","cha"],
      "Druide":                  ["int","wis"],
      "Kämpfer":                 ["str","con"],
      "Mönch":                   ["str","dex"],
      "Paladin":                 ["wis","cha"],
      "Waldläufer":              ["str","dex"],
      "Schurke":                 ["dex","int"],
      "Zauberer (Magier)":       ["int","wis"],
      "Hexenmeister":            ["wis","cha"],
      "Zauberwirker (Sorcerer)": ["con","cha"],
    };
    const saveProficiencies = { str:false, dex:false, con:false, int:false, wis:false, cha:false };
    if (cls) {
      const saves = CLASS_SAVES[cls.name] || [];
      saves.forEach(s => { saveProficiencies[s] = true; });
    }

    // ── Fertigkeits-Proficiencies aus Klasse (2 Stück, PHB-typisch) ───────
    const CLASS_SKILLS = {
      "Barbar":                  ["Athletik","Einschüchtern","Natur","Wahrnehmung","Überleben","Mit Tieren umgehen"],
      "Barde":                   ["Akrobatik","Athletik","Auftreten","Überzeugung","Geschichte","Heimlichkeit","Täuschen","Wahrnehmung","Einschüchtern"],
      "Kleriker":                ["Geschichte","Einblick","Medizin","Überzeugung","Religion"],
      "Druide":                  ["Arkane Kunde","Mit Tieren umgehen","Einblick","Medizin","Natur","Wahrnehmung","Religion","Überleben"],
      "Kämpfer":                 ["Akrobatik","Athletik","Geschichte","Einblick","Einschüchtern","Wahrnehmung","Überleben"],
      "Mönch":                   ["Akrobatik","Athletik","Geschichte","Einblick","Religion","Heimlichkeit"],
      "Paladin":                 ["Athletik","Einblick","Einschüchtern","Medizin","Überzeugung","Religion"],
      "Waldläufer":              ["Mit Tieren umgehen","Athletik","Einblick","Ermitteln","Natur","Wahrnehmung","Heimlichkeit","Überleben"],
      "Schurke":                 ["Akrobatik","Athletik","Täuschen","Einblick","Einschüchtern","Ermitteln","Wahrnehmung","Auftreten","Überzeugung","Heimlichkeit","Taschendiebstahl"],
      "Zauberer (Magier)":       ["Arkane Kunde","Geschichte","Einblick","Ermitteln","Medizin","Religion"],
      "Hexenmeister":            ["Arkane Kunde","Täuschen","Geschichte","Einschüchtern","Natur","Religion"],
      "Zauberwirker (Sorcerer)": ["Arkane Kunde","Täuschen","Einblick","Einschüchtern","Überzeugung","Religion"],
    };
    const skillProficiencies = Object.fromEntries(SKILLS.map(s => [s.name, false]));

    // Standard: 2 typische Fertigkeiten der Klasse (erste zwei aus der Liste)
    if (cls) {
      const pool = CLASS_SKILLS[cls.name] || [];
      pool.slice(0, 2).forEach(sk => {
        if (skillProficiencies.hasOwnProperty(sk)) skillProficiencies[sk] = true;
      });
    }

    // Fertigkeiten aus Rassen-Traits (z.B. Elf: Wahrnehmung, Halbork: Einschüchtern)
    const RACE_SKILL_MAP = {
      "Elf":         ["Wahrnehmung"],
      "Halbork":     ["Einschüchtern"],
    };
    if (race) {
      const raceSkills = RACE_SKILL_MAP[race.name] || [];
      raceSkills.forEach(sk => { if (skillProficiencies.hasOwnProperty(sk)) skillProficiencies[sk] = true; });
    }

    // Hintergrund-Fertigkeiten (aus proficiencies-Array)
    if (bg?.proficiencies) {
      // Mapping von Deutsch-Strings auf SKILLS-Namen
      const BG_SKILL_NORMALIZE = {
        "Einblick": "Motiv erkennen",
        "Ermitteln": "Untersuchen",
      };
      bg.proficiencies.forEach(p => {
        const normalized = BG_SKILL_NORMALIZE[p] || p;
        if (skillProficiencies.hasOwnProperty(normalized)) skillProficiencies[normalized] = true;
        else if (skillProficiencies.hasOwnProperty(p)) skillProficiencies[p] = true;
      });
    }

    // ── Sprachen als Notiz im Notes-Feld ──────────────────────────────────
    const languages = [];
    if (race?.languages) languages.push(...race.languages);
    // Unterrasse: Hochelf +1 Sprache
    if (sr?.name?.includes("Hochelf")) languages.push("+ eine weitere Sprache (Hochelf)");

    // ── Zauberfähigkeit aus Klasse ─────────────────────────────────────────
    const CLASS_SPELLCASTING = {
      "Barde":                   { ability:"CHA", dc: 8, bonus: 2 },
      "Kleriker":                { ability:"WIS", dc: 8, bonus: 2 },
      "Druide":                  { ability:"WIS", dc: 8, bonus: 2 },
      "Hexenmeister":            { ability:"CHA", dc: 8, bonus: 2 },
      "Paladin":                 { ability:"CHA", dc: 8, bonus: 2 },
      "Waldläufer":              { ability:"WIS", dc: 8, bonus: 2 },
      "Zauberer (Magier)":       { ability:"INT", dc: 8, bonus: 2 },
      "Zauberwirker (Sorcerer)": { ability:"CHA", dc: 8, bonus: 2 },
    };
    const spellData = cls ? CLASS_SPELLCASTING[cls.name] || null : null;

    // ── HP: Klassen-Maximun auf Stufe 1 ───────────────────────────────────
    const HIT_DIE_MAX = { "1d12":12, "1d10":10, "1d8":8, "1d6":6 };
    const hitDie = cls?.hitDie || "1d8";
    const conMod = Math.floor((stats.con - 10) / 2);
    const maxHP = (HIT_DIE_MAX[hitDie] || 8) + conMod;

    // ── Features aus Rasse & Unterrasse als Feature-Einträge ──────────────
    const featureList = [];

    // Rassenmerkmale die mechanisch relevant sind
    const RACE_FEATURES = {
      "Halbork": [
        { keyword:"Unbeugsame Ausdauer", type:"passive", note:"Einmal pro Lange Rast: auf 1 HP statt 0 HP fallen", desc:"Wenn du auf 0 HP fällst, kannst du einmal pro langen Rast stattdessen auf 1 HP fallen." },
        { keyword:"Wilde Angriffe", type:"bonus_damage", value:"1W", note:"Kritische Treffer: +1 Schadenswürfel", desc:"Bei einem kritischen Treffer mit einer Nahkampfwaffe würfelst du einen zusätzlichen Schadenswürfel." },
      ],
      "Elf": [
        { keyword:"Fey Ancestry", type:"advantage", target:"", note:"Vorteil gegen Bezauberung; Immunität gegen Schlaf", desc:"Du hast Vorteil auf Rettungswürfe gegen Bezauberung und kannst nicht magisch eingeschläfert werden." },
      ],
      "Halb-Elf": [
        { keyword:"Fey Ancestry", type:"advantage", target:"", note:"Vorteil gegen Bezauberung; Immunität gegen Schlaf", desc:"Du hast Vorteil auf Rettungswürfe gegen Bezauberung und kannst nicht magisch eingeschläfert werden." },
      ],
      "Zwerg": [
        { keyword:"Zwergische Widerstandsfähigkeit", type:"advantage", target:"", note:"Vorteil auf Rettungswürfe gegen Gift; Resistenz gegen Giftschaden", desc:"Du hast Vorteil auf Rettungswürfe gegen Gift und Resistenz gegen Giftschaden." },
      ],
      "Halbling": [
        { keyword:"Lucky", type:"passive", note:"Gewürfelte 1 auf d20 immer neu würfeln", desc:"Wenn du eine 1 auf einem Angriffswurf, Rettungswurf oder Fertigkeitswurf würfelst, kannst du den Würfel neu würfeln und musst das neue Ergebnis verwenden." },
        { keyword:"Mutig", type:"advantage", target:"", note:"Vorteil auf Rettungswürfe gegen Angst", desc:"Du hast Vorteil auf Rettungswürfe gegen Erschrecken." },
      ],
    };

    const raceName = race?.name || "";
    const raceFeatures = RACE_FEATURES[raceName] || [];
    raceFeatures.forEach(f => featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE, ...f, active: true })));

    // Hügelzwerg: +1 HP pro Stufe als passive Note
    if (sr?.name?.includes("Hügelzwerg")) {
      featureList.push({ ...DEFAULT_FEATURE,
        keyword:"Zwergische Zähigkeit", type:"passive",
        note:"+1 TP pro Stufe (bereits in Max-TP eingerechnet ab Level 2)",
        desc:"Deine Trefferpunktmaximum erhöht sich um 1, und es erhöht sich um weitere 1 jedes Mal, wenn du eine Stufe aufsteigst.",
        active:true });
    }

    // Halbork: Einschüchtern bereits in Fertigkeiten – ggf. als Feature vermerken
    // Barbar Rage als Feature
    const monkLevel = cls?.name === "Mönch" ? (charData?.classes?.[0]?.level || 1) : 1;
    const CLASS_FEATURES = {
      "Barbar": [
        { keyword:"Kampfrausch (Rage)", type:"limited_use", maxUses:2, resetOn:"long",
          note:"Bonus-Aktion · Vorteil STR-Angriffe · +2 Schaden · Resistenz Hieb/Stich/Wucht",
          desc:"Als Bonus-Aktion kannst du in den Kampfrausch eintreten. Du hast Vorteil auf STR-Würfe, +2 Schadensbonus, und Resistenz gegen Hieb-, Stich- und Wuchtschaden. Endet wenn du keinen Angriff machst oder keinen Schaden nimmst." },
      ],
      "Schurke": [
        { keyword:"Meucheln (Sneak Attack)", type:"sneak_attack", value:"1W6",
          note:"1× pro Runde · braucht Vorteil oder verbündeten Angreifer",
          desc:"Einmal pro Runde kannst du 1W6 Extraschaden verursachen wenn du Vorteil hast oder ein Verbündeter deinen Feind bedrängt." },
      ],
      "Mönch": [
        { keyword:"Ki-Pool", type:"ki_pool", maxUses: monkLevel, resetOn:"short",
          note:`${monkLevel} Ki-Punkte (= Level) · Reset nach kurzer oder langer Rast`,
          desc:"Ki ist deine innere Energie. Du gibst Ki-Punkte aus um besondere Fähigkeiten zu aktivieren." },
        // Level-2 Ki-Fähigkeiten direkt als ki_ability eintragen
        { keyword:"Flurry of Blows",  type:"ki_ability", kiCost:1, kiAction:"Bonus-Aktion", active:true,
          desc:"Nach einem Angriff: 2 zusätzliche unbewaffnete Angriffe als Bonus-Aktion." },
        { keyword:"Patient Defense",  type:"ki_ability", kiCost:1, kiAction:"Bonus-Aktion", active:true,
          desc:"Nimm die Dodge-Aktion als Bonus-Aktion (Angreifer haben Nachteil auf dich)." },
        { keyword:"Step of the Wind", type:"ki_ability", kiCost:1, kiAction:"Bonus-Aktion", active:true,
          desc:"Dash oder Disengage als Bonus-Aktion. Sprungweite verdoppelt." },
      ],
      "Paladin": [
        { keyword:"Göttlicher Schlag (Divine Smite)", type:"passive",
          note:"Reaktion nach Treffer · kostet Zauberslot · 2W8 + 1W8/Slot Strahlenschaden",
          desc:"Wenn du einen Angriff triffst, kannst du einen Zauberslot verbrauchen um 2W8 (+1W8 pro Slot über dem 1.) extra Strahlenschaden zuzufügen." },
      ],
      "Hexenmeister": [
        { keyword:"Eldritch Blast", type:"passive",
          note:"Immer verfügbar · 1W10 Kraftschaden · Reichweite 36 m",
          desc:"Dein stärkster Zaubertrick: 1W10 Kraftschaden auf 36 Meter Reichweite." },
      ],
      "Barde": [
        { keyword:"Bardic Inspiration", type:"limited_use", maxUses:Math.max(1,Math.floor(((charData?.stats?.cha||10)-10)/2)), resetOn:"long",
          note:"Bonus-Aktion · W6 Inspirationswürfel · 1 Verbündeter profitiert",
          desc:"Als Bonus-Aktion kannst du einem Verbündeten in 18 m einen Inspirationswürfel (W6) geben. Er kann ihn auf einen Angriff, Fähigkeitswurf oder Rettungswurf addieren." },
      ],
      "Kleriker": [
        { keyword:"Kanalisierte Gottheit", type:"limited_use", maxUses:1, resetOn:"short",
          note:"1× pro Kurze Rast · Domain-spezifischer Effekt",
          desc:"Du kannst göttliche Energie kanalisieren. Der genaue Effekt hängt von deiner Domain ab." },
      ],
      "Druide": [
        { keyword:"Wild Shape", type:"limited_use", maxUses:2, resetOn:"short",
          note:"2× pro Kurze Rast · Bonus-Aktion · in Tier verwandeln",
          desc:"Als Bonus-Aktion kannst du dich in ein Tier verwandeln das du schon gesehen hast." },
      ],
    };

    const classFeatures = cls ? (CLASS_FEATURES[cls.name] || []) : [];
    classFeatures.forEach(f => featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE, ...f, active: true })));

    // ── Zusammenbauen ──────────────────────────────────────────────────────
    const raceName2 = selectedSubrace
      ? `${race?.name || ""} (${selectedSubrace.name})`
      : race?.name || "";

    const notes = languages.length > 0
      ? `Sprachen: ${[...new Set(languages)].join(", ")}`
      : "";

    // ── Ausrüstung verarbeiten ─────────────────────────────────────────────
    const eq = selectedEquipment;
    // ── Ausrüstung ins Inventar – mit korrektem Handsystem ────────────────
    const inventoryFromEquip = [];

    // Rüstung: immer ausgerüstet (braucht keine Hände)
    if (eq?.armorId && eq.armorId !== "unarmored") {
      const armorObj = ARMOR_CATALOG.find(a => a.id === eq.armorId);
      if (armorObj) inventoryFromEquip.push({
        ...DEFAULT_ITEM, name: armorObj.name, type:"armor", equipped:true, qty:1,
        armor:{ ac: armorObj.baseAC, stealthDisadv: armorObj.stealthDisadv, bonus:0 },
      });
    }

    // Waffen + Schild: Handsystem – max 2 Hände
    // Sammle alle Items die Hände brauchen
    const handItems = [];
    if (eq?.hasShield) handItems.push({ kind:"shield" });
    (eq?.weaponIds || []).forEach(wid => {
      const w = WEAPON_CATALOG.find(x => x.id === wid);
      if (w) handItems.push({ kind:"weapon", w });
    });

    // Sortiere: Zweihänder zuerst (damit ein einzelner Zweihänder korrekt ausgerüstet wird),
    // dann Einhandwaffen, dann Schild
    handItems.sort((a, b) => {
      const handsOf = item => {
        if (item.kind === "shield") return 1;
        if (item.kind === "weapon") {
          return (item.w.props||[]).some(p => p === "Zweihändig") ? 2 : 1;
        }
        return 0;
      };
      return handsOf(b) - handsOf(a);
    });

    let handsUsed = 0;
    handItems.forEach(item => {
      if (item.kind === "shield") {
        const fits = handsUsed + 1 <= 2;
        inventoryFromEquip.push({
          ...DEFAULT_ITEM, name:"Schild", type:"shield", equipped: fits, qty:1,
          shield:{ acBonus:2 },
        });
        if (fits) handsUsed += 1;
      } else if (item.kind === "weapon") {
        const w = item.w;
        const twoH = (w.props||[]).some(p => p === "Zweihändig");
        const hands = twoH ? 2 : 1;
        const fits = handsUsed + hands <= 2;
        inventoryFromEquip.push({
          ...DEFAULT_ITEM, name: w.name, type:"weapon", equipped: fits, qty:1,
          weapon:{ damage: w.damage, damageType: w.type, scale: w.scale, bonus:0, props: w.props, range: w.range === "fern" ? "30/120 ft" : "" },
        });
        if (fits) handsUsed += hands;
      }
    });

    // AC: nur ausgerüstete Items zählen
    const equippedArmorItem = inventoryFromEquip.find(x => x.type === "armor" && x.equipped);
    const equippedShieldItem = inventoryFromEquip.find(x => x.type === "shield" && x.equipped);
    const computedAC = (() => {
      const dex = Math.floor((stats.dex - 10) / 2);
      const con = Math.floor((stats.con - 10) / 2);
      const wis = Math.floor((stats.wis - 10) / 2);
      const shieldBonus = equippedShieldItem ? (equippedShieldItem.shield?.acBonus || 2) : 0;
      if (!equippedArmorItem) {
        // Unarmored
        if (cls?.name === "Barbar") return 10 + dex + con + shieldBonus;
        if (cls?.name === "Mönch")  return 10 + dex + wis + shieldBonus;
        return 10 + dex + shieldBonus;
      }
      const baseAC = equippedArmorItem.armor?.ac || 10;
      const armorObj = ARMOR_CATALOG.find(a => a.name === equippedArmorItem.name);
      if (armorObj?.addDex) {
        const effectiveDex = armorObj.maxDex !== null ? Math.min(dex, armorObj.maxDex ?? 99) : dex;
        return baseAC + effectiveDex + shieldBonus;
      }
      return baseAC + shieldBonus;
    })();

    const charData = {
      name:       nameInput.trim() || "Unbenannt",
      race:       raceName2,
      background: bg?.name || "",
      alignment:  data.alignment?.name || "",
      classes:    [{ name: cls?.name || "", subclass:"", level:1 }],
      hitDice:    hitDie,
      stats,
      maxHP:      Math.max(1, maxHP),
      currentHP:  Math.max(1, maxHP),
      speed,
      ac:         computedAC,
      saveProficiencies,
      skillProficiencies,
      featureList,
      notes,
      inventory:  inventoryFromEquip,
      ...(spellData ? {
        spellcastingAbility: spellData.ability,
        spellSaveDC:         8 + 2 + Math.floor((stats[spellData.ability.toLowerCase()] - 10) / 2),
        spellAttackBonus:    2 + Math.floor((stats[spellData.ability.toLowerCase()] - 10) / 2),
      } : {}),
    };
    // ── Freie Auswahlen prüfen ─────────────────────────────────────────────
    const freeChoices = detectFreeChoices(race, sr, bg);
    if (freeChoices.length > 0) {
      setFreeChoiceModal({ choices: freeChoices, pendingCharData: charData });
      return;
    }

    onFinish(charData);
  };

  const handleFreeChoiceConfirm = (choiceValues, pendingCharData) => {
    const updated = JSON.parse(JSON.stringify(pendingCharData));
    Object.entries(choiceValues).forEach(([id, val]) => {
      // Stat bonuses
      if (typeof val === "object" && !Array.isArray(val)) {
        Object.entries(val).forEach(([k, bonus]) => {
          if (bonus > 0) updated.stats[k] = (updated.stats[k] || 10) + bonus;
        });
        // If CON changed, adjust HP
        if (val.con > 0) { updated.maxHP += val.con; updated.currentHP += val.con; }
      }
      // Skills
      if (Array.isArray(val) && id.includes("skill")) {
        val.forEach(sk => { if (updated.skillProficiencies?.[sk] !== undefined) updated.skillProficiencies[sk] = true; });
      }
      // Languages – append to notes
      if (Array.isArray(val) && id.includes("lang")) {
        const existing = updated.notes || "";
        const langStr  = val.join(", ");
        const langLine = `Sprachen (zusätzlich): ${langStr}`;
        updated.notes = existing
          ? existing.replace(/Sprachen:.*/, m => m + ", " + langStr) || existing + "\n" + langLine
          : langLine;
      }
    });
    setFreeChoiceModal(null);
    onFinish(updated);
  };

  const canNext = () => {
    if (currentStep.id === "name") return nameInput.trim().length > 0;
    if (currentStep.id === "class") return !!data.class;
    if (currentStep.id === "race") return !!data.race;
    return true;
  };

  const recommendedBackgrounds = WIZARD_BACKGROUNDS
    .filter(bg => {
      const classMatch = data.class && bg.suggestedFor?.classes?.some(c => data.class.name.includes(c) || c.includes(data.class.name));
      const raceMatch  = data.race  && bg.suggestedFor?.races?.some(r => data.race.name.includes(r)   || r.includes(data.race.name));
      return classMatch || raceMatch;
    })
    .map(bg => bg.name);

  const recommendedRaces = data.class
    ? WIZARD_RACES
        .filter(r => r.suggestedFor?.classes?.some(c => data.class.name.includes(c) || c.includes(data.class.name)))
        .map(r => r.name)
    : [];

  const S = {
    card: { background:theme.card, borderRadius:16, border:`1px solid ${theme.border}`, padding:16 },
    input: { background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10,
      padding:"10px 14px", color:"white", fontSize:16, outline:"none", width:"100%", fontFamily:"inherit" },
  };

  const renderStep = () => {
    switch(currentStep.id) {
      case "name":
        return (
          <div className="wizard-fade">
            <div style={{ fontSize:20, fontWeight:900, color:theme.accent, marginBottom:8 }}>✏️ Wie heißt dein Charakter?</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:24 }}>
              Gib deinem Charakter einen Namen. Du kannst ihn später jederzeit ändern.
            </div>
            <input type="text" value={nameInput} onChange={e => setNameInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && canNext() && handleNext()}
              placeholder="z.B. Aldric der Mutige..." autoFocus
              style={{...S.input, fontSize:22, fontWeight:700, padding:"14px 18px", marginBottom:20}} />
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.25)", lineHeight:1.7 }}>
              💡 Tipp: Überlege dir einen Namen, der zur Rasse und Herkunft deines Charakters passt.
            </div>
          </div>
        );

      case "race":
      case "class":
      case "background":
      case "alignment": {
        const dataMap = { race:allRaces, class:WIZARD_CLASSES, background:WIZARD_BACKGROUNDS, alignment:WIZARD_ALIGNMENTS };
        const typeMap = { race:"race", class:"class", background:"background", alignment:"alignment" };
        const titleMap = {
          race:"🌍 Wähle deine Rasse",
          class:"⚔️ Wähle deine Klasse",
          background:"📖 Wähle deinen Hintergrund",
          alignment:"☯️ Wähle deine Gesinnung",
        };
        const subtitleMap = {
          race: data.class ? `Basierend auf deiner Klassenwahl werden passende Rassen hervorgehoben.` : "Die Rasse bestimmt deine angeborenen Fähigkeiten und Attribute.",
          class:"Die Klasse ist dein Beruf als Abenteurer – sie bestimmt deinen Spielstil.",
          background:data.class || data.race ? `Basierend auf deiner Wahl werden passende Hintergründe hervorgehoben.` : "Woher kommst du? Was hast du vor deiner Abenteurerlaufbahn gemacht?",
          alignment:"Wie verhält sich dein Charakter moralisch und ethisch?",
        };
        const items = dataMap[currentStep.id];
        const type = typeMap[currentStep.id];
        const selected = data[currentStep.id];
        const recNames = currentStep.id === "background" ? recommendedBackgrounds
                       : currentStep.id === "race"       ? recommendedRaces
                       : null;
        return (
          <div className="wizard-fade">
            <div style={{ fontSize:18, fontWeight:900, color:theme.accent, marginBottom:4 }}>{titleMap[currentStep.id]}</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:16 }}>{subtitleMap[currentStep.id]}</div>
            {currentStep.id === "race" && recNames && recNames.length > 0 && (
              <div style={{ fontSize:12, color:"rgba(74,222,128,0.8)", background:"rgba(74,222,128,0.06)",
                border:"1px solid rgba(74,222,128,0.2)", borderRadius:9, padding:"7px 12px", marginBottom:12 }}>
                ✦ Empfohlen für {data.class.name}: <strong>{recNames.join(", ")}</strong>
              </div>
            )}
            {currentStep.id === "background" && recNames && recNames.length > 0 && (
              <div style={{ fontSize:12, color:"rgba(74,222,128,0.8)", background:"rgba(74,222,128,0.06)",
                border:"1px solid rgba(74,222,128,0.2)", borderRadius:9, padding:"7px 12px", marginBottom:12 }}>
                ✦ Empfohlen für{data.class ? ` ${data.class.name}` : ""}{data.race ? ` · ${data.race.name}` : ""}: <strong>{recNames.join(", ")}</strong>
              </div>
            )}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, alignItems:"start" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:6, maxHeight:480, overflowY:"auto", paddingRight:4 }}>
                {items.map(item => (
                  <div key={item.name} style={{ position:"relative" }}>
                    <WizardCard item={item}
                      selected={detailItem || selected}
                      onSelect={it => {
                        setDetailItem(it);
                        set(currentStep.id, it);
                        if (currentStep.id === "race") {
                          setSelectedSubrace(null);
                          if (it.subraces && it.subraces.length > 1) {
                            setSubraceModalRace(it);
                          } else {
                            setSubraceModalRace(null);
                          }
                        }
                      }}
                      theme={theme}
                      showTip={currentStep.id === "race"}
                      recommendedNames={recNames} />
                    {currentStep.id === "race" && item.isCustom && (
                      <div style={{ position:"absolute", top:6, right:6, display:"flex", gap:4 }}>
                        <button onClick={e => { e.stopPropagation(); setEditingCustomRace(item); setShowCustomRaceModal(true); }}
                          style={{ background:"rgba(251,191,36,0.2)", border:"1px solid rgba(251,191,36,0.4)",
                            borderRadius:7, padding:"3px 7px", cursor:"pointer", fontSize:11,
                            color:"#fbbf24", fontFamily:"inherit", fontWeight:700 }}>✏</button>
                        <button onClick={e => { e.stopPropagation(); handleDeleteCustomRace(item.id); }}
                          style={{ background:"rgba(239,68,68,0.2)", border:"1px solid rgba(239,68,68,0.4)",
                            borderRadius:7, padding:"3px 7px", cursor:"pointer", fontSize:11,
                            color:"#f87171", fontFamily:"inherit", fontWeight:700 }}>✕</button>
                      </div>
                    )}
                  </div>
                ))}
                {currentStep.id === "race" && (
                  <button onClick={() => { setEditingCustomRace(null); setShowCustomRaceModal(true); }}
                    style={{ marginTop:4, padding:"11px 14px", borderRadius:14, cursor:"pointer",
                      fontFamily:"inherit", fontWeight:700, fontSize:13,
                      background:"rgba(255,255,255,0.03)",
                      border:"2px dashed rgba(255,255,255,0.15)",
                      color:"rgba(255,255,255,0.4)",
                      display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                      transition:"all 0.2s",
                    }}>
                    <span style={{ fontSize:18 }}>✨</span> Eigene Rasse erstellen
                  </button>
                )}
              </div>
              <div style={{ ...S.card, background:"rgba(255,255,255,0.02)", maxHeight:480, overflowY:"auto" }}>
                <WizardDetail item={detailItem || selected} theme={theme} type={type}
                  onOpenSubraceModal={currentStep.id === "race" ? (race) => setSubraceModalRace(race) : undefined}
                  selectedSubrace={currentStep.id === "race" ? selectedSubrace : undefined} />
              </div>
            </div>
          </div>
        );
      }

      case "attributes":
        return (
          <div className="wizard-fade">
            <div style={{ fontSize:18, fontWeight:900, color:theme.accent, marginBottom:4 }}>💪 Attribute</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:16 }}>
              Lerne was jedes Attribut bedeutet, trage Werte manuell ein oder würfle sie direkt hier.
            </div>
            <AttributeExplainer theme={theme} chosenClass={data.class}
              onStatsChange={vals => setRolledStats(vals)} />
          </div>
        );

      case "equipment":
        return (
          <WizardEquipmentStep
            cls={data.class}
            stats={rolledStats ? (() => {
              const parseS = v => { const n=parseInt(v); return isNaN(n)?10:Math.max(1,Math.min(30,n)); };
              const base = { str:parseS(rolledStats.str),dex:parseS(rolledStats.dex),con:parseS(rolledStats.con),int:parseS(rolledStats.int),wis:parseS(rolledStats.wis),cha:parseS(rolledStats.cha) };
              // apply race bonuses for live preview
              if (data.race?.traits) data.race.traits.forEach(t => {
                const re=/\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi; let m;
                const map={STR:"str",DEX:"dex",CON:"con",INT:"int",WIS:"wis",CHA:"cha"};
                while((m=re.exec(t))!==null){ const k=map[m[1].toUpperCase()]; if(k) base[k]=(base[k]||10)+parseInt(m[2]); }
              });
              if (selectedSubrace?.bonus) {
                const re=/\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi; let m;
                const map={STR:"str",DEX:"dex",CON:"con",INT:"int",WIS:"wis",CHA:"cha"};
                while((m=re.exec(selectedSubrace.bonus))!==null){ const k=map[m[1].toUpperCase()]; if(k) base[k]=(base[k]||10)+parseInt(m[2]); }
              }
              return base;
            })() : {str:10,dex:10,con:10,int:10,wis:10,cha:10}}
            theme={theme}
            selectedEquipment={selectedEquipment}
            onEquipmentChange={eq => setSelectedEquipment(eq)}
          />
        );

      case "summary":
        return <WizardSummary data={{...data, name:nameInput}} theme={theme}
          onFinish={handleFinish} onBack={handleBack}
          selectedSubrace={selectedSubrace} rolledStats={rolledStats}
          selectedEquipment={selectedEquipment} />;

      default: return null;
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:theme.bg, color:"white", padding:"12px 10px" }}>
      {/* Unterrassen-Modal */}
      {subraceModalRace && (
        <SubraceModal
          race={subraceModalRace}
          selectedSubrace={selectedSubrace}
          onSelect={sr => setSelectedSubrace(sr)}
          onClose={() => setSubraceModalRace(null)}
          theme={theme}
        />
      )}
      {/* Custom-Rasse Modal */}
      {showCustomRaceModal && (
        <CustomRaceModal
          editRace={editingCustomRace}
          onSave={handleSaveCustomRace}
          onClose={() => { setShowCustomRaceModal(false); setEditingCustomRace(null); }}
          theme={theme}
        />
      )}
      {/* Freie Auswahl Modal */}
      {freeChoiceModal && (
        <FreeChoiceModal
          choices={freeChoiceModal.choices}
          currentStats={freeChoiceModal.pendingCharData?.stats}
          currentSkillProfs={freeChoiceModal.pendingCharData?.skillProficiencies}
          onConfirm={vals => handleFreeChoiceConfirm(vals, freeChoiceModal.pendingCharData)}
          onClose={() => setFreeChoiceModal(null)}
          theme={theme}
        />
      )}
      <div style={{ maxWidth:800, margin:"0 auto" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
          <div>
            <div style={{ fontSize:22, fontWeight:900, color:theme.accent }}>⚔ Charakter erstellen</div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.3)", marginTop:2 }}>
              Schritt {step+1} von {steps.length}: {currentStep.label}
            </div>
          </div>
          <button onClick={onSkip}
            style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)",
              color:"rgba(255,255,255,0.35)", borderRadius:10, padding:"6px 14px",
              cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>
            Überspringen →
          </button>
        </div>

        <WizardProgressBar step={step} total={steps.length} theme={theme} />

        <div style={{ display:"grid", gridTemplateColumns:`repeat(${steps.length},1fr)`, gap:4, marginBottom:20 }}>
          {steps.map((s,i) => (
            <button key={s.id} onClick={() => { if(i < step) { setStep(i); setDetailItem(null); } }}
              style={{
                padding:"6px 4px", fontSize:10, fontWeight:700, borderRadius:8,
                border:`1px solid ${i === step ? `${theme.accent}66` : "rgba(255,255,255,0.06)"}`,
                cursor: i < step ? "pointer" : "default", fontFamily:"inherit",
                background: i === step ? `${theme.accent}18` : i < step ? "rgba(255,255,255,0.04)" : "transparent",
                color: i === step ? theme.accent : i < step ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.2)",
                whiteSpace:"nowrap", textOverflow:"ellipsis", overflow:"hidden",
              }}>
              {s.emoji} {s.label}
            </button>
          ))}
        </div>

        <div style={{ ...S.card, minHeight:200 }} key={step}>
          {renderStep()}
        </div>

        {currentStep.id !== "summary" && (
          <div className="wizard-nav" style={{ display:"flex", gap:10, marginTop:14 }}>
            {step > 0 && (
              <button onClick={handleBack}
                style={{ background:"rgba(255,255,255,0.07)", color:"rgba(255,255,255,0.7)",
                  border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"12px 20px",
                  fontWeight:600, cursor:"pointer", fontSize:14, fontFamily:"inherit" }}>
                ← Zurück
              </button>
            )}
            <button onClick={handleNext} disabled={!canNext() && (currentStep.id === "name" || currentStep.id === "race" || currentStep.id === "class")}
              style={{
                flex:1,
                background: canNext() ? `linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)` : "rgba(255,255,255,0.05)",
                color: canNext() ? "white" : "rgba(255,255,255,0.2)",
                border:"none", borderRadius:12, padding:"12px 0",
                fontWeight:800, cursor: canNext() ? "pointer" : "not-allowed",
                fontSize:15, fontFamily:"inherit", transition:"all 0.2s"
              }}>
              {step === steps.length - 2 ? "📋 Übersicht →" : "Weiter →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const THEMES = [
  { id:"black",  label:"Dungeon-Schwarz",  bg:"#0f1117", accent:"#fbbf24", card:"rgba(255,255,255,0.04)", border:"rgba(255,255,255,0.08)" },
  { id:"blue",   label:"Mitternachtsblau", bg:"#0a0f1e", accent:"#60a5fa", card:"rgba(255,255,255,0.04)", border:"rgba(96,165,250,0.12)"  },

function autoClassifyFeature(f) {
  const text = ((f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"")).toLowerCase();

  // ── 1. Schon als Ressourcen-Pool klassifiziert – kiAbilities ergänzen wenn leer ──
  if (f.type === "ki_pool") {
    if (!f.kiAbilities || f.kiAbilities.length === 0) {
      // Suche passenden Pool anhand des Textes
      for (const pool of Object.values(KNOWN_RESOURCE_POOLS)) {
        if (pool.type === "ki_pool" && pool.keywords.some(kw => text.includes(kw))) {
          return { ...f, kiAbilities: pool.abilities, resetOn: f.resetOn || pool.resetOn };
        }
      }
    }
    return f;
  }
  if (f.type === "limited_use") return f;

  // ── 2. Ressourcen-Pool erkennen ──
  for (const [poolName, pool] of Object.entries(KNOWN_RESOURCE_POOLS)) {
    if (pool.keywords.some(kw => text.includes(kw))) {
      const maxUses = f.maxUses || 1;
      return {
        ...f,
        type: pool.type,
        resetOn: pool.resetOn,
        maxUses,
        usesLeft: f.usesLeft ?? maxUses,
        kiAbilities: pool.abilities.length > 0 ? pool.abilities : undefined,
      };
    }
  }

  // ── 3. Allgemeine Erkennung begrenzte Nutzung ──
  const limitedPatterns = [
    /einmal pro (langen?|kurzen?) rast/i,
    /(\d+)×? pro (langen?|kurzen?) rast/i,
    /once per (long|short) rest/i,
    /pro tag/i, /per day/i,
    /einmal täglich/i,
    /(\d+)× pro tag/i,
    /recharges? (on a|after) (long|short)/i,
    /lädt sich.*rast.*auf/i,
    /nach.*rast.*zurück/i,
    /kann.*einmal.*pro/i,
    /einmal pro runde/i,
    /once per turn/i,
  ];
  const isLimited = limitedPatterns.some(p => p.test(text));
  if (!isLimited) return f;

  let resetOn = "long";
  if (/kurzen? rast|short rest/i.test(text)) resetOn = "short";

  let maxUses = 1;
  const countMatch = text.match(/(\d+)[×x]?\s*pro/i) || text.match(/(\d+)\s*mal/i);
  if (countMatch) maxUses = Math.min(parseInt(countMatch[1]), 20);

  return { ...f, type:"limited_use", maxUses, usesLeft: f.usesLeft ?? maxUses, resetOn };
}

function syncKiAbilities(featureList, classes) {
  const list = [...featureList];
  const charLevel = (classes||[]).reduce((s,c)=>s+(c.level||0),0)||1;

  // Welcher Pool-Typ ist vorhanden?
  for (const pool of Object.values(KNOWN_RESOURCE_POOLS)) {
    if (pool.type !== "ki_pool" || !pool.abilities.length) continue;
    // Prüfen ob dieser Pool im featureList vorhanden ist
    const hasPool = list.some(f => f.type==="ki_pool" &&
      pool.keywords.some(kw => ((f.keyword||"")+" "+(f.desc||"")).toLowerCase().includes(kw)));
    if (!hasPool) continue;

    // Bestehende ki_ability Keywords sammeln
    const existing = new Set(list.filter(f=>f.type==="ki_ability").map(f=>(f.keyword||"").toLowerCase()));

    // Neue Fähigkeiten die für dieses Level freigeschaltet sind, aber noch nicht vorhanden
    for (const ab of pool.abilities) {
      if (ab.minLevel && charLevel < ab.minLevel) continue; // noch nicht freigeschaltet
      if (existing.has(ab.name.toLowerCase())) continue;   // schon vorhanden
      list.push({
        ...DEFAULT_FEATURE,
        keyword: ab.name,
        type: "ki_ability",
        kiCost: ab.cost,
        kiAction: ab.action,
        desc: ab.desc,
        active: true,
      });
    }
  }
  return list;
}

  base.featureList = syncKiAbilities(base.featureList, base.classes);

  const [mode,setMode]=useState(null);const [input,setInput]=useState("");

55,0.1)",borderRadius:10,padding:"8px 14px",fontWeight:600,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Voll</button></div>)}</div>);

function RestModals({restModal,setRestModal,ch,upCh,totalLevel,deathSaves,setDeathSaves,theme}){
  const [shortRestDice,setShortRestDice]=useState(0);const [shortRestInput,setShortRestInput]=useState("");const [shortRestResult,setShortRestResult]=useState(null);
  const S={card:{background:theme.card,borderRadius:16,border:`1px solid ${theme.border}`,padding:16},input:{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"6px 10px",color:"white",fontSize:14,outline:"none",width:"100%",fontFamily:"inherit"},btnGhost:{background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"6px 12px",fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit"},};
  const dieType=ch.hitDice||"1d8";const conMod=statMod(ch.stats.con);const availHD=Math.max(0,totalLevel-(ch.usedHitDice||0));
  const closeShort=()=>{setRestModal(null);setShortRestDice(0);setShortRestInput("");setShortRestResult(null);};
  const doShortRest=()=>{if(shortRestDice<=0)return;const rolled=parseInt(shortRestInput);if(isNaN(rolled)||rolled<shortRestDice)return;const healing=Math.max(0,rolled+conMod*shortRestDice);upCh(n=>{n.currentHP=Math.min(n.maxHP,n.currentHP+healing);n.usedHitDice=(n.usedHitDice||0)+shortRestDice;// Reset short-rest limited_use features
    n.featureList=(n.featureList||[]).map(f=>
      (f.type==="limited_use"&&f.resetOn==="short")||(f.type==="ki_pool")
        ?{...f,usesLeft:f.maxUses||1}:f);return n;});setShortRestResult({rolled,conMod,healing,dice:shortRestDice});};
  const doLongRest=()=>{upCh(n=>{n.currentHP=n.maxHP;n.tempHP=0;n.usedHitDice=0;for(let lvl=1;lvl<=9;lvl++){const max=n.spellSlots[lvl][1];n.spellSlots[lvl]=[max,max];}// Reset all limited_use features on long rest
    n.featureList=(n.featureList||[]).map(f=>
      (f.type==="limited_use"&&(f.resetOn==="long"||f.resetOn==="short"))||(f.type==="ki_pool")
        ?{...f,usesLeft:f.maxUses||1}:f);return n;});setDeathSaves({success:0,fail:0});setRestModal(null);};
  if(!restModal)return null;
  return(<div style={{position:"fixed",inset:0,zIndex:55,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.85)"}} onClick={restModal==="short"?closeShort:()=>setRestModal(null)}><div style={{...S.card,maxWidth:360,width:"92%",padding:24}} onClick={e=>e.stopPropagation()}>
    {restModal==="long"&&<><div style={{fontSize:18,fontWeight:900,color:"#60a5fa",marginBottom:6}}>🌙 Lange Rast</div><div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginBottom:16,lineHeight:1.6}}>Eine lange Rast dauert mindestens 8 Stunden.</div><div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>{[["❤️ Trefferpunkte",`Volle HP (${ch.maxHP})`],["🎲 Trefferwürfel","Alle TW zurück"],["✨ Zauberslots","Alle Slots zurück"],["💀 Todesrettungswürfe","Reset"],["🛡 Temporäre HP","Werden entfernt"]].map(([label,desc])=>(<div key={label} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 10px",background:"rgba(96,165,250,0.05)",borderRadius:8,border:"1px solid rgba(96,165,250,0.15)"}}><span style={{color:"rgba(255,255,255,0.7)"}}>{label}</span><span style={{color:"#60a5fa",fontWeight:700}}>{desc}</span></div>))}</div><div style={{display:"flex",gap:8}}><button onClick={doLongRest} style={{flex:1,background:"rgba(96,165,250,0.2)",color:"#60a5fa",border:"1px solid rgba(96,165,250,0.4)",borderRadius:10,padding:"10px 0",fontWeight:800,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>🌙 Rasten</button><button onClick={()=>setRestModal(null)} style={{...S.btnGhost,padding:"10px 16px"}}>Abbrechen</button></div></>}
    {restModal==="short"&&<><div style={{fontSize:18,fontWeight:900,color:"#fbbf24",marginBottom:6}}>☕ Kurze Rast</div><div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginBottom:14,lineHeight:1.6}}>Mindestens 1 Stunde. Trefferwürfel ausgeben um HP zu heilen.</div>{!shortRestResult?<><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}><div style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>TW ausgeben:</div><div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}><button onClick={()=>setShortRestDice(d=>Math.max(0,d-1))} style={{...S.btnGhost,padding:"4px 10px",fontSize:16}}>−</button><span style={{fontSize:20,fontWeight:900,color:"#fbbf24",minWidth:28,textAlign:"center"}}>{shortRestDice}</span><button onClick={()=>setShortRestDice(d=>Math.min(availHD,d+1))} style={{...S.btnGhost,padding:"4px 10px",fontSize:16}}>+</button></div></div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:12,textAlign:"right"}}>Verfügbar: {availHD}/{totalLevel} · {dieType}</div>{shortRestDice>0&&<><div style={{padding:"10px 14px",background:"rgba(251,191,36,0.07)",borderRadius:10,border:"1px solid rgba(251,191,36,0.2)",marginBottom:12}}><div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:4}}>Würfle {shortRestDice}×{dieType}</div>{conMod!==0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>+ {shortRestDice}×{fmtMod(conMod)} CON = {conMod>0?"+":""}{shortRestDice*conMod} extra</div>}</div><div style={{marginBottom:16}}><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:4,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>Summe eingeben</div><input type="number" min={shortRestDice} value={shortRestInput} onChange={e=>setShortRestInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doShortRest()} placeholder={`Mind. ${shortRestDice}`} style={{...S.input,fontSize:22,fontWeight:900,textAlign:"center",padding:"10px 14px"}}/></div></>}<div style={{display:"flex",gap:8}}><button onClick={doShortRest} disabled={shortRestDice===0||shortRestInput===""} style={{flex:1,background:shortRestDice>0&&shortRestInput!==""?"rgba(251,191,36,0.2)":"rgba(255,255,255,0.05)",color:shortRestDice>0&&shortRestInput!==""?"#fbbf24":"rgba(255,255,255,0.2)",border:`1px solid ${shortRestDice>0&&shortRestInput!==""?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"10px 0",fontWeight:800,cursor:shortRestDice>0&&shortRestInput!==""?"pointer":"not-allowed",fontSize:14,fontFamily:"inherit"}}>☕ Bestätigen</button><button onClick={closeShort} style={{...S.btnGhost,padding:"10px 16px"}}>Abbrechen</button></div></>:<><div style={{padding:"14px",background:"rgba(251,191,36,0.07)",borderRadius:12,border:"1px solid rgba(251,191,36,0.2)",marginBottom:16}}><div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:6}}>Dein Wurf ({shortRestResult.dice}×{dieType}):</div><div style={{fontSize:22,fontWeight:900,color:"#fbbf24",marginBottom:4}}>{shortRestResult.rolled}</div><div style={{fontSize:18,fontWeight:900,color:"#4ade80"}}>+{shortRestResult.healing} HP geheilt ✓</div></div><button onClick={closeShort} style={{width:"100%",background:"rgba(34,197,94,0.15)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"10px 0",fontWeight:800,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>Fertig</button></>}</>}
  </div></div>);
}

function CharacterSelect({onSelect,onNew,theme,onThemeChange,onShowInfo}){
  const [chars,setChars]=useState([]);const [delConf,setDelConf]=useState(null);
  useEffect(()=>setChars(loadAllChars()),[]);
  const deleteChar=id=>{const u=chars.filter(c=>c.id!==id);saveAllChars(u);try{localStorage.removeItem(imgKey(id));}catch{}setChars(u);setDelConf(null);};
  const totalLevel=c=>(c.classes||[]).reduce((s,cl)=>s+(cl.level||0),0)||1;
  const classLabel=c=>(c.classes||[]).map(cl=>`${cl.name} ${cl.level}`).filter(x=>x.trim()!==" 1").join(" / ")||"Unbekannte Klasse";
  return(<div style={{minHeight:"100vh",background:theme.bg,color:"white",padding:"20px 16px"}}>
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div style={{marginBottom:28,display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
        <h1 style={{fontSize:26,fontWeight:900,color:theme.accent,letterSpacing:"-0.5px"}}>⚔ D&amp;D 5e Sheet</h1>
        <div style={{display:"flex",gap:8,marginTop:4,alignItems:"center"}}>
          {/* Info button */}
          <button onClick={onShowInfo} title="Info" style={{
            width:28,height:28,borderRadius:"50%",
            background:"rgba(255,255,255,0.06)",
            border:"1px solid rgba(255,255,255,0.15)",
            color:"rgba(255,255,255,0.5)",cursor:"pointer",
            fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",
            fontFamily:"inherit",transition:"all 0.2s",
          }}>ℹ</button>
          {/* Theme dots */}
          {THEMES.map(t=>(<button key={t.id} onClick={()=>onThemeChange(t.id)} title={t.label} style={{width:20,height:20,borderRadius:"50%",background:t.accent,border:`2px solid ${theme.id===t.id?"white":"transparent"}`,cursor:"pointer",padding:0}}/>))}
        </div>
      </div>
      <button onClick={onNew} style={{background:`linear-gradient(135deg,${theme.accent}bb,${theme.accent}77)`,color:"white",border:"none",borderRadius:14,padding:"14px 0",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",width:"100%",marginBottom:24,display:"block",textAlign:"center"}}>+ Neuen Charakter erstellen</button>
      {chars.length===0?(<div style={{textAlign:"center",padding:"60px 0",color:"rgba(255,255,255,0.2)"}}><div style={{fontSize:48,marginBottom:12}}>🎲</div><div style={{fontSize:16,fontWeight:700}}>Noch keine Charaktere</div><div style={{fontSize:13,marginTop:4}}>Erstelle deinen ersten!</div></div>):(<div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.3)",letterSpacing:"0.08em",marginBottom:4}}>GESPEICHERTE CHARAKTERE</div>
        {chars.map(c=>(<div key={c.id} style={{background:theme.card,borderRadius:16,border:`1px solid ${theme.border}`,overflow:"hidden"}}>
          {delConf===c.id?(<div style={{padding:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{color:"#f87171",fontSize:14,fontWeight:600}}>Wirklich löschen?</span><div style={{display:"flex",gap:8}}><button onClick={()=>deleteChar(c.id)} style={{background:"rgba(239,68,68,0.15)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Löschen</button><button onClick={()=>setDelConf(null)} style={{background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Abbrechen</button></div></div>):(<div style={{display:"flex",alignItems:"stretch"}}><button onClick={()=>onSelect(c.id,c)} style={{flex:1,padding:"14px 16px",textAlign:"left",background:"transparent",border:"none",cursor:"pointer",color:"white",fontFamily:"inherit"}}><div style={{fontSize:17,fontWeight:800}}>{c.name||"Unbenannter Charakter"}</div><div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginTop:4,display:"flex",gap:8,flexWrap:"wrap"}}>{c.race&&<span style={{color:theme.accent,fontWeight:600}}>{c.race}</span>}<span>{classLabel(c)}</span><span style={{color:"#4ade80",fontWeight:600}}>Level {totalLevel(c)}</span></div>{c.background&&<div style={{fontSize:12,color:"rgba(255,255,255,0.25)",marginTop:2}}>{c.background}</div>}</button><button onClick={()=>setDelConf(c.id)} style={{background:"transparent",border:"none",cursor:"pointer",padding:"0 16px",color:"rgba(255,255,255,0.2)",fontSize:18}}>🗑</button></div>)}
        </div>))}
      </div>)}
    </div>
  </div>);
}

// TRAIT NOTES TAB
// ═══════════════════════════════════════════════════════

function TraitNotesTab({ ch, upCh, up, theme, S, AT }) {
  const [openPicker, setOpenPicker] = useState(null); // "personalityTraits"|"ideals"|"bonds"|"flaws"

  const background = ch.background || "";
  const fields = [
    { key:"personalityTraits", label:"🧠 Persönlichkeit", placeholder:"Wie verhält sich dein Charakter?" },
    { key:"ideals",            label:"💡 Ideale",         placeholder:"Wofür kämpft dein Charakter?" },
    { key:"bonds",             label:"🔗 Bindungen",      placeholder:"Was hält deinen Charakter in der Welt?" },
    { key:"flaws",             label:"⚠️ Schwächen",      placeholder:"Was macht deinen Charakter menschlich?" },
  ];

  const getSuggestions = (fieldKey) => {
    const data = TRAIT_SUGGESTIONS[fieldKey];
    if (!data) return [];
    const byBg = background ? (data.byBackground?.[background] || []) : [];
    const generic = data.generic || [];
    // Hintergrund-spezifische zuerst, dann generische, deduplizieren
    return [...byBg, ...generic.filter(g => !byBg.includes(g))];
  };

  const appendSuggestion = (fieldKey, text) => {
    const current = ch[fieldKey] || "";
    const newVal = current.trim() ? current.trim() + "\n" + text : text;
    up(fieldKey, newVal);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        {fields.map(({ key, label, placeholder }) => {
          const suggestions = getSuggestions(key);
          const isOpen = openPicker === key;
          const bgSuggestions = background ? (TRAIT_SUGGESTIONS[key]?.byBackground?.[background] || []) : [];

          return (
            <div key={key} style={S.card}>
              {/* Header */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                <div style={{ ...S.section, fontSize:13, margin:0 }}>{label}</div>
                <button
                  onClick={() => setOpenPicker(isOpen ? null : key)}
                  style={{
                    background: isOpen ? `${theme.accent}22` : "rgba(255,255,255,0.06)",
                    border: `1px solid ${isOpen ? theme.accent+"66" : "rgba(255,255,255,0.12)"}`,
                    borderRadius: 8, padding:"3px 10px", cursor:"pointer",
                    fontFamily:"inherit", fontWeight:700, fontSize:11,
                    color: isOpen ? theme.accent : "rgba(255,255,255,0.45)",
                    transition:"all 0.15s",
                  }}
                >
                  {isOpen ? "✕ Schließen" : "✦ Vorschläge"}
                </button>
              </div>

              {/* Suggestions Panel */}
              {isOpen && (
                <div style={{
                  marginBottom:10, borderRadius:10,
                  border:`1px solid ${theme.accent}33`,
                  background:"rgba(255,255,255,0.02)",
                  overflow:"hidden",
                }}>
                  {/* Background-specific header */}
                  {background && bgSuggestions.length > 0 && (
                    <div style={{
                      padding:"6px 10px", fontSize:10, fontWeight:800,
                      color:theme.accent, letterSpacing:"0.07em",
                      background:`${theme.accent}0d`,
                      borderBottom:`1px solid ${theme.accent}22`,
                    }}>
                      ✦ PASSEND ZUM HINTERGRUND: {background.toUpperCase()}
                    </div>
                  )}
                  <div style={{ maxHeight:220, overflowY:"auto", padding:"6px 0" }}>
                    {suggestions.map((s, i) => {
                      const isBg = bgSuggestions.includes(s);
                      const alreadyUsed = (ch[key] || "").includes(s);
                      return (
                        <div
                          key={i}
                          onClick={() => !alreadyUsed && appendSuggestion(key, s)}
                          style={{
                            padding:"7px 10px",
                            cursor: alreadyUsed ? "default" : "pointer",
                            display:"flex", alignItems:"flex-start", gap:8,
                            opacity: alreadyUsed ? 0.35 : 1,
                            background: alreadyUsed ? "transparent" : "transparent",
                            transition:"background 0.12s",
                            borderBottom: i < suggestions.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none",
                          }}
                          onMouseEnter={e => { if(!alreadyUsed) e.currentTarget.style.background = `${theme.accent}0d`; }}
                          onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}
                        >
                          <span style={{
                            flexShrink:0, fontSize:12, marginTop:1,
                            color: alreadyUsed ? "rgba(255,255,255,0.2)" : isBg ? theme.accent : "rgba(255,255,255,0.25)",
                            fontWeight:800,
                          }}>
                            {alreadyUsed ? "✓" : isBg ? "★" : "·"}
                          </span>
                          <span style={{
                            fontSize:12, color: alreadyUsed ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.7)",
                            lineHeight:1.5,
                          }}>
                            {s}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{
                    padding:"6px 10px", fontSize:10,
                    color:"rgba(255,255,255,0.2)",
                    borderTop:"1px solid rgba(255,255,255,0.06)",
                  }}>
                    <span style={{ color:theme.accent }}>★</span> Hintergrund-passend &nbsp;·&nbsp; <span style={{ color:"rgba(255,255,255,0.4)" }}>·</span> Allgemein &nbsp;·&nbsp; Klicken zum Hinzufügen
                  </div>
                </div>
              )}

              {/* Text field */}
              <AT path={key} placeholder={placeholder} minRows={3}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const HIT_DICE_SIDES = { "1d12":12,"1d10":10,"1d8":8,"1d6":6 };

// ═══════════════════════════════════════════════════════
// LEVEL UP MODAL
// ═══════════════════════════════════════════════════════

function LevelUpModal({ cls, currentLevel, ch, onConfirm, onClose, theme }) {
  const newLevel = currentLevel + 1;
  const clsData  = LEVEL_UP_DATA[cls?.name] || null;
  const hitDie   = clsData?.hitDie || cls?.hitDie || ch.hitDice || "1d8";
  const dieSides = HIT_DICE_SIDES[hitDie] || 8;
  const conMod   = Math.floor(((ch.stats?.con || 10) - 10) / 2);
  const newFeatures = clsData?.features?.[newLevel] || [];
  const newPB    = Math.ceil(newLevel / 4) + 1;
  const oldPB    = Math.ceil(currentLevel / 4) + 1;
  const pbChanged = newPB !== oldPB;

  // Spell slots
  const newSlots = clsData?.spellSlots?.[newLevel] || null;
  const oldSlots = clsData?.spellSlots?.[currentLevel] || null;
  const slotChanges = newSlots ? newSlots.map((v, i) => v - (oldSlots?.[i] || 0)).filter((d, i) => d > 0 ? i : false).map((d, i) => d > 0 ? { grade: i+1, delta: d } : null).filter(Boolean) : [];

  // ASI flag
  const isASI = newFeatures.some(f => f.includes("ASI") || f.includes("Attributsteigerung"));

  // HP rolling
  const [hpMode, setHpMode]       = useState("roll");
  const [rolledHP, setRolledHP]   = useState(null);
  const [manualHP, setManualHP]   = useState("");
  const [rolling, setRolling]     = useState(false);
  const [asiStats, setAsiStats]   = useState({ str:0,dex:0,con:0,int:0,wis:0,cha:0 });
  const [asiPoints, setAsiPoints] = useState(2); // 2 points to distribute

  const rollHP = () => {
    setRolling(true);
    setTimeout(() => {
      setRolledHP(Math.floor(Math.random() * dieSides) + 1);
      setRolling(false);
    }, 500);
  };

  const hpGain = hpMode === "max"
    ? dieSides + conMod
    : hpMode === "roll"
    ? (rolledHP !== null ? rolledHP + conMod : null)
    : (parseInt(manualHP) ? parseInt(manualHP) + conMod : null);

  const canConfirm = hpGain !== null && hpGain !== undefined;

  const handleConfirm = () => {
    if (!canConfirm) return;
    onConfirm({
      newLevel,
      hpIncrease: Math.max(1, hpGain),
      newFeatures,
      newSlots,
      asiStats: isASI ? asiStats : null,
      pbChanged,
      newPB,
    });
  };

  const STAT_KEYS = ["str","dex","con","int","wis","cha"];
  const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
  const STAT_COLORS = { str:"#ef4444",dex:"#4ade80",con:"#f97316",int:"#818cf8",wis:"#86efac",cha:"#ec4899" };

  const inp = { background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)",
    borderRadius:10, padding:"7px 10px", color:"white", fontSize:14, outline:"none",
    width:"100%", fontFamily:"inherit" };

  return (
    <div style={{ position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",
      justifyContent:"center",background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",padding:16 }}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        maxWidth:480,width:"100%",maxHeight:"92vh",overflowY:"auto",
        background:"#0f1117",border:`2px solid ${theme.accent}55`,borderRadius:20,
        padding:"24px 20px",boxShadow:`0 0 60px ${theme.accent}22,0 24px 60px rgba(0,0,0,0.8)`,
        animation:"modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",position:"relative",
      }}>
        {/* Close */}
        <button onClick={onClose} style={{ position:"absolute",top:14,right:14,
          background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:8,width:30,height:30,color:"rgba(255,255,255,0.5)",cursor:"pointer",
          fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>✕</button>

        {/* Header */}
        <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:20 }}>
          <div style={{ width:52,height:52,borderRadius:14,flexShrink:0,
            background:`${theme.accent}18`,border:`2px solid ${theme.accent}55`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:26 }}>⬆</div>
          <div>
            <div style={{ fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.3)",
              letterSpacing:"0.08em",textTransform:"uppercase" }}>Level Up!</div>
            <div style={{ fontSize:22,fontWeight:900,color:theme.accent }}>
              {cls?.name || "Klasse"} – Level {newLevel}
            </div>
            {pbChanged && (
              <div style={{ fontSize:12,color:"#4ade80",fontWeight:700,marginTop:2 }}>
                ✦ Übungsbonus steigt auf +{newPB}
              </div>
            )}
          </div>
        </div>

        <div style={{ display:"flex",flexDirection:"column",gap:16 }}>

          {/* HP SECTION */}
          <div style={{ background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:14,padding:"14px 16px" }}>
            <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:12 }}>
              ❤️ TREFFERPUNKTE
            </div>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:10 }}>
              Trefferwürfel: <strong style={{color:"rgba(255,255,255,0.7)"}}>{hitDie}</strong> &nbsp;·&nbsp;
              CON-Mod: <strong style={{color:conMod>=0?"#4ade80":"#f87171"}}>{conMod>=0?"+":""}{conMod}</strong>
            </div>

            {/* Mode switcher */}
            <div style={{ display:"flex",gap:6,marginBottom:12 }}>
              {[["roll","🎲 Würfeln"],["max","⬆ Maximum"],["manual","✏ Manuell"]].map(([m,l])=>(
                <button key={m} onClick={()=>setHpMode(m)} style={{
                  flex:1,padding:"7px 4px",fontSize:11,fontWeight:800,
                  borderRadius:10,cursor:"pointer",fontFamily:"inherit",
                  border:`2px solid ${hpMode===m?theme.accent:"rgba(255,255,255,0.1)"}`,
                  background:hpMode===m?`${theme.accent}22`:"rgba(255,255,255,0.04)",
                  color:hpMode===m?theme.accent:"rgba(255,255,255,0.4)",transition:"all 0.15s",
                }}>{l}</button>
              ))}
            </div>

            {hpMode==="roll" && (
              <div>
                <button onClick={rollHP} disabled={rolling} style={{
                  width:"100%",padding:"11px",fontWeight:900,fontSize:15,
                  fontFamily:"inherit",borderRadius:12,cursor:rolling?"not-allowed":"pointer",
                  border:`2px solid ${theme.accent}`,color:rolling?"rgba(255,255,255,0.3)":theme.accent,
                  background:rolling?"rgba(255,255,255,0.03)":`${theme.accent}18`,
                  marginBottom:10,transition:"all 0.2s",
                  animation:rolling?"rollPulse 0.5s ease infinite":"none",
                }}>{rolling?"🎲 Würfle...":rolledHP!==null?`🎲 Neu würfeln (letztes: ${rolledHP})`:"🎲 Jetzt würfeln"}</button>
                {rolledHP!==null && (
                  <div style={{ textAlign:"center",padding:"10px",background:`${theme.accent}0d`,
                    borderRadius:10,border:`1px solid ${theme.accent}33` }}>
                    <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{rolledHP}</span>
                    <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
                    <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
                    <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
                    <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,rolledHP+conMod)} HP</span>
                  </div>
                )}
              </div>
            )}
            {hpMode==="max" && (
              <div style={{ textAlign:"center",padding:"12px",background:`${theme.accent}0d`,
                borderRadius:10,border:`1px solid ${theme.accent}33` }}>
                <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:4 }}>Maximum + CON</div>
                <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{dieSides}</span>
                <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
                <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
                <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
                <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,dieSides+conMod)} HP</span>
              </div>
            )}
            {hpMode==="manual" && (
              <div>
                <input type="number" min="1" max={dieSides} value={manualHP}
                  onChange={e=>setManualHP(e.target.value)}
                  placeholder={`1–${dieSides}`}
                  style={{...inp,fontSize:22,fontWeight:900,textAlign:"center",padding:"10px"}}/>
                {manualHP && (
                  <div style={{ textAlign:"center",marginTop:8,padding:"8px",
                    background:`${theme.accent}0d`,borderRadius:10,border:`1px solid ${theme.accent}33`,fontSize:14 }}>
                    <span style={{ color:theme.accent,fontWeight:800 }}>{manualHP}</span>
                    <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>+</span>
                    <span style={{ color:conMod>=0?"#4ade80":"#f87171",fontWeight:800 }}>{conMod>=0?"+":""}{conMod}</span>
                    <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>=</span>
                    <span style={{ color:"#4ade80",fontWeight:900 }}>+{Math.max(1,(parseInt(manualHP)||0)+conMod)} HP</span>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* NEW FEATURES */}
          {newFeatures.length > 0 && (
            <div style={{ background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",
              borderRadius:14,padding:"14px 16px" }}>
              <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:10 }}>
                ✨ NEUE FEATURES AUF LEVEL {newLevel}
              </div>
              <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                {newFeatures.map((f,i)=>(
                  <div key={i} style={{ display:"flex",gap:8,alignItems:"flex-start",
                    padding:"6px 10px",background:`${theme.accent}0d`,borderRadius:8,
                    border:`1px solid ${theme.accent}22` }}>
                    <span style={{ color:theme.accent,flexShrink:0,fontWeight:800 }}>✦</span>
                    <span style={{ fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.5 }}>{f}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* SPELL SLOTS */}
          {newSlots && slotChanges.length > 0 && (
            <div style={{ background:"rgba(192,132,252,0.06)",border:"1px solid rgba(192,132,252,0.25)",
              borderRadius:14,padding:"14px 16px" }}>
              <div style={{ fontSize:11,fontWeight:800,color:"#c084fc",letterSpacing:"0.07em",marginBottom:10 }}>
                ✨ NEUE ZAUBERSLOTS
              </div>
              <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                {newSlots.map((count,i)=>{
                  if(count===0) return null;
                  const delta = count - (oldSlots?.[i]||0);
                  return (
                    <div key={i} style={{ background:"rgba(192,132,252,0.12)",border:"1px solid rgba(192,132,252,0.35)",
                      borderRadius:10,padding:"6px 12px",textAlign:"center" }}>
                      <div style={{ fontSize:10,color:"rgba(192,132,252,0.7)",fontWeight:800 }}>GRAD {i+1}</div>
                      <div style={{ fontSize:18,fontWeight:900,color:"#c084fc" }}>{count}</div>
                      {delta>0 && <div style={{ fontSize:10,color:"#4ade80",fontWeight:700 }}>+{delta}</div>}
                    </div>
                  );
                }).filter(Boolean)}
              </div>
            </div>
          )}

          {/* ASI */}
          {isASI && (
            <div style={{ background:"rgba(255,255,255,0.03)",border:`1px solid ${theme.accent}33`,
              borderRadius:14,padding:"14px 16px" }}>
              <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:4 }}>
                💪 ATTRIBUTSTEIGERUNG (ASI)
              </div>
              <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:12 }}>
                Verteile <strong style={{color:theme.accent}}>{asiPoints}</strong> Punkt{asiPoints!==1?"e":""} auf deine Attribute (max. +2 pro Attribut). Oder überspringe für einen Feat.
              </div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 }}>
                {STAT_KEYS.map(k=>(
                  <div key={k} style={{ textAlign:"center",background:"rgba(255,255,255,0.04)",
                    border:`1px solid ${asiStats[k]>0?STAT_COLORS[k]+"55":"rgba(255,255,255,0.1)"}`,
                    borderRadius:10,padding:"8px 4px" }}>
                    <div style={{ fontSize:10,fontWeight:800,color:STAT_COLORS[k] }}>{STAT_LABELS[k]}</div>
                    <div style={{ fontSize:16,fontWeight:900,color:"rgba(255,255,255,0.6)",margin:"3px 0" }}>
                      {(ch.stats?.[k]||10)+asiStats[k]}
                      {asiStats[k]>0 && <span style={{color:"#4ade80",fontSize:12}}> +{asiStats[k]}</span>}
                    </div>
                    <div style={{ display:"flex",gap:3 }}>
                      <button onClick={()=>{if(asiStats[k]>0)setAsiStats(s=>({...s,[k]:s[k]-1}));setAsiPoints(p=>Math.min(2,p+1));}}
                        disabled={asiStats[k]===0}
                        style={{ flex:1,background:"rgba(239,68,68,0.2)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",
                          borderRadius:6,padding:"2px 0",fontSize:13,cursor:asiStats[k]===0?"not-allowed":"pointer",
                          fontFamily:"inherit",opacity:asiStats[k]===0?0.3:1 }}>−</button>
                      <button onClick={()=>{if(asiPoints>0&&asiStats[k]<2&&(ch.stats?.[k]||10)+asiStats[k]<20){setAsiStats(s=>({...s,[k]:s[k]+1}));setAsiPoints(p=>p-1);}}}
                        disabled={asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20}
                        style={{ flex:1,background:"rgba(34,197,94,0.2)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",
                          borderRadius:6,padding:"2px 0",fontSize:13,fontFamily:"inherit",
                          cursor:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?"not-allowed":"pointer",
                          opacity:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?0.3:1 }}>+</button>
                    </div>
                  </div>
                ))}
              </div>
              {asiPoints > 0 && (
                <div style={{ marginTop:10,fontSize:12,color:"rgba(255,255,255,0.3)",fontStyle:"italic",textAlign:"center" }}>
                  Noch {asiPoints} Punkt{asiPoints!==1?"e":""} übrig – oder lass sie frei für einen Feat.
                </div>
              )}
            </div>
          )}

          {/* Confirm */}
          <button onClick={handleConfirm} disabled={!canConfirm} style={{
            width:"100%",background:canConfirm?`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`:"rgba(255,255,255,0.06)",
            color:canConfirm?"white":"rgba(255,255,255,0.2)",border:"none",borderRadius:12,
            padding:"13px 0",fontWeight:900,cursor:canConfirm?"pointer":"not-allowed",
            fontSize:15,fontFamily:"inherit",transition:"all 0.2s",
