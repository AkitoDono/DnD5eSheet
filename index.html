        + Unterrasse
       </button>
      </div>
      {(form.subraces||[]).length === 0 && (
       <div style={{ fontSize:12, color:"rgba(255,255,255,0.2)", fontStyle:"italic",
        textAlign:"center", padding:"10px 0" }}>
        Keine Unterrassen – optional.
       </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
       {(form.subraces||[]).map((sr, i) => (
        <div key={i} style={{ background:`${form.color}0a`,
         border:`1px solid ${form.color}33`, borderRadius:12, overflow:"hidden" }}>
         {/* Subrace header row */}
         <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px" }}>
          <button onClick={()=>setSubraceOpen(subraceOpen===i?null:i)}
           style={{ background:"transparent", border:"none", color:form.color,
            cursor:"pointer", fontSize:13, padding:0, fontFamily:"inherit",
            fontWeight:800, flex:1, textAlign:"left" }}>
           {subraceOpen===i?"▼":"▶"} {sr.name||`Unterrasse ${i+1}`}
           {sr.bonus && <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)",
            fontWeight:600, marginLeft:8 }}>{sr.bonus}</span>}
          </button>
          <button onClick={()=>delSubrace(i)} style={{ background:"rgba(239,68,68,0.15)",
           color:"#f87171", border:"1px solid rgba(239,68,68,0.3)",
           borderRadius:7, padding:"4px 9px", cursor:"pointer",
           fontSize:12, fontFamily:"inherit" }}>✕</button>
         </div>
         {subraceOpen===i && (
          <div style={{ padding:"0 12px 12px", display:"flex", flexDirection:"column", gap:8 }}>
           <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div>{label("Name")}
             <input type="text" value={sr.name} onChange={e=>upSR(i,"name",e.target.value)}
              placeholder="z.B. Hügelzwerg" style={inp}/></div>
            <div>{label("Attribut-Bonus")}
             <input type="text" value={sr.bonus} onChange={e=>upSR(i,"bonus",e.target.value)}
              placeholder="WIS +1" style={inp}/></div>
           </div>
           <div>
            {label("Merkmale")}
            {(sr.traits||[]).map((t,j) => (
             <div key={j} style={{ display:"flex", gap:6, marginBottom:5 }}>
              <input type="text" value={t} onChange={e=>upSRTrait(i,j,e.target.value)}
               placeholder={`Merkmal ${j+1}`} style={{...inp,flex:1}}/>
              <button onClick={()=>delSRTrait(i,j)} style={{ background:"rgba(239,68,68,0.12)",
               color:"#f87171", border:"1px solid rgba(239,68,68,0.25)",
               borderRadius:7, padding:"5px 8px", cursor:"pointer", fontFamily:"inherit" }}>✕</button>
             </div>
            ))}
            <button onClick={()=>addSRTrait(i)} style={{ background:"transparent",
             border:"1px dashed rgba(255,255,255,0.12)", borderRadius:8, padding:"5px",
             color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:11,
             fontFamily:"inherit", width:"100%" }}>+ Merkmal</button>
           </div>
           <div>{label("Notiz / Empfehlung (optional)")}
            <input type="text" value={sr.note||""} onChange={e=>upSR(i,"note",e.target.value)}
             placeholder="z.B. Ideal für Kleriker" style={inp}/></div>
          </div>
         )}
        </div>
       ))}
      </div>
     </div>

     {/* Save */}
     <button onClick={handleSave} disabled={!canSave} style={{
      width:"100%", marginTop:4,
      background: canSave ? `linear-gradient(135deg,${form.color}cc,${form.color}77)` : "rgba(15,15,22,0.85)",
      color: canSave ? "white" : "rgba(255,255,255,0.2)",
      border:"none", borderRadius:12, padding:"13px 0",
      fontWeight:900, cursor: canSave ? "pointer" : "not-allowed",
      fontSize:15, fontFamily:"inherit", transition:"all 0.2s",
     }}>
      {editRace ? "✓ Änderungen speichern" : "✨ Rasse erstellen"}
     </button>
    </div>
   </div>
  </div>
 );
}

function CharacterWizard({ theme, onFinish, onSkip }) {
 const [step, setStep] = useState(0);
 const [data, setData] = useState({ name:"", race:null, class:null, background:null, alignment:null });
 const [detailItem, setDetailItem] = useState(null);
 const [nameInput, setNameInput] = useState("");
 const [selectedSubrace, setSelectedSubrace] = useState(null);
 const [customBgOpen, setCustomBgOpen] = useState(false);
 const [customBg, setCustomBg] = useState({
  name:"", emoji:"✨", color:"#a78bfa",
  description:"", proficiencies:[], tools:"", languages:0,
  equipment:"", feature:"", ideal:"", bond:"",
 });
 const [rolledStats, setRolledStats] = useState(null);
 const [subraceModalRace, setSubraceModalRace] = useState(null);
 const [customRaces, setCustomRaces] = useState(() => loadCustomRaces());
 const [showCustomRaceModal, setShowCustomRaceModal] = useState(false);
 const [freeChoiceModal, setFreeChoiceModal] = useState(null);
 const [editingCustomRace, setEditingCustomRace] = useState(null);
 const [selectedEquipment, setSelectedEquipment] = useState(null);
 const [wizardLanguages, setWizardLanguages] = useState([]);

 const [attrMode,        setAttrMode]        = useState("info");
 const [attrManualVals,  setAttrManualVals]  = useState({str:"",dex:"",con:"",int:"",wis:"",cha:""});
 const [attrRollResults, setAttrRollResults] = useState(null);
 const [attrAssigned,    setAttrAssigned]    = useState({str:null,dex:null,con:null,int:null,wis:null,cha:null});
 const [freeStatChoices, setFreeStatChoices] = useState([]);
 const [freeStepChoices, setFreeStepChoices] = useState({});

 const allRaces = [...WIZARD_RACES, ...customRaces];

 const saveAndRefreshCustomRaces = races => { saveCustomRaces(races); setCustomRaces(races); };

 const handleSaveCustomRace = race => {
  const idx = customRaces.findIndex(r => r.id === race.id);
  const updated = idx >= 0 ? customRaces.map((r,i) => i===idx ? race : r) : [...customRaces, race];
  saveAndRefreshCustomRaces(updated);
  setShowCustomRaceModal(false);
  setEditingCustomRace(null);
 };

 const handleDeleteCustomRace = id => {
  saveAndRefreshCustomRaces(customRaces.filter(r => r.id !== id));
  if (data.race?.id === id) { set("race", null); setDetailItem(null); setSelectedSubrace(null); }
 };

 const steps = WIZARD_STEPS;
 const currentStep = steps[step];

 const set = (key, val) => setData(d => ({...d, [key]:val}));

 const handleNext = () => {
  if (step < steps.length - 1) {

   if (currentStep.id === "attributes") {
    const freeChoices = detectFreeChoices(data.race, selectedSubrace, data.background)
     .filter(fc => fc.type !== "stat_free" && fc.type !== "language_free");
    if (freeChoices.length > 0) {

     setFreeChoiceModal({ choices: freeChoices, pendingCharData: null, fromStep: true });
     return;
    }
   }
   setStep(s => s + 1);
   setDetailItem(null);
  }
 };
 const handleBack = () => {
  if (step > 0) { setStep(s => s - 1); setDetailItem(null); }
 };

 const handleFinish = () => {
  const parseS = v => { const n = parseInt(v); return isNaN(n) ? 10 : Math.max(1,Math.min(30,n)); };
  const baseStats = rolledStats
   ? { str:parseS(rolledStats.str), dex:parseS(rolledStats.dex), con:parseS(rolledStats.con),
     int:parseS(rolledStats.int), wis:parseS(rolledStats.wis), cha:parseS(rolledStats.cha) }
   : { str:10, dex:10, con:10, int:10, wis:10, cha:10 };

  const cls   = data.class;
  const race  = data.race;
  const sr    = selectedSubrace;
  const bg    = data.background;

  const stats = { ...baseStats };

  const applyStatBonuses = (bonuses) => {
   if (!bonuses) return;
   Object.entries(bonuses).forEach(([k,v]) => {
    if (v && stats[k] !== undefined) stats[k] = (stats[k] || 10) + v;
   });
  };

  applyStatBonuses(race?.statBonuses);

  applyStatBonuses(sr?.statBonuses);

  const freeAmt = race?.extraChoices?.statAmount || sr?.extraChoices?.statAmount || 1;
  freeStatChoices.forEach(sk => {
   if (stats[sk] !== undefined) stats[sk] = (stats[sk] || 10) + freeAmt;
  });

  const applyStatBonus = (bonusStr) => {
   if (!bonusStr) return;
   const map = { STR:"str", DEX:"dex", CON:"con", INT:"int", WIS:"wis", CHA:"cha" };
   const re = /\b(STR|DEX|CON|INT|WIS|CHA)\s*\+(\d+)/gi;
   let m;
   while ((m = re.exec(bonusStr)) !== null) {
    const key = map[m[1].toUpperCase()];
    if (key) stats[key] = (stats[key] || 10) + parseInt(m[2]);
   }
  };

  let speed = typeof race?.speed === 'number' ? race.speed : 30;
  if (sr?.speedOverride) speed = sr.speedOverride;

  if (typeof race?.speed === 'string') {
   const sp = parseInt(race.speed); if (!isNaN(sp)) speed = sp;
  }

  const CLASS_SAVES = {
   "Barbar":                  ["str","con"],
   "Barde":                   ["dex","cha"],
   "Kleriker":                ["wis","cha"],
   "Druide":                  ["int","wis"],
   "Kämpfer":                 ["str","con"],
   "Mönch":                   ["str","dex"],
   "Paladin":                 ["wis","cha"],
   "Waldläufer":              ["str","dex"],
   "Schurke":                 ["dex","int"],
   "Zauberer (Magier)":       ["int","wis"],
   "Hexenmeister":            ["wis","cha"],
   "Zauberwirker (Sorcerer)": ["con","cha"],
  };
  const saveProficiencies = { str:false, dex:false, con:false, int:false, wis:false, cha:false };
  if (cls) {
   const saves = CLASS_SAVES[cls.name] || [];
   saves.forEach(s => { saveProficiencies[s] = true; });
  }

  const CLASS_SKILLS = {
   "Barbar":                  ["Athletik","Einschüchtern","Natur","Wahrnehmung","Überleben","Mit Tieren umgehen"],
   "Barde":                   ["Akrobatik","Athletik","Auftreten","Überzeugung","Geschichte","Heimlichkeit","Täuschen","Wahrnehmung","Einschüchtern"],
   "Kleriker":                ["Geschichte","Einblick","Medizin","Überzeugung","Religion"],
   "Druide":                  ["Arkane Kunde","Mit Tieren umgehen","Einblick","Medizin","Natur","Wahrnehmung","Religion","Überleben"],
   "Kämpfer":                 ["Akrobatik","Athletik","Geschichte","Einblick","Einschüchtern","Wahrnehmung","Überleben"],
   "Mönch":                   ["Akrobatik","Athletik","Geschichte","Einblick","Religion","Heimlichkeit"],
   "Paladin":                 ["Athletik","Einblick","Einschüchtern","Medizin","Überzeugung","Religion"],
   "Waldläufer":              ["Mit Tieren umgehen","Athletik","Einblick","Ermitteln","Natur","Wahrnehmung","Heimlichkeit","Überleben"],
   "Schurke":                 ["Akrobatik","Athletik","Täuschen","Einblick","Einschüchtern","Ermitteln","Wahrnehmung","Auftreten","Überzeugung","Heimlichkeit","Taschendiebstahl"],
   "Zauberer (Magier)":       ["Arkane Kunde","Geschichte","Einblick","Ermitteln","Medizin","Religion"],
   "Hexenmeister":            ["Arkane Kunde","Täuschen","Geschichte","Einschüchtern","Natur","Religion"],
   "Zauberwirker (Sorcerer)": ["Arkane Kunde","Täuschen","Einblick","Einschüchtern","Überzeugung","Religion"],
  };
  const skillProficiencies = Object.fromEntries(SKILLS.map(s => [s.name, false]));

  if (cls) {
   const pool = CLASS_SKILLS[cls.name] || [];
   pool.slice(0, 2).forEach(sk => {
    if (skillProficiencies.hasOwnProperty(sk)) skillProficiencies[sk] = true;
   });
  }

  const RACE_SKILL_MAP = {
   "Elf":         ["Wahrnehmung"],
   "Halbork":     ["Einschüchtern"],
  };
  if (race) {
   const raceSkills = RACE_SKILL_MAP[race.name] || [];
   raceSkills.forEach(sk => { if (skillProficiencies.hasOwnProperty(sk)) skillProficiencies[sk] = true; });
  }

  if (bg?.proficiencies) {

   const BG_SKILL_NORMALIZE = {
    "Einblick": "Motiv erkennen",
    "Ermitteln": "Untersuchen",
   };
   bg.proficiencies.forEach(p => {
    const normalized = BG_SKILL_NORMALIZE[p] || p;
    if (skillProficiencies.hasOwnProperty(normalized)) skillProficiencies[normalized] = true;
    else if (skillProficiencies.hasOwnProperty(p)) skillProficiencies[p] = true;
   });
  }

  const languages = [];
  if (race?.languages) {
   race.languages.forEach(l => {

    if (!l.startsWith("+") && !l.includes("eine weitere") && !l.includes("nach Wahl") && !l.includes("weitere")) {
     languages.push(l);
    }
   });
  }

  const CLASS_SPELLCASTING = {
   "Barde":                   { ability:"CHA", dc: 8, bonus: 2 },
   "Kleriker":                { ability:"WIS", dc: 8, bonus: 2 },
   "Druide":                  { ability:"WIS", dc: 8, bonus: 2 },
   "Hexenmeister":            { ability:"CHA", dc: 8, bonus: 2 },
   "Paladin":                 { ability:"CHA", dc: 8, bonus: 2 },
   "Waldläufer":              { ability:"WIS", dc: 8, bonus: 2 },
   "Zauberer (Magier)":       { ability:"INT", dc: 8, bonus: 2 },
   "Zauberwirker (Sorcerer)": { ability:"CHA", dc: 8, bonus: 2 },
  };
  const spellData = cls ? CLASS_SPELLCASTING[cls.name] || null : null;

  const HIT_DIE_MAX = { "1d12":12, "1d10":10, "1d8":8, "1d6":6 };
  const hitDie = cls?.hitDie || "1d8";
  const conMod = Math.floor((stats.con - 10) / 2);
  const maxHP = (HIT_DIE_MAX[hitDie] || 8) + conMod;

  const featureList = [];

const raceName = race?.name || "";
  const raceFeatures = RACE_FEATURES[raceName] || [];
  raceFeatures.forEach(f => featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE, ...f, active: true })));

  const dvRange = sr?.darkvision ?? race?.darkvision ?? 0;
  if (dvRange > 0) {
   const dvExists = featureList.some(f => f.keyword?.toLowerCase().includes('dunkelsicht'));
   if (!dvExists) featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE,
    keyword:`Dunkelsicht (${dvRange} ft)`, type:"passive", active:true,
    note:`${dvRange} ft · Dämmerlicht wie Helles Licht · Dunkelheit wie Dämmerlicht`,
    desc:`Du siehst in dunklen Bedingungen bis ${dvRange} ft als wäre es Dämmerlicht, und in Dunkelheit als wäre es Dämmerlicht.`
   }));
  }

  const allResistances = [...(race?.resistances||[]), ...(sr?.resistances||[])];
  allResistances.forEach(res => {
   const resExists = featureList.some(f => f.keyword?.includes(res));
   if (!resExists) featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE,
    keyword:`Resistenz: ${res}`, type:"resistance", active:true,
    note:`Resistenz gegen ${res} (halber Schaden)`,
    desc:`Du hast Resistenz gegen ${res}. Du nimmst nur die Hälfte des Schadens dieses Typs.`
   }));
  });

  if (sr?.name?.includes("Hügelzwerg")) {
   featureList.push({ ...DEFAULT_FEATURE,
    keyword:"Zwergische Zähigkeit", type:"passive",
    note:"+1 TP pro Stufe (bereits in Max-TP eingerechnet ab Level 2)",
    desc:"Deine Trefferpunktmaximum erhöht sich um 1, und es erhöht sich um weitere 1 jedes Mal, wenn du eine Stufe aufsteigst.",
    active:true });
  }

  const monkLevel = 1;
const chaModFinal = Math.max(1, Math.floor(((stats?.cha||10)-10)/2));
  const classFeatures = (cls ? (CLASS_FEATURES[cls.name] || []) : []).map(f => {
   if (f.keyword && f.keyword.includes("Bardische Inspiration")) return { ...f, maxUses: chaModFinal };
   if (f.keyword && f.keyword.includes("Heilende Hände")) return { ...f, maxUses: 5 };
   return f;
  });
  classFeatures.forEach(f => featureList.push(autoClassifyFeature({ ...DEFAULT_FEATURE, ...f, active: true })));

  const raceName2 = selectedSubrace
   ? `${race?.name || ""} (${selectedSubrace.name})`
   : race?.name || "";

  const notes = languages.length > 0
   ? `Sprachen: ${[...new Set(languages)].join(", ")}`
   : "";

  const eq = selectedEquipment;

  const inventoryFromEquip = [];

  if (eq?.armorId && eq.armorId !== "unarmored") {
   const armorObj = ARMOR_CATALOG.find(a => a.id === eq.armorId);
   if (armorObj) inventoryFromEquip.push({
    ...DEFAULT_ITEM, name: armorObj.name, type:"armor", equipped:true, qty:1,
    armor:{ ac: armorObj.baseAC, stealthDisadv: armorObj.stealthDisadv, profCategory: armorObj.profCategory, minStr: armorObj.minStr||0, bonus:0, addDex: armorObj.addDex, maxDex: armorObj.maxDex },
   });
  }

  const handItems = [];
  if (eq?.hasShield) handItems.push({ kind:"shield" });
  (eq?.weaponIds || []).forEach(wid => {
   const w = WEAPON_CATALOG.find(x => x.id === wid);
   if (w) handItems.push({ kind:"weapon", w });
  });

  handItems.sort((a, b) => {
   const handsOf = item => {
    if (item.kind === "shield") return 1;
    if (item.kind === "weapon") return handsNeeded(item.w.props);
    return 0;
   };
   return handsOf(b) - handsOf(a);
  });

  let handsUsed = 0;
  handItems.forEach(item => {
   if (item.kind === "shield") {
    const fits = handsUsed + 1 <= 2;
    inventoryFromEquip.push({
     ...DEFAULT_ITEM, name:"Schild", type:"shield", equipped: fits, qty:1,
     shield:{ acBonus:2 },
    });
    if (fits) handsUsed += 1;
   } else if (item.kind === "weapon") {
    const w = item.w;
    const hands = handsNeeded(w.props);
    const fits = handsUsed + hands <= 2;
    const rangeStr = w.rangeStr && w.rangeStr !== "—" ? w.rangeStr : (w.range === "fern" ? "30/120 ft" : "");
    inventoryFromEquip.push({
     ...DEFAULT_ITEM, name: w.name, type:"weapon", equipped: fits, qty:1,
     weapon:{
      damage: w.damage, damageType: w.type, damageVers: w.damageVers || null,
      scale: w.scale, bonus:0, props: w.props, range: rangeStr,
      note: w.note || "", catalogId: w.id, category: w.category,
     },
    });
    if (fits) handsUsed += hands;
   }
  });

  const equippedArmorItem = inventoryFromEquip.find(x => x.type === "armor" && x.equipped);
  const equippedShieldItem = inventoryFromEquip.find(x => x.type === "shield" && x.equipped);

  const packId = eq?.packageId || "a";
  const packMapForClass = CLASS_PACK_MAP[cls?.name] || {};
  const packKey = packMapForClass[packId];
  const selectedPkg = (EQUIPMENT_RECOMMENDATIONS[cls?.name]?.packages || []).find(p => p.id === packId);

  const backpackContents = [];

  if (packKey && ITEM_PACKS[packKey]) {
   ITEM_PACKS[packKey].items
    .filter(item => item.name !== "Rucksack")
    .forEach(item => backpackContents.push({ name: item.name, qty: item.qty }));
  }

  (CLASS_MISC_ITEMS[cls?.name] || []).forEach(item => {
   if (item.qty > 0) backpackContents.push({ name: item.name, qty: item.qty });
  });

  const bgName = (bg?.name || data?.background?.name || "").trim();

  const bgMiscItems = BACKGROUND_MISC_ITEMS[bgName]
   || BACKGROUND_MISC_ITEMS[Object.keys(BACKGROUND_MISC_ITEMS).find(k => k.trim().toLowerCase() === bgName.toLowerCase())]
   || [];
  bgMiscItems.forEach(item => {
   const alreadyIn = backpackContents.some(c => c.name === item.name);
   if (!alreadyIn) backpackContents.push({ name: item.name, qty: item.qty });
  });

  if (backpackContents.length > 0) {
   const packLabel = packKey && ITEM_PACKS[packKey] ? ITEM_PACKS[packKey].label : "Ausrüstung";
   inventoryFromEquip.push({
    ...DEFAULT_ITEM,
    name: "Rucksack",
    type: "misc", qty: 1, equipped: false,
    desc: packLabel + " · " + backpackContents.length + " Gegenstände",
    contents: backpackContents,
    isOpen: false,
   });
  }
  const computedAC = (() => {
   const dex = Math.floor((stats.dex - 10) / 2);
   const con = Math.floor((stats.con - 10) / 2);
   const wis = Math.floor((stats.wis - 10) / 2);
   const shieldBonus = equippedShieldItem ? (equippedShieldItem.shield?.acBonus || 2) : 0;
   if (!equippedArmorItem) {

    if (cls?.name === "Barbar") return 10 + dex + con + shieldBonus;
    if (cls?.name === "Mönch")  return 10 + dex + wis + shieldBonus;
    return 10 + dex + shieldBonus;
   }
   const baseAC = equippedArmorItem.armor?.ac || 10;
   const armorAddDex = equippedArmorItem.armor?.addDex ?? ARMOR_CATALOG.find(a => a.name === equippedArmorItem.name)?.addDex;
   const armorMaxDex = equippedArmorItem.armor?.maxDex ?? ARMOR_CATALOG.find(a => a.name === equippedArmorItem.name)?.maxDex;
   if (armorAddDex) {
    const effectiveDex = (armorMaxDex !== null && armorMaxDex !== undefined) ? Math.min(dex, armorMaxDex) : dex;
    return baseAC + effectiveDex + shieldBonus;
   }
   return baseAC + shieldBonus;
  })();

  const charData = {
   name:       nameInput.trim() || "Unbenannt",
   race:       raceName2,
   background: bg?.name || "",
   alignment:  data.alignment?.name || "",
   classes:    [{ name: cls?.name || "", subclass:"", level:1 }],
   hitDice:    hitDie,
   stats,
   maxHP:      Math.max(1, maxHP),
   currentHP:  Math.max(1, maxHP),
   speed,
   ac:         computedAC,
   saveProficiencies,
   skillProficiencies,
   featureList,
   notes:      "",
   languages:  [...new Set([
    ...languages.filter(l =>
     !l.startsWith("+") &&
     !l.includes("eine weitere") &&
     !l.includes("nach Wahl") &&
     !l.includes("weitere") &&
     l.trim() !== ""
    ),
    ...wizardLanguages.filter(l => l.trim() !== ""),
   ])],
   inventory:  inventoryFromEquip,
   currency: { pp:0, gp: selectedPkg?.gold || CLASS_STARTING_GOLD[cls?.name] || 0, ep:0, sp:0, cp:0 },
   ...(spellData ? {
    spellcastingAbility: spellData.ability,
    spellSaveDC:         8 + 2 + Math.floor((stats[spellData.ability.toLowerCase()] - 10) / 2),
    spellAttackBonus:    2 + Math.floor((stats[spellData.ability.toLowerCase()] - 10) / 2),
   } : {}),
  };

  const remainingFreeChoices = detectFreeChoices(race, sr, bg)
   .filter(fc => {
    if (fc.type === "stat_free") return false;
    if (fc.type === "language_free") return false;
    return !Object.keys(freeStepChoices).some(k => k.startsWith(fc.id));
   })

   .map(fc => ({ ...fc, className: cls?.name || "", raceName: race?.name || "" }));
  if (remainingFreeChoices.length > 0) {
   setFreeChoiceModal({ choices: remainingFreeChoices, pendingCharData: charData });
   return;
  }

  if (Object.keys(freeStepChoices).length > 0) {
   const updated = JSON.parse(JSON.stringify(charData));
   Object.entries(freeStepChoices).forEach(([k, v]) => {
    if (k.startsWith("skill_")) {
     const sk = k.replace("skill_", "");
     if (updated.skillProficiencies?.[sk] !== undefined) updated.skillProficiencies[sk] = true;
    } else if (k.startsWith("lang_")) {
     if (!updated.languages) updated.languages = [];
     if (!updated.languages.includes(v)) updated.languages.push(v);
    }
   });
   onFinish(updated);
   return;
  }

  onFinish(charData);
 };

 const handleFreeChoiceConfirm = (choiceValues, pendingCharData) => {

  if (!pendingCharData) {

   setFreeChoiceModal(null);

   setFreeStepChoices(prev => ({...prev, ...choiceValues}));
   setStep(s => s + 1);
   setDetailItem(null);
   return;
  }
  const updated = JSON.parse(JSON.stringify(pendingCharData));
  Object.entries(choiceValues).forEach(([id, val]) => {

   if (typeof val === "object" && !Array.isArray(val)) {
    Object.entries(val).forEach(([k, bonus]) => {
     if (bonus > 0) updated.stats[k] = (updated.stats[k] || 10) + bonus;
    });

    if (val.con > 0) { updated.maxHP += val.con; updated.currentHP += val.con; }
   }

   if (Array.isArray(val) && id.includes("skill")) {
    val.forEach(sk => { if (updated.skillProficiencies?.[sk] !== undefined) updated.skillProficiencies[sk] = true; });
   }

   if (Array.isArray(val) && id.includes("lang")) {
    if (!updated.languages) updated.languages = [];
    val.forEach(l => { if (!updated.languages.includes(l)) updated.languages.push(l); });
   }
  });
  setFreeChoiceModal(null);
  onFinish(updated);
 };

function autoClassifyFeature(f) {

 const protectedTypes = ["limited_use","ki_pool","ki_ability","sneak_attack","extra_attack",
  "attack_bonus","bonus_damage","ac_bonus","speed_bonus","stat_bonus","skill_bonus","resistance","advantage","disadvantage"];
 if (protectedTypes.includes(f.type)) {

  if (f.type === "ki_pool") {
   if (!f.kiAbilities || f.kiAbilities.length === 0) {
    const text = ((f.keyword||"")+" "+(f.desc||"")).toLowerCase();
    for (const pool of Object.values(KNOWN_RESOURCE_POOLS)) {
     if (pool.type === "ki_pool" && pool.keywords.some(kw => text.includes(kw))) {
      return { ...f, kiAbilities: pool.abilities, resetOn: f.resetOn || pool.resetOn };
     }
    }
   }
  }
  return f;
 }

 const text = ((f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"")).toLowerCase();

 for (const [poolName, pool] of Object.entries(KNOWN_RESOURCE_POOLS)) {
  if (pool.keywords.some(kw => text.includes(kw))) {
   const maxUses = f.maxUses || 1;
   return {
    ...f,
    type: pool.type,
    resetOn: pool.resetOn,
    maxUses,
    usesLeft: f.usesLeft ?? maxUses,
    kiAbilities: pool.abilities.length > 0 ? pool.abilities : undefined,
   };
  }
 }

 const perRoundPatterns = [
  /pro runde/i,
  /per (turn|round)/i,
  /once per turn/i,
  /einmal pro (angriff|zug|kampfrunde)/i,
  /bonus.?aktion/i,
  /als reaktion/i,
 ];
 if (perRoundPatterns.some(p => p.test(text))) return f;

 const limitedPatterns = [
  /einmal pro (langen?|kurzen?) rast/i,
  /(\d+)×? pro (langen?|kurzen?) rast/i,
  /once per (long|short) rest/i,
  /pro tag/i, /per day/i,
  /einmal täglich/i,
  /(\d+)×? pro tag/i,
  /recharges? (on a|after) (long|short)/i,
  /lädt sich.*rast.*auf/i,
  /nach.*rast.*zurück/i,
  /kann.*einmal.*pro (langen?|kurzen?) rast/i,
 ];
 const isLimited = limitedPatterns.some(p => p.test(text));
 if (!isLimited) return f;

 let resetOn = "long";
 if (/kurzen? rast|short rest/i.test(text)) resetOn = "short";

 let maxUses = 1;
 const countMatch = text.match(/(\d+)[×x]?\s*pro/i) || text.match(/(\d+)\s*mal/i);
 if (countMatch) maxUses = Math.min(parseInt(countMatch[1]), 20);

 return { ...f, type:"limited_use", maxUses, usesLeft: maxUses, resetOn };
}

function syncKiAbilities(featureList, classes) {
 let list = [...featureList];
 const totalLevel = (classes||[]).reduce((s,c)=>s+(c.level||0),0)||1;

 for (const pool of Object.values(KNOWN_RESOURCE_POOLS)) {
  if (pool.type !== "ki_pool" || !pool.abilities.length) continue;
  const poolIdx = list.findIndex(f => f.type==="ki_pool" &&
   pool.keywords.some(kw => ((f.keyword||"")+" "+(f.desc||"")).toLowerCase().includes(kw)));
  if (poolIdx === -1) continue;

  const poolF = list[poolIdx];
  const classNames = {
   ki:         ["Mönch","Monk"],
   sorcery:    ["Zauberwirker","Sorcerer","Sorcerer (Zauberwirker)"],
   superiority:["Kämpfer","Fighter","Krieger"],
  };

  const poolKey = Object.keys(KNOWN_RESOURCE_POOLS).find(k => KNOWN_RESOURCE_POOLS[k] === pool);
  const relevantNames = classNames[poolKey] || [];

  let classLevel = totalLevel;
  if (relevantNames.length > 0) {
   const match = (classes||[]).find(c => relevantNames.some(n => (c.name||"").toLowerCase().includes(n.toLowerCase())));
   if (match) classLevel = match.level || 1;
  }

  list[poolIdx] = {
   ...poolF,
   maxUses: classLevel,
   usesLeft: Math.min(poolF.usesLeft ?? classLevel, classLevel),
   note: `${classLevel} Ki-Punkte (= Mönch-Level) · Reset nach kurzer oder langer Rast`,
  };

  const existing = new Set(list.filter(f=>f.type==="ki_ability").map(f=>(f.keyword||"").toLowerCase()));
  for (const ab of pool.abilities) {
   if (ab.minLevel && classLevel < ab.minLevel) continue;
   if (existing.has(ab.name.toLowerCase())) continue;
   list.push({
    ...DEFAULT_FEATURE,
    keyword: ab.name,
    type: "ki_ability",
    kiCost: ab.cost,
    kiAction: ab.action,
    desc: ab.desc,
    active: true,
   });
  }
 }
 return list;
}

  inventory:(p.inventory||[]).map(it=>({...DEFAULT_ITEM,...it,weapon:{...DEFAULT_ITEM.weapon,...(it.weapon||{})},armor:{...DEFAULT_ITEM.armor,...(it.armor||{})},shield:{...DEFAULT_ITEM.shield,...(it.shield||{})},potion:{...DEFAULT_ITEM.potion,...(it.potion||{})},magic:{...DEFAULT_ITEM.magic,...(it.magic||{})}})),
  featureList:(p.featureList||[]).map(f=>autoClassifyFeature({...DEFAULT_FEATURE,...f})),
  classes:p.classes||DEFAULT.classes,
 };

 base.featureList = syncKiAbilities(base.featureList, base.classes);
 return base;
};
const currToCP  = c=>(c.pp||0)*1000+(c.gp||0)*100+(c.ep||0)*50+(c.sp||0)*10+(c.cp||0);
const cpToCurr  = total=>{let r=Math.max(0,Math.round(total));const pp=Math.floor(r/1000);r%=1000;const gp=Math.floor(r/100);r%=100;const ep=Math.floor(r/50);r%=50;const sp=Math.floor(r/10);r%=10;return{pp,gp,ep,sp,cp:r};};
const parseCoins= raw=>{const out={pp:0,gp:0,ep:0,sp:0,cp:0};const re=/(\d+)\s*(pp|gp|ep|sp|cp)/gi;let m;while((m=re.exec(raw))!==null)out[m[2].toLowerCase()]+=parseInt(m[1])||0;return(out.pp+out.gp+out.ep+out.sp+out.cp)>0?out:null;};

 {key:"sp",label:"SP",name:"Silber",  color:"#d1d5db",bg:"rgba(156,163,175,0.15)",border:"rgba(156,163,175,0.4)"},

function HpButtons({currentHP,maxHP,tempHP,onUpdate,onUpdateTemp}){

 return(<div style={{marginTop:12}}>{mode?(<div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{flex:1,display:"flex",alignItems:"center",gap:10,background:"rgba(12,12,18,0.88)",borderRadius:16,border:`1px solid ${mode==="heal"?"rgba(74,222,128,0.4)":"rgba(248,113,113,0.4)"}`,padding:"10px 14px"}}><span style={{fontSize:20}}>{mode==="heal"?"💚":"🩸"}</span><input type="number" min="1" autoFocus value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirm();if(e.key==="Escape"){setMode(null);setInput("");}}} placeholder={mode==="heal"?"Wie viel heilen?":"Wie viel Schaden?"} style={{flex:1,background:"transparent",border:"none",color:"white",fontSize:18,fontWeight:800,outline:"none",fontFamily:"inherit"}}/></div><button onClick={confirm} style={{background:"rgba(34,197,94,0.15)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✓</button><button onClick={()=>{setMode(null);setInput("");}} style={{background:"rgba(18,18,25,0.83)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 12px",fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✕</button></div>):(<div style={{display:"flex",gap:8}}><button onClick={()=>setMode("heal")} style={{background:"rgba(34,197,94,0.15)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit",flex:1}}>💚 Heilen</button><button onClick={()=>setMode("damage")} style={{background:"rgba(239,68,68,0.15)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit",flex:1}}>🩸 Schaden</button><button onClick={()=>onUpdate(maxHP)} style={{background:"rgba(18,18,25,0.83)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 14px",fontWeight:600,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Voll</button></div>)}</div>);

function RestModals({restModal,setRestModal,ch,upCh,totalLevel,deathSaves,setDeathSaves,theme}){

 const dieType=ch.hitDice||"1d8";const conMod=statMod(ch.stats.con);const availHD=Math.max(0,totalLevel-(ch.usedHitDice||0));
 const closeShort=()=>{setRestModal(null);setShortRestDice(0);setShortRestInput("");setShortRestResult(null);};
 const doShortRest=()=>{if(shortRestDice<=0)return;const rolled=parseInt(shortRestInput);if(isNaN(rolled)||rolled<shortRestDice)return;const healing=Math.max(0,rolled+conMod*shortRestDice);upCh(n=>{n.currentHP=Math.min(n.maxHP,n.currentHP+healing);n.usedHitDice=(n.usedHitDice||0)+shortRestDice;
  n.featureList=(n.featureList||[]).map(f=>
   (f.type==="limited_use"&&f.resetOn==="short")||(f.type==="ki_pool")
    ?{...f,usesLeft:f.maxUses||1}:f);return n;});setShortRestResult({rolled,conMod,healing,dice:shortRestDice});};
 const doLongRest=()=>{const hdRegain=Math.max(1,Math.floor(totalLevel/2));upCh(n=>{n.currentHP=n.maxHP;n.tempHP=0;n.usedHitDice=Math.max(0,(n.usedHitDice||0)-hdRegain);for(let lvl=1;lvl<=9;lvl++){const max=n.spellSlots[lvl][1];n.spellSlots[lvl]=[max,max];}
  n.featureList=(n.featureList||[]).map(f=>
   (f.type==="limited_use"&&(f.resetOn==="long"||f.resetOn==="short"))||(f.type==="ki_pool")
    ?{...f,usesLeft:f.maxUses||1}:f);return n;});setDeathSaves({success:0,fail:0});setRestModal(null);};

  {restModal==="short"&&<><div style={{fontSize:18,fontWeight:900,color:"#fbbf24",marginBottom:6}}>☕ Kurze Rast</div><div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginBottom:14,lineHeight:1.6}}>Mindestens 1 Stunde. Trefferwürfel ausgeben um HP zu heilen.</div>{!shortRestResult?<><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}><div style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>TW ausgeben:</div><div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}><button onClick={()=>setShortRestDice(d=>Math.max(0,d-1))} style={{...S.btnGhost,padding:"4px 10px",fontSize:16}}>−</button><span style={{fontSize:20,fontWeight:900,color:"#fbbf24",minWidth:28,textAlign:"center"}}>{shortRestDice}</span><button onClick={()=>setShortRestDice(d=>Math.min(availHD,d+1))} style={{...S.btnGhost,padding:"4px 10px",fontSize:16}}>+</button></div></div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:12,textAlign:"right"}}>Verfügbar: {availHD}/{totalLevel} · {dieType}</div>{shortRestDice>0&&<><div style={{padding:"10px 14px",background:"rgba(251,191,36,0.07)",borderRadius:10,border:"1px solid rgba(251,191,36,0.2)",marginBottom:12}}><div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:4}}>Würfle {shortRestDice}×{dieType}</div>{conMod!==0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>+ {shortRestDice}×{fmtMod(conMod)} CON = {conMod>0?"+":""}{shortRestDice*conMod} extra</div>}</div><div style={{marginBottom:16}}><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:4,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>Summe eingeben</div><input type="number" min={shortRestDice} value={shortRestInput} onChange={e=>setShortRestInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doShortRest()} placeholder={`Mind. ${shortRestDice}`} style={{...S.input,fontSize:22,fontWeight:900,textAlign:"center",padding:"10px 14px"}}/></div></>}<div style={{display:"flex",gap:8}}><button     </div>))}
   </div>)}
  </div>
 </div>);
}

function TraitNotesTab({ ch, upCh, up, theme, S, AT }) {
 const [openPicker, setOpenPicker] = useState(null);

 const background = ch.background || "";
 const fields = [
  { key:"personalityTraits", label:"🧠 Persönlichkeit", placeholder:"Wie verhält sich dein Charakter?" },
  { key:"ideals",            label:"💡 Ideale",         placeholder:"Wofür kämpft dein Charakter?" },
  { key:"bonds",             label:"🔗 Bindungen",      placeholder:"Was hält deinen Charakter in der Welt?" },
  { key:"flaws",             label:"⚠️ Schwächen",      placeholder:"Was macht deinen Charakter menschlich?" },
 ];

 const getSuggestions = (fieldKey) => {
  const data = TRAIT_SUGGESTIONS[fieldKey];
  if (!data) return [];
  const byBg = background ? (data.byBackground?.[background] || []) : [];
  const generic = data.generic || [];

  return [...byBg, ...generic.filter(g => !byBg.includes(g))];
 };

 const appendSuggestion = (fieldKey, text) => {
  const current = ch[fieldKey] || "";
  const newVal = current.trim() ? current.trim() + "\n" + text : text;
  up(fieldKey, newVal);
 };

 return (
  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
   <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
    {fields.map(({ key, label, placeholder }) => {
     const suggestions = getSuggestions(key);
     const isOpen = openPicker === key;
     const bgSuggestions = background ? (TRAIT_SUGGESTIONS[key]?.byBackground?.[background] || []) : [];

     return (
      <div key={key} style={S.card}>
       {/* Header */}
       <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <div style={{ ...S.section, fontSize:13, margin:0 }}>{label}</div>
        <button
         onClick={() => setOpenPicker(isOpen ? null : key)}
         style={{
          background: isOpen ? `${theme.accent}22` : "rgba(15,15,22,0.85)",
          border: `1px solid ${isOpen ? theme.accent+"66" : "rgba(255,255,255,0.12)"}`,
          borderRadius: 8, padding:"3px 10px", cursor:"pointer",
          fontFamily:"inherit", fontWeight:700, fontSize:11,
          color: isOpen ? theme.accent : "rgba(255,255,255,0.45)",
          transition:"all 0.15s",
         }}
        >
         {isOpen ? "✕ Schließen" : "✦ Vorschläge"}
        </button>
       </div>

       {/* Suggestions Panel */}
       {isOpen && (
        <div style={{
         marginBottom:10, borderRadius:10,
         border:`1px solid ${theme.accent}33`,
         background:"rgba(255,255,255,0.02)",
         overflow:"hidden",
        }}>
         {/* Background-specific header */}
         {background && bgSuggestions.length > 0 && (
          <div style={{
           padding:"6px 10px", fontSize:10, fontWeight:800,
           color:theme.accent, letterSpacing:"0.07em",
           background:`${theme.accent}0d`,
           borderBottom:`1px solid ${theme.accent}22`,
          }}>
           ✦ PASSEND ZUM HINTERGRUND: {background.toUpperCase()}
          </div>
         )}
         <div style={{ maxHeight:220, overflowY:"auto", padding:"6px 0" }}>
          {suggestions.map((s, i) => {
           const isBg = bgSuggestions.includes(s);
           const alreadyUsed = (ch[key] || "").includes(s);
           return (
            <div
             key={i}
             onClick={() => !alreadyUsed && appendSuggestion(key, s)}
             style={{
              padding:"7px 10px",
              cursor: alreadyUsed ? "default" : "pointer",
              display:"flex", alignItems:"flex-start", gap:8,
              opacity: alreadyUsed ? 0.35 : 1,
              background: alreadyUsed ? "transparent" : "transparent",
              transition:"background 0.12s",
              borderBottom: i < suggestions.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none",
             }}

            >
             <span style={{
              flexShrink:0, fontSize:12, marginTop:1,
              color: alreadyUsed ? "rgba(255,255,255,0.2)" : isBg ? theme.accent : "rgba(255,255,255,0.25)",
              fontWeight:800,
             }}>
              {alreadyUsed ? "✓" : isBg ? "★" : "·"}
             </span>
             <span style={{
              fontSize:12, color: alreadyUsed ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.7)",
              lineHeight:1.5,
             }}>
              {s}
             </span>
            </div>
           );
          })}
         </div>
         <div style={{
          padding:"6px 10px", fontSize:10,
          color:"rgba(255,255,255,0.2)",
          borderTop:"1px solid rgba(255,255,255,0.06)",
         }}>
          <span style={{ color:theme.accent }}>★</span> Hintergrund-passend &nbsp;·&nbsp; <span style={{ color:"rgba(255,255,255,0.4)" }}>·</span> Allgemein &nbsp;·&nbsp; Klicken zum Hinzufügen
         </div>
        </div>
       )}

       {/* Text field */}
       <AT path={key} placeholder={placeholder} minRows={3}/>
      </div>
     );
    })}
   </div>
  </div>
 );
}

const HIT_DICE_SIDES = { "1d12":12,"1d10":10,"1d8":8,"1d6":6 };

function LevelUpModal({ cls, currentLevel, ch, onConfirm, onClose, theme }) {
 const newLevel = currentLevel + 1;
 const clsData  = LEVEL_UP_DATA[cls?.name] || null;
 const hitDie   = clsData?.hitDie || cls?.hitDie || ch.hitDice || "1d8";
 const dieSides = HIT_DICE_SIDES[hitDie] || 8;
 const conMod   = Math.floor(((ch.stats?.con || 10) - 10) / 2);
 const newFeatures = clsData?.features?.[newLevel] || [];
 const newPB    = Math.ceil(newLevel / 4) + 1;
 const oldPB    = Math.ceil(currentLevel / 4) + 1;
 const pbChanged = newPB !== oldPB;

 const newSlots = clsData?.spellSlots?.[newLevel] || null;
 const oldSlots = clsData?.spellSlots?.[currentLevel] || null;
 const slotChanges = newSlots ? newSlots.map((v, i) => ({ grade: i+1, delta: v - (oldSlots?.[i] || 0) })).filter(({delta}) => delta > 0) : [];

 const isASI = newFeatures.some(f => f.includes("ASI") || f.includes("Attributsteigerung"));

 const [hpMode, setHpMode]       = useState("roll");
 const [rolledHP, setRolledHP]   = useState(null);
 const [manualHP, setManualHP]   = useState("");
 const [rolling, setRolling]     = useState(false);
 const [asiStats, setAsiStats]   = useState({ str:0,dex:0,con:0,int:0,wis:0,cha:0 });
 const [asiPoints, setAsiPoints] = useState(2);

 const rollHP = () => {
  setRolling(true);
  setTimeout(() => {
   setRolledHP(Math.floor(Math.random() * dieSides) + 1);
   setRolling(false);
  }, 500);
 };

 const hpGain = hpMode === "max"
  ? dieSides + conMod
  : hpMode === "roll"
  ? (rolledHP !== null ? rolledHP + conMod : null)
  : (parseInt(manualHP) ? parseInt(manualHP) + conMod : null);

 const canConfirm = hpGain !== null && hpGain !== undefined;

 const handleConfirm = () => {
  if (!canConfirm) return;
  onConfirm({
   newLevel,
   hpIncrease: Math.max(1, hpGain),
   newFeatures,
   newSlots,
   asiStats: isASI ? asiStats : null,
   pbChanged,
   newPB,
  });
 };

 const STAT_KEYS = ["str","dex","con","int","wis","cha"];
 const STAT_LABELS = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
 const STAT_COLORS = { str:"#ef4444",dex:"#4ade80",con:"#f97316",int:"#818cf8",wis:"#86efac",cha:"#ec4899" };

 const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:10, padding:"7px 10px", color:"white", fontSize:14, outline:"none",
  width:"100%", fontFamily:"inherit" };

 return (
  <div style={{ position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",
   justifyContent:"center",background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",padding:16 }}
   onClick={onClose}>
   <div onClick={e=>e.stopPropagation()} style={{
    maxWidth:480,width:"100%",maxHeight:"92vh",overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain",
    background:"#0f1117",border:`2px solid ${theme.accent}55`,borderRadius:20,
    padding:"24px 20px",boxShadow:`0 0 60px ${theme.accent}22,0 24px 60px rgba(0,0,0,0.8)`,
    animation:"modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",position:"relative",
   }}>
    {/* Close */}
    <button onClick={onClose} style={{ position:"absolute",top:14,right:14,
     background:"rgba(18,18,25,0.83)",border:"1px solid rgba(255,255,255,0.1)",
     borderRadius:8,width:30,height:30,color:"rgba(255,255,255,0.5)",cursor:"pointer",
     fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>✕</button>

    {/* Header */}
    <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:20 }}>
     <div style={{ width:52,height:52,borderRadius:14,flexShrink:0,
      background:`${theme.accent}18`,border:`2px solid ${theme.accent}55`,
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:26 }}>⬆</div>
     <div>
      <div style={{ fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.3)",
       letterSpacing:"0.08em",textTransform:"uppercase" }}>Level Up!</div>
      <div style={{ fontSize:22,fontWeight:900,color:theme.accent }}>
       {cls?.name || "Klasse"} – Level {newLevel}
      </div>
      {pbChanged && (
       <div style={{ fontSize:12,color:"#4ade80",fontWeight:700,marginTop:2 }}>
        ✦ Übungsbonus steigt auf +{newPB}
       </div>
      )}
     </div>
    </div>

    <div style={{ display:"flex",flexDirection:"column",gap:16 }}>

     {/* HP SECTION */}
     <div style={{ background:"rgba(12,12,18,0.90)",border:"1px solid rgba(255,255,255,0.08)",
      borderRadius:14,padding:"14px 16px" }}>
      <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:12 }}>
       ❤️ TREFFERPUNKTE
      </div>
      <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:10 }}>
       Trefferwürfel: <strong style={{color:"rgba(255,255,255,0.7)"}}>{hitDie}</strong> &nbsp;·&nbsp;
       CON-Mod: <strong style={{color:conMod>=0?"#4ade80":"#f87171"}}>{conMod>=0?"+":""}{conMod}</strong>
      </div>

      {/* Mode switcher */}
      <div style={{ display:"flex",gap:6,marginBottom:12 }}>
       {[["roll","🎲 Würfeln"],["max","⬆ Maximum"],["manual","✏ Manuell"]].map(([m,l])=>(
        <button key={m} onClick={()=>setHpMode(m)} style={{
         flex:1,padding:"7px 4px",fontSize:11,fontWeight:800,
         borderRadius:10,cursor:"pointer",fontFamily:"inherit",
         border:`2px solid ${hpMode===m?theme.accent:"rgba(255,255,255,0.1)"}`,
         background:hpMode===m?`${theme.accent}22`:"rgba(12,12,18,0.88)",
         color:hpMode===m?theme.accent:"rgba(255,255,255,0.4)",transition:"all 0.15s",
        }}>{l}</button>
       ))}
      </div>

      {hpMode==="roll" && (
       <div>
        <button onClick={rollHP} disabled={rolling} style={{
         width:"100%",padding:"11px",fontWeight:900,fontSize:15,
         fontFamily:"inherit",borderRadius:12,cursor:rolling?"not-allowed":"pointer",
         border:`2px solid ${theme.accent}`,color:rolling?"rgba(255,255,255,0.3)":theme.accent,
         background:rolling?"rgba(12,12,18,0.90)":`${theme.accent}18`,
         marginBottom:10,transition:"all 0.2s",
         animation:rolling?"rollPulse 0.5s ease infinite":"none",
        }}>{rolling?"🎲 Würfle...":rolledHP!==null?`🎲 Neu würfeln (letztes: ${rolledHP})`:"🎲 Jetzt würfeln"}</button>
        {rolledHP!==null && (
         <div style={{ textAlign:"center",padding:"10px",background:`${theme.accent}0d`,
          borderRadius:10,border:`1px solid ${theme.accent}33` }}>
          <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{rolledHP}</span>
          <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
          <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
          <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
          <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,rolledHP+conMod)} HP</span>
         </div>
        )}
       </div>
      )}
      {hpMode==="max" && (
       <div style={{ textAlign:"center",padding:"12px",background:`${theme.accent}0d`,
        borderRadius:10,border:`1px solid ${theme.accent}33` }}>
        <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:4 }}>Maximum + CON</div>
        <span style={{ fontSize:28,fontWeight:900,color:theme.accent }}>{dieSides}</span>
        <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>+</span>
        <span style={{ fontSize:20,fontWeight:800,color:conMod>=0?"#4ade80":"#f87171" }}>{conMod>=0?"+":""}{conMod}</span>
        <span style={{ fontSize:16,color:"rgba(255,255,255,0.4)",margin:"0 8px" }}>=</span>
        <span style={{ fontSize:28,fontWeight:900,color:"#4ade80" }}>+{Math.max(1,dieSides+conMod)} HP</span>
       </div>
      )}
      {hpMode==="manual" && (
       <div>
        <input type="number" min="1" max={dieSides} value={manualHP}
         onChange={e=>setManualHP(e.target.value)}
         placeholder={`1–${dieSides}`}
         style={{...inp,fontSize:22,fontWeight:900,textAlign:"center",padding:"10px"}}/>
        {manualHP && (
         <div style={{ textAlign:"center",marginTop:8,padding:"8px",
          background:`${theme.accent}0d`,borderRadius:10,border:`1px solid ${theme.accent}33`,fontSize:14 }}>
          <span style={{ color:theme.accent,fontWeight:800 }}>{manualHP}</span>
          <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>+</span>
          <span style={{ color:conMod>=0?"#4ade80":"#f87171",fontWeight:800 }}>{conMod>=0?"+":""}{conMod}</span>
          <span style={{ color:"rgba(255,255,255,0.4)",margin:"0 6px" }}>=</span>
          <span style={{ color:"#4ade80",fontWeight:900 }}>+{Math.max(1,(parseInt(manualHP)||0)+conMod)} HP</span>
         </div>
        )}
       </div>
      )}
     </div>

     {/* NEW FEATURES */}
     {newFeatures.length > 0 && (
      <div style={{ background:"rgba(12,12,18,0.90)",border:"1px solid rgba(255,255,255,0.08)",
       borderRadius:14,padding:"14px 16px" }}>
       <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:10 }}>
        ✨ NEUE FEATURES AUF LEVEL {newLevel}
       </div>
       <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
        {newFeatures.map((f,i)=>(
         <div key={i} style={{ display:"flex",gap:8,alignItems:"flex-start",
          padding:"6px 10px",background:`${theme.accent}0d`,borderRadius:8,
          border:`1px solid ${theme.accent}22` }}>
          <span style={{ color:theme.accent,flexShrink:0,fontWeight:800 }}>✦</span>
          <span style={{ fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.5 }}>{f}</span>
         </div>
        ))}
       </div>
      </div>
     )}

     {/* SPELL SLOTS */}
     {newSlots && slotChanges.length > 0 && (
      <div style={{ background:"rgba(192,132,252,0.06)",border:"1px solid rgba(192,132,252,0.25)",
       borderRadius:14,padding:"14px 16px" }}>
       <div style={{ fontSize:11,fontWeight:800,color:"#c084fc",letterSpacing:"0.07em",marginBottom:10 }}>
        ✨ NEUE ZAUBERSLOTS
       </div>
       <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
        {newSlots.map((count,i)=>{
         if(count===0) return null;
         const delta = count - (oldSlots?.[i]||0);
         return (
          <div key={i} style={{ background:"rgba(192,132,252,0.12)",border:"1px solid rgba(192,132,252,0.35)",
           borderRadius:10,padding:"6px 12px",textAlign:"center" }}>
           <div style={{ fontSize:10,color:"rgba(192,132,252,0.7)",fontWeight:800 }}>GRAD {i+1}</div>
           <div style={{ fontSize:18,fontWeight:900,color:"#c084fc" }}>{count}</div>
           {delta>0 && <div style={{ fontSize:10,color:"#4ade80",fontWeight:700 }}>+{delta}</div>}
          </div>
         );
        }).filter(Boolean)}
       </div>
      </div>
     )}

     {/* ASI */}
     {isASI && (
      <div style={{ background:"rgba(12,12,18,0.90)",border:`1px solid ${theme.accent}33`,
       borderRadius:14,padding:"14px 16px" }}>
       <div style={{ fontSize:11,fontWeight:800,color:theme.accent,letterSpacing:"0.07em",marginBottom:4 }}>
        💪 ATTRIBUTSTEIGERUNG (ASI)
       </div>
       <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:12 }}>
        Verteile <strong style={{color:theme.accent}}>{asiPoints}</strong> Punkt{asiPoints!==1?"e":""} auf deine Attribute (max. +2 pro Attribut). Oder überspringe für einen Feat.
       </div>
       <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 }}>
        {STAT_KEYS.map(k=>(
         <div key={k} style={{ textAlign:"center",background:"rgba(12,12,18,0.88)",
          border:`1px solid ${asiStats[k]>0?STAT_COLORS[k]+"55":"rgba(255,255,255,0.1)"}`,
          borderRadius:10,padding:"8px 4px" }}>
          <div style={{ fontSize:10,fontWeight:800,color:STAT_COLORS[k] }}>{STAT_LABELS[k]}</div>
          <div style={{ fontSize:16,fontWeight:900,color:"rgba(255,255,255,0.6)",margin:"3px 0" }}>
           {(ch.stats?.[k]||10)+asiStats[k]}
           {asiStats[k]>0 && <span style={{color:"#4ade80",fontSize:12}}> +{asiStats[k]}</span>}
          </div>
          <div style={{ display:"flex",gap:3 }}>
           <button onClick={()=>{if(asiStats[k]>0)setAsiStats(s=>({...s,[k]:s[k]-1}));setAsiPoints(p=>Math.min(2,p+1));}}
            disabled={asiStats[k]===0}
            style={{ flex:1,background:"rgba(239,68,68,0.2)",color:"#f87171",border:"1px solid rgba(239,68,68,0.3)",
             borderRadius:6,padding:"2px 0",fontSize:13,cursor:asiStats[k]===0?"not-allowed":"pointer",
             fontFamily:"inherit",opacity:asiStats[k]===0?0.3:1 }}>−</button>
           <button onClick={()=>{if(asiPoints>0&&asiStats[k]<2&&(ch.stats?.[k]||10)+asiStats[k]<20){setAsiStats(s=>({...s,[k]:s[k]+1}));setAsiPoints(p=>p-1);}}}
            disabled={asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20}
            style={{ flex:1,background:"rgba(34,197,94,0.2)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.3)",
             borderRadius:6,padding:"2px 0",fontSize:13,fontFamily:"inherit",
             cursor:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?"not-allowed":"pointer",
             opacity:(asiPoints===0||asiStats[k]===2||(ch.stats?.[k]||10)+asiStats[k]>=20)?0.3:1 }}>+</button>
          </div>
         </div>
        ))}
       </div>
       {asiPoints > 0 && (
        <div style={{ marginTop:10,fontSize:12,color:"rgba(255,255,255,0.3)",fontStyle:"italic",textAlign:"center" }}>
         Noch {asiPoints} Punkt{asiPoints!==1?"e":""} übrig – oder lass sie frei für einen Feat.
        </div>
       )}
      </div>
     )}

     {/* Confirm */}
     <button onClick={handleConfirm} disabled={!canConfirm} style={{
      width:"100%",background:canConfirm?`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`:"rgba(15,15,22,0.85)",
      color:canConfirm?"white":"rgba(255,255,255,0.2)",border:"none",borderRadius:12,
      padding:"13px 0",fontWeight:900,cursor:canConfirm?"pointer":"not-allowed",
      fontSize:15,fontFamily:"inherit",transition:"all 0.2s",
     }}>
      {canConfirm ? `⬆ Level ${newLevel} bestätigen (+${Math.max(1,hpGain)} HP)` : "Erst HP festlegen"}
     </button>
    </div>
   </div>
  </div>
 );
}

function WizardLanguagesPicker({ race, subrace, background, cls, fixedLanguages, freeCount, chosen, onChange, theme }) {

 const knownSet = new Set([
  ...fixedLanguages.filter(l =>
   l && !l.startsWith("+") && !l.includes("eine weitere") && !l.includes("nach Wahl") && !l.includes("weitere")
  ),
 ]);
 const chosenSet = new Set(chosen);

 const suggestions = new Set([
  ...(cls?.name ? (LANGUAGE_SUGGESTIONS.byClass[cls.name]||[]) : []),
  ...(race?.name ? (LANGUAGE_SUGGESTIONS.byRace[race.name]||[]) : []),
 ]);

 const toggle = (lang) => {
  if (knownSet.has(lang)) return;
  if (chosenSet.has(lang)) {
   onChange(chosen.filter(l=>l!==lang));
  } else if (chosen.length < freeCount) {
   onChange([...chosen, lang]);
  }
 };

 const addCustom = (val) => {
  const t = val.trim();
  if (!t || chosenSet.has(t) || chosen.length >= freeCount) return;
  onChange([...chosen, t]);
 };

 const [customInput, setCustomInput] = useState("");

 if (freeCount === 0) return null;

 return (
  <div style={{marginTop:16,background:"rgba(56,189,248,0.05)",border:"2px solid rgba(56,189,248,0.25)",
   borderRadius:14,padding:"14px 16px"}}>
   <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
    <div style={{fontWeight:900,fontSize:14,color:"#38bdf8"}}>
     🗣 Sprachen wählen
    </div>
    <span style={{fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:20,
     background: chosen.length===freeCount ? "rgba(74,222,128,0.2)" : "rgba(56,189,248,0.15)",
     color: chosen.length===freeCount ? "#4ade80" : "#38bdf8",
     border:`1px solid ${chosen.length===freeCount ? "rgba(74,222,128,0.4)" : "rgba(56,189,248,0.3)"}`}}>
     {chosen.length}/{freeCount} gewählt
    </span>
   </div>
   <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:10}}>
    {freeCount === 1 ? "Wähle 1 weitere Sprache" : `Wähle ${freeCount} weitere Sprachen`} · Bereits bekannt: {fixedLanguages.join(", ")||"—"}
   </div>

   {/* Empfehlungen */}
   {[...suggestions].filter(l=>!knownSet.has(l)).length > 0 && (
    <div style={{marginBottom:10}}>
     <div style={{fontSize:10,fontWeight:800,color:"rgba(74,222,128,0.7)",letterSpacing:"0.07em",marginBottom:5}}>✦ EMPFOHLEN</div>
     <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
      {[...suggestions].filter(l=>!knownSet.has(l)).map(lang=>{
       const active = chosenSet.has(lang);
       const disabled = !active && chosen.length >= freeCount;
       const meta = ALL_LANGUAGES_WITH_META.find(l=>l.name===lang);
       return (
        <button key={lang} onClick={()=>toggle(lang)}
         title={meta ? meta.speakers : ""}
         style={{fontSize:12,padding:"4px 12px",borderRadius:20,fontFamily:"inherit",fontWeight:700,
          cursor:disabled?"not-allowed":"pointer",transition:"all 0.15s",
          background:active?"rgba(74,222,128,0.25)":"rgba(74,222,128,0.08)",
          color:active?"#4ade80":"rgba(74,222,128,0.7)",
          border:`1px solid ${active?"rgba(74,222,128,0.6)":"rgba(74,222,128,0.25)"}`,
          opacity:disabled?0.4:1}}>
         {active?"✓ ":""}{lang}
         {meta?.type==="exotic"&&<span style={{fontSize:9,marginLeft:4,opacity:0.6}}>✦</span>}
        </button>
       );
      })}
     </div>
    </div>
   )}

   {/* Standard */}
   <div style={{marginBottom:8}}>
    <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.3)",letterSpacing:"0.07em",marginBottom:5}}>STANDARD</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
     {STANDARD_LANGUAGES.map(lo=>{
      const active = chosenSet.has(lo.name);
      const known  = knownSet.has(lo.name);
      const disabled = known || (!active && chosen.length >= freeCount);
      return (
       <button key={lo.name} onClick={()=>!known&&toggle(lo.name)}
        title={lo.speakers}
        style={{fontSize:12,padding:"4px 10px",borderRadius:20,fontFamily:"inherit",fontWeight:700,
         cursor:known?"not-allowed":disabled?"not-allowed":"pointer",transition:"all 0.15s",
         background:known?"rgba(56,189,248,0.1)":active?`${theme.accent}22`:"rgba(15,15,22,0.85)",
         color:known?"#38bdf8":active?theme.accent:"rgba(255,255,255,0.55)",
         border:`1px solid ${known?"rgba(56,189,248,0.3)":active?`${theme.accent}55`:"rgba(255,255,255,0.12)"}`,
         opacity:(!active&&!known&&disabled)?0.35:1}}>
        {known?"✓ bekannt ":active?"✓ ":""}{lo.name}
       </button>
      );
     })}
    </div>
   </div>

   {/* Exotisch */}
   <div style={{marginBottom:10}}>
    <div style={{fontSize:10,fontWeight:800,color:"rgba(167,139,250,0.6)",letterSpacing:"0.07em",marginBottom:5}}>EXOTISCH ✦</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
     {EXOTIC_LANGUAGES.map(lo=>{
      const active = chosenSet.has(lo.name);
      const known  = knownSet.has(lo.name);
      const disabled = known || (!active && chosen.length >= freeCount);
      return (
       <button key={lo.name} onClick={()=>!known&&toggle(lo.name)}
        title={`${lo.speakers} · Schrift: ${lo.script}`}
        style={{fontSize:12,padding:"4px 10px",borderRadius:20,fontFamily:"inherit",fontWeight:700,
         cursor:known?"not-allowed":disabled?"not-allowed":"pointer",transition:"all 0.15s",
         background:known?"rgba(167,139,250,0.1)":active?"rgba(167,139,250,0.2)":"rgba(15,15,22,0.85)",
         color:known?"#a78bfa":active?"#a78bfa":"rgba(167,139,250,0.5)",
         border:`1px solid ${known?"rgba(167,139,250,0.3)":active?"rgba(167,139,250,0.5)":"rgba(167,139,250,0.15)"}`,
         opacity:(!active&&!known&&disabled)?0.35:1}}>
        {known?"✓ bekannt ":active?"✓ ":""}{lo.name}
       </button>
      );
     })}
    </div>
   </div>

   {/* Eigene Sprache */}
   <div style={{display:"flex",gap:6}}>
    <input value={customInput} onChange={e=>setCustomInput(e.target.value)}
     placeholder="Eigene Sprache eingeben…"
     onKeyDown={e=>{if(e.key==="Enter"){addCustom(customInput);setCustomInput("");}}}
     style={{flex:1,background:"rgba(12,12,18,0.9)",border:"1px solid rgba(255,255,255,0.12)",
      borderRadius:8,padding:"6px 10px",color:"white",fontFamily:"inherit",fontSize:12}}/>
    <button onClick={()=>{addCustom(customInput);setCustomInput("");}}
     disabled={!customInput.trim()||chosen.length>=freeCount}
     style={{padding:"6px 12px",borderRadius:8,fontFamily:"inherit",fontWeight:700,fontSize:12,
      cursor:!customInput.trim()||chosen.length>=freeCount?"not-allowed":"pointer",
      background:!customInput.trim()||chosen.length>=freeCount?"rgba(12,12,18,0.88)":`${theme.accent}22`,
      color:!customInput.trim()||chosen.length>=freeCount?"rgba(255,255,255,0.2)":theme.accent,
      border:`1px solid ${!customInput.trim()||chosen.length>=freeCount?"rgba(255,255,255,0.08)":`${theme.accent}44`}`}}>
     + Hinzufügen
    </button>
   </div>
  </div>
 );
}
function LanguagesCard({ ch, upCh, theme, S }) {
 const [addLangOpen, setAddLangOpen] = useState(false);
 const [customLang, setCustomLang]   = useState("");

 const langs = (ch.languages||[]).filter(l=>l&&!l.includes("eine weitere")&&!l.includes("nach Wahl")&&!l.includes("weitere")&&!l.startsWith("+"));
 const knownSet = new Set(langs);
 const classNames = (ch.classes||[]).map(c=>c.name).filter(Boolean);
 const raceName   = (ch.race||"").split(" ")[0];
 const suggestions = new Set([
  ...classNames.flatMap(cn => LANGUAGE_SUGGESTIONS.byClass[cn]||[]),
  ...(LANGUAGE_SUGGESTIONS.byRace[raceName]||[]),
 ]);

 const addLang = (l) => {
  const t = l.trim();
  if (!t) return;
  upCh(n => { if (!(n.languages||[]).includes(t)) { n.languages = [...(n.languages||[]), t]; } return n; });
 };

 return (
  <div style={S.card}>
   <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
    <div style={S.section}>🗣 Sprachen</div>
    <button onClick={()=>setAddLangOpen(o=>!o)}
     style={{...S.btnGhost,fontSize:12,padding:"4px 12px"}}>
     {addLangOpen?"✕ Schließen":"+ Sprache hinzufügen"}
    </button>
   </div>

   {/* Bekannte Sprachen */}
   {langs.length===0
    ? <div style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>Noch keine Sprachen eingetragen.</div>
    : <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:addLangOpen?12:0}}>
      {langs.map((l,li)=>(
       <div key={li} style={{display:"flex",alignItems:"center",gap:4,
        background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",
        borderRadius:20,padding:"3px 10px"}}>
        <span style={{fontSize:12,fontWeight:700,color:"#38bdf8"}}>🗣 {l}</span>
        <button onClick={()=>upCh(n=>{n.languages=(n.languages||[]).filter((_,i)=>i!==li);return n;})}
         style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.3)",
          cursor:"pointer",fontSize:12,lineHeight:1,padding:"0 2px"}}>✕</button>
       </div>
      ))}
     </div>
   }

   {/* Sprachen hinzufügen */}
   {addLangOpen&&(
    <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:10}}>
     {suggestions.size>0&&(
      <div style={{marginBottom:8}}>
       <div style={{fontSize:10,fontWeight:800,color:"rgba(74,222,128,0.7)",letterSpacing:"0.07em",marginBottom:5}}>✦ EMPFOHLEN</div>
       <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {[...suggestions].filter(l=>!knownSet.has(l)).map(l=>(
         <button key={l} onClick={()=>addLang(l)}
          style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
           background:"rgba(74,222,128,0.08)",color:"rgba(74,222,128,0.7)",border:"1px solid rgba(74,222,128,0.25)"}}>{l}</button>
        ))}
       </div>
      </div>
     )}
     <div style={{marginBottom:6}}>
      <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.3)",letterSpacing:"0.07em",marginBottom:5}}>STANDARD</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
       {STANDARD_LANGUAGES.map(lo=>(
        <button key={lo.name} onClick={()=>!knownSet.has(lo.name)&&addLang(lo.name)}
         title={lo.speakers}
         style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:knownSet.has(lo.name)?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:700,
          background:knownSet.has(lo.name)?"rgba(56,189,248,0.1)":"rgba(15,15,22,0.85)",
          color:knownSet.has(lo.name)?"#38bdf8":"rgba(255,255,255,0.5)",
          border:`1px solid ${knownSet.has(lo.name)?"rgba(56,189,248,0.3)":"rgba(255,255,255,0.1)"}`,
          opacity:knownSet.has(lo.name)?0.6:1}}>
         {knownSet.has(lo.name)?"✓ ":""}{lo.name}
        </button>
       ))}
      </div>
     </div>
     <div style={{marginBottom:8}}>
      <div style={{fontSize:10,fontWeight:800,color:"rgba(167,139,250,0.6)",letterSpacing:"0.07em",marginBottom:5}}>EXOTISCH ✦</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
       {EXOTIC_LANGUAGES.map(lo=>(
        <button key={lo.name} onClick={()=>!knownSet.has(lo.name)&&addLang(lo.name)}
         title={`${lo.speakers} · Schrift: ${lo.script}`}
         style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:knownSet.has(lo.name)?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:700,
          background:knownSet.has(lo.name)?"rgba(167,139,250,0.1)":"rgba(15,15,22,0.85)",
          color:knownSet.has(lo.name)?"#a78bfa":"rgba(167,139,250,0.5)",
          border:`1px solid ${knownSet.has(lo.name)?"rgba(167,139,250,0.3)":"rgba(167,139,250,0.15)"}`,
          opacity:knownSet.has(lo.name)?0.6:1}}>
         {knownSet.has(lo.name)?"✓ ":""}{lo.name}
        </button>
       ))}
      </div>
     </div>
     {/* Eigene Sprache */}
     <div style={{display:"flex",gap:6}}>
      <input value={customLang} onChange={e=>setCustomLang(e.target.value)}
       placeholder="Eigene Sprache eingeben…"
       onKeyDown={e=>{if(e.key==="Enter"){addLang(customLang);setCustomLang("");}}}
       style={{flex:1,background:"rgba(12,12,18,0.9)",border:"1px solid rgba(255,255,255,0.12)",
        borderRadius:8,padding:"5px 10px",color:"white",fontFamily:"inherit",fontSize:12}}/>
      <button onClick={()=>{addLang(customLang);setCustomLang("");}}
       style={{...S.btnPrimary,padding:"5px 12px",fontSize:12}}>+ Hinzufügen</button>
     </div>
    </div>
   )}
  </div>
 );
}

function App(){
 const [themeId,setThemeId]=useState(()=>localStorage.getItem("dnd5e_theme")||"black");

 const up=(path,val)=>{setCh(prev=>{const next=JSON.parse(JSON.stringify(prev));const keys=path.split(".");let obj=next;for(let i=0;i<keys.length-1;i++)obj=obj[keys[i]];obj[keys[keys.length-1]]=val;saveChar(next,currentId);return next;});};
 const upCh=fn=>{setCh(prev=>{const next=fn(JSON.parse(JSON.stringify(prev)));saveChar(next,currentId);return next;});};

 const handleLevelUp=(clsIndex,result)=>{
  upCh(n=>{

   n.classes[clsIndex].level = result.newLevel;

   n.maxHP = (n.maxHP||0) + Math.max(1, result.hpIncrease);
   n.currentHP = (n.currentHP||0) + Math.max(1, result.hpIncrease);

   if(result.asiStats){
    Object.keys(result.asiStats).forEach(k=>{
     if(result.asiStats[k]>0) n.stats[k]=(n.stats[k]||10)+result.asiStats[k];
    });

    if(result.asiStats.con>0){
     const oldConMod=Math.floor(((n.stats.con-result.asiStats.con)-10)/2);
     const newConMod=Math.floor((n.stats.con-10)/2);
     const modDelta=newConMod-oldConMod;
     if(modDelta>0){
      const newTotalLevel=n.classes.reduce((s,c)=>s+(c.level||0),0)||1;
      const extraHP=modDelta*newTotalLevel;
      n.maxHP+=extraHP; n.currentHP+=extraHP;
     }
    }
   }

   if(result.newSlots){
    result.newSlots.forEach((count,i)=>{
     const grade=i+1;
     if(count>0){
      const prevMax=n.spellSlots[grade]?.[1]||0;
      const prevCur=n.spellSlots[grade]?.[0]||0;
      const delta=count-prevMax;
      n.spellSlots[grade]=[Math.min(prevCur+Math.max(0,delta),count),count];
     }
    });
   }

   if(result.newFeatures && result.newFeatures.length>0){
    result.newFeatures.forEach(f=>{
     if(f.includes("ASI")||f.includes("Attributsteigerung")) return;
     n.featureList=n.featureList||[];
     n.featureList.push(autoClassifyFeature({
      ...DEFAULT_FEATURE,
      keyword:f.length>40?f.slice(0,40)+"…":f,
      desc:f, type:"passive", active:true,
     }));
    });
   }

   n.featureList = syncKiAbilities(n.featureList||[], n.classes);
   return n;
  });
  setLevelUpModal(null);
 };

 const activeF=ch.featureList.filter(f=>f.active!==false);
 const statBonuses=Object.fromEntries(SAVES.map(s=>[s,0]));
 const skillBonuses=Object.fromEntries(SKILLS.map(s=>[s.name,0]));
 activeF.filter(f=>f.type==="stat_bonus"&&f.target).forEach(f=>{if(statBonuses[f.target]!==undefined)statBonuses[f.target]+=parseInt(f.value)||0;});
 activeF.filter(f=>f.type==="skill_bonus"&&f.target).forEach(f=>{if(skillBonuses[f.target]!==undefined)skillBonuses[f.target]+=parseInt(f.value)||0;});
 const equipped=ch.inventory.filter(it=>it.equipped);
 const equippedWeapons=equipped.filter(it=>it.type==="weapon");
 const equippedArmor=equipped.find(it=>it.type==="armor");
 const equippedShield=equipped.find(it=>it.type==="shield");
 const equippedMagic=equipped.filter(it=>it.type==="magic"&&it.magic?.bonus);
 const armorACBonus=equippedArmor?(equippedArmor.armor?.bonus||0):0;
 const shieldACBonus=equippedShield?(equippedShield.shield?.acBonus||0):0;
 const magicACBonus=equippedMagic.reduce((s,it)=>s+(parseInt(it.magic?.bonus)||0),0);
 const totalLevel=ch.classes.reduce((s,c)=>s+(c.level||0),0)||1;
 const pb=profB(totalLevel);
 const effStat=k=>ch.stats[k]+(statBonuses[k]||0);
 const skillMod=skill=>{const s=SKILLS.find(x=>x.name===skill);const base=statMod(effStat(s.stat))+(skillBonuses[skill]||0);if(ch.skillExpertise[skill])return base+pb*2;if(ch.skillProficiencies[skill])return base+pb;return base;};
 const saveMod=stat=>{const base=statMod(effStat(stat));return ch.saveProficiencies[stat]?base+pb:base;};
 const passivePerc=10+skillMod("Wahrnehmung");
 const attackBonusF=activeF.filter(f=>f.type==="attack_bonus").reduce((s,f)=>s+(parseInt(f.value)||0),0);
 const acBonusF=activeF.filter(f=>f.type==="ac_bonus").reduce((s,f)=>s+(parseInt(f.value)||0),0);

 const PASSIVE_KEYWORDS = [

  { pattern:/unarmored movement|unbewaffnete bewegung/i,
   extract: (f, lvl) => {

    const monkLvl = ch.classes.filter(c=>/mönch|monk/i.test(c.name)).reduce((s,c)=>s+(c.level||0),0);
    const bonus = monkLvl>=18?30:monkLvl>=14?25:monkLvl>=10?20:monkLvl>=6?15:monkLvl>=2?10:0;

    const explicit = ((f.note||"")+" "+(f.value||"")).match(/\+?(\d+)\s*ft/i);
    return { speedBonus: explicit ? parseInt(explicit[1]) : bonus };
   }
  },
  { pattern:/\+(\d+)\s*ft.*(?:speed|bewegung|bewegungsrate|movement)/i,
   extract: (f) => {
    const m = ((f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"")).match(/\+(\d+)\s*ft/i);
    return m ? { speedBonus: parseInt(m[1]) } : {};
   }
  },
  { pattern:/(?:speed|bewegung|bewegungsrate|movement).*\+(\d+)\s*ft/i,
   extract: (f) => {
    const m = ((f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"")).match(/\+(\d+)\s*ft/i);
    return m ? { speedBonus: parseInt(m[1]) } : {};
   }
  },

  { pattern:/\+(\d+).*initiative/i,
   extract: (f) => {
    const m = ((f.keyword||"")+" "+(f.note||"")).match(/\+(\d+)/);
    return m ? { initBonus: parseInt(m[1]) } : {};
   }
  },
  { pattern:/jack of all trades|vielseitig begabt/i,
   extract: (f, lvl) => ({ halfPBToSkills: true })
  },

  { pattern:/reliable talent|zuverlässiges talent/i,
   extract: () => ({})
  },
 ];

 let speedBonusF = activeF.filter(f=>f.type==="speed_bonus").reduce((s,f)=>s+(parseInt(f.value)||0),0);
 let initBonusF = 0;

 activeF.filter(f=>f.type==="passive"||f.type==="other").forEach(f => {
  const text = (f.keyword||"")+" "+(f.note||"")+" "+(f.desc||"");
  for (const kw of PASSIVE_KEYWORDS) {
   if (kw.pattern.test(text)) {
    const result = kw.extract(f, totalLevel);
    if (result.speedBonus) speedBonusF += result.speedBonus;
    if (result.initBonus)  initBonusF  += result.initBonus;
    break;
   }
  }
 });

 const hasArmor = !!equippedArmor && equippedArmor.armor?.profCategory !== "keine";

 const unarmoredMovementActive = !hasArmor && !equippedShield;

 let effectiveSpeedBonus = speedBonusF;
 if (!unarmoredMovementActive) {

  activeF.filter(f=>(f.type==="passive"||f.type==="other")&&/unarmored movement|unbewaffnete bewegung/i.test((f.keyword||"")+" "+(f.note||""))).forEach(f => {
   const monkLvl = ch.classes.filter(c=>/mönch|monk/i.test(c.name)).reduce((s,c)=>s+(c.level||0),0);
   const bonus = monkLvl>=18?30:monkLvl>=14?25:monkLvl>=10?20:monkLvl>=6?15:monkLvl>=2?10:0;
   const explicit = ((f.note||"")+" "+(f.value||"")).match(/\+?(\d+)\s*ft/i);
   effectiveSpeedBonus -= explicit ? parseInt(explicit[1]) : bonus;
  });
 }

 const totalSpeed = ch.speed + effectiveSpeedBonus;
 const totalInitBonus = statMod(effStat("dex")) + initBonusF;

 const totalAC = (() => {
  const dexM = statMod(effStat("dex"));
  const conM = statMod(effStat("con"));
  const wisM = statMod(effStat("wis"));
  const extras = shieldACBonus + magicACBonus + acBonusF;
  const className = ch.classes?.[0]?.name || "";
  if (!equippedArmor) {
   if (className === "Barbar") return 10 + dexM + conM + extras;
   if (className === "Mönch")  return 10 + dexM + wisM + extras;
   return 10 + dexM + extras;
  }
  const baseAC = equippedArmor.armor?.ac || 10;
  const bonus  = armorACBonus;
  const armorAddDex = equippedArmor.armor?.addDex ?? ARMOR_CATALOG.find(a => a.name === equippedArmor.name)?.addDex;
  const armorMaxDex = equippedArmor.armor?.maxDex ?? ARMOR_CATALOG.find(a => a.name === equippedArmor.name)?.maxDex;
  if (armorAddDex) {
   const effectiveDex = (armorMaxDex !== null && armorMaxDex !== undefined)
    ? Math.min(dexM, armorMaxDex) : dexM;
   return baseAC + effectiveDex + bonus + extras;
  }
  return baseAC + bonus + extras;
 })();
 const hpRatio=ch.currentHP/Math.max(1,ch.maxHP);
 const hpColor=hpRatio>0.5?"#22c55e":hpRatio>0.25?"#f59e0b":"#ef4444";
 const weaponAtkBonus=w=>{
  const sc=w.weapon?.scale||"STR";
  let m=0;
  if(sc==="STR")m=statMod(effStat("str"));
  else if(sc==="DEX")m=statMod(effStat("dex"));
  else if(sc==="STR oder DEX")m=Math.max(statMod(effStat("str")),statMod(effStat("dex")));
  else if(sc==="INT")m=statMod(effStat("int"));
  else if(sc==="WIS")m=statMod(effStat("wis"));
  else if(sc==="CHA")m=statMod(effStat("cha"));

  const catId=w.weapon?.catalogId;
  const wCat=w.weapon?.category;
  let proficient=!catId;
  if(catId){
   const allProfs=(ch.classes||[]).flatMap(c=>WEAPON_PROFICIENCY[c.name]||[]);
   proficient=allProfs.some(p=>p===catId||p===wCat||p==="einfach"&&wCat==="einfach"||p==="kriegs"&&wCat==="kriegs");
  }
  return m+(proficient?pb:0)+(parseInt(w.weapon?.bonus)||0)+attackBonusF;
 };

 return(<div style={{minHeight:"100vh",background:"transparent",color:"white",fontFamily:"system-ui,sans-serif",position:"relative"}}>
  {/* Info Modal (accessible from sheet too) */}
