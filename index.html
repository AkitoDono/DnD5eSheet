  <style>*{box-sizing:border-box;margin:0;padding:0;} html{transition:background 0.5s;} body{color:white;font-family:system-ui,sans-serif;background:transparent;} input[type=number]::-webkit-inner-spin-button{opacity:0.4;} input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2);} select option{background:#1a1d2e;} ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;} .stat-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;} .stat-grid-rk{display:grid;grid-template-columns:52px repeat(6,1fr);gap:6px;} .rk-box-mobile{display:none;} .skills-mobile{display:none;} .tab-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;} .tab-bar button{text-align:center;min-height:36px;} @media (max-width:600px){.stat-grid-6{grid-template-columns:repeat(3,1fr);gap:6px;} .stat-grid-rk{grid-template-columns:repeat(3,1fr);gap:6px;} .rk-box-desktop{display:none !important;} .rk-box-mobile{display:flex !important;} .overview-grid{grid-template-columns:1fr !important;} .skills-sidebar{display:none !important;} .skills-mobile{display:block !important;} .tab-bar{gap:3px !important;} .tab-bar button{font-size:10px !important;padding:8px 3px !important;min-height:34px !important;} .wizard-nav{flex-direction:column !important;} .wizard-nav button{width:100% !important;} .feature-tags{flex-direction:column !important;} .feature-tags >div{max-width:100% !important;width:100% !important;} .inv-action-col{flex-direction:row !important;flex-wrap:wrap !important;} .wizard-card-grid{grid-template-columns:1fr !important;} .rk-preview-row{gap:12px !important;padding:12px !important;} .ki-ability-row{flex-wrap:wrap !important;} .ki-ability-row button{align-self:flex-start !important;} .sheet-card{padding:10px 10px !important;} .lu-row{flex-wrap:wrap !important;gap:8px !important;} } @media (min-width:601px){.skills-mobile{display:none !important;} } #root >*{position:relative;z-index:1;} @keyframes flyIn{0%{transform:translateY(-300px) scale(0.5);opacity:0}60%{transform:translateY(20px) scale(1.08);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}} @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}} @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}} @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}} .wizard-fade{animation:fadeIn 0.35s ease forwards;} .wizard-slide{animation:slideIn 0.3s ease forwards;} @keyframes rollPulse{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}} @keyframes infoPulse{0%{box-shadow:0 0 0 0 rgba(255,210,0,0.5)}70%{box-shadow:0 0 0 7px rgba(255,210,0,0)}100%{box-shadow:0 0 0 0 rgba(255,210,0,0)}} .info-btn{animation:infoPulse 2s ease-in-out infinite;} .card-hover{transition:all 0.2s ease;cursor:pointer;} .card-hover:hover{transform:translateY(-2px);} *{-webkit-tap-highlight-color:transparent;} button,select,input,textarea{touch-action:manipulation;} input[type="number"]{-webkit-appearance:none;} button{user-select:none;-webkit-user-select:none;} @media (max-width:600px){.tab-bar button{min-height:44px !important;} select,input,textarea{font-size:16px !important;} }</style>

<body>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

function InfoModal({ onClose, theme, L, lang }) {
 if(!L) L=LANG.de;
 if(!lang) lang="de";
 return (
  <div
   style={{
    position: "fixed", inset: 0, zIndex: 100,
    display: "flex", alignItems: "center", justifyContent: "center",
    background: "rgba(0,0,0,0.85)", backdropFilter: "blur(6px)",
    padding: "16px",
   }}
   onClick={onClose}
  >
   <div
    onClick={e => e.stopPropagation()}
    style={{
     maxWidth: 420, width: "100%",
     background: "#0f1117",
     border: `1px solid ${theme.accent}44`,
     borderRadius: 20,
     padding: "28px 24px",
     boxShadow: `0 0 60px ${theme.accent}22, 0 24px 60px rgba(0,0,0,0.8)`,
     animation: "modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",
     position: "relative",
    }}
   >
    <button
     onClick={onClose}
     style={{
      position: "absolute", top: 14, right: 14,
      background: "rgba(18,18,25,0.83)",
      border: "1px solid rgba(255,255,255,0.1)",
      borderRadius: 8, width: 30, height: 30,
      color: "rgba(255,255,255,0.5)", cursor: "pointer",
      fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "inherit",
     }}
    >✕</button>

    <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
     <div style={{
      width: 52, height: 52, borderRadius: 14, flexShrink: 0,
      background: `${theme.accent}18`,
      border: `2px solid ${theme.accent}55`,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: 26,
     }}>⚔</div>
     <div>
      <div style={{ fontSize: 20, fontWeight: 900, color: theme.accent, lineHeight: 1.2 }}>
       D&amp;D 5e Sheet
      </div>
      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>
       {L.infoTitle}
      </div>
     </div>
    </div>

    <div style={{
     fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.75,
     marginBottom: 20,
    }}>
     {lang==="en" ? <>
      This tool is a digital character sheet for{" "}
      <span style={{ color: theme.accent, fontWeight: 700 }}>Dungeons &amp; Dragons 5e</span>.
      It replaces the classic paper sheet and offers a guided character wizard,
      automatic calculations for modifiers, skills and saving throws,
      as well as full inventory and spell management.
     </> : <>
      Dieses Tool ist ein digitales Charakterblatt für{" "}
      <span style={{ color: theme.accent, fontWeight: 700 }}>Dungeons &amp; Dragons 5e</span>.
      Es ersetzt das klassische Papierblatt und bietet einen geführten Charakter-Wizard,
      automatische Berechnungen für Modifikatoren, Fertigkeiten und Rettungswürfe,
      sowie eine vollständige Inventar- und Zauberverwaltung.
     </>}
    </div>

    <div style={{
     background: "rgba(12,12,18,0.90)",
     border: "1px solid rgba(255,255,255,0.08)",
     borderRadius: 12, padding: "14px 16px", marginBottom: 20,
    }}>
     <div style={{ fontSize: 11, fontWeight: 800, color: theme.accent, letterSpacing: "0.07em", marginBottom: 10 }}>
      {lang==="en" ? "✦ WHAT THIS TOOL CAN DO" : "✦ WAS DIESES TOOL KANN"}
     </div>
     {(lang==="en" ? [
      ["🧙", "Character wizard with classes, races & background"],
      ["⚔",  "Combat tracker with HP, AC, Initiative & rest functions"],
      ["✨", "Spell management with slots for all levels"],
      ["🎒", "Inventory with weapons, armor & coins"],
      ["💾", "Auto-save – everything is preserved"],
      ["📱", "Works on mobile and desktop"],
     ] : [
      ["🧙", "Charakter-Wizard mit Klassen, Rassen & Hintergrund"],
      ["⚔",  "Kampf-Tracker mit HP, RK, Initiative & Rast-Funktionen"],
      ["✨", "Zauberverwaltung mit Slots für alle Grade"],
      ["🎒", "Inventar mit Waffen, Rüstungen & Münzen"],
      ["💾", "Automatisches Speichern – alles bleibt erhalten"],
      ["📱", "Funktioniert auf Handy und Desktop"],
     ]).map(([icon, text], i) => (
      <div key={i} style={{
       display: "flex", gap: 10, alignItems: "flex-start",
       marginBottom: i < 5 ? 8 : 0,
       fontSize: 13, color: "rgba(255,255,255,0.65)",
      }}>
       <span style={{ flexShrink: 0, fontSize: 15 }}>{icon}</span>
       <span>{text}</span>
      </div>
     ))}
    </div>

    <div style={{
     display: "flex", alignItems: "center", gap: 10,
     background: `${theme.accent}0d`,
     border: `1px solid ${theme.accent}33`,
     borderRadius: 10, padding: "10px 14px",
     fontSize: 12, color: "rgba(255,255,255,0.5)", lineHeight: 1.6,
    }}>
     <span style={{ fontSize: 18, flexShrink: 0 }}>🛠</span>
     <span>
      {lang==="en"
       ? "This project is personally maintained and continuously improved. New features and fixes are added regularly."
       : "Dieses Projekt wird persönlich gepflegt und ständig weiterentwickelt. Neue Features und Verbesserungen kommen regelmäßig dazu."}
     </span>
    </div>

    <button
     onClick={onClose}
     style={{
      width: "100%", marginTop: 10,
      background: `linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`,
      color: "white", border: "none", borderRadius: 12,
      padding: "11px 0", fontWeight: 800, cursor: "pointer",
      fontSize: 14, fontFamily: "inherit",
     }}
    >
     {L.infoClose}
    </button>
   </div>
  </div>
 );
}

const STANDARD_LANGUAGES = [
 { name:"Gemeinsprache",           script:"Gemein",    speakers:"Alle Charaktere (aus Sigil)",            type:"standard" },
 { name:"Drakonisch",              script:"Drakonisch",speakers:"Drachen",                                type:"standard" },
 { name:"Elfisch",                 script:"Elfisch",   speakers:"Elfen",                                  type:"standard" },
 { name:"Gebärden-Gemeinsprache",  script:"—",         speakers:"Sigil",                                  type:"standard" },
 { name:"Gnomisch",                script:"Zwergisch", speakers:"Gnome",                                  type:"standard" },
 { name:"Goblinisch",              script:"Zwergisch", speakers:"Goblinoide",                             type:"standard" },
 { name:"Halblingisch",            script:"Gemein",    speakers:"Halblinge",                              type:"standard" },
 { name:"Orkisch",                 script:"Zwergisch", speakers:"Orks",                                   type:"standard" },
 { name:"Riesisch",                script:"Zwergisch", speakers:"Riesen",                                 type:"standard" },
 { name:"Zwergisch",               script:"Zwergisch", speakers:"Zwerge",                                 type:"standard" },
];

const EXOTIC_LANGUAGES = [
 { name:"Abyssisch",                  script:"Infernalisch", speakers:"Dämonen des Abyss",                          type:"exotic" },
 { name:"Celestisch",                 script:"Celestisch",   speakers:"Celestische Wesen",                          type:"exotic" },
 { name:"Diebessprache",              script:"—",            speakers:"Verschiedene kriminelle Gilden",              type:"exotic" },
 { name:"Druidisch",                  script:"—",            speakers:"Druidenzirkel",                               type:"exotic" },
 { name:"Gemeinsprache der Unterreiche",script:"—",          speakers:"Das Unterreich",                             type:"exotic" },
 { name:"Infernalisch",               script:"Infernalisch", speakers:"Teufel aus den Neun Höllen",                 type:"exotic" },
 { name:"Sylvanisch",                 script:"Elfisch",      speakers:"Bewohner der Feenwildnis",                   type:"exotic" },
 { name:"Tiefensprache",              script:"—",            speakers:"Aberrationen",                               type:"exotic" },
 { name:"Urtümlich",                  script:"Zwergisch",    speakers:"Elementare (Aqual, Aural, Ignal, Terral)",   type:"exotic" },
];
const ALL_LANGUAGES = [...STANDARD_LANGUAGES, ...EXOTIC_LANGUAGES].map(l=>l.name);

const LANGUAGE_SUGGESTIONS = {

 byClass: {
  "Kleriker":           ["Celestisch","Infernalisch","Abyssisch"],
  "Paladin":            ["Celestisch","Infernalisch"],
  "Zauberer (Magier)":  ["Drakonisch","Sylvanisch","Primordialisch"],
  "Hexenmeister":       ["Abyssisch","Infernalisch","Sylvanisch"],
  "Druide":             ["Sylvanisch","Primordialisch","Riesisch"],
  "Waldläufer":         ["Elfisch","Orkisch","Goblinisch"],
  "Barde":              ["Elfisch","Sylvanisch","Gnomisch"],
  "Barbar":             ["Riesisch","Orkisch","Gnollisch"],
  "Kämpfer":            ["Orkisch","Goblinisch","Riesisch"],
  "Schurke":            ["Goblinisch","Unterdunkel","Infernalisch"],
  "Mönch":              ["Drakonisch","Celestisch","Sylvanisch"],
 },

 byRace: {
  "Zwerg":    ["Riesisch","Goblinisch","Orkisch"],
  "Elf":      ["Sylvanisch","Unterdunkel","Primordialisch"],
  "Halbling": ["Gnomisch","Goblinisch","Zwergisch"],
  "Mensch":   ["Elfisch","Zwergisch","Drakonisch"],
  "Dragonborn":["Drakonisch","Infernalisch","Riesisch"],
  "Gnom":     ["Sylvanisch","Goblinisch","Zwergisch"],
  "Halb-Elf": ["Sylvanisch","Unterdunkel","Elfisch"],
  "Halbork":  ["Riesisch","Goblinisch","Orkisch"],
  "Tiefling": ["Infernalisch","Abyssisch","Drakonisch"],
 },
};

const ALL_LANGUAGES_WITH_META = [...STANDARD_LANGUAGES, ...EXOTIC_LANGUAGES];

const ALL_SKILLS_LIST = [
 "Akrobatik","Arkane Kunde","Athletik","Auftreten","Einschüchtern","Geschichte",
 "Heimlichkeit","Medizin","Mit Tieren umgehen","Motiv erkennen","Natur","Überleben",
 "Überzeugung","Fingerfertigkeit","Täuschen","Wahrnehmung","Religion","Untersuchen",
];

const STAT_KEYS_ALL  = ["str","dex","con","int","wis","cha"];
const STAT_LABELS_FC = { str:"STR",dex:"DEX",con:"CON",int:"INT",wis:"WIS",cha:"CHA" };
const STAT_COLORS_FC = { str:"#ef4444",dex:"#4ade80",con:"#f97316",int:"#818cf8",wis:"#86efac",cha:"#ec4899" };

function detectFreeChoices(race, subrace, background) {
 const choices = [];
 const raceName = race?.name || "";
 const srName   = subrace?.name || "";

 // Support both DE and EN subrace/race names
 const isVariantHuman = srName.includes("Varianten-Mensch") || srName.includes("Variant Human");
 const isHalfElf = raceName === "Halb-Elf" || raceName === "Half-Elf";
 const isHighElf = srName.includes("Hochelf") || srName.includes("High Elf");
 const isHuman = raceName === "Mensch" || raceName === "Human";

 if (isVariantHuman || subrace?.extraChoices?.freeStats) {
  if (isVariantHuman) {
   choices.push({ id:"vm_stats", type:"stat_free", count:2, label:"Attributsteigerung (Varianten-Mensch)", desc:"Wähle 2 verschiedene Attribute, die je +1 erhalten.", max1perStat:true });
   choices.push({ id:"vm_skill", type:"skill_free", count:1, label:"Fertigkeit (Varianten-Mensch)", desc:"Wähle 1 Fertigkeit als geübt." });
  }
 }

 if (isHalfElf) {
  choices.push({ id:"halfelf_stats", type:"stat_free", count:2, label:"Attributsteigerung (Halb-Elf)", desc:"Wähle 2 verschiedene Attribute (nicht CHA), die je +1 erhalten.", exclude:["cha"] });
  choices.push({ id:"halfelf_skills", type:"skill_free", count:2, label:"Fertigkeiten (Skill Versatility)", desc:"Wähle 2 Fertigkeiten als geübt." });
 }

 if (isHighElf) {
  choices.push({ id:"highelf_lang", type:"language_free", count:1, label:"Sprache (Hochelf)", desc:"Hochelfen lernen eine weitere Sprache ihrer Wahl.", suggestFor:{race:raceName} });
 }

 if (isHuman && !isVariantHuman) {
  choices.push({ id:"human_lang", type:"language_free", count:1, label:"Sprache (Mensch)", desc:"Menschen sprechen die Gemeinsprache und eine weitere Sprache ihrer Wahl.", suggestFor:{race:"Mensch"} });
 }

 if (isHalfElf) {
  choices.push({ id:"halfelf_lang", type:"language_free", count:1, label:"Sprache (Halb-Elf)", desc:"Halb-Elfen sprechen eine weitere Sprache ihrer Wahl.", suggestFor:{race:"Halb-Elf"} });
 }

 const bgLangCount = typeof background?.languages === "number" ? background.languages : 0;
 if (bgLangCount > 0) {
  choices.push({
   id:"bg_lang",
   type:"language_free",
   count: bgLangCount,
   label:`Sprache${bgLangCount>1?"n":""} (${background?.name||"Hintergrund"})`,
   desc:`Dein Hintergrund gibt dir ${bgLangCount} freie Sprachenwahl${bgLangCount>1?"en":""}.`,
   suggestFor:{ class: null },
  });
 }

 return choices;
}

function FreeChoiceModal({ choices, currentStats, currentSkillProfs, onConfirm, onClose, theme }) {
 const lang = localStorage.getItem("dnd5e_lang") || "de";

 const initState = () => {
  const s = {};
  choices.forEach(c => {
   if (c.type === "stat_free")     s[c.id] = {};
   if (c.type === "skill_free")    s[c.id] = [];
   if (c.type === "language_free") s[c.id] = [];
   if (c.type === "custom_text")   s[c.id] = "";
  });
  return s;
 };
 const [values, setValues] = useState(initState);
 const [customInputs, setCustomInputs] = useState({});

 const upVal = (id, val) => setValues(v => ({ ...v, [id]: val }));

 const isChoiceComplete = (c) => {
  const val = values[c.id];
  if (c.type === "stat_free") {
   const total = Object.values(val).reduce((s,v)=>s+(v||0),0);
   return total === c.count;
  }
  if (c.type === "skill_free")    return (val||[]).length === c.count;
  if (c.type === "language_free") return (val||[]).length === c.count;
  if (c.type === "custom_text")   return (val||"").trim().length > 0;
  return true;
 };
 const allComplete = choices.every(isChoiceComplete);

 const handleConfirm = () => {
  if (!allComplete) return;
  onConfirm(values);
 };

 const inp = { background:"rgba(18,18,25,0.83)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:10, padding:"7px 10px", color:"white", fontSize:13, outline:"none",
  width:"100%", fontFamily:"inherit" };

 return (
  <div style={{ position:"fixed",inset:0,zIndex:110,display:"flex",alignItems:"center",
   justifyContent:"center",background:"rgba(0,0,0,0.9)",backdropFilter:"blur(8px)",padding:16 }}
   onClick={onClose}>
   <div onClick={e=>e.stopPropagation()} style={{
    maxWidth:500,width:"100%",maxHeight:"92vh",overflowY:"auto",WebkitOverflowScrolling:"touch",
    background:"#0f1117",border:`2px solid ${theme.accent}55`,borderRadius:20,
    padding:"24px 20px",
    boxShadow:`0 0 60px ${theme.accent}22,0 24px 60px rgba(0,0,0,0.8)`,
    animation:"modalIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards",
    position:"relative",
   }}>
    {/* Header */}
    <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:6 }}>
     <div style={{ width:48,height:48,borderRadius:12,flexShrink:0,
      background:`${theme.accent}18`,border:`2px solid ${theme.accent}55`,
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:24 }}>🎲</div>
     <div>
      <div style={{ fontSize:20,fontWeight:900,color:theme.accent }}>{lang==="en"?"Free Choice":"Freie Auswahl"}</div>
      <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)" }}>
       {lang==="en"
        ? `Your race gives you ${choices.length} free choice${choices.length!==1?"s":""}`
        : `Deine Rasse gibt dir noch ${choices.length} freie Wahl${choices.length!==1?"en":""}`}
      </div>
     </div>
    </div>
    <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",lineHeight:1.6,marginBottom:20,
     paddingBottom:16,borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
     {lang==="en"?"Choose from the suggestions or enter your own values. All fields must be filled in.":"Wähle aus den Vorschlägen oder trage eigene Werte ein. Alle Felder müssen ausgefüllt sein."}
    </div>

    <div style={{ display:"flex",flexDirection:"column",gap:18 }}>
     {choices.map((c, ci) => {
      const complete = isChoiceComplete(c);
      return (
       <div key={c.id} style={{
        background:"rgba(12,12,18,0.90)",
        border:`2px solid ${complete?theme.accent+"55":"rgba(255,255,255,0.08)"}`,
        borderRadius:14,padding:"14px 16px",transition:"border 0.2s",
       }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6 }}>
         <div style={{ fontSize:14,fontWeight:800,color:complete?theme.accent:"rgba(255,255,255,0.7)" }}>
          {complete?"✓ ":""}{c.label}
         </div>
         {c.count > 1 && (
          <span style={{ fontSize:11,fontWeight:800,
           background:`${theme.accent}18`,color:theme.accent,
           border:`1px solid ${theme.accent}44`,borderRadius:20,padding:"2px 8px" }}>
           {c.type==="stat_free"
            ? `${Object.values(values[c.id]||{}).reduce((s,v)=>s+(v||0),0)}/${c.count} Punkte`
            : `${(values[c.id]||[]).length}/${c.count} gewählt`}
          </span>
         )}
        </div>
        <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:12 }}>{c.desc}</div>

        {/* STAT FREE CHOICE */}
        {c.type === "stat_free" && (() => {
         const val = values[c.id] || {};
         const used = Object.values(val).reduce((s,v)=>s+(v||0),0);
         const avail = c.count - used;
         const excluded = c.exclude || [];
         return (
          <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 }}>
           {STAT_KEYS_ALL.filter(k => !excluded.includes(k)).map(k => {
            const cur = val[k] || 0;
            const base = currentStats?.[k] || 10;
            return (
             <div key={k} style={{ textAlign:"center",borderRadius:10,padding:"8px 4px",
              background:cur>0?`${STAT_COLORS_FC[k]}15`:"rgba(12,12,18,0.88)",
              border:`1px solid ${cur>0?STAT_COLORS_FC[k]+"55":"rgba(255,255,255,0.1)"}`,
              transition:"all 0.15s" }}>
              <div style={{ fontSize:10,fontWeight:800,color:STAT_COLORS_FC[k] }}>{STAT_LABELS_FC[k]}</div>
              <div style={{ fontSize:18,fontWeight:900,color:"rgba(255,255,255,0.7)",margin:"2px 0" }}>
               {base+cur}
               {cur>0&&<span style={{color:"#4ade80",fontSize:11}}> +{cur}</span>}
              </div>
              <div style={{ display:"flex",gap:3 }}>
               <button onClick={()=>{if(cur>0){const nv={...val,[k]:cur-1};upVal(c.id,nv);}}}
                disabled={cur===0}
                style={{ flex:1,background:"rgba(239,68,68,0.2)",color:"#f87171",
                 border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,
                 padding:"2px 0",fontSize:12,cursor:cur===0?"not-allowed":"pointer",
                 fontFamily:"inherit",opacity:cur===0?0.3:1 }}>−</button>
               <button onClick={()=>{if(avail>0&&(c.max1perStat?cur<1:cur<c.count)){const nv={...val,[k]:cur+1};upVal(c.id,nv);}}}
                disabled={avail===0||(c.max1perStat?cur>=1:cur>=c.count)}
                style={{ flex:1,background:"rgba(34,197,94,0.2)",color:"#4ade80",
                 border:"1px solid rgba(34,197,94,0.3)",borderRadius:6,
                 padding:"2px 0",fontSize:12,fontFamily:"inherit",
                 cursor:(avail===0||(c.max1perStat?cur>=1:cur>=c.count))?"not-allowed":"pointer",
                 opacity:(avail===0||(c.max1perStat?cur>=1:cur>=c.count))?0.3:1 }}>+</button>
              </div>
             </div>
            );
           })}
          </div>
         );
        })()}

        {/* SKILL FREE CHOICE */}
        {c.type === "skill_free" && (() => {
         const chosen = values[c.id] || [];
         const alreadyProf = Object.keys(currentSkillProfs||{}).filter(k=>(currentSkillProfs||{})[k]);
         return (
          <div>
           <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:10 }}>
            {ALL_SKILLS_LIST.map(sk => {
             const isChosen   = chosen.includes(sk);
             const isProf     = alreadyProf.includes(sk);
             const canAdd     = !isChosen && !isProf && chosen.length < c.count;
             return (
              <button key={sk} onClick={()=>{
               if(isChosen) upVal(c.id, chosen.filter(s=>s!==sk));
               else if(canAdd) upVal(c.id,[...chosen,sk]);
              }} style={{
               fontSize:12,padding:"4px 10px",borderRadius:20,cursor:isProf?"not-allowed":"pointer",
               fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
               background:isChosen?`${theme.accent}22`:isProf?"rgba(12,12,18,0.88)":"rgba(15,15,22,0.85)",
               color:isChosen?theme.accent:isProf?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.55)",
               border:`1px solid ${isChosen?`${theme.accent}66`:isProf?"rgba(15,15,22,0.85)":"rgba(255,255,255,0.12)"}`,
               opacity:(!canAdd&&!isChosen&&!isProf)?0.4:1,
              }}>
               {isChosen?"✓ ":isProf?"✓ (bereits) ":""}{sk}
              </button>
             );
            })}
           </div>
           {/* Custom entry */}
           <CustomEntry id={c.id} placeholder="Oder eigene Fertigkeit eingeben..."
            onAdd={v=>{if(chosen.length<c.count&&!chosen.includes(v))upVal(c.id,[...chosen,v]);}}
            theme={theme} inp={inp}/>
          </div>
         );
        })()}

        {/* LANGUAGE FREE CHOICE */}
        {c.type === "language_free" && (() => {
         const chosen = values[c.id] || [];
         const suggestions = new Set([
          ...(c.className ? (LANGUAGE_SUGGESTIONS.byClass[c.className]||[]) : []),
          ...(c.raceName  ? (LANGUAGE_SUGGESTIONS.byRace[c.raceName]||[])   : []),
         ]);
         const alreadyKnown = new Set(
          Object.entries(values)
           .filter(([k]) => k !== c.id)
           .flatMap(([,v]) => Array.isArray(v) ? v : [])
         );
         return (
          <div>
           {suggestions.size > 0 && (
            <div style={{marginBottom:10}}>
             <div style={{fontSize:10,fontWeight:800,color:"rgba(74,222,128,0.7)",letterSpacing:"0.07em",marginBottom:5}}>✦ EMPFOHLEN</div>
             <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {[...suggestions].filter(l=>!alreadyKnown.has(l)).map(lang => {
               const isChosen = chosen.includes(lang);
               const canAdd = !isChosen && chosen.length < c.count;
               const meta = ALL_LANGUAGES_WITH_META.find(l=>l.name===lang);
               return (
                <button key={lang} onClick={()=>{
                 if(isChosen) upVal(c.id,chosen.filter(l=>l!==lang));
                 else if(canAdd) upVal(c.id,[...chosen,lang]);
                }} title={meta?`${meta.speakers}`:""}
                style={{
                 fontSize:12,padding:"4px 11px",borderRadius:20,cursor:canAdd||isChosen?"pointer":"not-allowed",
                 fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
                 background:isChosen?"rgba(74,222,128,0.25)":"rgba(74,222,128,0.08)",
                 color:isChosen?"#4ade80":"rgba(74,222,128,0.7)",
                 border:`1px solid ${isChosen?"rgba(74,222,128,0.6)":"rgba(74,222,128,0.25)"}`,
                 opacity:(!canAdd&&!isChosen)?0.4:1,
                }}>
                 {isChosen?"✓ ":""}{lang}{meta?.type==="exotic"&&<span style={{fontSize:9,marginLeft:4,opacity:0.6}}>✦</span>}
                </button>
               );
              })}
             </div>
            </div>
           )}
           <div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.3)",letterSpacing:"0.07em",marginBottom:5}}>STANDARD</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
             {STANDARD_LANGUAGES.map(langObj => {
              const lang = langObj.name;
              const isChosen = chosen.includes(lang);
              const isKnown = alreadyKnown.has(lang);
              const canAdd = !isChosen && !isKnown && chosen.length < c.count;
              return (
               <button key={lang} onClick={()=>{
                if(isChosen) upVal(c.id,chosen.filter(l=>l!==lang));
                else if(canAdd) upVal(c.id,[...chosen,lang]);
               }} title={langObj.speakers}
               style={{
                fontSize:12,padding:"4px 10px",borderRadius:20,
                cursor:isKnown?"not-allowed":canAdd||isChosen?"pointer":"not-allowed",
                fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
                background:isChosen?`${theme.accent}22`:isKnown?"rgba(12,12,18,0.7)":"rgba(15,15,22,0.85)",
                color:isChosen?theme.accent:isKnown?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.55)",
                border:`1px solid ${isChosen?`${theme.accent}66`:isKnown?"rgba(15,15,22,0.6)":"rgba(255,255,255,0.12)"}`,
                opacity:(!canAdd&&!isChosen&&!isKnown)?0.4:1,
               }}>
                {isChosen?"✓ ":isKnown?"✓ ":""}{lang}{isKnown&&<span style={{fontSize:9,marginLeft:3,opacity:0.5}}>(bekannt)</span>}
               </button>
              );
             })}
            </div>
           </div>
           <div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:800,color:"rgba(167,139,250,0.6)",letterSpacing:"0.07em",marginBottom:5}}>EXOTISCH ✦</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
             {EXOTIC_LANGUAGES.map(langObj => {
              const lang = langObj.name;
              const isChosen = chosen.includes(lang);
              const isKnown = alreadyKnown.has(lang);
              const canAdd = !isChosen && !isKnown && chosen.length < c.count;
              return (
               <button key={lang} onClick={()=>{
                if(isChosen) upVal(c.id,chosen.filter(l=>l!==lang));
                else if(canAdd) upVal(c.id,[...chosen,lang]);
               }} title={`${langObj.speakers} · Schrift: ${langObj.script}`}
               style={{
                fontSize:12,padding:"4px 10px",borderRadius:20,
                cursor:isKnown?"not-allowed":canAdd||isChosen?"pointer":"not-allowed",
                fontFamily:"inherit",fontWeight:700,transition:"all 0.15s",
                background:isChosen?"rgba(167,139,250,0.2)":isKnown?"rgba(12,12,18,0.7)":"rgba(15,15,22,0.85)",
                color:isChosen?"#a78bfa":isKnown?"rgba(255,255,255,0.2)":"rgba(167,139,250,0.55)",
                border:`1px solid ${isChosen?"rgba(167,139,250,0.5)":isKnown?"rgba(15,15,22,0.6)":"rgba(167,139,250,0.2)"}`,
                opacity:(!canAdd&&!isChosen&&!isKnown)?0.4:1,
               }}>
                {isChosen?"✓ ":isKnown?"✓ ":""}{lang}{isKnown&&<span style={{fontSize:9,marginLeft:3,opacity:0.5}}>(bekannt)</span>}
               </button>
              );
             })}
            </div>
           </div>
           <CustomEntry id={c.id} placeholder="Oder eigene Sprache eingeben..."
            onAdd={v=>{if(chosen.length<c.count&&!chosen.includes(v))upVal(c.id,[...chosen,v]);}}
            theme={theme} inp={inp}/>
          </div>
         );
        })()}
       </div>
      );
     })}
    </div>

    {/* Confirm */}
    <button onClick={handleConfirm} disabled={!allComplete} style={{
     width:"100%",marginTop:20,
     background:allComplete?`linear-gradient(135deg,${theme.accent}cc,${theme.accent}77)`:"rgba(15,15,22,0.85)",
     color:allComplete?"white":"rgba(255,255,255,0.2)",
     border:"none",borderRadius:12,padding:"13px 0",
     fontWeight:900,cursor:allComplete?"pointer":"not-allowed",
     fontSize:15,fontFamily:"inherit",transition:"all 0.2s",
    }}>
     {allComplete ? (lang==="en"?"✓ Confirm & Create Character":"✓ Auswahl bestätigen & Charakter erstellen") : (lang==="en"?"Please fill in all fields":"Bitte alle Felder ausfüllen")}
    </button>
   </div>
  </div>
 );
}

function CustomEntry({ id, placeholder, onAdd, theme, inp }) {
 const [val, setVal] = useState("");
 const submit = () => {
  const t = val.trim();
  if (t) { onAdd(t); setVal(""); }
 };
 return (
  <div style={{ display:"flex",gap:6,marginTop:4 }}>
   <input type="text" value={val} onChange={e=>setVal(e.target.value)}
    onKeyDown={e=>e.key==="Enter"&&submit()}
    placeholder={placeholder}
    style={{...inp,flex:1,fontSize:12,padding:"5px 10px"}}/>
   <button onClick={submit} disabled={!val.trim()} style={{
    background:`${theme.accent}18`,border:`1px solid ${theme.accent}55`,
    borderRadius:8,padding:"5px 12px",cursor:val.trim()?"pointer":"not-allowed",
    color:theme.accent,fontWeight:800,fontSize:13,fontFamily:"inherit",
    opacity:val.trim()?1:0.4,
   }}>+</button>
  </div>
 );
}

 );

function hasArmorProf(classNames, profCategory) {
 if (profCategory === "keine") return true;
 for (const cls of (classNames||[])) {
  const profs = ARMOR_PROFICIENCY[cls] || ARMOR_PROFICIENCY[EN_TO_DE_CLASS[cls]] || [];
  if (profs.includes(profCategory)) return true;
 }
 return false;
}

function armorWarnings(armorItem, classNames, strScore) {
 const warnings = [];
 const cat = armorItem?.armor?.profCategory || armorItem?.profCategory;
 if (!cat || cat === "keine") return warnings;
 if (!hasArmorProf(classNames, cat)) {
  const uiLang = localStorage.getItem("dnd5e_lang") || "de";
  const catLabel = uiLang==="en"
   ? (cat === "leicht" ? "Light Armor" : cat === "mittel" ? "Medium Armor" : "Heavy Armor")
   : (cat === "leicht" ? "Leichter Rüstung" : cat === "mittel" ? "Mittlerer Rüstung" : "Schwerer Rüstung");
  warnings.push(uiLang==="en"
   ? `Not proficient with ${catLabel} – no proficiency bonus on ATK/saves & disadvantage on STR/DEX checks!`
   : `Nicht geübt mit ${catLabel} – kein Übungsbonus auf ATK/Rettungswürfe & Nachteil auf STR/DEX-Würfe!`);
 }
 const minStr = armorItem?.armor?.minStr ?? armorItem?.minStr ?? 0;
 if (minStr > 0 && (strScore||10) < minStr) {
  warnings.push(uiLang==="en"
   ? `STR ${strScore||10} too low – requires STR ${minStr}! Speed −10 ft.`
   : `STR ${strScore||10} zu niedrig – Mindest-STR ${minStr} nötig! Bewegungsrate −10 ft.`);
 }
 return warnings;
}

function handsNeeded(propsArr, weaponObj) {
 if (!propsArr) return 1;
 if (propsArr.some(p => p === "Zweihändig" || p === "2H")) return 2;

 const isVers = propsArr.some(p => p.startsWith("Vielseitig"));
 if (isVers && weaponObj?.twoHanded) return 2;
 return 1;
}

// Central translation helper: translates stored item/feature names for display
function translateDisplayName(name, lang) {
 if (!name) return name;
 if (lang === "en") {
  return WEAPON_NAME_EN[name] || ARMOR_NAME_EN[name] || FEATURE_KW_EN[name] || name;
 } else {
  return WEAPON_NAME_DE[name] || ARMOR_NAME_DE[name] || FEATURE_KW_DE[name] || name;
 }
}

// Map EN class names to DE class names for lookups that use DE keys internally
const EN_TO_DE_CLASS = {
 "Barbarian":"Barbar","Bard":"Barde","Cleric":"Kleriker","Druid":"Druide",
 "Fighter":"Kämpfer","Monk":"Mönch","Paladin":"Paladin","Ranger":"Waldläufer",
 "Rogue":"Schurke","Wizard":"Zauberer (Magier)","Warlock":"Hexenmeister","Sorcerer":"Zauberwirker (Sorcerer)",
};

function calcAC(armorId, hasShield, stats, className) {
 // Support both EN and DE class names for Barbarian/Monk detection
 const isBarb = className==="Barbar"||className==="Barbarian";
 const isMonk = className==="Mönch"||className==="Monk";
 const armor = (ARMOR_CATALOG.find(a => a.id === armorId) || ARMOR_CATALOG_EN.find(a => a.id === armorId)) || ARMOR_CATALOG[0];
 const dexMod = Math.floor(((stats?.dex || 10) - 10) / 2);
 const conMod = Math.floor(((stats?.con || 10) - 10) / 2);
 const wisMod = Math.floor(((stats?.wis || 10) - 10) / 2);
 const shieldBonus = hasShield ? 2 : 0;

 let ac = armor.baseAC;

 if (armorId === "unarmored") {
  if (isBarb) {
   ac = 10 + dexMod + conMod;
  } else if (isMonk) {
   ac = 10 + dexMod + wisMod;
  } else {
   ac = 10 + dexMod;
  }
 } else if (armor.addDex) {
  const effectiveDex = armor.maxDex !== null ? Math.min(dexMod, armor.maxDex) : dexMod;
  ac = armor.baseAC + effectiveDex;
 }

 return ac + shieldBonus;
}

function WizardEquipmentStep({ cls, bg, stats, theme, selectedEquipment, onEquipmentChange, lang }) {
 if(!lang) lang="de";
 const className = cls?.name || "";
 const deClassName = lang==="en" ? (EN_TO_DE_CLASS[className] || className) : className;
 const equipRec = lang==="en" ? EQUIPMENT_RECOMMENDATIONS_EN : EQUIPMENT_RECOMMENDATIONS;
 const rec = equipRec[className] || equipRec[deClassName] || (lang==="en" ? EQUIPMENT_RECOMMENDATIONS_EN["Fighter"] : EQUIPMENT_RECOMMENDATIONS["Kämpfer"]);
 const armorCat = lang==="en" ? ARMOR_CATALOG_EN : ARMOR_CATALOG;

 const [selectedPackage,   setSelectedPackage]   = useState(selectedEquipment?.packageId   || rec.packages?.[0]?.id || "a");
 const [selectedBgPackage, setSelectedBgPackage] = useState(selectedEquipment?.bgPackageId || "a");

 const packages = rec.packages || [];
 const currentPackage = packages.find(p => p.id === selectedPackage) || packages[0];

 // Armor and shield come directly from the package — no free selection
 const packageArmorId  = currentPackage?.armorId   || "unarmored";
 const packageHasShield = currentPackage?.hasShield || false;

 useEffect(() => {
  onEquipmentChange({
   armorId:     packageArmorId,
   hasShield:   packageHasShield,
   weaponIds:   currentPackage?.weaponIds || [],
   packageId:   selectedPackage,
   bgPackageId: selectedBgPackage,
   gold:        currentPackage?.gold || 0,
  });
 }, [selectedPackage, selectedBgPackage]);

 const currentAC = calcAC(packageArmorId, packageHasShield, stats, deClassName);
 const selectedArmorObj = armorCat.find(a => a.id === packageArmorId) || armorCat[0];

 const dexMod = Math.floor(((stats?.dex || 10) - 10) / 2);
 const conMod = Math.floor(((stats?.con || 10) - 10) / 2);
 const wisMod = Math.floor(((stats?.wis || 10) - 10) / 2);

 // Background package info
 const bgName = bg?.name || "";
 const bgEquipA = bg?.equipment?.split("·")[0]?.trim() || "";
 const bgEquipB = bg?.equipment?.split("·")[1]?.trim() || "50 GM";

 return (
  <div className="wizard-fade" style={{ display:"flex", flexDirection:"column", gap:16 }}>

     <div style={{ marginTop:5, fontWeight:800, color:theme.accent }}>
      {className==="Barbar"

       : `Unarmored Defense: 10 + DEX(${dexMod>=0?"+":""}${dexMod}) + WIS(${wisMod>=0?"+":""}${wisMod}) = RK ${10+dexMod+wisMod}`}

function WizardProgressBar({ step, total, theme }) {
 return (
  <div style={{ display:"flex", gap:4, marginBottom:24 }}>
   {Array.from({length:total}).map((_,i) => (
    <div key={i} style={{
     flex:1, height:3, borderRadius:4,
     background: i <= step ? theme.accent : "rgba(255,255,255,0.1)",
     transition:"background 0.3s",
     boxShadow: i === step ? `0 0 8px ${theme.accent}88` : "none"
    }}/>
   ))}
  </div>
 );
}

function WizardCard({ item, selected, onSelect, theme, showTip, recommendedNames }) {
 const isSelected = selected?.name === item.name;
 const isRecommended = recommendedNames && recommendedNames.includes(item.name);
 return (
  <div className="card-hover" onClick={() => onSelect(item)}
   style={{
    background: isSelected ? `${item.color}18` : isRecommended ? `${item.color}0a` : "rgba(12,12,18,0.90)",
    border: `2px solid ${isSelected ? item.color : isRecommended ? `${item.color}55` : "rgba(255,255,255,0.08)"}`,
    borderRadius:14, padding:"14px 16px", cursor:"pointer",
    boxShadow: isSelected ? `0 0 20px ${item.color}33` : "none",
    transition:"all 0.2s"
   }}>
   <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom: showTip && isSelected && item.classTip ? 6 : 0 }}>
    <span style={{ fontSize:24 }}>{item.emoji}</span>
    <div style={{ flex:1, minWidth:0 }}>
     <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <span style={{ fontWeight:800, fontSize:15, color: isSelected ? item.color : "white" }}>{item.name}</span>
      {isRecommended && !isSelected && (
       <span style={{ fontSize:10, fontWeight:800, color:"#4ade80", background:"rgba(74,222,128,0.15)",
        border:"1px solid rgba(74,222,128,0.3)", borderRadius:20, padding:"1px 7px", letterSpacing:"0.04em" }}>
        ✦ {localStorage.getItem("dnd5e_lang")==="en"?"RECOMMENDED":"EMPFOHLEN"}
       </span>
      )}
     </div>
     <div style={{ fontSize:11, color: item.color, fontWeight:600, opacity:0.8 }}>{item.tagline}</div>
    </div>
    {isSelected && <span style={{ color:item.color, fontSize:18 }}>✓</span>}
   </div>
   {showTip && isSelected && item.classTip && (
    <div style={{ fontSize:11, color:"rgba(74,222,128,0.9)", background:"rgba(74,222,128,0.07)",
     border:"1px solid rgba(74,222,128,0.2)", borderRadius:7, padding:"4px 8px", lineHeight:1.5 }}>
     🎯 {item.classTip}
    </div>
   )}
  </div>
 );
}

class WizardDetailErrorBoundary extends React.Component {
 constructor(props) { super(props); this.state = { hasError: false }; }
 static getDerivedStateFromError() { return { hasError: true }; }
 componentDidCatch(err) { console.error("WizardDetail crash:", err); }
 render() {
  if (this.state.hasError) return (
   <div style={{ padding:20, color:"rgba(255,255,255,0.4)", textAlign:"center" }}>
    <div style={{ fontSize:24, marginBottom:8 }}>⚠</div>
    <div>{localStorage.getItem("dnd5e_lang")==="en"?"Could not load details.":"Konnte Details nicht laden."}</div>
   </div>
  );
  return this.props.children;
 }
}
